 warn:[F("La patience du GPS. Tous ces réglages exigent le satellite pour fonctionner. Dans les champs extérieurs, avant de faire claquer l'interrupteur 'Position' ou 'Offboard', le Pixhawk doit observer et capter fixement au moins 8 à 10 satellites. Tentez un vol positionné avec 5 pauvres satellites clignotants et le drone fuira de 5 mètres sur le côté de façon erratique dans un phénomène appelé 'Toilet Bowling'.","The GPS patience. All these settings demand satellites to function. In the outdoor fields, before slamming the 'Position' or 'Offboard' toggle, the Pixhawk must observe and solidly lock onto at least 8 to 10 satellites. Attempt a positioned flight with 5 poor blinking satellites and the drone will run away 5 metres sideways erratically in a phenomenon called 'Toilet Bowling'.")]},
/* ===== LOGICIEL PI ===== */
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Le calculateur de bord","The companion computer"),
 lede:F("Si vous avez bien suivi, votre drone noir et lourd trône sur votre table, capable de voler si vous poussez le joystick en manuel. Il est temps de lui injecter une dose de Python pour qu'il le fasse sans vous. La carte mère Raspberry Pi 5 fixée derrière est encore une coquille vide endormie. Nous allons utiliser la magie du partage de connexion (hotspot) Wi-Fi d'un téléphone pour réveiller la bête.","If you've followed properly, your heavy black drone sits on your table, capable of flying if you push the manual joystick. It's time to inject it with a dose of Python so it does it without you. The Raspberry Pi 5 motherboard fastened to the back is still a sleeping empty shell. We will use the magic of a phone's Wi-Fi hotspot to wake the beast."),
 instr:[
  F("Ce n'est pas vous qui taperez sur un clavier branché au drone. Le plan d'attaque est celui d'un pirate distant. Le drone et votre PC de bureau sont tous les deux accrochés au réseau Wi-Fi diffusé par la puce 4G/5G de votre téléphone portable (Hotspot). Le PC va infiltrer la Pi par les airs (SSH).","You will not be typing on a keyboard plugged into the drone. The attack plan is that of a remote hacker. The drone and your desktop PC are both tethered to the Wi-Fi network broadcast by your cellphone's 4G/5G chip (Hotspot). The PC will infiltrate the Pi through the air (SSH)."),
  F("Préparez la manœuvre en posant l'appareil sur votre table avec sa batterie branchée. Le Pixhawk flamboie, la petite carte verte Raspberry s'anime. Gardez votre PC portable connecté au téléphone. Laissez l'ordinateur de vol respirer quelques secondes.","Prepare the manoeuvre by setting the craft on your table with its battery plugged in. The Pixhawk blazes, the small green Raspberry board comes alive. Keep your laptop tethered to the phone. Let the flight computer breathe for a few seconds.")],
 tip:[F("Assurez-vous d'avoir flashé la carte SD avec Raspberry Pi Imager tel qu'expliqué plus haut, en configurant minutieusement le Wi-Fi (SSID/Mot de passe de votre téléphone) durant cette gravure. Sans cette préparation SD rigoureuse, la Pi ne pourra jamais attraper le réseau de votre téléphone.","Ensure you've flashed the SD card with Raspberry Pi Imager as explained earlier, meticulously configuring the Wi-Fi (SSID/Password of your phone) during that burn. Without this rigorous SD prep, the Pi will never be able to snatch your phone's network.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Trouver les adresses IP","Find the IP addresses"),
 lede:F("Le traditionnel stratagème '.local' ne fonctionne malheureusement jamais de façon fiable sur ces partages de connexion. Pour s'introduire dans la machine, il nous faut obtenir les coordonnées numériques brutes de la Pi et du PC.","The traditional '.local' trick unfortunately never works reliably over these hotspots. To break into the machine, we must obtain the raw numeric coordinates of the Pi and the PC."),
 instr:[
  F("Trouver l'IP cible (la Pi) : Déverrouillez votre smartphone. Enfoncez-vous dans le menu sombre des réglages de partage de connexion. Il s'y trouve souvent une ligne discrète nommée 'Appareils connectés' ou un sous-menu affichant le DHCP. Trouvez-y la ligne désignant le client 'neutronit'. Notez cette adresse IP sur un papier (elle ressemble souvent à <span class='tag'>172.20.10.2</span> ou 192.168.43.x).","Find the target IP (the Pi): Unlock your smartphone. Delve into the dark menu of hotspot settings. There is often a discrete line named 'Connected devices' or a submenu showing the DHCP. Find the line designating the 'neutronit' client. Jot this IP address down on paper (it often looks like <span class='tag'>172.20.10.2</span> or 192.168.43.x)."),
  F("Trouver sa propre IP (le PC) : Sur votre PC Windows, ouvrez la console brutale PowerShell (recherchez 'powershell' dans la barre Démarrer). Tapez agressivement la commande d'une traite : <span class='tag'>ipconfig</span> et tapez sur Entrée. Au milieu des pavés de texte, lisez la ligne 'Adresse IPv4' sous l'adaptateur Wi-Fi (ex. <span class='tag'>172.20.10.3</span>).","Find your own IP (the PC): On your Windows PC, open the brutal PowerShell console (search 'powershell' in the Start bar). Aggressively type the one-shot command: <span class='tag'>ipconfig</span> and hit Enter. Amidst the text blocks, read the 'IPv4 Address' line under the Wi-Fi adapter (e.g. <span class='tag'>172.20.10.3</span>).")],
 tip:[F("C'est une loi de réseau incontournable : les trois premiers gros blocs de chiffres constituant ces deux adresses doivent être des jumeaux parfaits (ex. 172.20.10.x). Sinon, PC et Drone habitent sur des planètes distinctes et le hacking échouera.","It's an inescapable law of networking: the first three large blocks of numbers making up these two addresses must be perfect twins (e.g. 172.20.10.x). Otherwise, PC and Drone live on distinct planets and the hack will fail.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Connexion SSH","SSH connection"),
 lede:F("Le pont sans fil est établi. Le PC va ouvrir un terminal ténébreux directement dans l'esprit du drone. Tout ce que vous frapperez ici sera exécuté là-bas, physiquement, à bord.","The wireless bridge is established. The PC will rip open a shadowy terminal straight into the drone's mind. Everything you strike here will be executed over there, physically, on board."),
 instr:[
  F("Gardez la fenêtre bleue ou noire PowerShell ouverte sur le PC. Frappez la commande d'invocation SSH en remplaçant l'adresse d'exemple par la vraie IP arrachée au téléphone :<code class='cmd'>ssh neutronit@172.20.10.2</code>(Remplacez 172.20.10.2). Répondez 'yes' si un message paranoïaque concernant une empreinte cryptographique (fingerprint) s'affiche. L'invite de commande vous réclamera un mot de passe. Tapez : <span class='tag'>neutronit2026</span> (Attention, les lettres ne s'afficheront pas à l'écran, frappez à l'aveugle puis validez).","Keep the blue or black PowerShell window open on the PC. Strike the SSH invocation command, replacing the example address with the true IP ripped from the phone:<code class='cmd'>ssh neutronit@172.20.10.2</code>(Replace 172.20.10.2). Answer 'yes' if a paranoid message concerning a cryptographic fingerprint pops up. The command prompt will demand a password. Type: <span class='tag'>neutronit2026</span> (Caution, the letters will not show on screen, strike blindly then enter)."),
  F("Si le terminal vous crache une erreur sanglante d'hôte révoqué ('WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!'), c'est fréquent si vous avez effacé et re-flashé la carte mémoire hier. Nettoyez le passé de votre ordinateur avec cette ligne foudroyante :<code class='cmd'>ssh-keygen -R 172.20.10.2</code>(utilisez l'IP de la Pi), et relancez votre tentative SSH précédente. Vous êtes désormais à bord.","If the terminal spits a bloody revoked host error at you ('WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!'), it's common if you wiped and re-flashed the memory card yesterday. Purge your computer's past with this blistering line:<code class='cmd'>ssh-keygen -R 172.20.10.2</code>(use the Pi's IP), and re-run your previous SSH attempt. You are now aboard.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Installer le logiciel","Install the software"),
 lede:F("Vous voilà dans le shell distant du drone. Il est temps de gaver l'ordinateur de bibliothèques mathématiques complexes pour la vision et le pilotage. Copiez-collez les pavés massifs de code ci-dessous. Allez boire un café pendant que le processeur sue pour les compiler.","Here you are in the drone's remote shell. It's time to force-feed the computer complex mathematical libraries for vision and piloting. Copy-paste the massive slabs of code below. Go drink a coffee while the processor sweats to compile them."),
 instr:[
  F("Première attaque : Mettre à jour l'architecture entière du système, puis abreuver la carte avec les monstrueuses librairies OpenCV (vision artificielle), les applications caméra natives, et les plugins complexes du serveur vidéo GStreamer. Collez cette lourde commande (elle pèse son poids en réseau) :<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>","First attack: Update the entire system architecture, then drench the board with the monstrous OpenCV libraries (artificial vision), native camera apps, and the complex plugins of the GStreamer video server. Paste this heavy command (it weighs heavily on the network):<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>"),
  F("Seconde attaque : Le langage MAVLink. Il faut forcer l'installation (en cassant les sécurités système) des paquets Python pymavlink et du démon MAVProxy, inscrire l'utilisateur au groupe matériel 'dialout' pour avoir le droit de toucher aux ports électriques bruts, et mettre à jour le raccourci d'exécution PATH. Exécutez ce magma en une seule ligne :<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>","Second attack: The MAVLink language. You must force the installation (breaking system safeties) of the Python pymavlink packages and MAVProxy daemon, enroll the user into the 'dialout' hardware group to earn the right to touch raw electrical ports, and update the PATH execution shortcut. Execute this magma in a single line:<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Activer l'UART","Enable UART"),
 lede:F("Les broches métalliques sur lesquelles vous avez glissé les câbles du Pixhawk tout à l'heure sont logiciellement bridées par défaut. On va défoncer ces sécurités et ouvrir la vanne du port Série (UART) pour permettre au flux d'IA de transiter.","The metallic pins onto which you slid the Pixhawk cables earlier are software-locked by default. We are going to smash these safeties and open the valve of the Serial port (UART) to let the AI flow transit."),
 instr:[
  F("Dans votre terminal SSH (sur la Pi), invoquez l'outil rudimentaire de configuration système en tapant la commande <span class='tag'>sudo raspi-config</span>. Un écran bleu désuet apparaît. Utilisez les flèches directionnelles du clavier pour descendre sur la ligne <strong>Interface Options</strong> puis <strong>Serial Port</strong>. Le système vous pose une question ambiguë 'login shell over serial ?'. Frappez impérativement <strong>NON / NO</strong>. Il enchaîne avec 'serial hardware enabled ?'. Frappez joyeusement <strong>OUI / YES</strong>. Quittez ce menu et acceptez de faire rebooter (redémarrer) le drone.","In your SSH terminal (on the Pi), invoke the rudimentary system config tool by typing the command <span class='tag'>sudo raspi-config</span>. An antiquated blue screen appears. Use keyboard arrow keys to descend onto the <strong>Interface Options</strong> line then <strong>Serial Port</strong>. The system asks an ambiguous question 'login shell over serial?'. Imperatively strike <strong>NO</strong>. It follows up with 'serial hardware enabled?'. Joyously strike <strong>YES</strong>. Exit this menu and agree to reboot the drone."),
  F("Laissez passer 30 secondes, et reconnectez-vous au drone avec la commande 'ssh neutronit@...'. Procédez à l'interrogatoire final des installations pour confirmer que les outils sont chargés dans la rampe de lancement :<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>Si les numéros de version, 'OpenCV OK', et la racine jaune du port ttyAMA0 s'affichent sans message d'insulte rouge vif, votre arsenal est déclaré opérationnel.","Wait 30 seconds, and reconnect to the drone with the 'ssh neutronit@...' command. Proceed with the final interrogation of the installs to confirm the tools are loaded in the launch tube:<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>If version numbers, 'OpenCV OK', and the yellow root of the ttyAMA0 port display without a bright red insult message, your arsenal is declared operational.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Éditer le code via VS Code (Remote SSH)","Edit the code via VS Code (Remote SSH)"),
 lede:F("Oubliez les horribles éditeurs de texte rudimentaires du terminal noir. Nous allons hacker le workflow en utilisant Visual Studio Code (VS Code) sur votre beau PC, qui se greffera silencieusement à la Pi par réseau. Vous y coderez des fichiers qui résideront en réalité sur la carte SD du drone.","Forget the horrible rudimentary text editors of the black terminal. We will hack the workflow using Visual Studio Code (VS Code) on your beautiful PC, which will silently graft itself onto the Pi over the network. You will code files there that actually reside on the drone's SD card."),
 instr:[
  F("Sur votre puissant ordinateur de bureau Windows, ouvrez votre Visual Studio Code. Rendez-vous dans la section grouillante des Extensions (l'icône carrée à gauche). Cherchez et installez goulûment l'extension phare de Microsoft nommée <strong>Remote - SSH</strong>.","On your powerful Windows desktop computer, open your Visual Studio Code. Head to the swarming Extensions section (the square icon on the left). Search for and greedily install the flagship Microsoft extension named <strong>Remote - SSH</strong>."),
  F("L'installation accomplie, dirigez votre curseur tout en bas à gauche de la fenêtre, sur la minuscule icône verte affichant les symboles <span class='tag'>&gt;&lt;</span>. Cliquez fermement. Un menu tombe du ciel. Sélectionnez l'action <strong>Connect to Host…</strong> puis <strong>Add New SSH Host…</strong>.","Installation complete, steer your cursor to the very bottom-left of the window, onto the tiny green icon displaying the <span class='tag'>&gt;&lt;</span> symbols. Click firmly. A menu drops from the sky. Select the <strong>Connect to Host…</strong> action then <strong>Add New SSH Host…</strong>."),
  F("Le logiciel vous demande la formule d'invocation. Tapez exactement comme dans PowerShell : <span class='tag'>ssh neutronit@172.20.10.2</span> (utilisez votre propre IP). Validez brutalement avec Entrée. Il vous propose un fichier de configuration, prenez le premier proposé par défaut (le plus banal), puis pressez la notification pop-up en bas à droite <strong>Connect</strong>. Quand il réclame un mot de passe dans un tiroir central en haut de l'écran, offrez-lui <span class='tag'>neutronit2026</span>.","The software demands the invocation formula. Type exactly as in PowerShell: <span class='tag'>ssh neutronit@172.20.10.2</span> (use your own IP). Brutally validate with Enter. It offers a config file, take the first default mundane one, then hit the pop-up notification bottom-right <strong>Connect</strong>. When it demands a password in a central top-screen drawer, offer it <span class='tag'>neutronit2026</span>."),
  F("La fenêtre se rafraîchit. Vous êtes greffé. Dans le menu en haut, allez sur <strong>File → Open Folder</strong>. Une case s'ouvre, effacez tout pour n'écrire que <span class='tag'>/home/neutronit</span> et validez lourdement. À gauche, l'arborescence des fichiers secrets de la Pi apparaît. Et le coup de grâce : cliquez sur <strong>Terminal → New Terminal</strong> en haut de l'écran. Un panneau s'ouvre en bas. Vous avez un terminal de commandes qui agit nativement dans le drone, sublimé par la beauté de VS Code.","The window refreshes. You are grafted. In the top menu, go to <strong>File → Open Folder</strong>. A box opens, wipe it all to write only <span class='tag'>/home/neutronit</span> and validate heavily. On the left, the tree of the Pi's secret files appears. And the kill shot: click <strong>Terminal → New Terminal</strong> at the top of the screen. A panel tears open at the bottom. You have a command terminal acting natively inside the drone, sublimated by the beauty of VS Code.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Lancer le vol","Launch the flight"),
 lede:F("Le grand théâtre des opérations en temps réel. Pour que le système complexe fonctionne sans que ses processus ne se marchent dessus, nous allons ouvrir simultanément trois terminaux (trois onglets) dans VS Code. L'un aspirera la télémétrie, l'autre vomira la vidéo vers votre écran de contrôle, et le troisième exécutera votre précieux code de mission IA.","The grand theatre of real-time operations. For the complex system to run without its processes trampling each other, we will simultaneously open three terminals (three tabs) in VS Code. One will suck up telemetry, another will vomit video to your control screen, and the third will execute your precious AI mission code."),
 instr:[
  F("Lancez la télémétrie (La colonne vertébrale des données). Ouvrez le Terminal 1. Il lance le logiciel MAVProxy. Son but ? Écouter le port UART relié au Pixhawk, récupérer toutes ses données de vol confidentielles et les pulvériser en réseau Wi-Fi vers le sol (vers votre logiciel QGC). <strong>Pensez impérativement à modifier l'IP '172.20.10.3' dans la commande ci-dessous par la véritable adresse IP de votre PC de sol !</strong><code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:172.20.10.3:14550 --out udp:127.0.0.1:14551</code>","Launch telemetry (The data backbone). Open Terminal 1. It launches the MAVProxy software. Its goal? Listen to the UART port wired to the Pixhawk, scavenge all its confidential flight data and spray it over Wi-Fi down to the ground (to your QGC software). <strong>You must imperatively modify the '172.20.10.3' IP in the command below with the true IP address of your ground PC!</strong><code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:172.20.10.3:14550 --out udp:127.0.0.1:14551</code>"),
  F("Lancez le Streaming vidéo. Cliquez sur le bouton '+' de VS Code pour créer le Terminal 2. Cette ligne extirpe la vision de la lentille vissée à l'avant du drone, la compresse en H264 furieusement via le matériel de la Pi, et expulse ce flux vidéo UDP vers l'adresse IP de votre PC terrestre (remplacez encore cette adresse !).<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://172.20.10.3:5600</code>","Launch Video Streaming. Click the '+' button in VS Code to spawn Terminal 2. This line yanks vision from the lens bolted to the drone's front, compresses it to H264 furiously via the Pi's hardware, and blasts this UDP video stream to your terrestrial PC's IP address (replace this address again!).<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://172.20.10.3:5600</code>"),
  F("Lancez l'intelligence artificielle. Créez un majestueux Terminal 3. C'est ici que l'âme de l'appareil s'exprime. Vous allez demander à la machine python de compiler et faire courir le long fichier complexe (neutronit_vol.py) que vous avez passé vos nuits à programmer. L'algorithme se liera au flux vidéo et expédiera ses ordres au Pixhawk.<code class='cmd'>python3 neutronit_vol.py</code>","Launch Artificial Intelligence. Spawn a majestic Terminal 3. This is where the soul of the craft expresses itself. You will demand the Python machine to compile and run the long complex file (neutronit_vol.py) you've spent nights programming. The algorithm will bind to the video stream and dispatch its orders to the Pixhawk.<code class='cmd'>python3 neutronit_vol.py</code>")]},
/* ===== FERMETURE ===== */
{phase:F("Fermeture finale","Final closing"),title:F("Monter le mât GPS","Fit the GPS mast"),
 lede:F("Avant de sceller le couvercle de la bête, il faut ériger la tour de garde. Le GPS doit absolument trôner sur une colonne élevée (le mât), le plus loin possible des interférences générées par les calculateurs, pour que sa boussole puisse écouter le très faible champ magnétique terrestre.","Before sealing the lid of the beast, the watchtower must be erected. The GPS must absolutely reign atop an elevated column (the mast), as far as possible from the interference bred by the computers, so its compass can listen to the very weak magnetic field of the earth."),
 parts:[{qty:"x4",name:F("Très fines vis M3×8","Very thin M3×8 screws"),ref:""}],
 fastener:[F("Vis M3×8","Screw M3×8"),F("Insert M3","Insert M3")],
 instr:[F("Reprenez la coque aérodynamique. Au sommet (le renfoncement carré), insérez la base carrée du grand mât cylindrique noir imprimé en 3D. Alignez ses 4 trous avec les 4 petits inserts M3 fondus plus tôt dans la cavité. Prenez 4 vis M3×8 et serrez de manière croisée la base du mât dans la coque. Posez ensuite le capteur GPS plat sur le sommet du mât. Pensez à l'orienter correctement : les GPS ont aussi une flèche pointant vers l'avant. Fixez-le avec du ruban mousse double face ou le système fourni avec le capteur.","Take back the aerodynamic shell. At its summit (the square recess), insert the square base of the tall black 3D-printed cylindrical mast. Align its 4 holes with the 4 small M3 inserts melted earlier into the cavity. Take 4 M3×8 screws and cross-tighten the base of the mast into the shell. Then place the flat GPS sensor on the pinnacle of the mast. Remember to orient it correctly: GPS units also have an arrow pointing to the front. Secure it with double-sided foam tape or the system provided with the sensor.")]},
{phase:F("Fermeture finale","Final closing"),title:F("Fermer la coque + fixer l'ELRS","Close the shell + secure the ELRS"),
 lede:F("L'acte final de l'assemblage physique. Le grand capot imprimé vient avaler toute la machinerie intime du drone. Il faut cependant veiller à ne broyer ni écraser les innombrables kilomètres de fils qui serpentent. Le petit récepteur ELRS abandonné trouve enfin sa place.","The final act of physical assembly. The grand printed canopy descends to swallow all the intimate machinery of the drone. You must take care, however, not to crush or mangle the countless kilometres of wires snaking about. The abandoned little ELRS receiver finally finds its place."),
 parts:[
  {qty:"x4",name:F("Vis M3 (à glisser par le dessous)","M3 screws (to slide from underneath)"),ref:""},
  {qty:"x1",name:F("Fin collier de serrage (Rilsan)","Thin zip tie (Rilsan)"),ref:"pour sécuriser l'ELRS / to secure the ELRS"}],
 fastener:[F("Vis M3","Screw M3"),F("Insert M3","Insert M3")],
 instr:[
  F("Glissez lentement la grande coque noire par-dessus toute la tour électronique. Prenez un soin méticuleux à faire passer librement les tubes de carbone des 4 bras à travers les grandes arches de la coque. Le câble du mât GPS doit plonger discrètement à travers le capot sans être tendu. L'énorme câble d'alimentation jaune de la batterie doit pendre dégagé sous la plaque de base.","Slowly lower the large black shell over the entire electronic tower. Take meticulous care letting the carbon tubes of the 4 arms pass freely through the shell's grand arches. The GPS mast cable must plunge stealthily through the canopy without being taut. The enormous yellow battery power cable must hang clear below the base plate."),
  F("Une fois la coque reposant parfaitement à plat sur la lèvre de la grande plaque inférieure, retournez doucement le drone. Prenez une lampe torche et glissez les vis M3 à travers la face inférieure de la grande plaque pour venir poignarder et visser dans les inserts noyés dans le pourtour de la coque. Serrez avec circonspection, car une pression herculéenne fissurera le fragile PETG.","Once the shell is resting perfectly flat on the lip of the grand bottom plate, gently flip the drone over. Take a flashlight and slip M3 screws through the underside of the grand plate to stab and screw up into the inserts melted around the shell's perimeter. Tighten with circumspection, as a Herculean pressure will crack the fragile PETG."),
  F("La touche ultime : repêchez la petite puce noire de réception radio (l'ELRS). Attirez-la vers l'arrière du drone, à l'intérieur. Identifiez les trous verticaux de ventilation striés situés à l'arrière de la coque. Plaquez l'ELRS contre l'intérieur de ces trous en laissant son antenne noire pointer verticalement dans un espace dégagé. Passez un petit collier de plastique à travers les grilles de ventilation, enserrant la puce, et tirez le fermoir.","The ultimate touch: fish out the small black radio receiver chip (the ELRS). Draw it to the rear of the drone, on the inside. Identify the vertically striated ventilation holes located at the rear of the shell. Press the ELRS against the inside of these holes, leaving its black stick antenna pointing vertically in clear space. Thread a small plastic zip tie through the ventilation grilles, looping the chip, and pull the clasp.")]},

{phase:F("Premier vol","First flight"),title:F("Installer la batterie","Install the battery"),
 lede:F("L'appareil n'est plus qu'une coquille finie. Nous allons charger son réservoir destructeur. Le monstre électrique noir de 6000 mAh ne rentre pas dans le drone, il s'arrime sauvagement à son ventre plat.","The craft is nothing but a finished shell. We will load its destructive tank. The massive black 6000 mAh electric monster does not fit inside the drone, it heavily tethers itself to its flat underbelly."),
 parts:[
  {qty:"x1",name:F("L'énorme Batterie LiPo 4S 6000 mAh","The massive 4S 6000 mAh LiPo battery"),ref:""},
  {qty:"x2",name:F("Sangles épaisses en Velcro rugueux","Thick rough Velcro straps"),ref:""}],
 instr:[
  F("Basculer le drone sur le flanc. Prenez le parpaing noir qui sert de batterie et glissez-le rudement au ras de la plaque inférieure, exactement <strong>au centre de gravité, coincé géométriquement entre les 4 petits plots de plastique circulaires</strong> (ces plots empêchent le ripage de la batterie en cas de choc latéral violent). Connectez joyeusement et avec un petit frisson l'extrémité jaune de la batterie au câble pendant du XT60 IN.","Tilt the drone on its flank. Take the black cinder block acting as a battery and shove it roughly flush against the bottom plate, exactly <strong>at the centre of gravity, geometrically wedged between the 4 small circular plastic stubs</strong> (these stubs prevent lateral battery slip in a violent shock). Joyously and with a slight shudder, connect the yellow end of the battery to the dangling XT60 IN cable."),
  F("Le verrouillage balistique : Faufilez les 2 énormes sangles en Kevlar ou Velcro autour de la bedaine du drone, enlaçant impitoyablement la batterie contre la plaque. Remontez la sangle, faites-la courir par-dessus les reins aérodynamiques de la coque supérieure noire, redescendez vers la boucle. Tirez sur la lanière avec une force bestiale avant de refermer le scratch. Un crash à 80 km/h arrachera tout, si ce n'est pas serré ainsi.","Ballistic lockdown: Weave the 2 huge Kevlar or Velcro straps around the drone's gut, pitilessly hugging the battery against the plate. Bring the strap up, run it over the aerodynamic kidneys of the top black shell, back down to the buckle. Pull the strap with beastly force before sealing the scratch. An 80 km/h crash will rip everything off if not tightened this way."),
  F("Exercez un pesage au doigt. Soulevez le drone d'un seul doigt planté exactement au centre géométrique des 4 hélices. Si le drone plonge de l'avant, la batterie est mal placée. Poussez physiquement la brique noire vers l'arrière d'un centimètre pour faire contrepoids au bloc caméra, et resserrez.","Perform a finger-weighing. Lift the drone with a single finger planted exactly at the geometric dead-centre of the 4 propellers. If the drone nose-dives, the battery is misplaced. Physically shove the black brick backwards by a centimetre to counterbalance the camera block, and retighten.")]},
{phase:F("Premier vol","First flight"),title:F("Monter les hélices","Fit the propellers"),
 lede:F("L'ultime geste mortel. Visser les sabres rotatifs. Ceci n'arrive qu'à l'extrême fin, juste avant de fouler l'herbe du terrain, et JAMAIS, au grand JAMAIS à l'intérieur d'un appartement, sauf si vous détestez votre mobilier et la peau de vos avant-bras.","The ultimate deadly act. Bolting the rotary sabers. This only occurs at the extreme end, right before treading the field's grass, and NEVER, EVER inside an apartment, unless you despise your furniture and the skin of your forearms."),
 parts:[{qty:"x2 paires",name:F("Pales profilées Gemfan 9047 (CW + CCW)","Profiled Gemfan 9047 blades (CW + CCW)"),ref:""}],
 instr:[
  F("Lisez attentivement l'ordre du câblage qui pend de vos moteurs. Si vous avez rigoureusement suivi la bible de soudage de l'ESC : un moteur dont le <strong>fil bleu électrique trône au centre est un soldat qui tourne en Anti-Horaire (CCW)</strong>. Un moteur dont le <strong>fil bleu est déporté sur le flanc extérieur est un soldat Horaire (CW)</strong>. Pointez chaque moteur du doigt et murmurez son sens.","Read carefully the wiring order hanging from your motors. If you rigorously followed the ESC soldering bible: a motor whose <strong>electric blue wire rules the centre is a soldier spinning Counter-Clockwise (CCW)</strong>. A motor whose <strong>blue wire is exiled to the outer flank is a Clockwise (CW) soldier</strong>. Point at each motor with your finger and whisper its spin direction."),
  F("Sortez vos hélices grises. L'une des faces bombées de la pale plastique présente un lettrage moulé effacé stipulant sa taille et sa nature (ex: 9047R pour Reverse/CW, 9047 pour Standard/CCW). Regardez de profil : le bord d'attaque arrondi de la lame doit fendre l'air dans la direction du spin. Appliquez formellement :<table class='map'><tr><th>Identifier le moteur</th><th>Sens vérifié</th><th>Monture d'hélice obligatoire</th></tr><tr><td>Avant-Droit (M1) · Arrière-Gauche (M2)</td><td>Horaire (CW)</td><td>Hélice CW (souvent marquée R)</td></tr><tr><td>Avant-Gauche (M3) · Arrière-Droit (M4)</td><td>Anti-Horaire (CCW)</td><td>Hélice CCW (souvent normale)</td></tr></table>","Pull out your grey props. One of the convex faces of the plastic blade features faint molded lettering stating its size and nature (e.g., 9047R for Reverse/CW, 9047 for Standard/CCW). Look in profile: the rounded leading edge of the blade must cleave the air in the direction of the spin. Formally apply:<table class='map'><tr><th>Identify motor</th><th>Verified spin</th><th>Mandatory prop mount</th></tr><tr><td>Front-Right (M1) · Rear-Left (M2)</td><td>Clockwise (CW)</td><td>CW Prop (often marked R)</td></tr><tr><td>Front-Left (M3) · Rear-Right (M4)</td><td>Counter-Clockwise (CCW)</td><td>CCW Prop (often normal)</td></tr></table>"),
  F("Pressez physiquement l'axe percé de l'hélice sur la tige pointue du moteur. Poussez très fort verticalement. L'hélice va descendre péniblement jusqu'à heurter un petit rebord métallique (le méplat) de la cloche moteur. Elle ne doit pas flotter. <strong>Vérifiez impérativement que les petites lettres moulées regardent toujours le plafond, jamais le sol.</strong>","Physically press the pierced axis of the prop onto the spiky motor shaft. Push very hard vertically. The prop will slide down painfully until hitting a small metal ledge (the flat) of the motor bell. It must not float. <strong>Imperatively verify that the small molded letters always look at the ceiling, never the ground.</strong>"),
  F("Prenez un petit écrou auto-bloquant pourri d'un anneau en nylon. Vissez-le à la main sur la tige dépassant au-dessus de l'hélice. Terminez de broyer la résistance du nylon avec une clé à douille. Donnez un quart de tour sec pour verrouiller méchamment. Donnez une pichenette à l'hélice avec le doigt : elle doit tourner avec grâce, fluidité et sans dessiner de vague ('voile'). Si l'hélice frotte ignoblement sur le dôme plastique de la coque, démontez et poncez la carrosserie !","Take a small lock-nut infested with a nylon ring. Thread it by hand onto the shaft poking above the prop. Finish crushing the nylon's resistance with a socket wrench. Give a sharp quarter-turn to lock maliciously. Flick the prop with your finger: it must spin with grace, fluidity and without drawing a wave ('wobble'). If the prop rubs foully against the plastic dome of the shell, dismantle and sand the bodywork!")]},

/* ============================ UI ============================ */
let lang = 'fr'; // Langue par défaut
const UI = {
  fr: {
    sub: "Notice de montage détaillée", step: "Étape", prev: "Précédent", next: "Suivant", done: "Terminer",
    parts: "Matériel strictement requis", screws: "Quincaillerie de fixation", check: "Checklist de survie", howto: "Procédure opérationnelle",
    caution: "Avertissement critique", tip: "Savoir-faire", checked: "Validé"
  },
  en: {
    sub: "Detailed assembly guide", step: "Step", prev: "Previous", next: "Next", done: "Finish",
    parts: "Strictly required hardware", screws: "Fixation hardware", check: "Survival checklist", howto: "Operational procedure",
    caution: "Critical warning", tip: "Know-how", checked: "Validated"
  }
};
const L = x => (x && typeof x === 'object' && 'fr' in x) ? x[lang] : x;

const stage = document.getElementById('stage'), dotsWrap = document.getElementById('dots'), bar = document.getElementById('bar');
const cNum = document.getElementById('cNum'), cTot = document.getElementById('cTot');
const prevB = document.getElementById('prev'), nextB = document.getElementById('next');
const langToggle = document.getElementById('langToggle'), langTxt = document.getElementById('langTxt');
let i = 0;
const pad = n => String(n).padStart(2, '0');
const SCREW = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M8.5 4h7l-1.5 3.2h-4z"/><path d="M10 7.2h4V18l-2 3-2-3z"/></svg>`;
const INSERT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="7" y="5" width="10" height="14" rx="1.2"/><path d="M9.4 5v14M12 5v14M14.6 5v14"/></svg>`;
const CHECKMARK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;

function partsCard(s) {
  const rows = s.parts.map(p => `<div class="part"><div class="qty">${L(p.qty)}</div><div><div class="pn">${L(p.name)}</div>${p.ref ? `<div class="pref">${L(p.ref)}</div>` : ''}</div></div>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].parts}</div><div class="manifest">${rows}</div></div>`;
}
function fastCard(s) {
  const it = s.fastener.map(f => { const t = L(f); const ic = /nsert/i.test(t) ? INSERT : SCREW; return `<div class="fitem">${ic}<span>${t}</span></div>`; }).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].screws}</div><div class="fastbody">${it}</div></div>`;
}
function checkCard(s) {
  const rows = s.checklist.map((c, k) => `<label class="check"><input type="checkbox" data-k="${k}"><span class="ctext">${L(c.name)}${c.ref ? `<small>${L(c.ref)}</small>` : ''}</span></label>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].check}</div><div class="manifest">${rows}</div><div class="checkfoot"><span>${UI[lang].checked}</span><span><b id="ckN">0</b> / ${s.checklist.length}</span></div></div>`;
}
function figure(im) {
  return `<figure class="figure"><div class="frame"><span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
    <img src="${im.src}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="ph" style="display:none"><div>[Image non trouvée / missing]</div><code>${im.src}</code></div></div>
    ${im.cap ? `<figcaption class="cap"><b>FIG</b><span>${L(im.cap)}</span></figcaption>` : ''}</figure>`;
}
function notes(arr, type) {
  if (!arr || !arr.length) return '';
  const ic = type === 'warn' ? '!' : 'i', lbl = type === 'warn' ? UI[lang].caution : UI[lang].tip;
  return arr.map(t => `<div class="note ${type}"><div class="ic">${ic}</div><div><b>${lbl}.</b> ${L(t)}</div></div>`).join('');
}
function render() {
  const s = STEPS[i];
  if (s.outro) {
    stage.innerHTML = `<div class="outro"><div class="big">${CHECKMARK}</div><h1>${L(s.title)}</h1><p>${L(s.lede)}</p><div class="sig">${s.sig}</div></div>`;
  } else {
    let rail = s.checklist ? checkCard(s) : (s.parts ? partsCard(s) : '');
    if (s.fastener) rail += fastCard(s);
    const left = rail ? `<div class="rail">${rail}</div>` : '';
    const imgs = (s.images || []).map(figure).join('');
    const instr = s.instr ? `<div class="steps-h">${UI[lang].howto}<span class="ln"></span></div><ol class="instr">${s.instr.map(t => `<li><p>${L(t)}</p></li>`).join('')}</ol>` : '';
    const co = (s.warn || s.tip) ? `<div class="notes-wrap">${notes(s.warn, 'warn')}${notes(s.tip, 'tip')}</div>` : '';
    const main = (imgs || instr || co) ? `<div class="viewport">${imgs}${instr}${co}</div>` : '';
    const cols = left ? `<div class="grid"><div>${left}</div>${main || '<div></div>'}</div>` : main;
    stage.innerHTML = `<div class="eyebrow">${L(s.phase)}</div><h1>${L(s.title)}</h1>${s.lede ? `<p class="lede">${L(s.lede)}</p>` : ''}${cols}`;
    if (s.checklist) {
      const bx = stage.querySelectorAll('.check input'), ck = document.getElementById('ckN');
      bx.forEach(b => b.addEventListener('change', () => { ck.textContent = [...bx].filter(x => x.checked).length; }));
    }
  }
  cNum.textContent = pad(i + 1);
  bar.style.width = ((i + 1) / STEPS.length * 100) + '%';
  prevB.disabled = i === 0;
  nextB.innerHTML = i === STEPS.length - 1 ? `<span class="navlabel">${UI[lang].done}</span> ✓` : `<span class="navlabel">${UI[lang].next}</span> ›`;
  [...dotsWrap.children].forEach((d, k) => { d.className = 'dt' + (k === i ? ' on' : (k < i ? ' done' : '')); });
  const a = dotsWrap.children[i]; if (a) a.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  stage.focus({ preventScroll: true });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function buildDots() {
  dotsWrap.innerHTML = '';
  STEPS.forEach((s, k) => { const b = document.createElement('button'); b.className = 'dt'; b.title = `${pad(k + 1)} — ${L(s.title)}`; b.addEventListener('click', () => { i = k; render(); }); dotsWrap.appendChild(b); });
}
function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('subtitle').textContent = UI[lang].sub;
  document.getElementById('cLbl').textContent = UI[lang].step;
  document.getElementById('prevL').textContent = UI[lang].prev;
  document.getElementById('nextL').textContent = UI[lang].next;
  langTxt.innerHTML = lang === 'fr' ? '<span style="color:var(--accent)">FR</span> / EN' : 'FR / <span style="color:var(--accent)">EN</span>';
  cTot.textContent = pad(STEPS.length);
  buildDots();
  render();
}

// Bouton de traduction global unique
langToggle.addEventListener('click', () => {
  lang = (lang === 'fr') ? 'en' : 'fr';
  applyLang();
});

prevB.addEventListener('click', () => { if (i > 0) { i--; render(); } });
nextB.addEventListener('click', () => { if (i < STEPS.length - 1) { i++; render(); } });
document.addEventListener('keydown', e => {
  if (e.target.matches('input')) return;
  if (e.key === 'ArrowRight' && i < STEPS.length - 1) { i++; render(); }
  if (e.key === 'ArrowLeft' && i > 0) { i--; render(); }
});
document.getElementById('theme').addEventListener('click', () => { const d = document.documentElement.getAttribute('data-theme') === 'dark'; document.documentElement.setAttribute('data-theme', d ? 'light' : 'dark'); });

// Initialisation au chargement
applyLang();
</script>
