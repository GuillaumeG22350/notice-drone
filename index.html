/* ===== BRAS ===== */
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Couper et étamer les fils moteur","Cut and tin the motor wires"),
 lede:F("Tout le bloc « Bras » se répète 4 fois. On commence par préparer les 3 fils de phase du moteur.","The whole \"Arm\" block repeats 4 times. Start by preparing the motor's 3 phase wires."),
 parts:[
  {qty:"x1",name:F("Moteur SunnySky X2216","SunnySky X2216 motor"),ref:""},
  {qty:"x1",name:F("Fer 380 °C, étain, flux","Iron 380 °C, solder, flux"),ref:""}],
 instr:[
  F("Coupez les 3 fils du moteur à peu près au milieu (vous les rallongerez ensuite vers l'ESC). Dénudez 5 mm à chaque extrémité.","Cut the motor's 3 wires roughly at the middle (you'll extend them to the ESC later). Strip 5 mm at each end."),
  F("<strong>Étamer</strong> = enrober le cuivre d'étain : appliquez un peu de flux, posez le fer à <span class='tag'>380 °C</span> sur le fil, touchez l'étain de l'autre côté jusqu'à ce que le cuivre l'absorbe. La soudure doit être lisse et brillante.","<strong>Tinning</strong> = coating the copper with solder: add a little flux, hold the iron at <span class='tag'>380 °C</span> on the wire, touch the solder on the other side until the copper soaks it up. The joint must be smooth and shiny.")],
 tip:[F("Gardez le même code couleur (bleu / noir / rouge) sur les 4 bras pour ne pas vous tromper de phase.","Keep the same colour code (blue / black / red) across all 4 arms so you don't mix up phases.")]},
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Souder le MR30 — côté moteur","Solder the MR30 — motor side"),
 lede:F("Les 3 phases du moteur se soudent sur un connecteur MR30, dans un ordre précis.","The motor's 3 phases solder onto an MR30 connector, in a precise order."),
 parts:[{qty:"x1",name:F("Connecteur MR30","MR30 connector"),ref:F("côté moteur","motor side")}],
 images:[{src:"mr30_cote_moteur.jpg",cap:F("MR30 côté moteur — bleu à gauche, noir au centre, rouge à droite.","MR30 motor side — blue left, black centre, red right.")}],
 instr:[
  F("Déposez d'abord un peu d'étain dans les 3 cavités du MR30 (on les étame).","First put a little solder into the 3 MR30 cups (tin them)."),
  F("Posez un fil sur sa cavité, chauffez le tout : l'étain fond et fige le fil en place. Maintenez 2 s sans bouger pendant le refroidissement.","Set a wire on its cup, heat both: the solder melts and locks the wire. Hold still for 2 s while it cools."),
  F("Ordre impératif : <strong>bleu à gauche, noir au centre, rouge à droite</strong>. Vérifiez qu'aucune soudure ne touche sa voisine.","Mandatory order: <strong>blue left, black centre, red right</strong>. Check no joint touches its neighbour.")]},
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Faire les rallonges + MR30 côté ESC","Make the leads + MR30 ESC side"),
 lede:F("Des fils silicone (la rallonge) traversent le bras et rejoignent l'ESC. C'est ici qu'on fabrique la rallonge.","Silicone wires (the lead) run through the arm to the ESC. This is where you make the extension."),
 parts:[
  {qty:"x3",name:F("Fil silicone 20 AWG","20 AWG silicone wire"),ref:F("rouge/noir/bleu","red/black/blue")},
  {qty:"x1",name:F("Connecteur MR30","MR30 connector"),ref:F("côté ESC","ESC side")}],
 images:[{src:"mr30_cote_esc.jpg",cap:F("MR30 côté ESC + rallonges 20 AWG (rouge/noir/bleu).","ESC-side MR30 + 20 AWG leads (red/black/blue).")}],
 instr:[
  F("Mesurez : la rallonge doit <strong>traverser tout le bras + 2 cm de mou</strong> pour atteindre les pads de l'ESC. Coupez les 3 fils à cette longueur.","Measure: the lead must <strong>cross the whole arm + 2 cm slack</strong> to reach the ESC pads. Cut the 3 wires to that length."),
  F("Dénudez 5 mm aux deux bouts de chaque fil et étamez-les.","Strip 5 mm at both ends of each wire and tin them."),
  F("Étamez l'autre moitié du MR30 (femelle), puis soudez-y les 3 fils dans le même ordre des couleurs.","Tin the other MR30 half (female), then solder the 3 wires onto it in the same colour order."),
  F("<strong>Refaites tout le câblage pour les 4 moteurs.</strong>","<strong>Redo the whole wiring for the 4 motors.</strong>")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Fixer le moteur sur la mâchoire","Fix the motor to the jaw"),
 lede:F("Le moteur se visse sur la mâchoire inférieure moteur, par le dessus.","The motor screws onto the lower motor jaw, from the top."),
 parts:[{qty:"x4",name:F("Vis M3×16","M3×16 screw"),ref:""},{qty:"x1",name:F("Loctite 243","Loctite 243"),ref:""}],
 fastener:[F("Vis M3×16","Screw M3×16")],
 images:[{src:"moteur_fixation_machoire.jpg",cap:F("Moteur vissé sur la mâchoire inf. moteur — 4 vis M3×16 par le dessus.","Motor screwed to the lower motor jaw — 4 × M3×16 from the top.")}],
 instr:[
  F("Posez le moteur sur la mâchoire inférieure moteur, <strong>cloche vers le haut</strong>, et alignez les 4 trous.","Place the motor on the lower motor jaw, <strong>bell up</strong>, and line up the 4 holes."),
  F("Mettez une goutte de <strong>Loctite 243</strong> sur chaque vis, puis serrez les <strong>4 vis M3×16 par le dessus</strong>, en croix et progressivement.","Put a drop of <strong>Loctite 243</strong> on each screw, then tighten the <strong>4 × M3×16 from the top</strong>, crosswise and gradually."),
  F("Vérifiez que le câble du moteur ne passe pas coincé sous sa base.","Make sure the motor cable isn't pinched under its base.")],
 warn:[F("Loctite obligatoire : sans frein-filet, les vibrations desserrent ces vis en vol.","Loctite is mandatory: without thread-lock, vibration loosens these screws in flight.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Serrer le tube dans les mâchoires moteur","Clamp the tube in the motor jaws"),
 lede:F("Le tube carbone se pince entre les deux mâchoires moteur, poussé à fond.","The carbon tube is clamped between the two motor jaws, pushed all the way in."),
 parts:[
  {qty:"x1",name:F("Mâchoire inf. + sup. moteur","Motor jaw lower + upper"),ref:""},
  {qty:"x1",name:F("Tube carbone 170 mm","170 mm carbon tube"),ref:""},
  {qty:"x4",name:F("Vis M3×18 + Loctite","M3×18 screw + Loctite"),ref:""}],
 fastener:[F("Vis M3×18","Screw M3×18")],
 images:[{src:"tube_machoires_moteur.jpg",cap:F("Tube en butée dans les mâchoires moteur. Vis M3×18 aux 4 trous.","Tube bottomed out in the motor jaws. M3×18 at the 4 holes.")}],
 instr:[
  F("Engagez le tube dans le canal des mâchoires et poussez-le <strong>jusqu'en butée</strong> au fond.","Slide the tube into the jaw channel and push it <strong>fully to the stop</strong>."),
  F("Mettez la mâchoire supérieure, ajoutez le Loctite et serrez les <strong>4 vis M3×18</strong> en croix.","Add the upper jaw, apply Loctite and tighten the <strong>4 × M3×18</strong> crosswise."),
  F("Test : tentez de tourner et de tirer le tube à la main — il ne doit <strong>ni tourner ni bouger</strong>.","Test: try to twist and pull the tube by hand — it must <strong>neither rotate nor move</strong>.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Fixer le bras sur la plaque","Fix the arm to the plate"),
 lede:F("L'autre bout du tube reçoit les mâchoires de bras, qui se fixent sur une oreille de la plaque.","The other end of the tube gets the arm jaws, which fix onto a plate ear."),
 parts:[
  {qty:"x1",name:F("Mâchoire inf. + sup. de bras","Arm jaw lower + upper"),ref:""},
  {qty:"x4",name:F("Vis M3×25 + Loctite","M3×25 screw + Loctite"),ref:""}],
 fastener:[F("Vis M3×25","Screw M3×25"),F("Insert M3","Insert M3")],
 images:[{src:"bras_fixation_plaque.jpg",cap:F("Mâchoires de bras posées sur une oreille de la plaque. Vis M3×25.","Arm jaws on a plate ear. M3×25 screws.")}],
 instr:[
  F("Glissez les mâchoires de bras au bout libre du tube, puis posez l'ensemble sur une <strong>oreille de la plaque</strong>, trous alignés.","Slide the arm jaws onto the free tube end, then set the assembly on a <strong>plate ear</strong>, holes aligned."),
  F("Vissez les <strong>4 vis M3×25</strong> : elles traversent mâchoire sup. + mâchoire inf. et viennent se loger dans les <strong>inserts M3 de la plaque</strong>. Loctite + serrage en croix.","Drive the <strong>4 × M3×25</strong>: they pass through upper jaw + lower jaw and seat into the <strong>plate's M3 inserts</strong>. Loctite + crosswise tightening.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Répéter ×4 et mettre à niveau","Repeat ×4 and level"),
 lede:F("Vous avez un bras complet. Refaites tout le bloc « Bras » pour les 3 autres, puis réglez l'horizontalité.","You have one complete arm. Redo the whole \"Arm\" block for the other 3, then set the level."),
 parts:[{qty:"x1",name:F("Niveau à bulle","Spirit level"),ref:""}],
 images:[{src:"bras_complet.png",cap:F("Résultat attendu — un bras complet (sans hélice à ce stade).","Expected result — one complete arm (no prop yet).")}],
 instr:[
  F("Reprenez : câblage → moteur sur mâchoire → tube → fixation plaque, pour chaque bras.","Repeat: wiring → motor on jaw → tube → plate fixing, for each arm."),
  F("Vérifiez qu'aucun bras ne bouge ni ne tourne (resserrez si besoin).","Check that no arm moves or rotates (retighten if needed)."),
  F("Posez un <strong>niveau</strong> sur chaque mâchoire moteur : desserrez/resserrez légèrement jusqu'à ce que les 4 soient bien horizontales.","Put a <strong>level</strong> on each motor jaw: slightly loosen/retighten until all 4 are horizontal.")]},
{phase:F("Structure","Structure"),title:F("Fixer les trains d'atterrissage","Fix the landing gear"),
 lede:F("Les deux pieds se fixent sous la plaque principale.","The two feet fix under the main plate."),
 parts:[
  {qty:"x2",name:F("Train d'atterrissage","Landing gear"),ref:""},
  {qty:"x4",name:F("Vis M3","M3 screws"),ref:"+ Loctite"}],
 fastener:[F("Vis M3","Screw M3"),F("Insert M3","Insert M3")],
 images:[{src:"train_fixation_plaque.jpg",cap:F("Vis passant par le dessus de la plaque pour se visser dans le train.","Screws from the top of the plate into the landing gear.")}],
 instr:[
  F("Retournez le châssis. Positionnez un train sous la plaque, trous alignés.","Flip the frame over. Position one foot under the plate, holes aligned."),
  F("Insérez les vis M3 <strong>par le dessus de la plaque</strong> : elles traversent la plaque et se vissent dans les inserts du train. Loctite.","Insert the M3 screws <strong>from the top of the plate</strong>: they go through the plate and into the gear's inserts. Loctite."),
  F("Répétez pour le second train.","Repeat for the second foot.")]},
/* ===== ESC ===== */
{phase:F("ESC","ESC"),title:F("Étamer les pads de l'ESC","Tin the ESC pads"),
 lede:F("On dépose une noisette d'étain sur chaque pad avant d'y souder quoi que ce soit.","Put a small dome of solder on each pad before soldering anything to it."),
 parts:[{qty:"x1",name:F("ESC SpeedyBee 60A","SpeedyBee 60A ESC"),ref:F("hors tension","powered off")}],
 images:[{src:"esc_pads_etamage.jpg",cap:F("ESC — 12 pads moteurs (M1–M4) + 2 pads d'alim BAT± étamés.","ESC — 12 motor pads (M1–M4) + 2 BAT± power pads tinned.")}],
 instr:[
  F("Étamez les <strong>12 petits pads moteurs</strong> : 3 par moteur (M1, M2, M3, M4).","Tin the <strong>12 small motor pads</strong>: 3 per motor (M1, M2, M3, M4)."),
  F("Étamez les <strong>2 gros pads d'alimentation</strong> BAT+ et BAT−.","Tin the <strong>2 large power pads</strong> BAT+ and BAT−."),
  F("Fer bien chaud (380–400 °C) pour les gros pads : ils évacuent beaucoup de chaleur.","Iron hot (380–400 °C) for the big pads: they sink a lot of heat.")]},
{phase:F("ESC","ESC"),title:F("Souder les phases + sens de rotation","Solder phases + rotation direction"),
 lede:F("Chaque fil de bras se soude sur son pad. L'ESC est posé flèche vers l'arrière, donc les pads +/− se retrouvent à l'avant.","Each arm wire solders to its pad. The ESC is placed arrow-to-rear, so the +/− pads end up at the front."),
 parts:[{qty:"x4",name:F("Fils de bras (MR30 connectés)","Arm wires (MR30 connected)"),ref:""}],
 images:[{src:"esc_phases_moteur.jpg",cap:F("ESC flèche arrière — correspondance des moteurs et soudure des phases.","ESC arrow-to-rear — motor mapping and phase soldering.")}],
 instr:[
  F("Reliez chaque MR30 de bras, puis amenez ses 3 fils sur le bon groupe de pads selon ce tableau :<table class='map'><tr><th>QGC</th><th>Position</th><th>Sens</th><th>ESC</th></tr><tr><td>M1</td><td>av-droit</td><td>horaire</td><td>M3</td></tr><tr><td>M3</td><td>av-gauche</td><td>anti-h.</td><td>M1</td></tr><tr><td>M2</td><td>ar-gauche</td><td>horaire</td><td>M2</td></tr><tr><td>M4</td><td>ar-droit</td><td>anti-h.</td><td>M4</td></tr></table>","Connect each arm MR30, then bring its 3 wires to the right pad group per this table:<table class='map'><tr><th>QGC</th><th>Position</th><th>Spin</th><th>ESC</th></tr><tr><td>M1</td><td>front-right</td><td>CW</td><td>M3</td></tr><tr><td>M3</td><td>front-left</td><td>CCW</td><td>M1</td></tr><tr><td>M2</td><td>rear-left</td><td>CW</td><td>M2</td></tr><tr><td>M4</td><td>rear-right</td><td>CCW</td><td>M4</td></tr></table>"),
  F("Ordre des fils selon le sens — <strong>anti-horaire</strong> : bleu au centre, noir à droite, rouge à gauche.","Wire order by spin — <strong>CCW</strong>: blue centre, black right, red left."),
  F("<strong>Horaire</strong> : noir à droite, rouge au centre, bleu à l'extrémité.","<strong>CW</strong>: black right, red centre, blue at the end."),
  F("Soudez les 3 fils, pad par pad. <strong>Répétez pour les 4 bras.</strong>","Solder the 3 wires, pad by pad. <strong>Repeat for the 4 arms.</strong>")],
 tip:[F("Si un moteur tourne à l'envers au test QGC, il suffira d'échanger 2 de ses 3 phases.","If a motor spins the wrong way at the QGC test, just swap 2 of its 3 phases.")]},
{phase:F("ESC","ESC"),title:F("Souder l'alimentation","Solder the power"),
 lede:F("On câble le XT60 (vers la batterie), le condensateur et la sortie de l'UBEC sur les pads BAT±.","Wire the XT60 (to the battery), the capacitor and the UBEC output onto the BAT± pads."),
 parts:[
  {qty:"x1",name:F("XT60 mâle (fils 12 AWG)","Male XT60 (12 AWG)"),ref:""},
  {qty:"x1",name:F("Condensateur 1000 µF","1000 µF capacitor"),ref:"low-ESR"},
  {qty:"x2",name:F("Fils UBEC (rouge/noir)","UBEC wires (red/black)"),ref:""}],
 images:[{src:"esc_alimentation.jpg",cap:F("Pads BAT± — XT60, condensateur et fils UBEC soudés.","BAT± pads — XT60, capacitor and UBEC wires soldered.")}],
 instr:[
  F("Soudez le <strong>fil rouge du XT60 sur BAT+</strong>, le noir sur BAT−.","Solder the <strong>XT60 red wire to BAT+</strong>, the black to BAT−."),
  F("Condensateur : <strong>patte longue (+) sur BAT+</strong>, patte courte / bande grise (−) sur BAT−. Le respecter sinon il explose.","Capacitor: <strong>long leg (+) on BAT+</strong>, short leg / grey stripe (−) on BAT−. Respect it or it pops."),
  F("Fils UBEC : <strong>rouge sur BAT+, noir sur BAT−</strong>.","UBEC wires: <strong>red on BAT+, black on BAT−</strong>."),
  F("Fer bien chaud pour fusionner l'étain neuf avec la noisette déjà présente.","Iron hot to fuse the new solder with the dome already there.")],
 warn:[F("Avant tout : vérifiez au multimètre (continuité) qu'il n'y a <strong>aucun pont entre BAT+ et BAT−</strong>. Un pont = ESC détruit dès la batterie branchée.","First: check with a multimeter (continuity) that there's <strong>no bridge between BAT+ and BAT−</strong>. A bridge = dead ESC the moment the battery is plugged in.")]},
/* ===== CALCULATEUR ===== */
{phase:F("Calculateur","Companion computer"),title:F("Préparer la carte SD — Raspberry Pi Imager","Prepare the SD card — Raspberry Pi Imager"),
 lede:F("L'application s'appelle Raspberry Pi Imager (gratuite, à télécharger sur raspberrypi.com/software). La carte n'est plus accessible une fois la Pi montée : on la prépare maintenant.","The app is Raspberry Pi Imager (free, from raspberrypi.com/software). The card isn't reachable once the Pi is mounted: prepare it now."),
 parts:[{qty:"x1",name:F("Carte micro-SD + lecteur","micro-SD card + reader"),ref:F("sur le PC","on the PC")}],
 images:[{src:"sd_imager.jpg",cap:F("Raspberry Pi Imager — écran de réglages OS (roue dentée).","Raspberry Pi Imager — OS settings screen (gear).")}],
 instr:[
  F("Téléchargez et ouvrez <strong>Raspberry Pi Imager</strong>. Insérez la carte micro-SD dans le PC.","Download and open <strong>Raspberry Pi Imager</strong>. Insert the micro-SD into the PC."),
  F("<strong>CHOOSE DEVICE</strong> → Raspberry Pi 5. <strong>CHOOSE OS</strong> → Raspberry Pi OS (other) → <strong>Raspberry Pi OS Lite (64-bit)</strong>. <strong>CHOOSE STORAGE</strong> → votre carte.","<strong>CHOOSE DEVICE</strong> → Raspberry Pi 5. <strong>CHOOSE OS</strong> → Raspberry Pi OS (other) → <strong>Raspberry Pi OS Lite (64-bit)</strong>. <strong>CHOOSE STORAGE</strong> → your card."),
  F("<strong>NEXT</strong> → <strong>EDIT SETTINGS</strong>. Onglet General : hostname <span class='tag'>neutronit</span>, user <span class='tag'>neutronit</span> + mdp <span class='tag'>neutronit2026</span>, Wi-Fi (SSID + mdp du partage de connexion), pays <strong>FR</strong>.","<strong>NEXT</strong> → <strong>EDIT SETTINGS</strong>. General tab: hostname <span class='tag'>neutronit</span>, user <span class='tag'>neutronit</span> + pw <span class='tag'>neutronit2026</span>, Wi-Fi (SSID + hotspot password), country <strong>FR</strong>."),
  F("Onglet <strong>Services</strong> : cochez <strong>Enable SSH → Use password authentication</strong>. Puis <strong>SAVE → YES → WRITE</strong>.","<strong>Services</strong> tab: tick <strong>Enable SSH → Use password authentication</strong>. Then <strong>SAVE → YES → WRITE</strong>.")],
 warn:[F("Respectez hostname et user exacts (neutronit / neutronit) : toute la suite réseau en dépend.","Use the exact hostname and user (neutronit / neutronit): all the networking depends on it.")],
 tip:[F("Plus tard, éteignez toujours la Pi avec <span class='tag'>sudo shutdown now</span> avant de couper l'alim.","Later, always shut the Pi down with <span class='tag'>sudo shutdown now</span> before cutting power.")]},
{phase:F("Calculateur","Companion computer"),title:F("Monter le ventilateur sur la Pi","Fit the cooler on the Pi"),
 lede:F("Le ventilateur (Active Cooler) se clipse avant de fixer la Pi.","The fan (Active Cooler) clips on before fixing the Pi."),
 parts:[{qty:"x1",name:F("Active Cooler officiel","Official Active Cooler"),ref:""}],
 images:[{src:"raspberry_ventilateur.jpg",cap:F("Active Cooler clipsé, câble branché sur le connecteur FAN.","Active Cooler clipped on, cable in the FAN header.")}],
 instr:[
  F("Posez le cooler : ses <strong>ergots plastique</strong> entrent dans les 2 trous prévus — un seul sens possible, ils se clipsent avec un léger « clac ».","Place the cooler: its <strong>plastic pins</strong> go into the 2 holes — only one way, they click in."),
  F("Branchez le petit câble du ventilateur sur le connecteur <span class='tag'>FAN</span> de la Pi (à côté du port USB-C).","Plug the small fan cable into the Pi's <span class='tag'>FAN</span> header (next to the USB-C port).")]},
{phase:F("Calculateur","Companion computer"),title:F("Fixer la Raspberry Pi (anti-vibration)","Mount the Raspberry Pi (anti-vibration)"),
 lede:F("La Pi est montée sur amortisseurs silicone pour isoler les vibrations. L'ordre d'empilage est important.","The Pi sits on silicone dampers to isolate vibration. The stacking order matters."),
 parts:[
  {qty:"x4",name:F("Vis M2×10","M2×10 screw"),ref:""},
  {qty:"x4",name:F("Écrous M2","M2 nuts"),ref:""},
  {qty:"x4",name:F("Boules amortissement silicone","Silicone damping balls"),ref:""}],
 fastener:[F("Vis M2×10","Screw M2×10"),F("Écrou M2","Nut M2"),F("Insert M2","Insert M2")],
 images:[{src:"raspberry_fixation.jpg",cap:F("Empilage : vis → écrou → boule silicone → insert M2 de la plaque.","Stack: screw → nut → silicone ball → plate's M2 insert.")}],
 instr:[
  F("Passez une <strong>vis M2×10</strong> par le dessus, à travers un trou de la Pi.","Pass an <strong>M2×10</strong> from above, through one Pi hole."),
  F("Côté dessous de la Pi : vissez un <strong>écrou M2</strong> contre la carte, puis une <strong>boule silicone</strong> sur la vis.","Under the Pi: thread an <strong>M2 nut</strong> against the board, then a <strong>silicone ball</strong> onto the screw."),
  F("Vissez la boule dans l'<strong>insert M2 de la plaque</strong>. Répétez aux 4 coins. Serrage <strong>doux</strong> (plastique fragile).","Screw the ball into the <strong>plate's M2 insert</strong>. Repeat at the 4 corners. <strong>Gentle</strong> torque (fragile plastic).")]},
/* ===== STACK CENTRAL ===== */
{phase:F("Stack central","Central stack"),title:F("Monter l'ESC sur la plaque","Mount the ESC on the plate"),
 lede:F("L'ESC est surélevé au centre par 4 vis montées par le dessous, avec des écrous qui font entretoise. On détaille chaque geste.","The ESC sits raised in the centre on 4 screws fitted from below, with nuts acting as standoffs. Every step is detailed."),
 parts:[
  {qty:"x4",name:F("Vis M3×20","M3×20 screw"),ref:F("par le dessous","from below")},
  {qty:"x8",name:F("Écrous M3","M3 nuts"),ref:F("2 par vis","2 per screw")},
  {qty:"x1",name:F("ESC (déjà câblé)","ESC (already wired)"),ref:""}],
 fastener:[F("Vis M3×20","Screw M3×20"),F("Écrou M3","Nut M3")],
 images:[{src:"esc_montage_central.jpg",cap:F("4 vis M3×20 par le dessous, 2 écrous par vis, ESC posé sur les écrous.","4 × M3×20 from below, 2 nuts per screw, ESC resting on the nuts.")}],
 instr:[
  F("Repérez les <strong>4 trous centraux</strong> de la plaque (les 4 petits au centre, pas les grandes découpes).","Find the <strong>4 central holes</strong> of the plate (the 4 small ones in the middle, not the big cut-outs)."),
  F("Retournez la plaque. Passez une <strong>vis M3×20 par le dessous</strong>, tête à plat sous la plaque, filetage vers le haut. Remettez la plaque à l'endroit.","Flip the plate. Pass an <strong>M3×20 from below</strong>, head flat under the plate, thread upward. Turn the plate back over."),
  F("Sur chaque vis, vissez un <strong>1er écrou</strong> et descendez-le jusqu'à plaquer contre la plaque (il bloque la vis).","On each screw, thread a <strong>1st nut</strong> down until it sits against the plate (it locks the screw)."),
  F("Vissez un <strong>2e écrou</strong> en laissant ~6 mm de filetage libre au-dessus : c'est l'entretoise qui surélève l'ESC. Faites les 4 à la <strong>même hauteur</strong>.","Thread a <strong>2nd nut</strong> leaving ~6 mm of free thread above: that's the standoff lifting the ESC. Make all 4 the <strong>same height</strong>."),
  F("Présentez l'ESC au-dessus, <strong>flèche vers l'arrière</strong>, et descendez-le pour que les 4 vis passent dans ses 4 trous. Il repose sur les 2es écrous.","Lower the ESC on top, <strong>arrow to rear</strong>, so the 4 screws pass through its 4 holes. It rests on the 2nd nuts.")],
 tip:[F("La hauteur des entretoises doit laisser passer les fils moteurs sous l'ESC sans les pincer.","The standoff height must let the motor wires pass under the ESC without pinching them.")]},
{phase:F("Stack central","Central stack"),title:F("Monter le support + le Pixhawk","Mount the bracket + Pixhawk"),
 lede:F("Le support Pixhawk coiffe l'ESC sur les mêmes 4 vis, puis le FCU se colle dessus.","The Pixhawk bracket caps the ESC on the same 4 screws, then the FCU sticks on top."),
 parts:[
  {qty:"x1",name:F("Support Pixhawk","Pixhawk mount"),ref:""},
  {qty:"x1",name:F("Pixhawk 6C Mini","Pixhawk 6C Mini"),ref:""},
  {qty:"—",name:F("Ruban mousse PE double face","PE foam tape"),ref:""}],
 images:[{src:"pixhawk_fixation.jpg",cap:F("Support sur l'ESC, Pixhawk collé à la mousse, flèche vers l'avant.","Bracket on the ESC, Pixhawk foam-stuck, arrow forward.")}],
 instr:[
  F("Posez le support Pixhawk sur les 4 vis qui dépassent de l'ESC et bloquez-le avec 4 écrous M3 par-dessus.","Set the Pixhawk bracket on the 4 screws sticking out of the ESC and lock it with 4 M3 nuts on top."),
  F("Collez un carré de <strong>ruban mousse</strong> sur le support, puis pressez le Pixhawk dessus, <strong>flèche FORWARD pointée vers l'avant du drone</strong>.","Stick a square of <strong>foam tape</strong> on the bracket, then press the Pixhawk on, <strong>FORWARD arrow pointing to the front of the drone</strong>."),
  F("Posez un <strong>niveau</strong> sur le Pixhawk : s'il penche, reprenez les écrous jusqu'à l'avoir bien à plat.","Put a <strong>level</strong> on the Pixhawk: if it tilts, adjust the nuts until it's perfectly flat.")],
 warn:[F("Orientation FORWARD impérative : une erreur ici fausse toute la stabilisation.","FORWARD orientation is mandatory: a mistake here ruins all stabilisation.")]},
/* ===== ALIMENTATION ===== */
{phase:F("Alimentation","Power"),title:F("Brancher le Power Module PM02","Connect the PM02 Power Module"),
 lede:F("Le PM02 s'intercale entre la batterie et l'ESC, et il alimente le Pixhawk en tension propre.","The PM02 sits between the battery and the ESC, and feeds the Pixhawk clean power."),
 parts:[{qty:"x1",name:F("Power Module PM02","PM02 Power Module"),ref:F("fourni avec le Pixhawk","comes with the Pixhawk")}],
 images:[{src:"power_module_branchement.jpg",cap:F("PM02 : XT60 entre batterie et ESC, câble 6 pins vers POWER.","PM02: XT60 between battery and ESC, 6-pin cable to POWER.")}],
 instr:[
  F("Côté <strong>XT60 IN</strong> du PM02 → ira vers la batterie. Côté <strong>XT60 OUT</strong> → se branche sur le XT60 de l'ESC.","PM02 <strong>XT60 IN</strong> → goes to the battery. <strong>XT60 OUT</strong> → plugs into the ESC's XT60."),
  F("Câble <strong>6 pins GH1.25</strong> du PM02 → port <span class='tag'>POWER</span> du Pixhawk (alim + mesure tension/courant).","PM02 <strong>6-pin GH1.25</strong> cable → Pixhawk <span class='tag'>POWER</span> port (power + voltage/current sensing).")]},
{phase:F("Alimentation","Power"),title:F("Alimenter la Pi (UBEC → broches 5V/GND)","Power the Pi (UBEC → 5V/GND pins)"),
 lede:F("On branche directement les câbles d'origine de l'UBEC sur les broches de la Pi — plus besoin de câble USB-C.","Connect the UBEC's original wires straight to the Pi's pins — no USB-C cable needed."),
 parts:[{qty:"x1",name:F("UBEC ZTW 10A (jumper sur 5V)","ZTW 10A UBEC (jumper on 5V)"),ref:""}],
 images:[{src:"alim_pi_ubec.jpg",cap:F("Fils UBEC : rouge sur broche 4 (5V), noir sur broche 6 (GND) du connecteur GPIO.","UBEC wires: red on pin 4 (5V), black on pin 6 (GND) of the GPIO header.")}],
 instr:[
  F("Vérifiez d'abord que le <strong>jumper de l'UBEC est sur 5 V</strong> (et non 12 V) ; il tire son courant depuis les pads de l'ESC.","First check the <strong>UBEC jumper is on 5 V</strong> (not 12 V); it draws power from the ESC pads."),
  F("Si les fils sont trop courts, faites une rallonge : coupez à la bonne longueur, dénudez 4 mm, étamez, soudez bout à bout, isolez à la gaine thermo.","If the wires are too short, make a lead: cut to length, strip 4 mm, tin, solder end to end, insulate with heat-shrink."),
  F("Branchez le <strong>fil rouge sur la broche 4 (5V)</strong> et le <strong>fil noir sur la broche 6 (GND)</strong> du connecteur 40 broches de la Pi.","Connect the <strong>red wire to pin 4 (5V)</strong> and the <strong>black wire to pin 6 (GND)</strong> of the Pi's 40-pin header.")],
 warn:[F("Mesurez <strong>5,0 V</strong> en sortie d'UBEC au multimètre AVANT de toucher la Pi, et vérifiez la polarité 2 fois : du 12 V ou une inversion grille la Pi.","Measure <strong>5.0 V</strong> at the UBEC output BEFORE touching the Pi, and double-check polarity: 12 V or a reversal kills the Pi.")]},
{phase:F("Alimentation","Power"),title:F("Fixer UBEC + PM à l'avant","Fix the UBEC + PM at the front"),
 lede:F("Ces deux modules se logent à l'avant, entre l'ESC et le futur support caméra.","These two modules go at the front, between the ESC and the future camera mount."),
 parts:[{qty:"—",name:F("Ruban mousse PE / colliers","PE foam tape / zip ties"),ref:""}],
 images:[
  {src:"ubec_pm_avant.jpg",cap:F("UBEC + Power Module collés à l'avant, entre l'ESC et le support caméra.","UBEC + Power Module stuck at the front, between the ESC and the camera mount.")},
  {src:"xt60_passage_plaque.jpg",cap:F("Le XT60 du PM descend par le trou de la plaque pour rejoindre la batterie placée dessous.","The PM's XT60 drops through the plate hole to reach the battery underneath.")}],
 instr:[
  F("Collez l'UBEC et le Power Module à l'avant (ruban mousse double face + collier si besoin).","Stick the UBEC and Power Module at the front (foam tape + a zip tie if needed)."),
  F("Faites passer le <strong>XT60 du Power Module par le trou de la plaque</strong> : il descend sous le châssis pour aller se brancher à la batterie, qui sera placée dessous.","Route the <strong>PM's XT60 through the plate hole</strong>: it drops under the frame to plug into the battery, which sits underneath."),
  F("Laissez ce XT60 bien dégagé et accessible — vous le brancherez/débrancherez à chaque vol.","Keep that XT60 clear and reachable — you'll plug/unplug it every flight.")]},
/* ===== BRANCHEMENTS ===== */
{phase:F("Branchements","Wiring"),title:F("Liaison UART Pi ↔ Pixhawk (TELEM 2)","UART link Pi ↔ Pixhawk (TELEM 2)"),
 lede:F("La télémétrie MAVLink passe par une liaison série croisée entre TELEM 2 et les broches GPIO de la Pi.","MAVLink telemetry runs over a crossed serial link between TELEM 2 and the Pi's GPIO pins."),
 parts:[{qty:"x1",name:F("Câble GH1.25 → Dupont femelle","GH1.25 → female Dupont cable"),ref:"3 fils"}],
 images:[{src:"uart_pi_pixhawk.jpg",cap:F("TELEM 2 du Pixhawk relié aux broches GPIO de la Pi (GND/TX/RX croisés).","Pixhawk TELEM 2 to the Pi's GPIO pins (GND/TX/RX crossed).")}],
 instr:[
  F("Branchez 3 fils seulement (les autres restent libres) :<table class='map'><tr><th>TELEM 2 (Pixhawk)</th><th>→ Pi (broche)</th></tr><tr><td>pin 6 — GND</td><td>broche 6 (GND)</td></tr><tr><td>pin 2 — TX</td><td>broche 10 (RX)</td></tr><tr><td>pin 3 — RX</td><td>broche 8 (TX)</td></tr></table>","Connect only 3 wires (leave the rest free):<table class='map'><tr><th>TELEM 2 (Pixhawk)</th><th>→ Pi (pin)</th></tr><tr><td>pin 6 — GND</td><td>pin 6 (GND)</td></tr><tr><td>pin 2 — TX</td><td>pin 10 (RX)</td></tr><tr><td>pin 3 — RX</td><td>pin 8 (TX)</td></tr></table>"),
  F("Si besoin de rallonger : dénudez 4 mm, étamez, soudez, et isolez chaque jonction à la gaine thermo.","If you need to extend: strip 4 mm, tin, solder, and insulate each joint with heat-shrink.")],
 warn:[F("Liaison <strong>croisée</strong> : le TX d'un côté va sur le RX de l'autre. Ne branchez <strong>pas</strong> le 5V de TELEM 2 (la Pi est déjà alimentée par l'UBEC).","<strong>Crossed</strong> link: TX on one side goes to RX on the other. Do <strong>not</strong> connect TELEM 2's 5V (the Pi is already powered by the UBEC).")]},
{phase:F("Branchements","Wiring"),title:F("Brancher l'ESC au Pixhawk","Connect the ESC to the Pixhawk"),
 lede:F("Ton ESC est fourni avec un câble plat 8 fils. Les sorties MAIN OUT du Pixhawk n'étant pas alignées comme la nappe, on coupe le connecteur et on trie les fils.","Your ESC comes with an 8-wire flat cable. Since the Pixhawk's MAIN OUT pins aren't aligned like the cable, cut the connector and sort the wires."),
 images:[{src:"esc_pixhawk_mainout.jpg",cap:F("Fils triés sur MAIN OUT : signaux 1–4 + GND. Le + n'est PAS branché.","Wires sorted on MAIN OUT: signals 1–4 + GND. The + is NOT connected.")}],
 instr:[
  F("Repérez/étiquetez chaque fil, puis <strong>coupez le connecteur 8 pins</strong> pour libérer les fils.","Label each wire, then <strong>cut the 8-pin connector</strong> to free the wires."),
  F("<strong>M1, M2, M3, M4</strong> (signaux) → rangée <strong>S</strong> des sorties 1 à 4 de <span class='tag'>MAIN OUT</span>.","<strong>M1, M2, M3, M4</strong> (signals) → <strong>S</strong> row of outputs 1–4 on <span class='tag'>MAIN OUT</span>."),
  F("<strong>GND (−)</strong> → une broche <strong>−</strong> de la même rangée.","<strong>GND (−)</strong> → a <strong>−</strong> pin on the same row."),
  F("<strong>Ne branchez PAS le + (BAT/VCC)</strong> : le Pixhawk est déjà alimenté par le Power Module. Isolez ce fil à la gaine thermo.","<strong>Do NOT connect the + (BAT/VCC)</strong>: the Pixhawk is already powered by the Power Module. Insulate that wire with heat-shrink."),
  F("<strong>C (courant)</strong> et <strong>T (télémétrie)</strong> : non utilisés ici, laissez-les libres et isolés.","<strong>C (current)</strong> and <strong>T (telemetry)</strong>: unused here, leave them free and insulated.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le GPS","Connect the GPS"),
 lede:F("Le GPS M10 (avec compas intégré) se branche sur son port dédié.","The M10 GPS (with built-in compass) plugs into its dedicated port."),
 images:[{src:"gps_branchement.jpg",cap:F("GPS u-blox M10 en GH1.25 sur le port GPS 1.","u-blox M10 GPS via GH1.25 on the GPS 1 port.")}],
 instr:[F("Branchez le câble du GPS en <strong>GH1.25</strong> sur le port <span class='tag'>GPS 1</span> du Pixhawk. Le câble du mât sera rangé plus tard, à la fermeture.","Plug the GPS cable via <strong>GH1.25</strong> into the Pixhawk's <span class='tag'>GPS 1</span> port. The mast cable will be tidied later, at closing.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le récepteur ELRS","Connect the ELRS receiver"),
 lede:F("Piège logiciel important : l'ELRS parle CRSF par défaut. Si tu branches juste les câbles, le Pixhawk ne comprend rien — il faut dire au récepteur de traduire en SBUS.","Important software trap: ELRS speaks CRSF by default. If you just plug the cables, the Pixhawk understands nothing — you must tell the receiver to translate to SBUS."),
 images:[{src:"elrs_branchement.jpg",cap:F("Récepteur ELRS branché en RC IN (SBUS) : signal sur TX, + GND + 5V.","ELRS receiver on RC IN (SBUS): signal on TX, + GND + 5V.")}],
 instr:[
  F("Câblez le récepteur sur <span class='tag'>RC IN</span> en SBUS : <strong>signal sur la broche TX</strong>, + GND + 5V (faites les rallonges si besoin : dénuder, étamer, souder, gaine).","Wire the receiver to <span class='tag'>RC IN</span> as SBUS: <strong>signal on the TX pin</strong>, + GND + 5V (make leads if needed: strip, tin, solder, shrink)."),
  F("Mettez le récepteur en mode Wi-Fi (laissez-le clignoter rapidement) et connectez-vous dessus avec le PC sur <span class='tag'>10.0.0.1</span>.","Put the receiver in Wi-Fi mode (let it blink fast) and connect to it from the PC at <span class='tag'>10.0.0.1</span>."),
  F("Onglet <strong>Hardware</strong> → trouvez la ligne du pin <strong>TX</strong> (Serial TX) et passez son mode en <strong>SBUS</strong>. Sauvegardez.","<strong>Hardware</strong> tab → find the <strong>TX</strong> pin row (Serial TX) and set its mode to <strong>SBUS</strong>. Save.")],
 tip:[F("La fixation physique du récepteur se fait plus tard, dans la coque (étape « Fermer la coque »).","The receiver is physically secured later, in the shell (\"Close the shell\" step).")]},
/* ===== TEST CRITIQUE ===== */
{phase:F("Test · critique","Test · critical"),title:F("Smoke Stopper — première mise sous tension","Smoke Stopper — first power-up"),
 lede:F("Avant toute première connexion de la batterie, on chasse les courts-circuits. Vu l'historique sur l'alim, cette étape n'est pas optionnelle.","Before any first battery connection, hunt for shorts. Given the power history, this step is not optional."),
 parts:[
  {qty:"x1",name:F("Smoke Stopper (XT60)","Smoke Stopper (XT60)"),ref:""},
  {qty:"x1",name:F("Multimètre","Multimeter"),ref:F("continuité","continuity")},
  {qty:"x1",name:F("Batterie LiPo 4S","LiPo 4S battery"),ref:""}],
 images:[{src:"smoke_stopper.jpg",cap:F("Smoke Stopper intercalé entre la batterie et le drone — LED de contrôle.","Smoke Stopper between battery and drone — indicator LED.")}],
 instr:[
  F("Multimètre en continuité : confirmez <strong>aucun bip entre BAT+ et BAT−</strong>.","Multimeter on continuity: confirm <strong>no beep between BAT+ and BAT−</strong>."),
  F("Intercalez le <strong>Smoke Stopper</strong> entre la batterie et le XT60 du drone, puis branchez la batterie.","Insert the <strong>Smoke Stopper</strong> between the battery and the drone's XT60, then connect the battery."),
  F("<strong>LED verte</strong> = pas de court-circuit. Vérifiez que Pixhawk et Pi démarrent, mesurez 5,0 V en sortie UBEC.","<strong>Green LED</strong> = no short. Check the Pixhawk and Pi boot, measure 5.0 V at the UBEC output."),
  F("Si tout est nominal après 30 s, débranchez proprement et retirez le Smoke Stopper.","If all is nominal after 30 s, disconnect cleanly and remove the Smoke Stopper.")],
 warn:[F("<strong>LED rouge fixe ou connecteur qui chauffe = court-circuit → débranchez immédiatement.</strong> Jamais de 1re mise sous tension sans Smoke Stopper.","<strong>Solid red LED or a connector heating up = short → disconnect at once.</strong> Never a first power-up without a Smoke Stopper.")]},
/* ===== CONFIG QGC ===== */
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Flasher PX4 + Airframe","Flash PX4 + Airframe"),
 lede:F("La carte est livrée sous Betaflight : ce flash est indispensable pour parler MAVLink.","The board ships with Betaflight: this flash is essential to speak MAVLink."),
 instr:[
  F("Reliez le Pixhawk au PC en USB. Ouvrez <strong>QGroundControl</strong>.","Connect the Pixhawk to the PC via USB. Open <strong>QGroundControl</strong>."),
  F("Cliquez l'icône <strong>Q</strong> (haut gauche) → <strong>Vehicle Setup</strong> → <strong>Firmware</strong>. Débranchez puis rebranchez l'USB quand c'est demandé.","Click the <strong>Q</strong> icon (top-left) → <strong>Vehicle Setup</strong> → <strong>Firmware</strong>. Unplug then replug USB when asked."),
  F("Choisissez <strong>PX4 Pro Stable</strong> → OK, et laissez l'installation finir.","Choose <strong>PX4 Pro Stable</strong> → OK, and let it finish installing."),
  F("Allez dans <strong>Airframe</strong> → <span class='tag'>Generic Quadrotor X</span> → bouton <strong>Apply and Restart</strong> (en haut à droite).","Go to <strong>Airframe</strong> → <span class='tag'>Generic Quadrotor X</span> → <strong>Apply and Restart</strong> (top-right).")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Géométrie des moteurs (deadcat)","Motor geometry (deadcat)"),
 lede:F("Les bras avant et arrière n'ont pas la même longueur : on renseigne les distances au centre.","Front and rear arms aren't the same length: enter the distances to centre."),
 instr:[
  F("Dans <strong>Airframe</strong> (ou Vehicle Setup → Geometry selon la version), ouvrez la géométrie personnalisée du châssis.","In <strong>Airframe</strong> (or Vehicle Setup → Geometry depending on version), open the custom airframe geometry."),
  F("Moteurs <strong>avant</strong> (M1 av-droit, M3 av-gauche) : <span class='tag'>24,3 cm</span> du milieu de la plaque.","<strong>Front</strong> motors (M1 front-right, M3 front-left): <span class='tag'>24.3 cm</span> from plate centre."),
  F("Moteurs <strong>arrière</strong> (M2 ar-gauche, M4 ar-droit) : <span class='tag'>26,3 cm</span> du milieu de la plaque.","<strong>Rear</strong> motors (M2 rear-left, M4 rear-right): <span class='tag'>26.3 cm</span> from plate centre.")],
 tip:[F("Une géométrie exacte améliore nettement la stabilisation et l'estimation du centre de poussée.","Accurate geometry clearly improves stabilisation and thrust-centre estimation.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Binder le récepteur ELRS","Bind the ELRS receiver"),
 lede:F("On lie le récepteur à la radio RadioMaster Pocket avec une même binding phrase des deux côtés.","Bind the receiver to the RadioMaster Pocket radio with the same binding phrase on both sides."),
 instr:[
  F("Récepteur en mode Wi-Fi (appui long ~10 s sur son bouton). PC sur le réseau <span class='tag'>ExpressLRS RX</span>.","Receiver in Wi-Fi mode (long press ~10 s). PC on the <span class='tag'>ExpressLRS RX</span> network."),
  F("Ouvrez <span class='tag'>10.0.0.1</span>, entrez une <strong>Binding Phrase</strong>, <strong>Save &amp; Reboot</strong>.","Open <span class='tag'>10.0.0.1</span>, enter a <strong>Binding Phrase</strong>, <strong>Save &amp; Reboot</strong>."),
  F("Sur la radio : <strong>Menu → Model Setup → Internal RF → ELRS</strong>, entrez <strong>exactement la même phrase</strong>. LED fixe du récepteur = bindé.","On the radio: <strong>Menu → Model Setup → Internal RF → ELRS</strong>, enter <strong>exactly the same phrase</strong>. Solid receiver LED = bound.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer la radio","Calibrate the radio"),
 lede:F("Une fois le récepteur bindé et branché, on calibre les manches et interrupteurs.","Once the receiver is bound and wired, calibrate the sticks and switches."),
 instr:[
  F("QGC → <strong>Vehicle Setup → Radio</strong>. Vérifiez que les barres bougent quand vous touchez les manches.","QGC → <strong>Vehicle Setup → Radio</strong>. Check the bars move when you touch the sticks."),
  F("Cliquez <strong>Calibrate</strong> et suivez les consignes : bougez tous les sticks et switches jusqu'aux extrémités quand c'est demandé.","Click <strong>Calibrate</strong> and follow the prompts: move every stick and switch to the extremes when asked.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer les capteurs","Calibrate the sensors"),
 lede:F("Quatre calibrations dans Vehicle Setup → Sensors, à faire dans l'ordre.","Four calibrations in Vehicle Setup → Sensors, in order."),
 instr:[
  F("<strong>Gyroscope</strong> : drone immobile et à plat, ne pas toucher.","<strong>Gyroscope</strong>: drone still and flat, don't touch it."),
  F("<strong>Accéléromètre</strong> : suivez les 6 positions montrées par les animations (à plat, sur chaque flanc, nez en haut/bas).","<strong>Accelerometer</strong>: follow the 6 positions shown by the animations (flat, each side, nose up/down)."),
  F("<strong>Compas / Boussole</strong> : faites tourner le drone dans tous les sens, <strong>loin de tout métal</strong>.","<strong>Compass</strong>: rotate the drone every which way, <strong>away from any metal</strong>."),
  F("<strong>Level Horizon</strong> : drone parfaitement à plat, cliquez pour figer le niveau.","<strong>Level Horizon</strong>: drone perfectly flat, click to set the level.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer la batterie","Configure the battery"),
 lede:F("Réglages d'alimentation dans Vehicle Setup → Power.","Power settings in Vehicle Setup → Power."),
 instr:[
  F("Number of Cells : <strong>4</strong> (4S). Full voltage <span class='tag'>4,2 V</span>/cellule, Empty <span class='tag'>3,7 V</span>/cellule.","Number of Cells: <strong>4</strong> (4S). Full voltage <span class='tag'>4.2 V</span>/cell, Empty <span class='tag'>3.7 V</span>/cell."),
  F("Renseignez le <strong>Voltage Divider</strong> du PM02 : <span class='tag'>≈ 18,182</span> (ajustable ensuite via « Calculate » en comparant au multimètre).","Set the PM02 <strong>Voltage Divider</strong>: <span class='tag'>≈ 18.182</span> (fine-tune later via \"Calculate\" against a multimeter).")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer les modes de vol","Configure flight modes"),
 lede:F("On assigne les interrupteurs dans Vehicle Setup → Flight Modes.","Assign the switches in Vehicle Setup → Flight Modes."),
 instr:[
  F("Choisissez un interrupteur 3 positions pour <strong>Stabilized / Altitude / Position</strong>.","Pick a 3-position switch for <strong>Stabilized / Altitude / Position</strong>."),
  F("Assignez un interrupteur dédié à <strong>Offboard</strong> (passage en vol autonome).","Assign a dedicated switch to <strong>Offboard</strong> (hand-off to autonomous flight)."),
  F("Assignez idéalement un interrupteur séparé à <strong>Return to Land (RTL)</strong> pour la sécurité.","Ideally assign a separate switch to <strong>Return to Land (RTL)</strong> for safety.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer et calibrer les ESC","Configure and calibrate the ESCs"),
 lede:F("Vérification des sorties, calibration, puis contrôle du sens — toujours sans hélices.","Check the outputs, calibrate, then verify direction — always without props."),
 instr:[
  F("Vehicle Setup → <strong>Actuators</strong> : vérifiez <strong>MAIN 1–4 = Motor 1–4</strong>, PWM <span class='tag'>400 Hz</span> (Disarmed 1000, Min 1000, Max 2000).","Vehicle Setup → <strong>Actuators</strong>: check <strong>MAIN 1–4 = Motor 1–4</strong>, PWM <span class='tag'>400 Hz</span> (Disarmed 1000, Min 1000, Max 2000)."),
  F("Calibrez les ESC : batterie débranchée, mettez les gaz à fond dans QGC, branchez la batterie, attendez les bips, puis ramenez les gaz à zéro.","Calibrate the ESCs: battery unplugged, throttle to max in QGC, plug the battery, wait for the beeps, then throttle to zero."),
  F("Faites tourner chaque moteur à 5–10 % et vérifiez le sens (tableau M1–M4). Sens inversé → échangez 2 des 3 phases sur l'ESC.","Spin each motor at 5–10% and check the direction (M1–M4 table). Wrong way → swap 2 of the 3 phases on the ESC.")],
 warn:[F("Aucune hélice montée pendant tout ce test.","No props fitted during this entire test.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Régler les paramètres critiques","Set the critical parameters"),
 lede:F("Sans ces paramètres, l'armement ou l'Offboard sont refusés. On les saisit un par un.","Without these, arming or Offboard are refused. Enter them one by one."),
 instr:[
  F("Allez dans <strong>Vehicle Setup → Parameters</strong>. Servez-vous de la <strong>barre de recherche</strong> en haut à droite : tapez le nom, double-cliquez le paramètre, entrez la valeur, <strong>Save</strong>.","Go to <strong>Vehicle Setup → Parameters</strong>. Use the <strong>search bar</strong> (top-right): type the name, double-click the parameter, enter the value, <strong>Save</strong>."),
  F("<span class='tag'>CBRK_IO_SAFETY</span> = 22027 (le 6C Mini n'a pas de bouton safety) · <span class='tag'>COM_RCL_EXCEPT</span> = 4 (autorise l'Offboard sans toucher les sticks).","<span class='tag'>CBRK_IO_SAFETY</span> = 22027 (the 6C Mini has no safety button) · <span class='tag'>COM_RCL_EXCEPT</span> = 4 (allows Offboard without touching the sticks)."),
  F("<span class='tag'>MAV_1_CONFIG</span> = TELEM 2 · <span class='tag'>SER_TEL2_BAUD</span> = 57600 · <span class='tag'>MAV_1_MODE</span> = Normal · <span class='tag'>MAV_1_RATE</span> = 1200 (lien Raspberry Pi).","<span class='tag'>MAV_1_CONFIG</span> = TELEM 2 · <span class='tag'>SER_TEL2_BAUD</span> = 57600 · <span class='tag'>MAV_1_MODE</span> = Normal · <span class='tag'>MAV_1_RATE</span> = 1200 (Raspberry Pi link)."),
  F("<span class='tag'>MPC_THR_HOVER</span> ≈ 0,65 · <span class='tag'>MPC_USE_HTE</span> = Enabled. Dans Safety : activez le GPS Loss Failsafe, RTL Altitude ≥ 15 m.","<span class='tag'>MPC_THR_HOVER</span> ≈ 0.65 · <span class='tag'>MPC_USE_HTE</span> = Enabled. In Safety: enable GPS Loss Failsafe, RTL Altitude ≥ 15 m.")],
 warn:[F("Attendez toujours un fix GPS ≥ 8–10 satellites avant de voler en Position ou Offboard.","Always wait for a GPS fix ≥ 8–10 satellites before flying in Position or Offboard.")]},
/* ===== LOGICIEL PI ===== */
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Le calculateur de bord","The companion computer"),
 lede:F("Le drone vole maintenant en manuel. Place au cerveau autonome : la Raspberry Pi exécute le script de vol et envoie la vidéo au PC sol. Les prochaines pages la mettent en route.","The drone now flies manually. Now the autonomous brain: the Raspberry Pi runs the flight script and streams video to the ground PC. The next pages bring it online."),
 instr:[
  F("Le plan : la trouver sur le réseau → s'y connecter en SSH → installer le logiciel → activer l'UART → lancer.","The plan: find it on the network → connect via SSH → install software → enable UART → launch."),
  F("Tout se fait depuis le PC sol, avec le partage de connexion du téléphone activé.","Everything is done from the ground PC, with the phone hotspot on.")],
 tip:[F("La carte SD a déjà été préparée plus tôt (étape Raspberry Pi Imager).","The SD card was already prepared earlier (Raspberry Pi Imager step).")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Trouver les adresses IP","Find the IP addresses"),
 lede:F("Le .local ne marche pas ici. PC et Pi doivent être sur le même Wi-Fi (partage de connexion).","The .local doesn't work here. PC and Pi must be on the same Wi-Fi (hotspot)."),
 instr:[
  F("IP de la Pi : dans les réglages du <strong>partage de connexion</strong> du téléphone, liste des appareils connectés (ex. <span class='tag'>172.20.10.2</span>).","Pi IP: in the phone's <strong>hotspot</strong> settings, connected devices list (e.g. <span class='tag'>172.20.10.2</span>)."),
  F("IP du PC : ouvrez PowerShell, tapez <span class='tag'>ipconfig</span>, lisez la ligne <strong>IPv4</strong> (ex. <span class='tag'>172.20.10.3</span>).","PC IP: open PowerShell, type <span class='tag'>ipconfig</span>, read the <strong>IPv4</strong> line (e.g. <span class='tag'>172.20.10.3</span>).")],
 tip:[F("PC et Pi doivent partager les 3 premiers blocs d'IP (172.20.10.x).","PC and Pi must share the first 3 IP blocks (172.20.10.x).")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Connexion SSH","SSH connection"),
 lede:F("On ouvre une session à distance sur la Pi depuis le PC.","Open a remote session on the Pi from the PC."),
 instr:[
  F("Dans PowerShell :<code class='cmd'>ssh neutronit@172.20.10.2</code>Mot de passe : <span class='tag'>neutronit2026</span>.","In PowerShell:<code class='cmd'>ssh neutronit@172.20.10.2</code>Password: <span class='tag'>neutronit2026</span>."),
  F("Si erreur de clé après un reflash de la carte :<code class='cmd'>ssh-keygen -R 172.20.10.2</code>puis relancez la commande ssh.","If a key error appears after re-flashing the card:<code class='cmd'>ssh-keygen -R 172.20.10.2</code>then run the ssh command again.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Installer le logiciel","Install the software"),
 lede:F("Deux commandes installent tout l'écosystème de vol. Collez-les telles quelles.","Two commands install the whole flight stack. Paste them as-is."),
 instr:[
  F("Système, OpenCV, caméra, GStreamer :<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>","System, OpenCV, camera, GStreamer:<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>"),
  F("Bibliothèques Python + PATH + groupe série :<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>","Python libs + PATH + serial group:<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Activer l'UART","Enable UART"),
 lede:F("On libère le port série matériel pour la liaison avec le Pixhawk.","Free the hardware serial port for the Pixhawk link."),
 instr:[
  F("Lancez <span class='tag'>sudo raspi-config</span> → <strong>Interface Options → Serial Port</strong>. À « login shell over serial » répondez <strong>NON</strong> ; à « serial hardware enabled » répondez <strong>OUI</strong>. Puis Reboot.","Run <span class='tag'>sudo raspi-config</span> → <strong>Interface Options → Serial Port</strong>. \"login shell over serial\" → <strong>NO</strong>; \"serial hardware enabled\" → <strong>YES</strong>. Then Reboot."),
  F("Après reboot, vérifiez :<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>","After reboot, check:<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Éditer le code via VS Code (Remote SSH)","Edit the code via VS Code (Remote SSH)"),
 lede:F("VS Code se connecte à la Pi : vous éditez les fichiers directement dessus, terminal compris. Plus besoin d'écran ni de clavier sur la Pi.","VS Code connects to the Pi: you edit the files right on it, terminal included. No screen or keyboard needed on the Pi."),
 instr:[
  F("Dans VS Code, installez l'extension <strong>Remote - SSH</strong> (éditeur de Microsoft).","In VS Code, install the <strong>Remote - SSH</strong> extension (by Microsoft)."),
  F("Cliquez l'icône verte <span class='tag'>&gt;&lt;</span> en bas à gauche → <strong>Connect to Host…</strong> → <strong>Add New SSH Host…</strong>.","Click the green <span class='tag'>&gt;&lt;</span> icon (bottom-left) → <strong>Connect to Host…</strong> → <strong>Add New SSH Host…</strong>."),
  F("Tapez <span class='tag'>ssh neutronit@172.20.10.2</span>, validez, choisissez le fichier de config par défaut, puis <strong>Connect</strong>. Mot de passe <span class='tag'>neutronit2026</span>.","Type <span class='tag'>ssh neutronit@172.20.10.2</span>, confirm, pick the default config file, then <strong>Connect</strong>. Password <span class='tag'>neutronit2026</span>."),
  F("<strong>File → Open Folder</strong> → <span class='tag'>/home/neutronit</span>. Le terminal intégré (<strong>Terminal → New Terminal</strong>) tourne déjà sur la Pi.","<strong>File → Open Folder</strong> → <span class='tag'>/home/neutronit</span>. The built-in terminal (<strong>Terminal → New Terminal</strong>) already runs on the Pi.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Lancer le vol","Launch the flight"),
 lede:F("Trois terminaux, trois commandes (remplacez l'IP par celle du PC sol).","Three terminals, three commands (replace the IP with the ground PC's)."),
 instr:[
  F("Terminal 1 — télémétrie vers QGC :<code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:172.20.10.3:14550 --out udp:127.0.0.1:14551</code>","Terminal 1 — telemetry to QGC:<code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:172.20.10.3:14550 --out udp:127.0.0.1:14551</code>"),
  F("Terminal 2 — caméra :<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://172.20.10.3:5600</code>","Terminal 2 — camera:<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://172.20.10.3:5600</code>"),
  F("Terminal 3 — vol autonome :<code class='cmd'>python3 neutronit_vol.py</code>","Terminal 3 — autonomous flight:<code class='cmd'>python3 neutronit_vol.py</code>")]},
/* ===== FERMETURE ===== */
{phase:F("Fermeture finale","Final closing"),title:F("Fixer le support caméra","Fix the camera mount"),
 lede:F("Maintenant que tout est testé, on attaque la caméra et la fermeture. Le support se visse à l'avant de la plaque.","Now everything is tested, start the camera and closing. The bracket screws to the front of the plate."),
 parts:[{qty:"x2",name:F("Vis M3×6","M3×6 screw"),ref:""}],
 fastener:[F("Vis M3×6","Screw M3×6")],
 images:[{src:"support_camera_fixation.jpg",cap:F("Support caméra vissé à l'avant de la plaque (2 vis M3×6).","Camera bracket screwed at the front of the plate (2 × M3×6).")}],
 instr:[F("Vissez le support_caméra à l'avant de la plaque avec <strong>2 vis M3×6</strong>, juste devant l'UBEC et le Power Module.","Screw the camera bracket to the front of the plate with <strong>2 × M3×6</strong>, right in front of the UBEC and Power Module.")]},
{phase:F("Fermeture finale","Final closing"),title:F("Assembler la caméra dans sa coque","Assemble the camera in its shell"),
 lede:F("On fixe d'abord la nappe sur la caméra, puis la caméra dans la coque caméra.","First attach the cable to the camera, then the camera into the camera shell."),
 parts:[
  {qty:"x1",name:F("Caméra Module 3 Wide + nappe 300 mm","Camera Module 3 Wide + 300 mm cable"),ref:""},
  {qty:"x2",name:F("Vis M2×6","M2×6 screw"),ref:""}],
 fastener:[F("Vis M2×6","Screw M2×6")],
 images:[{src:"camera_dans_coque.jpg",cap:F("Caméra + nappe 300 mm placées dans la coque caméra.","Camera + 300 mm cable placed in the camera shell.")}],
 instr:[
  F("Clipsez la <strong>nappe 300 mm</strong> sur le connecteur de la caméra (verrou noir tiré, nappe insérée, verrou repoussé).","Clip the <strong>300 mm cable</strong> onto the camera connector (pull the black latch, insert, push the latch back)."),
  F("Posez la caméra dans la coque, objectif vers l'avant, et vissez-la directement (<strong>2 vis M2×6</strong>).","Place the camera in the shell, lens forward, and screw it directly (<strong>2 × M2×6</strong>)."),
  F("Faites ressortir la nappe par l'ouverture de la coque.","Route the cable out through the shell opening.")]},
{phase:F("Fermeture finale","Final closing"),title:F("Fermer avec le clap caméra","Close with the camera clamp"),
 lede:F("Le clap bloque la caméra et se visse dans les inserts M2 de la coque.","The clamp locks the camera and screws into the shell's M2 inserts."),
 parts:[{qty:"x2",name:F("Vis M2×6","M2×6 screw"),ref:""}],
 fastener:[F("Vis M2×6","Screw M2×6"),F("Insert M2","Insert M2")],
 images:[{src:"clap_camera.jpg",cap:F("Clap vissé dans les inserts M2 de la coque caméra (vis M2×6).","Clamp screwed into the camera shell's M2 inserts (M2×6).")}],
 instr:[
  F("Posez le clap caméra par-dessus la caméra.","Place the camera clamp over the camera."),
  F("Vissez <strong>2 vis M2×6</strong> qui traversent le clap et se logent dans les <strong>inserts M2 de la coque</strong>.","Drive <strong>2 × M2×6</strong> through the clamp into the <strong>shell's M2 inserts</strong>."),
  F("La nappe doit ressortir proprement par le trou formé entre la coque et le clap.","The cable should exit cleanly through the gap between shell and clamp.")]},
{phase:F("Fermeture finale","Final closing"),title:F("Monter la caméra + brancher la nappe","Mount the camera + plug the cable"),
 lede:F("On monte l'ensemble sur le support via le cylindre, et on branche la nappe sur la Pi.","Mount the assembly on the bracket via the cylinder, and plug the cable into the Pi."),
 parts:[{qty:"x1",name:F("Cylindre caméra","Camera cylinder"),ref:""}],
 images:[{src:"camera_montage_support.jpg",cap:F("Ensemble caméra sur le support, nappe branchée sur CAM 0 de la Pi.","Camera assembly on the bracket, cable plugged into the Pi's CAM 0.")}],
 instr:[
  F("Emboîtez la coque caméra dans le support et fixez-la avec le <strong>cylindre</strong> ; réglez l'<strong>angle de vue</strong> voulu avant de serrer.","Seat the camera shell in the bracket and fix it with the <strong>cylinder</strong>; set the desired <strong>view angle</strong> before tightening."),
  F("Branchez l'autre bout de la nappe sur le port <span class='tag'>CAM 0</span> de la Pi, <strong>dents métalliques vers l'intérieur</strong> de la carte, et refermez le verrou.","Plug the other cable end into the Pi's <span class='tag'>CAM 0</span> port, <strong>metal contacts toward the inside</strong> of the board, and close the latch.")]},
{phase:F("Fermeture finale","Final closing"),title:F("Monter le mât GPS","Fit the GPS mast"),
 lede:F("Le mât se fixe sur le renfoncement central de la coque (loin des moteurs, pour le compas).","The mast fixes on the shell's central recess (away from the motors, for the compass)."),
 parts:[{qty:"x4",name:F("Vis M3×8","M3×8 screw"),ref:""}],
 fastener:[F("Vis M3×8","Screw M3×8"),F("Insert M3","Insert M3")],
 images:[{src:"mat_gps.jpg",cap:F("Mât GPS vissé sur le renfoncement central (4 vis M3×8 dans les inserts).","GPS mast screwed on the central recess (4 × M3×8 into the inserts).")}],
 instr:[F("Fixez le mât GPS avec <strong>4 vis M3×8</strong> dans les inserts M3 du renfoncement central de la coque.","Fix the GPS mast with <strong>4 × M3×8</strong> into the central recess's M3 inserts.")]},
{phase:F("Fermeture finale","Final closing"),title:F("Fermer la coque + fixer l'ELRS","Close the shell + secure the ELRS"),
 lede:F("On referme tout, et on fixe le récepteur ELRS à l'intérieur, à l'arrière, avec un collier dans les trous d'aération.","Close everything up, and secure the ELRS receiver inside, at the rear, with a zip tie through the vent holes."),
 parts:[
  {qty:"x4",name:F("Vis M3 (par le dessous)","M3 screws (from below)"),ref:""},
  {qty:"x1",name:F("Collier de serrage","Zip tie"),ref:"ELRS"}],
 fastener:[F("Vis M3","Screw M3"),F("Insert M3","Insert M3")],
 images:[
  {src:"coque_fixation.jpg",cap:F("Coque vissée par le dessous dans les inserts M3 ; bras, mât et câble batterie sortis.","Shell screwed from below into the M3 inserts; arms, mast and battery cable out.")},
  {src:"elrs_coque_fixation.jpg",cap:F("Récepteur ELRS maintenu à l'arrière par un collier passant dans les trous d'aération.","ELRS receiver held at the rear by a zip tie through the vent holes.")}],
 instr:[
  F("Posez la coque sur le drone en laissant sortir les bras, le mât GPS et le câble batterie (XT60).","Set the shell on the drone, letting the arms, GPS mast and battery cable (XT60) stick out."),
  F("Vissez les <strong>vis M3 par le dessous</strong> dans les inserts M3 de la coque. Sans forcer (PETG fragile).","Drive the <strong>M3 screws from below</strong> into the shell's M3 inserts. Don't overtighten (fragile PETG)."),
  F("Placez le récepteur ELRS à l'arrière, antenne dégagée, et serrez un <strong>collier passant dans les trous d'aération</strong> pour le maintenir.","Place the ELRS at the rear, antenna clear, and tighten a <strong>zip tie through the vent holes</strong> to hold it.")]},
/* ===== PREMIER VOL ===== */
{phase:F("Premier vol","First flight"),title:F("Installer la batterie","Install the battery"),
 lede:F("La batterie se cale entre les 4 plots et se sangle autour de la coque.","The battery sits between the 4 posts and is strapped around the shell."),
 parts:[
  {qty:"x1",name:F("Batterie LiPo 4S 6000 mAh","LiPo 4S 6000 mAh battery"),ref:""},
  {qty:"x2",name:F("Sangles velcro","Velcro straps"),ref:""}],
 images:[{src:"batterie_sangles.jpg",cap:F("Batterie calée entre les 4 plots, maintenue par 2 sangles autour de la coque.","Battery between the 4 posts, held by 2 straps around the shell.")}],
 instr:[
  F("Glissez la batterie <strong>entre les 4 plots</strong>, sous le châssis, puis branchez son XT60 à celui qui descend de la plaque.","Slide the battery <strong>between the 4 posts</strong>, under the frame, then plug its XT60 to the one coming down from the plate."),
  F("Passez les <strong>2 sangles velcro</strong> qui font le tour complet de la coque et serrez.","Run the <strong>2 velcro straps</strong> all the way around the shell and tighten."),
  F("Centrez la batterie pour équilibrer le centre de masse.","Centre the battery to balance the centre of mass.")]},
{phase:F("Premier vol","First flight"),title:F("Monter les hélices","Fit the propellers"),

  F("Identifiez le sens de chaque moteur au câblage : <strong>fil bleu au milieu = anti-horaire (CCW)</strong>, <strong>fil bleu à l'extrémité = horaire (CW)</strong>.","Identify each motor's spin from the wiring: <strong>blue wire in the middle = CCW</strong>, <strong>blue wire at the end = CW</strong>."),

  F("Enfoncez l'hélice <strong>à fond sur l'axe</strong> (bonne hauteur de montage), face supérieure vers le haut.","Push the prop <strong>fully onto the shaft</strong> (correct mounting height), top face up."),
  F("Serrez l'écrou auto-freinant à la main + ¼ de tour à la clé. L'hélice doit tourner libre, sans voile ni frottement sur la coque.","Hand-tighten the self-locking nut + ¼ turn with a wrench. The prop must spin free, no wobble or rubbing on the shell.")],

{phase:F("Premier vol","First flight"),title:F("Checklist finale avant décollage","Final pre-flight checklist"),

  {name:F("Vis moteurs serrées + Loctite","Motor screws tight + Loctite"),ref:""},

  {name:F("Zone dégagée + Failsafe RTL","Clear area + RTL failsafe"),ref:""},
  {name:F("Hélices montées en dernier","Props fitted last"),ref:""}]},

  F("Partage de connexion ON. PC sol connecté au Wi-Fi, relevez son IP, lancez QGroundControl.","Hotspot ON. Ground PC on Wi-Fi, note its IP, launch QGroundControl."),

{outro:true,phase:F("Terminé","Done"),
 title:F("Drone assemblé. Bon vol !","Drone built. Happy flying!"),

 sig:"NEUTRON IT · Guillaume Guguen"}
];

/* ============================ UI ============================ */
const UI={
  fr:{sub:"Notice de montage",step:"Étape",prev:"Précédent",next:"Suivant",done:"Terminé",
    parts:"Matériel nécessaire",screws:"Visserie",check:"Liste de vérification",howto:"Marche à suivre",
    caution:"Précaution",tip:"Astuce",checked:"Coché",photo:"Photo à placer dans le dossier"},
  en:{sub:"Assembly guide",step:"Step",prev:"Previous",next:"Next",done:"Done",
    parts:"Required parts",screws:"Fasteners",check:"Checklist",howto:"How to",
    caution:"Caution",tip:"Tip",checked:"Checked",photo:"Photo to add to the folder"}
};
let lang='fr';
const L=x=> (x&&typeof x==='object'&&'fr'in x)? x[lang] : x;

const stage=document.getElementById('stage'),dotsWrap=document.getElementById('dots'),bar=document.getElementById('bar');
const cNum=document.getElementById('cNum'),cTot=document.getElementById('cTot');
const prevB=document.getElementById('prev'),nextB=document.getElementById('next');
let i=0;
const pad=n=>String(n).padStart(2,'0');
const PH=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
const SCREW=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M8.5 4h7l-1.5 3.2h-4z"/><path d="M10 7.2h4V18l-2 3-2-3z"/></svg>`;
const INSERT=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="7" y="5" width="10" height="14" rx="1.2"/><path d="M9.4 5v14M12 5v14M14.6 5v14"/></svg>`;
const CHECKMARK=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;

function partsCard(s){
  const rows=s.parts.map(p=>`<div class="part"><div class="qty">${L(p.qty)}</div><div><div class="pn">${L(p.name)}</div>${p.ref?`<div class="pref">${L(p.ref)}</div>`:''}</div></div>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].parts}</div><div class="manifest">${rows}</div></div>`;
}
function fastCard(s){
  const it=s.fastener.map(f=>{const t=L(f);const ic=/nsert/i.test(t)?INSERT:SCREW;return `<div class="fitem">${ic}<span>${t}</span></div>`;}).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].screws}</div><div class="fastbody">${it}</div></div>`;
}
function checkCard(s){
  const rows=s.checklist.map((c,k)=>`<label class="check"><input type="checkbox" data-k="${k}"><span class="ctext">${L(c.name)}${c.ref?`<small>${L(c.ref)}</small>`:''}</span></label>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].check}</div><div class="manifest">${rows}</div><div class="checkfoot"><span>${UI[lang].checked}</span><span><b id="ckN">0</b> / ${s.checklist.length}</span></div></div>`;
}
function figure(im){
  return `<figure class="figure"><div class="frame"><span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
    <img src="${im.src}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="ph" style="display:none">${PH}<div>${UI[lang].photo}</div><code>${im.src}</code></div></div>
    ${im.cap?`<figcaption class="cap"><b>FIG</b><span>${L(im.cap)}</span></figcaption>`:''}</figure>`;
}
function notes(arr,type){
  if(!arr||!arr.length) return '';
  const ic=type==='warn'?'!':'i', lbl=type==='warn'?UI[lang].caution:UI[lang].tip;
  return arr.map(t=>`<div class="note ${type}"><div class="ic">${ic}</div><div><b>${lbl}.</b> ${L(t)}</div></div>`).join('');
}
function render(){
  const s=STEPS[i];
  if(s.outro){
    stage.innerHTML=`<div class="outro"><div class="big">${CHECKMARK}</div><h1>${L(s.title)}</h1><p>${L(s.lede)}</p><div class="sig">${s.sig}</div></div>`;
  }else{
    let rail = s.checklist?checkCard(s):(s.parts?partsCard(s):'');
    if(s.fastener) rail+=fastCard(s);
    const left = rail?`<div class="rail">${rail}</div>`:'';
    const imgs=(s.images||[]).map(figure).join('');
    const instr=s.instr?`<div class="steps-h">${UI[lang].howto}<span class="ln"></span></div><ol class="instr">${s.instr.map(t=>`<li><p>${L(t)}</p></li>`).join('')}</ol>`:'';
    const co=(s.warn||s.tip)?`<div class="notes-wrap">${notes(s.warn,'warn')}${notes(s.tip,'tip')}</div>`:'';
    const main=(imgs||instr||co)?`<div class="viewport">${imgs}${instr}${co}</div>`:'';
    const cols=left?`<div class="grid"><div>${left}</div>${main||'<div></div>'}</div>`:main;
    stage.innerHTML=`<div class="eyebrow">${L(s.phase)}</div><h1>${L(s.title)}</h1>${s.lede?`<p class="lede">${L(s.lede)}</p>`:''}${cols}`;
    if(s.checklist){const bx=stage.querySelectorAll('.check input'),ck=document.getElementById('ckN');
      bx.forEach(b=>b.addEventListener('change',()=>{ck.textContent=[...bx].filter(x=>x.checked).length;}));}
  }
  cNum.textContent=pad(i+1);
  bar.style.width=((i+1)/STEPS.length*100)+'%';
  prevB.disabled=i===0;
  nextB.innerHTML=i===STEPS.length-1?`<span class="navlabel">${UI[lang].done}</span> ✓`:`<span class="navlabel">${UI[lang].next}</span> ›`;
  [...dotsWrap.children].forEach((d,k)=>{d.className='dt'+(k===i?' on':(k<i?' done':''));});
  const a=dotsWrap.children[i]; if(a) a.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  stage.focus({preventScroll:true});
  window.scrollTo({top:0,behavior:'smooth'});
}
function buildDots(){
  dotsWrap.innerHTML='';
  STEPS.forEach((s,k)=>{const b=document.createElement('button');b.className='dt';b.title=`${pad(k+1)} — ${L(s.title)}`;b.addEventListener('click',()=>{i=k;render();});dotsWrap.appendChild(b);});
}
function applyLang(){
  document.documentElement.lang=lang;
  document.getElementById('subtitle').textContent=UI[lang].sub;
  document.getElementById('cLbl').textContent=UI[lang].step;
  document.getElementById('prevL').textContent=UI[lang].prev;
  document.getElementById('nextL').textContent=UI[lang].next;
  document.getElementById('segFr').classList.toggle('on',lang==='fr');
  document.getElementById('segEn').classList.toggle('on',lang==='en');
  cTot.textContent=pad(STEPS.length);
  buildDots(); render();
}
prevB.addEventListener('click',()=>{if(i>0){i--;render();}});
nextB.addEventListener('click',()=>{if(i<STEPS.length-1){i++;render();}});
document.addEventListener('keydown',e=>{if(e.target.matches('input'))return;
  if(e.key==='ArrowRight'&&i<STEPS.length-1){i++;render();}
  if(e.key==='ArrowLeft'&&i>0){i--;render();}});
document.getElementById('segFr').addEventListener('click',()=>{if(lang!=='fr'){lang='fr';applyLang();}});
document.getElementById('segEn').addEventListener('click',()=>{if(lang!=='en'){lang='en';applyLang();}});
document.getElementById('theme').addEventListener('click',()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',d?'light':'dark');});
applyLang();
</script>
</body>
</html>
