<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neutron IT — Notice de montage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EBEE;--panel:#FFFFFF;--panel-2:#F4F5F7;
    --ink:#15181D;--ink-soft:#5B6470;--ink-faint:#8B929C;
    --line:#D7DBE0;--line-strong:#C2C8D0;
    --accent:#FF5A1F;--accent-soft:#FFE9DF;
    --warn:#C92A1C;--warn-soft:#FCE9E7;--tip:#1F6BB8;--tip-soft:#E6F0FA;
    --shadow:0 1px 2px rgba(20,24,29,.06),0 8px 24px rgba(20,24,29,.06);--radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0E1115;--panel:#161A20;--panel-2:#1C2128;
    --ink:#E9ECF0;--ink-soft:#9AA3AE;--ink-faint:#6B7480;
    --line:#262C34;--line-strong:#323A44;
    --accent:#FF6A33;--accent-soft:#3a1d10;
    --warn:#F2685A;--warn-soft:#2a1614;--tip:#6BB0F0;--tip-soft:#11202e;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100dvh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;background-position:center}
  html[data-theme="dark"] body{background-image:linear-gradient(#1a1f26 1px,transparent 1px),linear-gradient(90deg,#1a1f26 1px,transparent 1px)}
  header{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--line-strong)}
  .bar{max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:30px;height:30px;flex:none;border-radius:7px;background:var(--accent);position:relative;box-shadow:0 0 0 4px var(--accent-soft)}
  .logo::before,.logo::after{content:"";position:absolute;background:#fff}
  .logo::before{inset:13px 6px;height:4px;border-radius:2px}
  .logo::after{inset:6px 13px;width:4px;border-radius:2px}
  .brand b{font-family:"Space Grotesk";font-weight:700;font-size:15px;letter-spacing:.04em}
  .brand span{display:block;font-size:11px;color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase}
  .counter{margin-left:auto;display:flex;align-items:baseline;gap:6px;font-family:"IBM Plex Mono";color:var(--ink-soft);font-size:13px}
  .counter b{color:var(--ink);font-size:18px;font-weight:600}
  .langseg{flex:none;display:flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
  .seg{height:34px;padding:0 11px;border:0;background:var(--panel);color:var(--ink-soft);font-family:"IBM Plex Mono";font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
  .seg+.seg{border-left:1px solid var(--line-strong)}
  .seg.on{background:var(--accent);color:#fff}
  .seg:not(.on):hover{color:var(--accent)}
  .iconbtn{flex:none;height:36px;min-width:36px;padding:0 10px;border-radius:9px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);cursor:pointer;font-size:15px;display:grid;place-items:center;transition:.15s}
  .iconbtn:hover{border-color:var(--accent);color:var(--accent)}
  .progress{height:3px;background:var(--line);width:100%}
  .progress i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s cubic-bezier(.4,0,.2,1)}
  main{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:26px 20px 120px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:"IBM Plex Mono";font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .eyebrow::before{content:"";width:22px;height:1.5px;background:var(--accent)}
  h1{font-family:"Space Grotesk";font-weight:600;font-size:clamp(23px,4vw,33px);line-height:1.1;letter-spacing:-.01em;margin-bottom:6px}
  .lede{color:var(--ink-soft);font-size:15.5px;max-width:62ch;margin-bottom:24px}
  .grid{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .rail{display:flex;flex-direction:column;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--line);font-family:"Space Grotesk";font-weight:600;font-size:13px;letter-spacing:.02em}
  .card-h .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .manifest{padding:6px}
  .part{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px}
  .part+.part{margin-top:1px}.part:hover{background:var(--panel-2)}
  .qty{flex:none;min-width:44px;height:30px;padding:0 8px;border-radius:7px;background:var(--ink);color:var(--bg);font-family:"IBM Plex Mono";font-weight:600;font-size:12.5px;display:grid;place-items:center}
  html[data-theme="dark"] .qty{background:var(--accent);color:#101317}
  .part .pn{font-size:13.5px;line-height:1.25}
  .part .pref{font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);margin-top:1px}
  .fastbody{padding:11px 12px;display:flex;flex-wrap:wrap;gap:8px}
  .fitem{display:flex;align-items:center;gap:7px;font-family:"IBM Plex Mono";font-size:11.5px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .fitem svg{width:17px;height:17px;color:var(--accent);flex:none}
  .check{display:flex;gap:11px;padding:9px 12px;cursor:pointer;border-radius:9px;align-items:flex-start}
  .check:hover{background:var(--panel-2)}
  .check input{appearance:none;flex:none;width:19px;height:19px;margin-top:1px;border:1.6px solid var(--line-strong);border-radius:5px;cursor:pointer;position:relative;transition:.15s}
  .check input:checked{background:var(--accent);border-color:var(--accent)}
  .check input:checked::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center}
  .check input:checked + .ctext{color:var(--ink-faint);text-decoration:line-through}
  .ctext{font-size:13.5px;line-height:1.35}
  .ctext small{display:block;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);text-decoration:none}
  .checkfoot{padding:11px 16px;border-top:1px solid var(--line);font-family:"IBM Plex Mono";font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center}
  .checkfoot b{color:var(--accent)}
  .viewport{display:flex;flex-direction:column;gap:18px}
  .figure{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .frame{position:relative;background:repeating-conic-gradient(var(--panel-2) 0% 25%,var(--panel) 0% 50%) 50%/22px 22px;min-height:230px;display:grid;place-items:center}
  .frame img{display:block;width:100%;height:auto;max-height:60vh;object-fit:contain}
  .ph{padding:40px 24px;text-align:center;color:var(--ink-faint);width:100%}
  .ph svg{width:38px;height:38px;opacity:.5;margin-bottom:12px}
  .ph code{display:inline-block;margin-top:10px;font-family:"IBM Plex Mono";font-size:12.5px;background:var(--panel-2);border:1px dashed var(--line-strong);padding:5px 10px;border-radius:7px;color:var(--ink-soft)}
  .frame .tick{position:absolute;width:13px;height:13px;border:1.5px solid var(--accent);opacity:.7}
  .frame .tick.tl{top:9px;left:9px;border-right:0;border-bottom:0}.frame .tick.tr{top:9px;right:9px;border-left:0;border-bottom:0}
  .frame .tick.bl{bottom:9px;left:9px;border-right:0;border-top:0}.frame .tick.br{bottom:9px;right:9px;border-left:0;border-top:0}
  .cap{padding:10px 15px;font-size:12.5px;color:var(--ink-soft);border-top:1px solid var(--line);display:flex;gap:8px;align-items:baseline}
  .cap b{font-family:"IBM Plex Mono";color:var(--accent);font-size:11px;letter-spacing:.05em}
  .steps-h{font-family:"Space Grotesk";font-weight:600;font-size:14px;letter-spacing:.02em;margin:2px 0 4px;display:flex;align-items:center;gap:9px}
  .steps-h .ln{flex:1;height:1px;background:var(--line)}
  ol.instr{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:2px}
  ol.instr li{counter-increment:s;display:flex;gap:14px;padding:11px 4px;border-bottom:1px solid var(--line)}
  ol.instr li:last-child{border-bottom:0}
  ol.instr li::before{content:counter(s,decimal-leading-zero);flex:none;font-family:"IBM Plex Mono";font-weight:600;font-size:12px;color:var(--accent);width:26px;text-align:right;padding-top:2px}
  ol.instr li p{font-size:14.5px;line-height:1.5}
  ol.instr strong{font-weight:600}
  ol.instr .tag{font-family:"IBM Plex Mono";font-size:12px;background:var(--panel-2);border:1px solid var(--line);padding:1px 6px;border-radius:5px;white-space:nowrap}
  ol.instr .cmd{display:block;font-family:"IBM Plex Mono";font-size:12px;line-height:1.55;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-top:7px;white-space:pre-wrap;word-break:break-word;color:var(--ink)}
  table.map{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  table.map th,table.map td{border:1px solid var(--line);padding:6px 8px;text-align:left}
  table.map th{background:var(--panel-2);font-family:"Space Grotesk";font-weight:600;font-size:12px}
  table.map td{font-family:"IBM Plex Mono";font-size:12px}
  .note{display:flex;gap:12px;padding:13px 15px;border-radius:11px;font-size:13.7px;line-height:1.5}
  .note .ic{flex:none;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;font-family:"Space Grotesk"}
  .note.warn{background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 35%,transparent)}
  .note.warn .ic{background:var(--warn)}.note.warn b{color:var(--warn)}
  .note.tip{background:var(--tip-soft);border:1px solid color-mix(in srgb,var(--tip) 30%,transparent)}
  .note.tip .ic{background:var(--tip)}.note.tip b{color:var(--tip)}
  .notes-wrap{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .outro{text-align:center;padding:46px 20px;max-width:640px;margin:6px auto}
  .outro .big{width:86px;height:86px;border-radius:50%;background:var(--accent);display:grid;place-items:center;margin:0 auto 24px;box-shadow:0 0 0 10px var(--accent-soft)}
  .outro .big svg{width:44px;height:44px;color:#fff}
  .outro h1{font-size:clamp(28px,6vw,44px)}
  .outro p{color:var(--ink-soft);font-size:16px;margin-top:12px}
  .outro .sig{margin-top:28px;font-family:"IBM Plex Mono";font-size:13px;color:var(--accent);letter-spacing:.05em}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:color-mix(in srgb,var(--panel) 90%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--line-strong)}
  .navin{max-width:1180px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px}
  .nbtn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:10px;font-family:"Space Grotesk";font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s}
  .nbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .nbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.nbtn.primary:hover{filter:brightness(1.06);color:#fff}
  .nbtn:disabled{opacity:.4;cursor:not-allowed}
  .dots{flex:1;display:flex;align-items:center;gap:7px;overflow-x:auto;padding:6px 2px;scroll-padding:0 40px;-ms-overflow-style:none;scrollbar-width:none}
  .dots::-webkit-scrollbar{display:none}
  .dt{flex:none;width:9px;height:9px;border-radius:50%;background:var(--line-strong);border:0;cursor:pointer;transition:.2s;padding:0}
  .dt:hover{transform:scale(1.3)}.dt.on{width:26px;border-radius:5px;background:var(--accent)}.dt.done{background:var(--ink-soft)}
  .navlabel{display:none;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);letter-spacing:.05em}
  @media(min-width:560px){.navlabel{display:block}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><div class="logo" aria-hidden="true"></div>
      <div><b>NEUTRON&nbsp;IT</b><span id="subtitle">Notice de montage</span></div></div>
    <div class="counter"><span id="cLbl">Étape</span> <b id="cNum">01</b>/<span id="cTot">00</span></div>
    <div class="langseg" role="group" aria-label="Langue / Language">
      <button class="seg on" id="segFr">FR</button><button class="seg" id="segEn">EN</button>
    </div>
    <button class="iconbtn" id="theme" title="Thème / Theme">◐</button>
  </div>
  <div class="progress"><i id="bar"></i></div>
</header>
<main id="stage" tabindex="-1"></main>
<nav class="nav"><div class="navin">
  <button class="nbtn" id="prev">‹ <span class="navlabel" id="prevL">Précédent</span></button>
  <div class="dots" id="dots"></div>
  <button class="nbtn primary" id="next"><span class="navlabel" id="nextL">Suivant</span> ›</button>
</div></nav>

<script>
const F=(fr,en)=>({fr,en});
const STEPS=[
/* ===== PRÉPARATION ===== */
{phase:F("Préparation · 1/2","Preparation · 1/2"),title:F("Composants — électronique","Components — electronics"),
 lede:F("Rassemblez et cochez toute l'électronique avant de commencer. Posez chaque pièce sur la table, à vue.","Gather and tick off all the electronics before starting. Lay every part out on the table, in view."),
 checklist:[
  {name:F("Moteurs SunnySky X2216 880KV","SunnySky X2216 880KV motors"),ref:"x4"},
  {name:F("ESC 4-en-1 SpeedyBee 60A","SpeedyBee 60A 4-in-1 ESC"),ref:"x1"},
  {name:F("Pixhawk 6C Mini + Power Module PM02","Pixhawk 6C Mini + PM02 Power Module"),ref:"x1"},
  {name:F("Raspberry Pi 5 8 Go + carte micro-SD","Raspberry Pi 5 8 GB + micro-SD"),ref:"x1"},
  {name:F("Ventilateur Active Cooler","Active Cooler fan"),ref:"x1"},
  {name:F("GPS u-blox M10 + mât","u-blox M10 GPS + mast"),ref:"x1"},
  {name:F("Récepteur ELRS Nano 2,4 GHz","ELRS Nano 2.4 GHz receiver"),ref:"x1"},
  {name:F("Caméra CSI Module 3 Wide + nappe 300 mm","CSI Camera Module 3 Wide + 300 mm cable"),ref:"x1"},
  {name:F("UBEC ZTW 10A (5V)","ZTW 10A UBEC (5V)"),ref:"x1"},
  {name:F("Batterie LiPo 4S 6000 mAh","LiPo 4S 6000 mAh battery"),ref:"x1"},
  {name:F("Radiocommande RadioMaster Pocket","RadioMaster Pocket radio"),ref:"x1"}]},
{phase:F("Préparation · 2/2","Preparation · 2/2"),title:F("Composants — structure & visserie","Components — structure & fasteners"),
 lede:F("Le mécanique et l'atelier. Toute la visserie est en M2 et M3 — triez-la par longueur dans des coupelles.","Mechanical parts and workshop. All fasteners are M2 and M3 — sort them by length into small cups."),
 checklist:[
  {name:F("Tubes carbone 16×14×500 mm","Carbon tubes 16×14×500 mm"),ref:"x4"},
  {name:F("Connecteurs MR30 (jaunes)","MR30 connectors (yellow)"),ref:"x4"},
  {name:F("Fils silicone 20 AWG rouge / noir / bleu","20 AWG silicone wire red / black / blue"),ref:""},
  {name:F("Hélices Gemfan 9047 CW + CCW","Gemfan 9047 CW + CCW props"),ref:"x2"},
  {name:F("XT60 + condensateur 1000 µF","XT60 + 1000 µF capacitor"),ref:""},
  {name:F("Inserts thermiques M3 et M2","M3 and M2 heat-set inserts"),ref:""},
  {name:F("Vis M3 (6/8/16/18/20/25) + écrous M3","M3 screws (6/8/16/18/20/25) + M3 nuts"),ref:""},
  {name:F("Vis M2×6 et M2×10 + écrous M2 + boules silicone","M2×6 and M2×10 screws + M2 nuts + silicone balls"),ref:""},
  {name:F("Ruban mousse PE + colliers + Loctite 243","PE foam tape + zip ties + Loctite 243"),ref:""},
  {name:F("Fer à souder, étain, flux, gaines thermo, clés Allen","Soldering iron, solder, flux, heat-shrink, hex keys"),ref:""},
  {name:F("Scie à métaux, étau, niveau, masque FFP2 + lunettes","Hacksaw, vise, level, FFP2 mask + goggles"),ref:""}],
 warn:[F("Ne lancez pas le montage tant que les deux pages ne sont pas entièrement cochées.","Do not start assembly until both pages are fully ticked off.")]},
/* ===== IMPRESSION ===== */
{phase:F("Impression 3D","3D printing"),title:F("Imprimer les pièces (PETG)","Print the parts (PETG)"),
 lede:F("Toutes les pièces structurelles sont en PETG noir. Imprimez d'abord la plaque et les 8 mâchoires (ce sont elles qui encaissent les efforts).","All structural parts are black PETG. Print the plate and the 8 jaws first (they take the loads)."),
 parts:[
  {qty:"x1",name:F("coque","shell"),ref:"coque.STL"},
  {qty:"x1",name:F("plaque_etage1","main plate"),ref:""},
  {qty:"x4",name:F("machoir_inférieur + supérieur","arm jaws lower + upper"),ref:""},
  {qty:"x4",name:F("machoir_inf. + sup. moteur","motor jaws lower + upper"),ref:""},
  {qty:"x4",name:F("plot","battery post"),ref:""},
  {qty:"x2",name:F("train_atterrissage","landing gear"),ref:""},
  {qty:"x1",name:F("support_caméra + support_pixhawk","camera + pixhawk mounts"),ref:""},
  {qty:"x1",name:F("coque + clap + cylindre caméra","camera shell + clamp + cylinder"),ref:""},
  {qty:"1 kg",name:F("Filament PETG noir, bien sec","Black PETG filament, well dried"),ref:""}],
 instr:[
  F("Réglages : buse <span class='tag'>240 °C</span>, plateau <span class='tag'>80 °C</span>, remplissage <strong>40 %</strong>, <strong>4 périmètres</strong>, 5 couches haut/bas, hauteur de couche 0,2 mm.","Settings: nozzle <span class='tag'>240 °C</span>, bed <span class='tag'>80 °C</span>, infill <strong>40%</strong>, <strong>4 perimeters</strong>, 5 top/bottom layers, 0.2 mm layer height."),
  F("Orientez chaque mâchoire avec ses <strong>trous de vis à la verticale</strong> : les couches travaillent alors dans le bon sens.","Orient each jaw with its <strong>screw holes vertical</strong>: the layers then work in the right direction.")],
 tip:[F("Pendant l'impression (≈ 16 h), passez à la découpe des tubes : on gagne du temps.","While it prints (≈ 16 h), move on to cutting the tubes: it saves time.")]},
{phase:F("Impression 3D","3D printing"),title:F("Contrôler les pièces","Inspect the parts"),
 lede:F("La qualité du fil et l'absence de défaut sont déterminantes : ces pièces tiennent le drone en l'air.","Filament quality and defect-free parts are critical: these parts hold the drone in the air."),
 instr:[
  F("Retirez les supports à la pince, sans arracher de matière.","Remove the supports with pliers, without tearing material."),
  F("Passez le doigt dans chaque trou : il doit être propre, rond et de diamètre constant.","Run a finger in each hole: it must be clean, round and of constant diameter.")],
 warn:[
  F("<strong>PETG humide</strong> = fils baveux et couches mal soudées = zones de vis fragiles. Utilisez un fil de qualité, bien sec (séché si besoin).","<strong>Wet PETG</strong> = stringing and weak layers = fragile screw zones. Use quality, well-dried filament."),
  F("Rebutez et réimprimez toute pièce qui se délamine ou dont un trou de vis est ovalisé.","Scrap and reprint any part that delaminates or has an oval screw hole.")],
 tip:[F("Trou un peu ovalisé : repassez un foret Ø3 mm <strong>à la main</strong>, jamais à la perceuse.","Slightly oval hole: re-pass a Ø3 mm drill bit <strong>by hand</strong>, never with a power drill.")]},
/* ===== TUBES ===== */
{phase:F("Tubes carbone","Carbon tubes"),title:F("Sécurité : découpe du carbone","Safety: cutting carbon"),
 lede:F("La poussière de fibre de carbone est dangereuse pour les poumons. On prépare le poste avant de couper.","Carbon fibre dust is hazardous to the lungs. Set up the workspace before cutting."),
 parts:[
  {qty:"x1",name:F("Masque FFP2 + lunettes","FFP2 mask + goggles"),ref:""},
  {qty:"x1",name:F("Étau / serre-joint","Vise / clamp"),ref:""},
  {qty:"x1",name:F("Aspirateur à proximité","Vacuum nearby"),ref:""}],
 instr:[
  F("Installez-vous en extérieur, ou avec l'embout d'un aspirateur juste sous la zone de coupe.","Work outdoors, or with a vacuum nozzle right under the cut area."),
  F("Mettez le masque FFP2 et les lunettes <strong>avant</strong> de couper, gardez-les jusqu'au nettoyage complet.","Put on the FFP2 mask and goggles <strong>before</strong> cutting, keep them on until fully cleaned up.")],
 warn:[F("<strong>Poussière cancérigène.</strong> Ne soufflez jamais sur les copeaux : aspirez-les ou essuyez avec un chiffon humide.","<strong>Carcinogenic dust.</strong> Never blow on the chips: vacuum them or wipe with a damp cloth.")]},
{phase:F("Tubes carbone","Carbon tubes"),title:F("Couper les tubes à 170 mm","Cut the tubes to 170 mm"),
 lede:F("Les 4 bras sont taillés à 170 mm, à la scie à métaux.","The 4 arms are cut to 170 mm with a hacksaw."),
 parts:[
  {qty:"x4",name:F("Tubes carbone 16×14 mm","Carbon tubes 16×14 mm"),ref:"170 mm"},
  {qty:"x1",name:F("Scie à métaux","Hacksaw"),ref:""},
  {qty:"x1",name:F("Papier de verre 400","400-grit sandpaper"),ref:""}],
 instr:[
  F("Mesurez et marquez <span class='tag'>170 mm</span> au feutre, puis enroulez 2–3 tours de ruban de masquage pile sur le trait (ça évite l'effilochage et guide la lame).","Measure and mark <span class='tag'>170 mm</span>, then wrap 2–3 turns of masking tape right on the line (prevents fraying and guides the blade)."),
  F("Serrez le tube dans l'<strong>étau</strong> près du trait — jamais à la main — et sciez bien droit, sans forcer, en laissant la scie travailler.","Clamp the tube in the <strong>vise</strong> near the line — never by hand — and saw straight, without forcing, letting the saw do the work."),
  F("Poncez les deux extrémités au papier 400 jusqu'à une coupe nette et perpendiculaire.","Sand both ends with 400-grit until the cut is clean and square."),
  F("Contrôlez au réglet : <strong>170 mm ± 1 mm</strong>. Répétez pour les 4 tubes.","Check with a ruler: <strong>170 mm ± 1 mm</strong>. Repeat for the 4 tubes.")]},
/* ===== INSERTS ===== */
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Technique de pose des inserts","Insert fitting technique"),

  {qty:"~6",name:F("Inserts M2","M2 inserts"),ref:""},
  {qty:"x1",name:F("Fer à souder + brucelles","Soldering iron + tweezers"),ref:"200 °C"}],
 fastener:[F("Insert M3","Insert M3"),F("Insert M2","Insert M2")],
 instr:[
  F("Réglez le fer à <span class='tag'>200 °C</span> exactement et attendez la montée en température.","Set the iron to exactly <span class='tag'>200 °C</span> and wait for it to reach temperature."),
  F("Avec des brucelles, posez l'insert <strong>bien droit</strong> sur le trou : il doit tenir seul, sans pencher.","With tweezers, set the insert <strong>perfectly upright</strong> on the hole: it should stand on its own, not lean."),
  F("Appuyez la panne au centre de l'insert, pression <strong>légère et constante</strong> : il s'enfonce tout seul en 5–10 s.","Press the tip into the centre of the insert, <strong>light and steady</strong> pressure: it sinks in on its own in 5–10 s."),
  F("Arrêtez dès qu'il <strong>affleure</strong> la surface, retirez le fer, ne touchez plus pendant 30 s (le temps que ça fige).","Stop as soon as it sits <strong>flush</strong>, remove the iron, don't touch it for 30 s (let it set).")],
 warn:[F("Affleurant, jamais en saillie. S'il part de travers ou plonge trop vite : trop chaud ou trop de pression — ressortez-le à chaud et recommencez.","Flush, never proud. If it goes crooked or dives too fast: too hot or too much pressure — pull it back out warm and redo it.")]},
