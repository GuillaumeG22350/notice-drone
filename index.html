<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neutron IT — Notice de montage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EBEE;--panel:#FFFFFF;--panel-2:#F4F5F7;
    --ink:#15181D;--ink-soft:#5B6470;--ink-faint:#8B929C;
    --line:#D7DBE0;--line-strong:#C2C8D0;
    --accent:#FF5A1F;--accent-soft:#FFE9DF;
    --warn:#C92A1C;--warn-soft:#FCE9E7;--tip:#1F6BB8;--tip-soft:#E6F0FA;
    --shadow:0 1px 2px rgba(20,24,29,.06),0 8px 24px rgba(20,24,29,.06);--radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0E1115;--panel:#161A20;--panel-2:#1C2128;
    --ink:#E9ECF0;--ink-soft:#9AA3AE;--ink-faint:#6B7480;
    --line:#262C34;--line-strong:#323A44;
    --accent:#FF6A33;--accent-soft:#3a1d10;
    --warn:#F2685A;--warn-soft:#2a1614;--tip:#6BB0F0;--tip-soft:#11202e;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100dvh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;background-position:center}
  html[data-theme="dark"] body{background-image:linear-gradient(#1a1f26 1px,transparent 1px),linear-gradient(90deg,#1a1f26 1px,transparent 1px)}
  header{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--line-strong)}
  .bar{max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:30px;height:30px;flex:none;border-radius:7px;background:var(--accent);position:relative;box-shadow:0 0 0 4px var(--accent-soft)}
  .logo::before,.logo::after{content:"";position:absolute;background:#fff}
  .logo::before{inset:13px 6px;height:4px;border-radius:2px}
  .logo::after{inset:6px 13px;width:4px;border-radius:2px}
  .brand b{font-family:"Space Grotesk";font-weight:700;font-size:15px;letter-spacing:.04em}
  .brand span{display:block;font-size:11px;color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase}
  .counter{margin-left:auto;display:flex;align-items:baseline;gap:6px;font-family:"IBM Plex Mono";color:var(--ink-soft);font-size:13px}
  .counter b{color:var(--ink);font-size:18px;font-weight:600}
  .langbtn{flex:none;height:34px;padding:0 14px;border-radius:9px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);font-family:"IBM Plex Mono";font-size:13px;font-weight:600;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .langbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--panel-2)}
  .iconbtn{flex:none;height:36px;min-width:36px;padding:0 10px;border-radius:9px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);cursor:pointer;font-size:15px;display:grid;place-items:center;transition:.15s}
  .iconbtn:hover{border-color:var(--accent);color:var(--accent)}
  .progress{height:3px;background:var(--line);width:100%}
  .progress i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s cubic-bezier(.4,0,.2,1)}
  main{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:26px 20px 120px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:"IBM Plex Mono";font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .eyebrow::before{content:"";width:22px;height:1.5px;background:var(--accent)}
  h1{font-family:"Space Grotesk";font-weight:600;font-size:clamp(23px,4vw,33px);line-height:1.1;letter-spacing:-.01em;margin-bottom:6px}
  .lede{color:var(--ink-soft);font-size:15.5px;max-width:62ch;margin-bottom:24px;line-height:1.5}
  .grid{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .rail{display:flex;flex-direction:column;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--line);font-family:"Space Grotesk";font-weight:600;font-size:13px;letter-spacing:.02em}
  .card-h .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .manifest{padding:6px}
  .part{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px}
  .part+.part{margin-top:1px}.part:hover{background:var(--panel-2)}
  .qty{flex:none;min-width:44px;height:30px;padding:0 8px;border-radius:7px;background:var(--ink);color:var(--bg);font-family:"IBM Plex Mono";font-weight:600;font-size:12.5px;display:grid;place-items:center}
  html[data-theme="dark"] .qty{background:var(--accent);color:#101317}
  .part .pn{font-size:13.5px;line-height:1.25}
  .part .pref{font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);margin-top:1px}
  .fastbody{padding:11px 12px;display:flex;flex-wrap:wrap;gap:8px}
  .fitem{display:flex;align-items:center;gap:7px;font-family:"IBM Plex Mono";font-size:11.5px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .fitem svg{width:17px;height:17px;color:var(--accent);flex:none}
  .check{display:flex;gap:11px;padding:9px 12px;cursor:pointer;border-radius:9px;align-items:flex-start}
  .check:hover{background:var(--panel-2)}
  .check input{appearance:none;flex:none;width:19px;height:19px;margin-top:1px;border:1.6px solid var(--line-strong);border-radius:5px;cursor:pointer;position:relative;transition:.15s}
  .check input:checked{background:var(--accent);border-color:var(--accent)}
  .check input:checked::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center}
  .check input:checked + .ctext{color:var(--ink-faint);text-decoration:line-through}
  .ctext{font-size:13.5px;line-height:1.35}
  .ctext small{display:block;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);text-decoration:none}
  .checkfoot{padding:11px 16px;border-top:1px solid var(--line);font-family:"IBM Plex Mono";font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center}
  .checkfoot b{color:var(--accent)}
  .viewport{display:flex;flex-direction:column;gap:18px}
  .figure{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .frame{position:relative;background:repeating-conic-gradient(var(--panel-2) 0% 25%,var(--panel) 0% 50%) 50%/22px 22px;min-height:230px;display:grid;place-items:center}
  .frame img{display:block;width:100%;height:auto;max-height:60vh;object-fit:contain}
  .ph{padding:40px 24px;text-align:center;color:var(--ink-faint);width:100%}
  .ph svg{width:38px;height:38px;opacity:.5;margin-bottom:12px}
  .ph code{display:inline-block;margin-top:10px;font-family:"IBM Plex Mono";font-size:12.5px;background:var(--panel-2);border:1px dashed var(--line-strong);padding:5px 10px;border-radius:7px;color:var(--ink-soft)}
  .frame .tick{position:absolute;width:13px;height:13px;border:1.5px solid var(--accent);opacity:.7}
  .frame .tick.tl{top:9px;left:9px;border-right:0;border-bottom:0}.frame .tick.tr{top:9px;right:9px;border-left:0;border-bottom:0}
  .frame .tick.bl{bottom:9px;left:9px;border-right:0;border-top:0}.frame .tick.br{bottom:9px;right:9px;border-left:0;border-top:0}
  .cap{padding:10px 15px;font-size:12.5px;color:var(--ink-soft);border-top:1px solid var(--line);display:flex;gap:8px;align-items:baseline;line-height:1.4}
  .cap b{font-family:"IBM Plex Mono";color:var(--accent);font-size:11px;letter-spacing:.05em}
  .steps-h{font-family:"Space Grotesk";font-weight:600;font-size:14px;letter-spacing:.02em;margin:2px 0 4px;display:flex;align-items:center;gap:9px}
  .steps-h .ln{flex:1;height:1px;background:var(--line)}
  ol.instr{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:2px}
  ol.instr li{counter-increment:s;display:flex;gap:14px;padding:11px 4px;border-bottom:1px solid var(--line)}
  ol.instr li:last-child{border-bottom:0}
  ol.instr li::before{content:counter(s,decimal-leading-zero);flex:none;font-family:"IBM Plex Mono";font-weight:600;font-size:12px;color:var(--accent);width:26px;text-align:right;padding-top:2px}
  ol.instr li p{font-size:14.5px;line-height:1.6}
  ol.instr strong{font-weight:600}
  ol.instr .tag{font-family:"IBM Plex Mono";font-size:12px;background:var(--panel-2);border:1px solid var(--line);padding:1px 6px;border-radius:5px;white-space:nowrap}
  ol.instr .cmd{display:block;font-family:"IBM Plex Mono";font-size:12px;line-height:1.55;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-top:7px;white-space:pre-wrap;word-break:break-word;color:var(--ink)}
  table.map{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  table.map th,table.map td{border:1px solid var(--line);padding:6px 8px;text-align:left}
  table.map th{background:var(--panel-2);font-family:"Space Grotesk";font-weight:600;font-size:12px}
  table.map td{font-family:"IBM Plex Mono";font-size:12px}
  .note{display:flex;gap:12px;padding:13px 15px;border-radius:11px;font-size:13.7px;line-height:1.5}
  .note .ic{flex:none;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;font-family:"Space Grotesk"}
  .note.warn{background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 35%,transparent)}
  .note.warn .ic{background:var(--warn)}.note.warn b{color:var(--warn)}
  .note.tip{background:var(--tip-soft);border:1px solid color-mix(in srgb,var(--tip) 30%,transparent)}
  .note.tip .ic{background:var(--tip)}.note.tip b{color:var(--tip)}
  .notes-wrap{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .outro{text-align:center;padding:46px 20px;max-width:640px;margin:6px auto}
  .outro .big{width:86px;height:86px;border-radius:50%;background:var(--accent);display:grid;place-items:center;margin:0 auto 24px;box-shadow:0 0 0 10px var(--accent-soft)}
  .outro .big svg{width:44px;height:44px;color:#fff}
  .outro h1{font-size:clamp(28px,6vw,44px)}
  .outro p{color:var(--ink-soft);font-size:16px;margin-top:12px}
  .outro .sig{margin-top:28px;font-family:"IBM Plex Mono";font-size:13px;color:var(--accent);letter-spacing:.05em}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:color-mix(in srgb,var(--panel) 90%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--line-strong)}
  .navin{max-width:1180px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px}
  .nbtn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:10px;font-family:"Space Grotesk";font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s}
  .nbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .nbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.nbtn.primary:hover{filter:brightness(1.06);color:#fff}
  .nbtn:disabled{opacity:.4;cursor:not-allowed}
  .dots{flex:1;display:flex;align-items:center;gap:7px;overflow-x:auto;padding:6px 2px;scroll-padding:0 40px;-ms-overflow-style:none;scrollbar-width:none}
  .dots::-webkit-scrollbar{display:none}
  .dt{flex:none;width:9px;height:9px;border-radius:50%;background:var(--line-strong);border:0;cursor:pointer;transition:.2s;padding:0}
  .dt:hover{transform:scale(1.3)}.dt.on{width:26px;border-radius:5px;background:var(--accent)}.dt.done{background:var(--ink-soft)}
  .navlabel{display:none;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);letter-spacing:.05em}
  @media(min-width:560px){.navlabel{display:block}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><div class="logo" aria-hidden="true"></div>
      <div><b>NEUTRON&nbsp;IT</b><span id="subtitle">Notice de montage</span></div></div>
    <div class="counter"><span id="cLbl">Étape</span> <b id="cNum">01</b>/<span id="cTot">00</span></div>
    
    <button class="langbtn" id="langToggle" title="Traduire / Translate">
      <span id="langTxt">FR / EN</span>
    </button>

    <button class="iconbtn" id="theme" title="Thème / Theme">◐</button>
  </div>
  <div class="progress"><i id="bar"></i></div>
</header>
<main id="stage" tabindex="-1"></main>
<nav class="nav"><div class="navin">
  <button class="nbtn" id="prev">‹ <span class="navlabel" id="prevL">Précédent</span></button>
  <div class="dots" id="dots"></div>
  <button class="nbtn primary" id="next"><span class="navlabel" id="nextL">Suivant</span> ›</button>
</div></nav>

<script>
const F=(fr,en)=>({fr,en});
const STEPS=[
/* ===== PRÉPARATION ===== */
{phase:F("Préparation · 1/2","Preparation · 1/2"),title:F("Composants — électronique","Components — electronics"),
 lede:F("Avant toute chose, rassemblez et cochez l'intégralité de l'électronique. Disposez chaque élément bien à plat sur votre plan de travail, trié et bien visible. Ne laissez aucune pièce au fond d'une boîte.","Before anything else, gather and tick off all the electronics. Lay every component flat on your workspace, sorted and clearly visible. Do not leave any part at the bottom of a box."),
 checklist:[
  {name:F("Moteurs SunnySky X2216 880KV","SunnySky X2216 880KV motors"),ref:"x4"},
  {name:F("ESC 4-en-1 SpeedyBee 60A","SpeedyBee 60A 4-in-1 ESC"),ref:"x1"},
  {name:F("Pixhawk 6C Mini + Power Module PM02","Pixhawk 6C Mini + PM02 Power Module"),ref:"x1"},
  {name:F("Raspberry Pi 5 8 Go + carte micro-SD","Raspberry Pi 5 8 GB + micro-SD"),ref:"x1"},
  {name:F("Ventilateur Active Cooler","Active Cooler fan"),ref:"x1"},
  {name:F("GPS u-blox M10 + mât","u-blox M10 GPS + mast"),ref:"x1"},
  {name:F("Récepteur ELRS Nano 2,4 GHz","ELRS Nano 2.4 GHz receiver"),ref:"x1"},
  {name:F("Caméra CSI Module 3 Wide + nappe 300 mm","CSI Camera Module 3 Wide + 300 mm cable"),ref:"x1"},
  {name:F("UBEC ZTW 10A (5V)","ZTW 10A UBEC (5V)"),ref:"x1"},
  {name:F("Batterie LiPo 4S 6000 mAh","LiPo 4S 6000 mAh battery"),ref:"x1"},
  {name:F("Radiocommande RadioMaster Pocket","RadioMaster Pocket radio"),ref:"x1"}]},
{phase:F("Préparation · 2/2","Preparation · 2/2"),title:F("Composants — structure & visserie","Components — structure & fasteners"),
 lede:F("Passez maintenant aux éléments mécaniques et aux outils. La visserie est exclusivement composée de M2 (petit diamètre) et de M3 (diamètre standard). Séparez-les rigoureusement par longueur dans de petites coupelles pour éviter les erreurs lors de l'assemblage.","Now move on to the mechanical parts and tools. Fasteners consist strictly of M2 (small diameter) and M3 (standard diameter). Sort them meticulously by length into small cups to prevent assembly errors."),
 checklist:[
  {name:F("Tubes carbone 16×14×500 mm","Carbon tubes 16×14×500 mm"),ref:"x4"},
  {name:F("Connecteurs MR30 (jaunes)","MR30 connectors (yellow)"),ref:"x4"},
  {name:F("Fils silicone 20 AWG rouge / noir / bleu","20 AWG silicone wire red / black / blue"),ref:""},
  {name:F("Hélices Gemfan 9047 CW + CCW","Gemfan 9047 CW + CCW props"),ref:"x2"},
  {name:F("XT60 + condensateur 1000 µF","XT60 + 1000 µF capacitor"),ref:""},
  {name:F("Inserts thermiques M3 et M2","M3 and M2 heat-set inserts"),ref:""},
  {name:F("Vis M3 (6/8/16/18/20/25) + écrous M3","M3 screws (6/8/16/18/20/25) + M3 nuts"),ref:""},
  {name:F("Vis M2×6 et M2×10 + écrous M2 + boules silicone","M2×6 and M2×10 screws + M2 nuts + silicone balls"),ref:""},
  {name:F("Ruban mousse PE + colliers + Loctite 243","PE foam tape + zip ties + Loctite 243"),ref:""},
  {name:F("Fer à souder, étain, flux, gaines thermo, clés Allen","Soldering iron, solder, flux, heat-shrink, hex keys"),ref:""},
  {name:F("Scie à métaux, étau, niveau, masque FFP2 + lunettes","Hacksaw, vise, level, FFP2 mask + goggles"),ref:""}],
 warn:[F("Vérification critique : Ne commencez surtout pas le montage avant d'avoir validé physiquement chaque élément de ces deux listes. Une pièce manquante en milieu d'assemblage vous bloquera complètement.","Critical check: Do not begin assembly until you have physically verified every item on these two lists. A missing part mid-assembly will block you completely.")]},
/* ===== IMPRESSION ===== */
{phase:F("Impression 3D","3D printing"),title:F("Imprimer les pièces (PETG)","Print the parts (PETG)"),
 lede:F("Le châssis repose entièrement sur les pièces imprimées en PETG noir. Privilégiez l'impression de la grande plaque principale et des 8 mâchoires en premier, car ce sont elles qui supportent toute la structure et nécessitent le plus grand soin.","The frame relies entirely on black PETG printed parts. Prioritise printing the large main plate and the 8 jaws first, as they support the entire structure and require the utmost care."),
 parts:[
  {qty:"x1",name:F("coque","shell"),ref:"coque.STL"},
  {qty:"x1",name:F("plaque_etage1","main plate"),ref:""},
  {qty:"x4",name:F("machoir_inférieur + supérieur","arm jaws lower + upper"),ref:""},
  {qty:"x4",name:F("machoir_inf. + sup. moteur","motor jaws lower + upper"),ref:""},
  {qty:"x4",name:F("plot","battery post"),ref:""},
  {qty:"x2",name:F("train_atterrissage","landing gear"),ref:""},
  {qty:"x1",name:F("support_caméra + support_pixhawk","camera + pixhawk mounts"),ref:""},
  {qty:"x1",name:F("coque + clap + cylindre caméra","camera shell + clamp + cylinder"),ref:""},
  {qty:"1 kg",name:F("Filament PETG noir, bien sec","Black PETG filament, well dried"),ref:""}],
 instr:[
  F("Sur votre trancheur (slicer), appliquez rigoureusement ces paramètres : température de la buse à <span class='tag'>240 °C</span>, température du plateau à <span class='tag'>80 °C</span>, remplissage interne dense de <strong>40 %</strong>, <strong>4 périmètres extérieurs</strong> au minimum, 5 couches pleines en haut et en bas, avec une hauteur de couche de 0,2 mm.","In your slicer, strictly apply these settings: nozzle temperature at <span class='tag'>240 °C</span>, bed temperature at <span class='tag'>80 °C</span>, dense <strong>40%</strong> internal infill, minimum <strong>4 outer perimeters</strong>, 5 solid top and bottom layers, with a 0.2 mm layer height."),
  F("L'orientation sur le plateau est vitale : positionnez systématiquement chaque mâchoire de manière à ce que les <strong>trous de vis soient parfaitement verticaux (pointant vers le haut)</strong>. Ainsi, les lignes d'extrusion de plastique travailleront dans le bon axe et résisteront aux forces d'arrachement.","Orientation on the print bed is vital: systematically position each jaw so that the <strong>screw holes are perfectly vertical (pointing upwards)</strong>. This ensures the plastic extrusion lines work in the correct axis and resist tear-out forces.")],
 tip:[F("Le temps d'impression total avoisine les 16 heures. Profitez de ce délai pour avancer sur la découpe des tubes en carbone et la préparation logicielle.","Total print time is around 16 hours. Use this window to get ahead on cutting the carbon tubes and software prep.")]},
{phase:F("Impression 3D","3D printing"),title:F("Contrôler les pièces","Inspect the parts"),
 lede:F("Une inspection minutieuse est obligatoire. La résistance de ces pièces garantit que le drone ne se disloquera pas en plein vol. Prenez le temps d'inspecter chaque millimètre.","A meticulous inspection is mandatory. The strength of these parts ensures the drone won't fall apart mid-flight. Take the time to inspect every millimetre."),
 instr:[
  F("Saisissez une pince fine et retirez délicatement tous les supports d'impression. Tirez doucement pour casser le support sans arracher la matière de la pièce finale ni créer de cratère.","Grab fine pliers and carefully remove all print supports. Pull gently to snap the support without tearing material from the final part or creating a crater."),
  F("Passez la pointe du doigt (ou une clé Allen) à l'intérieur de chaque trou de vis. Le canal doit être lisse, bien rond, et conserver un diamètre constant de bout en bout, sans obstruction de plastique fondu.","Run your fingertip (or a hex key) inside every screw hole. The channel must be smooth, perfectly round, and maintain a constant diameter end-to-end, with no melted plastic obstructions.")],
 warn:[
  F("<strong>Le danger du PETG humide :</strong> Si votre bobine a pris l'humidité, vous observerez des fils baveux (stringing) et une mauvaise fusion entre les couches. Cela rend les zones de vissage extrêmement cassantes. Utilisez un filament sec sorti de son emballage sous vide.","<strong>The danger of wet PETG:</strong> If your spool has absorbed moisture, you will see stringing and poor layer adhesion. This makes the screwing zones extremely brittle. Use dry filament fresh from a vacuum bag."),
  F("Soyez intransigeant : jetez et réimprimez immédiatement toute pièce qui présente un début de délamination (couches qui se séparent) ou dont un trou de vis est déformé/ovale.","Be uncompromising: immediately scrap and reprint any part showing signs of delamination (layers splitting) or where a screw hole is deformed/oval.")],
 tip:[F("Si un trou est seulement très légèrement rétréci ou ovalisé, vous pouvez le rectifier en y insérant un foret à métaux de Ø3 mm. Tournez le foret <strong>exclusivement à la main</strong>, sans forcer, pour râper l'excédent. Ne jamais utiliser de perceuse électrique.","If a hole is only very slightly shrunk or oval, you can true it up by inserting a Ø3 mm metal drill bit. Turn the bit <strong>strictly by hand</strong>, without forcing, to scrape the excess. Never use a power drill.")]},
/* ===== TUBES ===== */
{phase:F("Tubes carbone","Carbon tubes"),title:F("Sécurité : découpe du carbone","Safety: cutting carbon"),
 lede:F("Attention danger : la poussière générée par la découpe de la fibre de carbone est hautement irritante et toxique pour vos poumons et vos yeux. L'organisation sécurisée du plan de travail est non négociable.","Danger warning: the dust generated by cutting carbon fibre is highly irritating and toxic to your lungs and eyes. Safe workspace setup is non-negotiable."),
 parts:[
  {qty:"x1",name:F("Masque FFP2 + lunettes de protection","FFP2 mask + safety goggles"),ref:""},
  {qty:"x1",name:F("Étau solidement fixé / serre-joint","Firmly secured vise / clamp"),ref:""},
  {qty:"x1",name:F("Aspirateur avec embout fin","Vacuum cleaner with fine nozzle"),ref:""}],
 instr:[
  F("Déplacez votre atelier à l'extérieur si possible. En intérieur, positionnez obligatoirement l'embout d'un aspirateur en marche à quelques centimètres seulement sous la zone où la lame attaquera le tube, pour aspirer la poussière à la source.","Move your workspace outdoors if possible. Indoors, you must position a running vacuum nozzle just a few centimetres below the area where the blade will bite the tube, to catch dust at the source."),
  F("Enfilez votre masque FFP2 en l'ajustant bien sur l'arête du nez, et mettez vos lunettes englobantes <strong>avant même de faire la première marque</strong>. Ne les retirez qu'une fois la zone entièrement nettoyée à l'éponge humide.","Put on your FFP2 mask, adjusting it snugly over the nose bridge, and put on your wraparound goggles <strong>before even making the first mark</strong>. Do not remove them until the area is fully wiped down with a damp sponge.")],
 warn:[F("<strong>Poussière cancérigène et conductrice.</strong> Il est formellement interdit de souffler sur les copeaux de carbone avec la bouche ou un compresseur. Aspirez tout immédiatement ou ramassez avec un chiffon humide que vous jetterez.","<strong>Carcinogenic and conductive dust.</strong> It is strictly forbidden to blow on carbon chips with your mouth or an air compressor. Vacuum everything immediately or pick it up with a damp cloth to be discarded.")]},
{phase:F("Tubes carbone","Carbon tubes"),title:F("Couper les tubes à 170 mm","Cut the tubes to 170 mm"),
 lede:F("Les 4 bras du drone proviennent des longs tubes de carbone. Il faut y découper 4 tronçons strictement identiques de 170 millimètres, en utilisant une scie à métaux à denture fine pour ne pas éclater la fibre.","The 4 drone arms come from the long carbon tubes. You must cut 4 strictly identical 170-millimetre sections, using a fine-toothed hacksaw to avoid splintering the fibre."),
 parts:[
  {qty:"x4",name:F("Tubes carbone 16×14 mm","Carbon tubes 16×14 mm"),ref:"coupés à 170 mm"},
  {qty:"x1",name:F("Scie à métaux (lame neuve)","Hacksaw (new blade)"),ref:""},
  {qty:"x1",name:F("Papier de verre grain fin 400","Fine 400-grit sandpaper"),ref:""}],
 instr:[
  F("Prenez un réglet en métal, mesurez exactement <span class='tag'>170 mm</span> depuis l'extrémité d'un tube et tracez un trait clair au feutre. Astuce cruciale : enroulez deux ou trois tours de ruban de masquage adhésif (scotch de peintre) en centrant parfaitement le ruban sur votre trait. Cela empêchera la lame de glisser et retiendra les fibres pour une coupe nette.","Take a metal ruler, measure exactly <span class='tag'>170 mm</span> from a tube end, and draw a clear line with a marker. Crucial tip: wrap two or three turns of masking tape (painter's tape), centering the tape perfectly over your line. This stops the blade slipping and binds the fibres for a clean cut."),
  F("Insérez le tube dans les mâchoires de votre <strong>étau</strong>. Laissez dépasser la marque de coupe d'à peine un centimètre hors de l'étau pour éviter que le tube ne fléchisse. Ne tenez jamais le tube à main nue. Sciez avec un mouvement horizontal très droit, sans appuyer fort vers le bas ; laissez les dents de la scie arracher la matière à leur rythme.","Insert the tube into your <strong>vise</strong> jaws. Let the cut mark overhang the vise by barely a centimetre to prevent the tube from flexing. Never hold the tube bare-handed. Saw with a very straight horizontal motion, without pressing down hard; let the saw teeth clear the material at their own pace."),
  F("Une fois le tronçon séparé, retirez le ruban adhésif. Posez votre papier de verre grain 400 à plat sur la table, prenez le tube coupé à la verticale, et frottez l'extrémité coupée en faisant des cercles (en '8') jusqu'à obtenir une tranche parfaitement plate, lisse et perpendiculaire à l'axe du tube.","Once the section is separated, remove the tape. Lay your 400-grit sandpaper flat on the table, hold the cut tube vertically, and rub the cut end in circular ('8') motions until you get a slice that is perfectly flat, smooth, and perpendicular to the tube's axis."),
  F("Prenez votre réglet et vérifiez la longueur du tronçon : vous devez lire <strong>170 mm avec une marge d'erreur de ± 1 mm</strong>. Répétez ces trois étapes avec la plus grande précision pour obtenir les 4 tubes constituant les bras.","Take your ruler and check the section's length: you must read <strong>170 mm with a margin of error of ± 1 mm</strong>. Repeat these three steps with utmost precision to yield the 4 arm tubes.")]},
/* ===== INSERTS ===== */
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Technique de pose des inserts","Insert fitting technique"),
 lede:F("Afin de visser des pièces métalliques dans le plastique PETG sans en arracher les filets, nous utilisons des inserts en laiton filetés à l'intérieur. En les chauffant, ils fondent le plastique environnant et s'y noient, créant un ancrage indestructible une fois refroidis. Maîtrisez cette méthode, elle servira pour toutes les étapes suivantes.","To screw metal hardware into the PETG plastic without stripping threads, we use internally-threaded brass inserts. By heating them, they melt the surrounding plastic and sink in, creating an indestructible anchor once cooled. Master this method; it will serve for all following steps."),
 parts:[
  {qty:"~30",name:F("Inserts filetés M3","M3 threaded inserts"),ref:"diamètre ext. 4,2 mm"},
  {qty:"~6",name:F("Inserts filetés M2","M2 threaded inserts"),ref:""},
  {qty:"x1",name:F("Fer à souder fin + pinces brucelles","Fine soldering iron + tweezers"),ref:"réglé sur 200 °C"}],
 fastener:[F("Insert M3","Insert M3"),F("Insert M2","Insert M2")],
 instr:[
  F("Allumez votre fer à souder, réglez impérativement la température sur <span class='tag'>200 °C</span> (le point de fusion idéal du PETG sans le brûler) et laissez la panne chauffer complètement pendant une minute.","Turn on your soldering iron, imperatively set the temperature to <span class='tag'>200 °C</span> (the ideal melting point for PETG without burning it), and let the tip heat fully for a minute."),
  F("Saisissez un insert métallique avec vos pinces brucelles. Présentez-le au-dessus du trou dans le plastique et posez-le dessus. Relâchez la pince : l'insert doit tenir en équilibre sur le trou en étant <strong>parfaitement droit et vertical</strong>. S'il penche, repositionnez-le avant d'appliquer la chaleur.","Grab a metal insert with your tweezers. Bring it over the hole in the plastic and rest it on top. Release the tweezers: the insert must balance on the hole, standing <strong>perfectly straight and vertical</strong>. If it leans, reposition it before applying heat."),
  F("Placez la pointe (panne) du fer à souder exactement au centre du trou de l'insert. Exercez une pression vers le bas <strong>très légère, strictement verticale et continue</strong>. Le laiton va chauffer, faire fondre les bords du trou en plastique, et s'enfoncer tout seul, en douceur, en l'espace de 5 à 10 secondes. Ne forcez pas avec le bras.","Place the tip of the soldering iron exactly in the centre of the insert's hole. Apply <strong>very light, strictly vertical, and steady</strong> downward pressure. The brass will heat up, melt the edges of the plastic hole, and sink in on its own, smoothly, over 5 to 10 seconds. Do not force it with your arm."),
  F("L'arrêt est le moment le plus délicat : retirez le fer à souder d'un coup sec vers le haut dès l'instant où le haut de l'insert arrive <strong>exactement à fleur (au même niveau)</strong> que la surface de la pièce en plastique. Ne touchez absolument plus à la pièce ni à l'insert pendant 30 secondes pour laisser le plastique se figer autour des cannelures.","The stop is the trickiest part: pull the iron straight up sharply the instant the top of the insert is <strong>exactly flush (level)</strong> with the surface of the plastic part. Do absolutely not touch the part or the insert for 30 seconds to let the plastic solidify around the knurls.")],
 warn:[F("L'insert doit être invisible de profil (affleurant), mais ne doit jamais couler trop profond en formant un cratère. S'il s'incline pendant la descente ou s'il s'enfonce brutalement en 2 secondes, c'est que vous appuyez beaucoup trop fort ou que le fer est réglé trop chaud. Si cela arrive, rattrapez l'insert immédiatement avec la pointe du fer pendant qu'il est encore chaud, sortez-le, et recommencez avec un insert neuf.","The insert must be invisible from the side (flush), but must never sink too deep and form a crater. If it tilts during descent or plunges violently in 2 seconds, you are pressing much too hard or the iron is too hot. If this happens, catch the insert immediately with the iron tip while it's still hot, pull it out, and restart with a fresh insert.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — plaque centrale","M3 inserts — main plate"),
 lede:F("Prenez la grande plaque principale (plaque_etage1). Repérez la grande découpe centrale carrée. Autour de cette découpe et sur les bords extérieurs (les 'oreilles'), vous identifierez plusieurs petits trous cylindriques conçus pour accueillir des inserts M3.","Take the large main plate (plaque_etage1). Locate the large square central cutout. Around this cutout and on the outer edges (the 'ears'), you will identify several small cylindrical holes designed to house M3 inserts."),
 parts:[{qty:F("1 / trou périphérique","1 / perimeter hole"),name:F("Insert M3","Insert M3"),ref:"plaque_etage1"}],
 fastener:[F("Insert M3","Insert M3")],
 instr:[F("Utilisez la technique détaillée précédemment pour noyer un insert M3 dans <strong>chacun</strong> des trous situés sur les excroissances périphériques de la plaque (qui serviront à fixer les bras) ainsi que dans les trous prévus autour du centre. Laissez bien refroidir la plaque.","Use the previously detailed technique to sink an M3 insert into <strong>each</strong> of the holes located on the peripheral outgrowths of the plate (which will secure the arms) as well as the holes arranged around the centre. Let the plate cool thoroughly.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M2 — plaque centrale","M2 inserts — main plate"),
 lede:F("Toujours sur la plaque principale, repérez à présent un groupement de 4 trous beaucoup plus petits, situés à l'arrière du châssis. Ce carré correspond exactement à l'espacement des fixations d'une carte Raspberry Pi.","Still on the main plate, now locate a grouping of 4 much smaller holes, situated toward the rear of the frame. This square corresponds exactly to the mounting spacing of a Raspberry Pi board."),
 parts:[{qty:"x4",name:F("Insert M2 (petit format)","M2 insert (small size)"),ref:""}],
 fastener:[F("Insert M2","Insert M2")],
 instr:[F("Prenez vos pinces brucelles et positionnez délicatement un insert M2 (plus petit que les précédents) sur chacun de ces 4 trous. Enfoncez-les au fer en étant très attentif : comme ils sont plus petits, ils chauffent et s'enfoncent beaucoup plus vite. Arrêtez-vous pile à fleur.","Take your tweezers and delicately position an M2 insert (smaller than the previous ones) on each of these 4 holes. Sink them with the iron paying close attention: being smaller, they heat up and sink much faster. Stop perfectly flush.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — trains d'atterrissage","M3 inserts — landing gear"),
 lede:F("Saisissez les deux pièces imprimées formant les pieds du drone (train_atterrissage). À la base supérieure de chaque pied, vous trouverez une platine de fixation plate contenant deux trous.","Grab the two printed parts forming the drone's feet (landing gear). At the upper base of each foot, you will find a flat mounting plate containing two holes."),
 parts:[{qty:"x4",name:F("Insert M3","Insert M3"),ref:"2 par train / 2 per gear"}],
 fastener:[F("Insert M3","Insert M3")],
 instr:[F("Sur le premier train d'atterrissage, enfoncez un insert M3 dans chaque trou de la platine plate (2 au total). Assurez-vous qu'ils soient bien droits par rapport à la surface plane. <strong>Prenez ensuite le second train d'atterrissage et répétez exactement la même opération</strong>.","On the first landing gear, sink an M3 insert into each hole of the flat plate (2 total). Ensure they are perfectly perpendicular to the flat surface. <strong>Then take the second landing gear and repeat exactly the same operation</strong>.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — mâchoires sup. moteur","M3 inserts — upper motor jaws"),
 lede:F("Parmi les petites pièces imprimées, isolez les 4 mâchoires supérieures prévues pour enserrer les bras au niveau des moteurs (elles ont une forme incurvée en demi-cercle avec 4 piliers).","Among the small printed parts, isolate the 4 upper jaws meant to clamp the arms at the motor ends (they have a curved half-circle shape with 4 pillars)."),
 parts:[{qty:"x16",name:F("Insert M3","Insert M3"),ref:"4 par mâchoire / 4 per jaw"}],
 fastener:[F("Insert M3","Insert M3")],
 instr:[F("Prenez l'une de ces mâchoires. Sur la face supérieure des 4 piliers d'angle, vous trouverez 4 trous de guidage. Posez et fondez un insert M3 dans chacun de ces 4 trous, bien droits. Laissez refroidir, puis <strong>répétez méthodiquement cette étape sur les 3 autres mâchoires supérieures moteur</strong>. Vous aurez posé 16 inserts au total ici.","Take one of these jaws. On the top face of the 4 corner pillars, you will find 4 guide holes. Place and melt an M3 insert into each of these 4 holes, perfectly straight. Let it cool, then <strong>methodically repeat this step on the 3 other upper motor jaws</strong>. You will have placed 16 inserts in total here.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — coque","M3 inserts — shell"),
 lede:F("La coque aérodynamique (le capot supérieur) possède deux séries d'inserts à intégrer. La première série fait tout le tour extérieur à la base (pour visser la coque à la plaque). La seconde série se situe dans une petite cavité carrée creusée au sommet (pour le mât du GPS).","The aerodynamic shell (the top canopy) has two sets of inserts to integrate. The first set goes all around the bottom outer edge (to screw the shell to the plate). The second set is located in a small square cavity hollowed out at the very top (for the GPS mast)."),
 parts:[
  {qty:F("Pourtour","Perimeter"),name:F("Insert M3 — fixation coque","Insert M3 — shell fixing"),ref:""},
  {qty:"x4",name:F("Insert M3 — renfoncement central","Insert M3 — central recess"),ref:"pour mât GPS / for GPS mast"}],
 fastener:[F("Insert M3","Insert M3")],
 instr:[
  F("Retournez la coque. Fondez un insert M3 dans chaque petit plot cylindrique réparti le long de la lèvre inférieure qui fait tout le tour de la pièce. Soyez vigilant, le bord est fin.","Turn the shell upside down. Melt an M3 insert into each small cylindrical post spread along the bottom lip going all around the part. Be careful, the edge is thin."),
  F("Remettez la coque à l'endroit. Au sommet, identifiez le renfoncement carré avec 4 trous à ses coins. Insérez-y délicatement <strong>4 inserts M3</strong>. C'est ici que viendra se visser solidement le mât de l'antenne GPS plus tard.","Place the shell right-side up. At the summit, identify the square recess with 4 holes at its corners. Delicately insert <strong>4 M3 inserts</strong> into them. This is where the GPS antenna mast will firmly screw in later.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — support Pixhawk","M3 inserts — Pixhawk mount"),
 lede:F("Le support du Pixhawk (support_pixhawk) est une petite plaque carrée avec des pattes aux 4 coins.","The Pixhawk mount (support_pixhawk) is a small square plate with tabs at the 4 corners."),
 parts:[{qty:"x4",name:F("Insert M3","Insert M3"),ref:"aux 4 coins du support / at 4 corners of mount"}],
 fastener:[F("Insert M3","Insert M3")],
 instr:[F("Repérez les 4 trous situés aux extrémités de la pièce. Fondez un insert M3 dans chaque trou, en veillant à l'affleurement parfait, car le boîtier électronique viendra se coller par-dessus de manière plane.","Locate the 4 holes at the extremities of the part. Melt an M3 insert into each hole, ensuring a perfectly flush finish, as the electronic casing will be stuck flat on top of it.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M2 — coque caméra","M2 inserts — camera shell"),
 lede:F("Prenez la petite pièce cubique évidée qui servira d'écrin à la caméra (coque caméra). Sur les tranches latérales gauches et droites de l'ouverture avant, des tout petits trous sont présents.","Take the small hollow cubic part that will house the camera (camera shell). On the left and right side edges of the front opening, tiny holes are present."),
 parts:[{qty:"x2",name:F("Insert M2","Insert M2"),ref:"flancs de la coque / sides of shell"}],
 fastener:[F("Insert M2","Insert M2")],
 instr:[F("Armé de vos pinces brucelles, insérez avec une grande délicatesse un insert M2 sur chaque flanc (à gauche et à droite). Ces inserts serviront à visser la façade amovible (le clap) qui viendra bloquer l'objectif de la caméra sans l'écraser.","Armed with your tweezers, insert an M2 insert with great delicacy onto each flank (left and right). These inserts will serve to screw down the removable front face (the clamp) which will lock the camera lens in place without crushing it.")]},
/* ===== BRAS ===== */
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Couper et étamer les fils moteur","Cut and tin the motor wires"),
 lede:F("Nous entamons l'assemblage complet du premier bras. Cette séquence intégrale (incluant le moteur et le tube) devra être exécutée 4 fois. Commencez par sortir un moteur SunnySky de sa boîte et préparez les 3 longs fils de cuivre recouverts de silicone qui en sortent.","We are starting the complete assembly of the first arm. This entire sequence (including motor and tube) must be executed 4 times. Begin by taking a SunnySky motor out of its box and prepare the 3 long silicone-covered copper wires coming out of it."),
 parts:[
  {qty:"x1",name:F("Moteur SunnySky X2216","SunnySky X2216 motor"),ref:""},
  {qty:"x1",name:F("Fer à 380 °C, fil d'étain, flux décapant","Iron at 380 °C, solder wire, flux"),ref:""}],
 instr:[
  F("Avec une pince coupante, coupez les 3 fils du moteur environ à mi-longueur (nous allons de toute façon y souder des rallonges pour traverser le bras tubulaire). Ensuite, utilisez une pince à dénuder pour retirer exactement 5 millimètres de gaine isolante à l'extrémité de chaque fil coupé.","With side cutters, cut the motor's 3 wires roughly at their midpoint (we will solder extensions to them anyway to cross the tubular arm). Then, use wire strippers to remove exactly 5 millimetres of insulating jacket at the end of each cut wire."),
  F("<strong>Pratique de l'étamage</strong> : Déposez une micro-goutte de pâte de flux sur le cuivre nu. Appliquez le bout de votre fer à souder (fortement chauffé à <span class='tag'>380 °C</span>) sous les brins de cuivre. Posez votre fil d'étain par le dessus. L'étain va fondre et s'infiltrer par capillarité dans tous les brins. Retirez le fer : la pointe du fil doit être recouverte d'un manchon d'étain lisse, compact et très brillant.","<strong>Tinning practice</strong>: Dab a micro-drop of flux paste onto the bare copper. Apply the tip of your soldering iron (strongly heated to <span class='tag'>380 °C</span>) under the copper strands. Touch your solder wire from above. The solder will melt and wick into all the strands by capillary action. Remove the iron: the wire tip must be covered in a smooth, compact, and highly shiny solder sleeve.")],
 tip:[F("Pour ne pas vous emmêler plus tard, décidez d'un code couleur immuable pour vos rallonges (par exemple : Bleu pour le fil de gauche, Noir pour le centre, Rouge pour la droite) et tenez-vous-y rigoureusement pour les 4 bras.","To avoid confusion later, decide on an unchangeable colour code for your extensions (e.g., Blue for left wire, Black for centre, Red for right) and stick to it strictly for all 4 arms.")]},
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Souder le MR30 — côté moteur","Solder the MR30 — motor side"),
 lede:F("Afin de pouvoir démonter les bras facilement en cas de casse (sans avoir à tout dessouder depuis la carte centrale), nous ajoutons un connecteur rapide jaune à 3 broches appelé MR30. Nous soudons ici la moitié du connecteur côté moteur.","To allow easy arm removal in case of breakage (without having to desolder everything from the central board), we add a yellow 3-pin quick connector called MR30. We solder the motor-side half of the connector here."),
 parts:[{qty:"x1",name:F("Connecteur MR30","MR30 connector"),ref:F("prendre la moitié avec broches pleines (mâle)","take the half with solid pins (male)")}],
 instr:[
  F("Coincez fermement le connecteur MR30 dans une pince ou un petit étau de modélisme. Les 3 petits godets semi-cylindriques dorés doivent pointer vers le haut. Remplissez chaque godet d'une petite bulle d'étain fondu (on étame les cavités).","Clamp the MR30 connector firmly in a vice or holding tool. The 3 small golden semi-cylindrical cups must point upwards. Fill each cup with a small bubble of molten solder (tin the cavities)."),
  F("Prenez l'un des fils de moteur préalablement étamé. Posez-le à plat dans la rigole du godet. Appliquez le fer à souder sur le fil : la chaleur va fondre l'étain du fil et l'étain du godet, fusionnant les deux. Retirez le fer et ne bougez absolument pas la main pendant 3 secondes pendant que le joint durcit.","Take one of the previously tinned motor wires. Lay it flat in the cup's trench. Apply the soldering iron on top of the wire: the heat will melt the wire's solder and the cup's solder, fusing them together. Remove the iron and keep your hand absolutely still for 3 seconds while the joint solidifies."),
  F("Soudez les trois fils en respectant cet ordre formel et non négociable de gauche à droite : <strong>fil gauche dans le godet gauche, fil central dans le central, fil droit dans le droit</strong>. Inspectez visuellement de très près : aucune bavure d'étain d'un godet ne doit effleurer le godet voisin (risque de court-circuit moteur mortel).","Solder the three wires obeying this formal and non-negotiable order left-to-right: <strong>left wire in left cup, centre wire in centre, right wire in right</strong>. Inspect visually very closely: no solder blob from one cup must touch a neighbouring cup (risk of fatal motor short-circuit).")]},
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Faire les rallonges + MR30 côté ESC","Make the leads + MR30 ESC side"),
 lede:F("Maintenant, nous fabriquons le 'câble' qui passera au travers du tube en carbone pour relier le connecteur MR30 (au bout du bras) jusqu'au contrôleur de vitesse central (l'ESC) situé sur le châssis principal.","Now, we fabricate the 'cable' that will pass through the carbon tube to link the MR30 connector (at the arm's end) all the way to the central speed controller (ESC) located on the main frame."),
 parts:[
  {qty:"x3",name:F("Sections de Fil silicone 20 AWG","Sections of 20 AWG silicone wire"),ref:F("rouge, noir, et bleu","red, black, and blue")},
  {qty:"x1",name:F("Connecteur MR30","MR30 connector"),ref:F("prendre la moitié avec trous (femelle)","take the half with holes (female)")}],
 instr:[
  F("Mesurez la distance nécessaire : la longueur de ces 3 fils doit équivaloir à la <strong>longueur totale du tube carbone (170 mm) augmentée d'un surplus généreux de 2 à 3 cm de mou</strong> pour atteindre confortablement les plots de soudure au centre du drone. Coupez vos fils rouge, noir et bleu à cette dimension précise.","Measure the required distance: the length of these 3 wires must equal the <strong>total length of the carbon tube (170 mm) plus a generous 2 to 3 cm of slack</strong> to comfortably reach the solder pads at the drone's centre. Cut your red, black, and blue wires to this precise dimension."),
  F("Comme à l'étape précédente, dénudez 5 mm aux deux extrémités de chaque fil et étamez-les avec du flux et de l'étain bien brillant.","Like the previous step, strip 5 mm at both ends of each wire and tin them with flux and very shiny solder."),
  F("Placez l'autre moitié du MR30 (la partie femelle) dans l'étau, étamez ses trois godets, puis venez y souder vos trois longs fils en respectant <strong>l'ordre de couleur exact</strong> (ex: bleu à gauche, noir au centre, rouge à droite) pour qu'ils fassent parfaitement miroir avec la prise mâle du moteur.","Place the other MR30 half (the female part) in the vise, tin its three cups, then solder your three long wires to it, respecting <strong>the exact colour order</strong> (e.g., blue left, black centre, red right) so they perfectly mirror the motor's male plug."),
  F("<strong>À ce stade, reprenez depuis la coupe des fils moteurs et répétez intégralement l'ensemble du câblage électrique pour les trois autres moteurs restants.</strong> Vous obtiendrez 4 groupes moteurs pré-câblés.","<strong>At this stage, go back to cutting the motor wires and completely repeat the entire electrical wiring process for the remaining three motors.</strong> You will have 4 pre-wired motor groups.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Fixer le moteur sur la mâchoire","Fix the motor to the jaw"),
 lede:F("Le bloc électrique est prêt. Nous l'attachons maintenant à sa monture imprimée en 3D. Le moteur vient se poser sur la grande mâchoire inférieure et se visse par le haut de sa base.","The electrical block is ready. We now attach it to its 3D-printed mount. The motor rests on the large lower jaw and is screwed from the top of its base."),
 parts:[{qty:"x4",name:F("Vis M3×16 (assez longues)","M3×16 screws (fairly long)"),ref:""},{qty:"x1",name:F("Flacon de frein-filet Loctite 243 (bleu)","Bottle of Loctite 243 threadlocker (blue)"),ref:""}],
 fastener:[F("Vis M3×16","Screw M3×16")],
 instr:[
  F("Saisissez une grande pièce appelée 'mâchoire inférieure moteur' (celle dotée d'une base large et de demi-cercles). Posez le moteur par-dessus. Le dôme rotatif du moteur (la cloche) doit pointer vers le plafond. Orienter la sortie des fils du moteur pour qu'ils plongent en direction du canal creusé dans le plastique. Faites coïncider les 4 trous métalliques de la base du moteur avec les 4 trous lisses de la pièce imprimée.","Grab a large piece called the 'lower motor jaw' (the one with a wide base and half-circles). Place the motor on top of it. The motor's rotating dome (the bell) must point towards the ceiling. Orient the motor wire exit so they plunge towards the channel hollowed out in the plastic. Line up the 4 metal holes of the motor base with the 4 smooth holes of the printed part."),
  F("C'est vital : déposez une toute petite goutte de liquide <strong>Loctite 243 (frein-filet bleu)</strong> sur les filets de chacune de vos 4 vis M3×16. Insérez les vis par le dessus (en les passant à travers les ouvertures de la cloche du moteur) et traversez la base métallique pour visser dans le pas de vis en plastique. Vissez en croix (haut gauche, bas droit, puis haut droit, bas gauche) en serrant progressivement sans écraser la pièce.","This is vital: apply a tiny drop of liquid <strong>Loctite 243 (blue threadlocker)</strong> to the threads of each of your 4 M3×16 screws. Insert the screws from the top (passing them through the openings of the motor bell) and go through the metal base to screw into the plastic threads. Screw in a cross pattern (top-left, bottom-right, then top-right, bottom-left), tightening gradually without crushing the part."),
  F("Tournez manuellement la cloche du moteur. Elle doit tourner librement et de façon fluide. Vérifiez en dessous : aucun fil moteur ne doit avoir été accidentellement pincé ou écrasé sous la base en aluminium.","Manually spin the motor bell. It must turn freely and smoothly. Check underneath: no motor wire must have been accidentally pinched or crushed under the aluminium base.")],
 warn:[F("Ne sautez jamais l'étape du Loctite. Les moteurs d'un drone génèrent des micro-vibrations d'une intensité redoutable. Sans ce frein chimique, ces 4 vis se dévisseront inexorablement en vol, entraînant la perte du moteur et le crash immédiat de la machine.","Never skip the Loctite step. Drone motors generate micro-vibrations of formidable intensity. Without this chemical lock, these 4 screws will inexorably back out in flight, leading to the loss of the motor and an immediate crash of the machine.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Serrer le tube dans les mâchoires moteur","Clamp the tube in the motor jaws"),
 lede:F("Le bras en carbone vient s'encastrer en force entre la mâchoire inférieure (qui tient le moteur) et la petite mâchoire supérieure préparée plus tôt avec ses inserts métalliques. Le tube sera littéralement pris en sandwich.","The carbon arm is wedged tightly between the lower jaw (holding the motor) and the small upper jaw prepared earlier with its metal inserts. The tube will literally be sandwiched."),
 parts:[
  {qty:"x1",name:F("Ensemble Moteur + Mâchoire inférieure","Motor + Lower Jaw assembly"),ref:""},
  {qty:"x1",name:F("Mâchoire supérieure (avec inserts)","Upper jaw (with inserts)"),ref:""},
  {qty:"x1",name:F("Tube carbone de 170 mm","170 mm carbon tube"),ref:""},
  {qty:"x4",name:F("Vis M3×18 + Loctite","M3×18 screws + Loctite"),ref:""}],
 fastener:[F("Vis M3×18","Screw M3×18")],
 instr:[
  F("Faites glisser la rallonge de 3 fils (celle avec le connecteur femelle) entièrement à l'intérieur du tube en carbone de 170 mm. Connectez les deux prises MR30 ensemble (côté moteur et côté tube). Repoussez ensuite le tube horizontalement dans le demi-canal de la mâchoire inférieure. Poussez fort jusqu'à ce que le bord du tube touche la paroi de butée au fond.","Slide the 3-wire extension (the one with the female connector) entirely inside the 170 mm carbon tube. Plug the two MR30 connectors together (motor side and tube side). Then push the tube horizontally into the half-channel of the lower jaw. Push hard until the edge of the tube hits the stop wall at the back."),
  F("Venez coiffer le tube par le dessus avec la petite mâchoire supérieure. Les 4 trous lisses de la mâchoire inférieure doivent s'aligner avec les 4 inserts métalliques de la mâchoire supérieure.","Cap the tube from above with the small upper jaw. The 4 smooth holes of the lower jaw must align with the 4 metal inserts of the upper jaw."),
  F("Insérez vos 4 vis M3×18 <strong>depuis le bas</strong> (par le dessous de la grande mâchoire). N'oubliez pas la goutte de Loctite. Vissez fermement en croix. Les deux mâchoires vont se rapprocher et étrangler violemment le tube carbone.","Insert your 4 M3×18 screws <strong>from the bottom</strong> (through the underside of the large jaw). Don't forget the Loctite drop. Tighten firmly in a cross pattern. The two jaws will close together and violently strangle the carbon tube."),
  F("Le test de vérité : tenez le moteur d'une main, et tentez de tordre et d'arracher le tube carbone de l'autre force. Il doit être pétrifié. Le moindre millimètre de glissement ou de rotation est inacceptable.","The moment of truth: hold the motor with one hand, and try to twist and rip out the carbon tube forcefully with the other. It must be petrified. The slightest millimetre of slip or rotation is unacceptable.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Fixer le bras sur la plaque","Fix the arm to the plate"),
 lede:F("Le bout libre du tube (d'où sortent les longs fils) vient se fixer sur l'un des angles (les 'oreilles') de la grande plaque centrale noire. Un système de mâchoires identique vient enserrer cette extrémité.","The free end of the tube (where the long wires exit) is fixed onto one of the corners (the 'ears') of the large black central plate. An identical jaw system clamps this extremity."),
 parts:[
  {qty:"x1",name:F("Mâchoire inf. + sup. de fixation bras","Arm fixing lower + upper jaw"),ref:""},
  {qty:"x4",name:F("Vis longues M3×25 + Loctite","Long M3×25 screws + Loctite"),ref:""}],
 fastener:[F("Vis M3×25","Screw M3×25"),F("Insert M3","Insert M3")],
 instr:[
  F("Récupérez les fils dépassant du bras et guidez-les pour qu'ils aillent vers le centre de la grande plaque. Prenez une mâchoire de bras inférieure et une supérieure, et placez-les en sandwich de part et d'autre de l'extrémité libre du tube carbone. Ne serrez pas encore.","Gather the wires protruding from the arm and route them towards the centre of the large plate. Take a lower and an upper arm jaw, and sandwich them on either side of the free end of the carbon tube. Do not tighten yet."),
  F("Posez l'ensemble de ces deux mâchoires enserrant le tube directement sur le dessus de l'une des 4 'oreilles' de la plaque principale. Faites pivoter l'ensemble pour que les 4 perçages verticaux traversant les deux mâchoires s'alignent avec les 4 inserts noyés dans l'oreille de la plaque.","Set this entire assembly of two jaws clamping the tube directly on top of one of the 4 'ears' of the main plate. Pivot the assembly so that the 4 vertical boreholes crossing both jaws align with the 4 inserts melted into the plate's ear."),
  F("Mettez une goutte de Loctite sur vos 4 longues vis M3×25. Insérez-les <strong>depuis le haut</strong>. Elles doivent traverser la mâchoire supérieure, frôler le tube de carbone sans le percer, traverser la mâchoire inférieure, et enfin s'ancrer solidement en se vissant dans les inserts métalliques de la plaque en dessous. Serrez fort en croix.","Put a drop of Loctite on your 4 long M3×25 screws. Insert them <strong>from the top down</strong>. They must cross the upper jaw, graze the carbon tube without piercing it, cross the lower jaw, and finally anchor solidly by screwing into the metal inserts of the plate below. Tighten hard in a cross pattern.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Répéter ×4 et mettre à niveau","Repeat ×4 and level"),
 lede:F("Un quart du drone est physiquement assemblé. Il s'agit maintenant de cloner cette procédure pour les 3 autres bras restants, puis de procéder à un ajustement géométrique majeur : l'alignement de l'assiette des moteurs.","A quarter of the drone is physically assembled. You must now clone this procedure for the remaining 3 arms, then proceed with a major geometric adjustment: leveling the motor pitch."),
 parts:[{qty:"x1",name:F("Petit niveau à bulle de précision","Small precision spirit level"),ref:""}],
 instr:[
  F("Munissez-vous de patience et reproduisez pas-à-pas les étapes précédentes (Vissage du moteur → Pincement du tube → Fixation à la plaque centrale) pour ériger les trois autres bras du quadricoptère en X.","Arm yourself with patience and replicate step-by-step the previous stages (Screwing motor → Clamping tube → Fixing to central plate) to erect the three other arms of the X-quadcopter."),
  F("Tentez de secouer doucement l'extrémité de chaque bras. Le châssis doit être une brique monolithique rigide. Resserrez les vis M3×25 de la plaque ou les vis M3×18 du tube au moindre jeu détecté.","Try to gently shake the end of each arm. The frame must feel like a rigid monolithic brick. Retighten the plate's M3×25 screws or the tube's M3×18 screws at the slightest detected play."),
  F("<strong>Le nivellement :</strong> Posez la structure centrale bien à plat sur une table parfaitement horizontale. Prenez votre niveau à bulle et posez-le sur la face supérieure parfaitement plate de la base d'un moteur. Si la bulle n'est pas au centre parfait, desserrez infimement les vis enserrant le tube côté plaque, tournez le bras à la main de quelques millimètres sur son axe pour corriger l'angle, et resserrez brutalement. Répétez ce contrôle critique pour les 4 moteurs. S'ils ne visent pas tous le ciel exactement sous le même angle, le drone dérivera constamment en vol.","<strong>Levelling:</strong> Set the central structure perfectly flat on a strictly horizontal table. Take your spirit level and place it on the perfectly flat top face of a motor base. If the bubble is not dead centre, slightly loosen the screws clamping the tube at the plate side, twist the arm by hand a few millimetres on its axis to correct the angle, and abruptly retighten. Repeat this critical check for all 4 motors. If they don't all point to the sky at exactly the same angle, the drone will constantly drift in flight.")]},
{phase:F("Structure","Structure"),title:F("Fixer les trains d'atterrissage","Fix the landing gear"),
 lede:F("Avant de manipuler des composants électroniques fragiles, nous allons monter le drone sur ses pieds pour surélever la plaque principale du plan de travail.","Before handling fragile electronic components, we will mount the drone on its feet to raise the main plate off the work surface."),
 parts:[
  {qty:"x2",name:F("Pièces du train d'atterrissage","Landing gear parts"),ref:"avec inserts déjà posés / with inserts already fitted"},
  {qty:"x4",name:F("Vis M3 (longueur adaptée)","M3 screws (appropriate length)"),ref:"+ Loctite"}],
 fastener:[F("Vis M3","Screw M3"),F("Insert M3","Insert M3")],
 instr:[
  F("Retournez le drone avec précaution (les moteurs touchent la table, le dessous de la plaque regarde le plafond). Saisissez l'un des grands arceaux servant de pied (le train). Alignez la platine plane du pied avec les deux trous traversants situés sur le flanc extérieur de la plaque principale.","Carefully flip the drone upside down (motors touching the table, underside of the plate facing the ceiling). Grab one of the large arches serving as a foot (the gear). Align the foot's flat plate with the two through-holes located on the outer flank of the main plate."),
  F("<strong>Depuis l'autre côté</strong> (c'est-à-dire en passant la vis depuis le dessus 'normal' du drone vers le dessous), introduisez une vis M3 dotée de Loctite dans la plaque noire, de sorte qu'elle vienne s'ancrer dans l'insert M3 de la base du pied. Serrez fermement.","<strong>From the other side</strong> (meaning passing the screw from the 'normal' top of the drone down to the underside), introduce an M3 screw coated with Loctite into the black plate, so it anchors into the M3 insert of the foot's base. Tighten firmly."),
  F("Répétez cette opération avec deux nouvelles vis pour arrimer le second train d'atterrissage sur le flanc opposé. Remettez le drone à l'endroit : il repose désormais fièrement sur ses deux grandes jambes.","Repeat this operation with two new screws to dock the second landing gear on the opposite flank. Flip the drone right-side up: it now rests proudly on its two large legs.")]},
/* ===== ESC ===== */
{phase:F("ESC","ESC"),title:F("Étamer les pads de l'ESC","Tin the ESC pads"),
 lede:F("Le grand circuit imprimé carré que vous avez sorti de la boîte SpeedyBee est l'ESC (Electronic Speed Controller). C'est la centrale électrique du drone. Ses rectangles dorés (les pads) vont recevoir d'énormes intensités de courant. Il faut les préparer en les recouvrant d'une belle cloche d'étain.","The large square printed circuit board you unboxed from SpeedyBee is the ESC (Electronic Speed Controller). It's the drone's power station. Its golden rectangles (the pads) will handle massive current intensities. They must be prepped by coating them with a beautiful dome of solder."),
 parts:[{qty:"x1",name:F("ESC SpeedyBee 60A","SpeedyBee 60A ESC"),ref:F("posé sur un tapis thermique isolant","placed on a heat-resistant mat")}],
 instr:[
  F("Observez la carte : sur les rebords extérieurs, vous distinguez 4 groupes distincts de 3 petits rectangles dorés alignés. Ce sont les <strong>12 pads moteurs</strong> (étiquetés M1, M2, M3, M4). Sur l'un des côtés, deux immenses rectangles trônent : ce sont les <strong>pads d'alimentation de la batterie</strong> (étiquetés BAT+ et BAT−).","Observe the board: on the outer edges, you distinguish 4 distinct groups of 3 small aligned golden rectangles. These are the <strong>12 motor pads</strong> (labeled M1, M2, M3, M4). On one side, two immense rectangles dominate: these are the <strong>battery power pads</strong> (labeled BAT+ and BAT−)."),
  F("Chauffez fort votre fer. Appliquez une pointe de flux sur l'un des petits pads moteur. Posez la panne du fer bien à plat sur la surface dorée pendant une seconde, puis nourrissez avec le fil d'étain. Retirez le fer : vous devez obtenir un magnifique dôme argenté et lisse. Répétez ce geste clinique sur les 12 pads des moteurs.","Heat your iron highly. Apply a dab of flux to one of the small motor pads. Rest the flat of the iron tip directly on the golden surface for a second, then feed in the solder wire. Remove the iron: you must get a magnificent smooth silver dome. Repeat this clinical motion on all 12 motor pads."),
  F("Augmentez la température du fer à 400 °C. Attaquez-vous aux deux énormes rectangles BAT+ et BAT−. Ces zones contiennent énormément de cuivre qui va aspirer la chaleur de votre fer. Laissez le fer chauffer la piste dorée 3 à 4 bonnes secondes avant d'injecter une quantité généreuse d'étain pour former deux gros oreillers bombés brillants.","Raise the iron temp to 400 °C. Tackle the two enormous BAT+ and BAT− rectangles. These zones hold massive amounts of copper that will suck the heat from your iron. Let the iron heat the gold pad for a good 3 to 4 seconds before injecting a generous amount of solder to form two large, shiny convex pillows.")]},
{phase:F("ESC","ESC"),title:F("Souder les phases + sens de rotation","Solder phases + rotation direction"),
 lede:F("C'est l'étape cruciale du raccordement. L'orientation de l'ESC dictera l'avant du drone. Observez la petite flèche blanche imprimée sur l'ESC : placez l'ESC au centre de la table pour que <strong>la flèche pointe vers l'arrière du drone</strong>. Les gros pads d'alimentation BAT se retrouvent ainsi propulsés à l'avant de la machine.","This is the crucial connection step. The ESC's orientation dictates the drone's front. Note the small white arrow printed on the ESC: set the ESC in the centre of the table so <strong>the arrow points to the rear of the drone</strong>. The large BAT power pads end up thrust to the front of the machine."),
 parts:[{qty:"x4",name:F("Fils longs venant des bras","Long wires coming from the arms"),ref:""}],
 instr:[
  F("Saisissez les trois fils longs dépassant du bras avant-droit (qui est le moteur M1 dans la logique PX4). Amenez ces trois fils jusqu'au groupe de 3 pads de l'ESC étiqueté <strong>M3</strong>. Reportez-vous impérativement à ce tableau de traduction mental :<table class='map'><tr><th>Emplacement du bras (QGC)</th><th>Sens de rotation requis</th><th>Pad correspondant sur l'ESC</th></tr><tr><td>Avant-Droit (M1)</td><td>Horaire (CW)</td><td>Pads M3</td></tr><tr><td>Avant-Gauche (M3)</td><td>Anti-Horaire (CCW)</td><td>Pads M1</td></tr><tr><td>Arrière-Gauche (M2)</td><td>Horaire (CW)</td><td>Pads M2</td></tr><tr><td>Arrière-Droit (M4)</td><td>Anti-Horaire (CCW)</td><td>Pads M4</td></tr></table>","Grab the three long wires protruding from the front-right arm (which is motor M1 in PX4 logic). Bring these three wires to the 3-pad group on the ESC labeled <strong>M3</strong>. Imperatively refer to this mental translation table:<table class='map'><tr><th>Arm Location (QGC)</th><th>Required Spin</th><th>Matching Pad on ESC</th></tr><tr><td>Front-Right (M1)</td><td>Clockwise (CW)</td><td>M3 Pads</td></tr><tr><td>Front-Left (M3)</td><td>Counter-Clockwise (CCW)</td><td>M1 Pads</td></tr><tr><td>Rear-Left (M2)</td><td>Clockwise (CW)</td><td>M2 Pads</td></tr><tr><td>Rear-Right (M4)</td><td>Counter-Clockwise (CCW)</td><td>M4 Pads</td></tr></table>"),
  F("<strong>Pour souder un moteur tournant en Anti-Horaire (CCW) :</strong> Posez le fil bleu vif sur le petit pad du milieu. Soudez le fil noir à sa droite. Soudez le fil rouge vif à sa gauche. Le bleu doit être encadré.","<strong>To solder a Counter-Clockwise (CCW) spinning motor:</strong> Place the bright blue wire on the middle pad. Solder the black wire to its right. Solder the bright red wire to its left. Blue must be framed in the centre."),
  F("<strong>Pour souder un moteur tournant en Horaire (CW) :</strong> Le fil noir prend la place de droite. Le fil rouge prend le pad du milieu. Le fil bleu vif se retrouve excentré sur le pad de l'extrémité gauche.","<strong>To solder a Clockwise (CW) spinning motor:</strong> The black wire takes the right spot. The red wire takes the middle pad. The bright blue wire ends up offset on the far left pad."),
  F("Soudez consciencieusement chaque extrémité de fil sur son dôme d'étain respectif. <strong>Répétez méticuleusement cette logique pour rassembler les fils des 4 bras autour de l'ESC.</strong>","Conscientiously solder each wire tip onto its respective solder dome. <strong>Meticulously repeat this logic to gather the wires from all 4 arms around the ESC.</strong>")],
 tip:[F("Ne paniquez pas sur le sens de rotation pour l'instant. Si lors des essais logiciels un moteur tourne du mauvais côté, la solution sera d'une simplicité enfantine : il suffira de dessouder deux de ses trois fils sur l'ESC et d'inverser leur place.","Don't panic over the spin direction right now. If during software trials a motor spins the wrong way, the solution is childishly simple: just desolder two of its three wires on the ESC and swap their places.")]},
{phase:F("ESC","ESC"),title:F("Souder l'alimentation","Solder the power"),
 lede:F("Les énormes pads situés à l'avant (BAT+ et BAT−) constituent le cœur vasculaire du drone. Ils vont recevoir les gros câbles du connecteur jaune XT60 (qui ira vers la batterie), les pattes du gros condensateur noir chargé de filtrer les pics de courant, ainsi que les petits fils du régulateur de tension UBEC.","The enormous pads located at the front (BAT+ and BAT−) constitute the vascular heart of the drone. They will receive the thick cables from the yellow XT60 connector (which goes to the battery), the legs of the large black capacitor tasked with filtering current spikes, as well as the small wires of the UBEC voltage regulator."),
 parts:[
  {qty:"x1",name:F("Gros connecteur XT60 mâle muni de gros fils 12 AWG","Large male XT60 connector fitted with thick 12 AWG wires"),ref:""},
  {qty:"x1",name:F("Gros condensateur cylindrique 1000 µF (Low-ESR)","Large cylindrical 1000 µF capacitor (Low-ESR)"),ref:""},
  {qty:"x2",name:F("Fins fils dénudés (rouge et noir) du boîtier UBEC","Thin stripped wires (red and black) from the UBEC casing"),ref:""}],
 instr:[
  F("Plaquez le gros <strong>fil rouge de la prise XT60 directement au centre du gros coussin d'étain BAT+</strong>. Plaquez le gros fil noir au centre du coussin BAT−. Chauffez énormément avec le fer posé sur le dessus des gros câbles pour faire fondre l'ensemble et figer la liaison.","Press the thick <strong>red wire from the XT60 plug straight into the centre of the large BAT+ solder cushion</strong>. Press the thick black wire into the centre of the BAT− cushion. Apply massive heat with the iron resting on top of the thick cables to melt everything and solidify the bond."),
  F("Prenez le condensateur cylindrique. Identifiez ses pôles : la tige métallique la plus longue est le positif (+). La tige courte bordée par une large bande grise peinte sur le cylindre est le négatif (−). Soudez la <strong>patte longue dans le bain d'étain de BAT+</strong>, et la patte courte dans BAT−. Ne vous trompez pas, une inversion provoque l'explosion littérale du condensateur à l'allumage.","Take the cylindrical capacitor. Identify its poles: the longest metal leg is positive (+). The short leg bordered by a wide grey stripe painted on the cylinder is negative (−). Solder the <strong>long leg into the BAT+ solder pool</strong>, and the short leg into BAT−. Make no mistake, a reversal causes the literal explosion of the capacitor upon power-up."),
  F("Prenez les petits fils fins de l'UBEC. Posez le fil <strong>rouge par-dessus la soudure BAT+ existante</strong> et fondez-le dedans. Faites la même chose avec le petit fil noir sur la montagne BAT−.","Take the small thin wires of the UBEC. Lay the <strong>red wire over the existing BAT+ joint</strong> and melt it in. Do the same with the small black wire on the BAT− mountain.")],
 warn:[F("Vérification absolue de survie : Prenez votre multimètre réglé sur le mode 'Bip' de continuité. Touchez la grosse soudure BAT+ avec une sonde, et BAT− avec l'autre. Le multimètre doit rester <strong>totalement silencieux</strong>. Si un bip long retentit, c'est qu'un filament invisible d'étain relie les deux pôles (court-circuit massif). Rebranchez la batterie dans cet état et l'ESC s'embrasera instantanément en projetant des étincelles. Nettoyez vos soudures.","Absolute survival check: Grab your multimeter set to 'Beep' continuity mode. Touch the large BAT+ solder joint with one probe, and BAT− with the other. The multimeter must stay <strong>totally silent</strong>. If a long beep sounds, an invisible strand of solder is bridging the two poles (massive short circuit). Plug in the battery in this state and the ESC will instantly burst into flames showering sparks. Clean your joints.")]},
/* ===== CALCULATEUR ===== */
{phase:F("Calculateur","Companion computer"),title:F("Préparer la carte SD — Raspberry Pi Imager","Prepare the SD card — Raspberry Pi Imager"),
 lede:F("Le drone possède un cerveau de bas niveau (le Pixhawk) et un cerveau de haut niveau autonome (l'ordinateur Raspberry Pi 5). L'ordinateur a besoin de son système d'exploitation gravé sur sa petite carte micro-SD. Une fois la Pi vissée dans les entrailles du drone, cette fente ne sera plus accessible. Préparez-la tout de suite.","The drone possesses a low-level brain (the Pixhawk) and a high-level autonomous brain (the Raspberry Pi 5 computer). The computer needs its operating system flashed onto its tiny micro-SD card. Once the Pi is bolted into the drone's bowels, this slot will be unreachable. Prep it right now."),
 parts:[{qty:"x1",name:F("Carte micro-SD haute vitesse + adaptateur USB pour le PC","High-speed micro-SD card + USB adapter for the PC"),ref:""}],
 instr:[
  F("Allez sur internet avec votre ordinateur fixe, téléchargez le logiciel gratuit <strong>Raspberry Pi Imager</strong> depuis raspberrypi.com et installez-le. Insérez votre carte micro-SD dans le PC.","Go online with your desktop PC, download the free <strong>Raspberry Pi Imager</strong> software from raspberrypi.com and install it. Insert your micro-SD card into the PC."),
  F("Ouvrez le logiciel. Dans la case <strong>CHOOSE DEVICE (Choisir l'appareil)</strong>, scrollez et sélectionnez 'Raspberry Pi 5'. Dans <strong>CHOOSE OS (Choisir l'OS)</strong>, cliquez sur 'Raspberry Pi OS (other)' puis scrollez jusqu'à trouver la version austère sans bureau graphique : <strong>Raspberry Pi OS Lite (64-bit)</strong>. Dans <strong>CHOOSE STORAGE</strong>, sélectionnez votre carte SD.","Open the software. In the <strong>CHOOSE DEVICE</strong> box, scroll and pick 'Raspberry Pi 5'. In <strong>CHOOSE OS</strong>, click 'Raspberry Pi OS (other)' then scroll to find the austere version without a graphical desktop: <strong>Raspberry Pi OS Lite (64-bit)</strong>. In <strong>CHOOSE STORAGE</strong>, select your SD card."),
  F("Cliquez sur <strong>NEXT</strong> puis répondez oui en cliquant sur <strong>EDIT SETTINGS (Modifier les réglages)</strong> pour configurer la Pi avant même qu'elle ne démarre. Dans le premier onglet (General) : cochez et tapez le nom d'hôte précis <span class='tag'>neutronit</span>, définissez le nom d'utilisateur exactement sur <span class='tag'>neutronit</span> et le mot de passe sur <span class='tag'>neutronit2026</span>. Cochez Wi-Fi, et inscrivez le Nom et Mot de passe du partage de connexion de votre smartphone. Mettez le pays sur <strong>FR</strong>.","Click <strong>NEXT</strong> then answer yes by clicking <strong>EDIT SETTINGS</strong> to configure the Pi before it even boots. In the first tab (General): tick and type the precise hostname <span class='tag'>neutronit</span>, set the username exactly to <span class='tag'>neutronit</span> and the password to <span class='tag'>neutronit2026</span>. Tick Wi-Fi, and input the Name and Password of your smartphone's hotspot. Set the country to <strong>FR</strong>."),
  F("Basculez sur l'onglet d'à côté nommé <strong>Services</strong>. Cochez impérativement la case <strong>Enable SSH</strong> et sélectionnez <strong>Use password authentication</strong>. Cliquez sur <strong>SAVE</strong>, puis confirmez l'effacement total de la carte en cliquant sur <strong>YES</strong> puis <strong>WRITE</strong>. Attendez la fin du processus, retirez la carte et glissez-la dans la fente située sous la carte Raspberry Pi.","Switch to the adjacent tab named <strong>Services</strong>. Imperatively tick the <strong>Enable SSH</strong> box and select <strong>Use password authentication</strong>. Click <strong>SAVE</strong>, then confirm total card wipe by clicking <strong>YES</strong> then <strong>WRITE</strong>. Wait for the process to finish, remove the card and slide it into the slot located under the Raspberry Pi board.")],
 warn:[F("Une coquille d'une seule lettre dans le nom d'utilisateur, le mot de passe ou le nom du réseau Wi-Fi, et vous serez physiquement incapable de prendre le contrôle du drone en vol. Vérifiez majuscules et espaces minutieusement.","A single-letter typo in the username, password or Wi-Fi network name, and you will be physically unable to take control of the drone in flight. Check capitals and spaces meticulously. ")],
 tip:[F("Pour votre culture : cet OS Lite ne contient aucun environnement visuel de bureau (pas de fenêtres, pas de souris). La carte Pi sera pilotée exclusivement via des lignes de commandes noires frappées à distance depuis votre PC portable sur le terrain.","For your knowledge: this Lite OS contains no visual desktop environment (no windows, no mouse). The Pi board will be driven exclusively via black command lines typed remotely from your laptop in the field.")]},
{phase:F("Calculateur","Companion computer"),title:F("Monter le ventilateur sur la Pi","Fit the cooler on the Pi"),
 lede:F("Le processeur de la Pi 5 dégage une chaleur folle lorsqu'il traite l'algorithme de vision en temps réel. Le montage du bloc radiateur métallique et de son ventilateur (Active Cooler) est vital et doit se faire tant que la carte vous est accessible dans les mains.","The Pi 5 processor throws off insane heat when processing the real-time vision algorithm. Mounting the metal heatsink block and its fan (Active Cooler) is vital and must be done while the board is accessible in your hands."),
 parts:[{qty:"x1",name:F("Bloc Active Cooler officiel Raspberry","Official Raspberry Active Cooler block"),ref:"livré avec des petits pads thermiques adhésifs préinstallés / comes with pre-applied sticky thermal pads"}],
 instr:[
  F("Retirez les films de protection en plastique transparent situés sous l'Active Cooler pour mettre à nu les carrés de gomme thermique. Présentez le bloc métallique bien au-dessus du grand processeur argenté de la Raspberry Pi. Les deux grandes broches-ergots en plastique blanc qui pendent sous le ventilateur s'alignent avec deux trous de la carte mère. Il n'y a qu'un sens possible. Appuyez fermement sur les ergots jusqu'à entendre le petit clac de verrouillage.","Remove the clear plastic protective films located under the Active Cooler to expose the thermal gum squares. Present the metal block straight above the large silver processor of the Raspberry Pi. The two large white plastic push-pin pegs hanging under the fan align with two motherboard holes. There's only one possible direction. Press firmly on the pegs until you hear the small locking click."),
  F("Prenez le minuscule câble torsadé sortant du ventilateur et enfoncez doucement sa fiche minuscule dans le tout petit connecteur blanc étiqueté <span class='tag'>FAN</span>, situé sur la bordure de la carte mère, juste à côté du gros port d'alimentation USB-C.","Take the tiny twisted wire coming from the fan and gently push its tiny plug into the minuscule white connector labeled <span class='tag'>FAN</span>, located on the edge of the motherboard, right next to the large USB-C power port.")]},
{phase:F("Calculateur","Companion computer"),title:F("Fixer la Raspberry Pi (anti-vibration)","Mount the Raspberry Pi (anti-vibration)"),
