 lede:F("L'ordinateur Raspberry Pi vient s'asseoir sur la grande plaque noire du châssis. Pour que ses minuscules soudures n'éclatent pas sous l'effet des vibrations des rotors, la carte est 'flottante', perchée sur des suspensions en silicone. L'ordre de cet empilement requiert de la concentration.","The Raspberry Pi computer comes to sit on the large black chassis plate. So its tiny solder joints don't shatter under rotor vibrations, the board is 'floating', perched on silicone suspensions. The order of this stack requires focus."),
 parts:[
  {qty:"x4",name:F("Très petites Vis M2×10","Very small M2×10 screws"),ref:""},
  {qty:"x4",name:F("Petits écrous hexagonaux M2","Small M2 hex nuts"),ref:""},
  {qty:"x4",name:F("Petites boules rondes d'amortissement en silicone noir","Small round black silicone damping balls"),ref:""}],
 fastener:[F("Vis M2×10","Screw M2×10"),F("Écrou M2","Nut M2"),F("Insert M2","Insert M2")],
 instr:[
  F("Prenez la carte Raspberry Pi en main. Prenez une vis M2×10, et glissez-la <strong>depuis le haut</strong> à travers l'un des 4 trous dorés situés aux coins de la carte verte. Maintenez la tête de vis appuyée avec l'index.","Hold the Raspberry Pi board in hand. Take an M2×10 screw, and slide it <strong>from the top down</strong> through one of the 4 golden holes located at the corners of the green board. Keep the screw head pressed with your index finger."),
  F("De l'autre main, regardez le dessous de la carte verte : le filetage de la vis dépasse. Vissez dessus un petit écrou M2 et remontez-le jusqu'à ce qu'il plaque contre le circuit imprimé. Serrez doucement, la vis est bloquée. Ensuite, prenez une boule de silicone souple, et vissez-la manuellement sur la portion de filetage qui dépasse encore en dessous de l'écrou. Répétez ce rituel chirurgical pour les 3 autres coins de la carte.","With the other hand, look at the underside of the green board: the screw thread protrudes. Thread a small M2 nut onto it and run it up until it sits tight against the PCB. Tighten gently, the screw is locked. Next, take a soft silicone ball, and manually twist it onto the portion of thread still protruding below the nut. Repeat this surgical ritual for the 3 other board corners."),
  F("Présentez l'ordinateur entier au-dessus du carré d'inserts M2 que vous aviez fondus à l'arrière de la grande plaque noire. Les 4 boules de silicone en dessous du PC doivent tomber face aux trous en laiton. Avec un petit tournevis cruciforme, serrez les têtes des vis M2 supérieures. Cela forcera le silicone à entrer dans les filets en laiton de la plaque. Arrêtez de visser dès qu'une tension ferme se fait sentir, ne broyez surtout pas le silicone !","Present the whole computer above the square of M2 inserts you melted into the rear of the large black plate. The 4 silicone balls below the PC must land facing the brass holes. With a small Phillips screwdriver, tighten the top M2 screw heads. This will force the silicone down into the plate's brass threads. Stop screwing as soon as firm tension is felt, absolutely do not crush the silicone!")]},
/* ===== INSTALLATION CAMERA (AVANCÉE) ===== */
{phase:F("Installation Caméra","Camera Installation"),title:F("Assembler la caméra dans sa coque","Assemble the camera in its shell"),
 lede:F("Maintenant que le calculateur est en place, installons les yeux du drone. Nous allons assembler le bloc caméra *avant* l'électronique de puissance, car il se monte tout à l'avant, une zone qui deviendra inaccessible plus tard.","Now that the computer is seated, let's install the drone's eyes. We will assemble the camera block *before* the power electronics, as it mounts at the very front, an area that will become inaccessible later."),
 parts:[
  {qty:"x1",name:F("Capteur Caméra Module 3 Wide","Camera Module 3 Wide sensor"),ref:""},
  {qty:"x1",name:F("Nappe plate de liaison dorée (300 mm de long)","Flat golden flex cable (300 mm long)"),ref:""},
  {qty:"x2",name:F("Petites Vis M2×6","Small M2×6 screws"),ref:""},
  {qty:"x1",name:F("Coque caméra carrée imprimée en 3D","3D-printed square camera shell"),ref:""}],
 fastener:[F("Vis M2×6","Screw M2×6")],
 instr:[
  F("Observez le dos carré et vert du capteur caméra. Vous y verrez une fine languette de plastique noir (le verrou). Avec l'ongle, soulevez délicatement cette barrette noire d'un millimètre vers le haut pour ouvrir la mâchoire du connecteur. Saisissez l'extrémité de la grande nappe plate dorée de 300 mm. Glissez-la bien droite au fond de la fente. <strong>La face brillante avec les minuscules contacts métalliques nus de la nappe doit être tournée vers l'intérieur de la carte, face aux composants</strong>. Une fois en butée, repoussez fermement la barrette noire vers le bas pour mordre la nappe.","Look at the square green back of the camera sensor. You will see a thin black plastic tab (the latch). With your fingernail, gently lift this black bar up a millimetre to open the connector's jaw. Grasp the end of the long 300 mm golden flex cable. Slide it straight deep into the slot. <strong>The shiny side with the tiny bare metal contacts of the cable must face inward towards the board, facing the components</strong>. Once fully inserted, firmly push the black bar back down to bite into the cable."),
  F("Prenez la coque caméra imprimée. Insérez le circuit imprimé de la caméra à l'intérieur, en poussant le gros bloc objectif en verre pour qu'il sorte par la grande ouverture béante à l'avant. Guidez soigneusement la nappe plate vers l'arrière pour ne pas la tordre sèchement.","Take the printed camera shell. Insert the camera's circuit board inside, pushing the bulky glass lens block so it protrudes through the large gaping opening at the front. Carefully route the flat cable towards the rear so as not to bend it sharply."),
  F("Regardez la face avant du cube : vous verrez deux petits trous encadrant l'objectif. Glissez-y deux vis M2×6 et vissez doucement pour que le bout des vis aille mordre le plastique du circuit imprimé de la caméra derrière et plaque le capteur contre le fond de la coque.","Look at the front face of the cube: you will see two small holes flanking the lens. Slip two M2×6 screws in and tighten gently so the screw tips bite into the plastic of the camera circuit board behind and clamp the sensor against the back of the shell.")]},
{phase:F("Installation Caméra","Camera Installation"),title:F("Fermer avec le clap caméra","Close with the camera clamp"),
 lede:F("Pour protéger les bords de l'objectif et maintenir l'ensemble parfaitement solidaire en vol, nous rajoutons une fine façade imprimée par-dessus la coque.","To protect the edges of the lens and keep the whole assembly perfectly solid in flight, we add a thin printed faceplate over the shell."),
 parts:[
  {qty:"x1",name:F("Façade (clap caméra) imprimée","Printed faceplate (camera clamp)"),ref:""},
  {qty:"x2",name:F("Petites vis M2×6","Small M2×6 screws"),ref:""}],
 fastener:[F("Vis M2×6","Screw M2×6"),F("Insert M2","Insert M2")],
 instr:[
  F("Présentez la fine façade par-dessus l'objectif qui dépasse du cube. Les côtés de la façade viendront épouser les flancs extérieurs de la coque cubique.","Present the thin faceplate over the protruding lens of the cube. The sides of the faceplate will hug the outer flanks of the cubic shell."),
  F("Rappelez-vous les tout petits inserts métalliques M2 que vous aviez fondus sur les flancs de la coque. Glissez vos deux vis M2×6 à travers les oreilles du clap, et vissez-les dans ces inserts latéraux situés à gauche et à droite de la boîte. La caméra est désormais prisonnière de son armure de plastique.","Recall the tiny M2 metal inserts you melted into the flanks of the shell. Slide your two M2×6 screws through the clamp's ears, and screw them into these lateral inserts located on the left and right of the box. The camera is now trapped in its plastic armor."),
  F("Contrôle de conformité : Vérifiez que la fragile nappe plate dorée ressort de la boîte sans être pincée ni cisaillée par le plastique environnant.","Compliance check: Verify that the fragile golden flex cable exits the box without being pinched or sheared by the surrounding plastic.")]},
{phase:F("Installation Caméra","Camera Installation"),title:F("Fixer le support caméra sur la plaque","Fix the camera mount to the plate"),
 lede:F("Il est temps d'arrimer ce bloc optique à l'avant-garde du drone. Le support est le cou qui reliera la tête caméra au corps du drone.","It's time to dock this optical block at the vanguard of the drone. The mount is the neck that will link the camera head to the drone body."),
 parts:[
  {qty:"x1",name:F("Support de caméra (pièce en forme de 'U')","Camera mount ('U' shaped part)"),ref:""},
  {qty:"x2",name:F("Vis M3×6 (très courtes)","M3×6 screws (very short)"),ref:""}],
 fastener:[F("Vis M3×6","Screw M3×6")],
 instr:[
  F("Repérez l'extrême nez de la grande plaque principale noire (à l'avant, entre les bras avant). Il y a deux trous percés en bordure. Prenez la pièce en plastique formant un 'U' (le support caméra).","Locate the extreme nose of the large black main plate (at the front, between the front arms). There are two holes drilled on the edge. Take the plastic part forming a 'U' (the camera mount)."),
  F("Posez ce support en U sur le bout de la plaque, les bras du U pointant vers le ciel et vers l'avant. Vissez deux petites vis M3×6 par le dessus pour verrouiller sa base contre la plaque.","Place this U-mount on the tip of the plate, the arms of the U pointing skyward and forward. Drive two small M3×6 screws from the top down to lock its base against the plate.")]},
{phase:F("Installation Caméra","Camera Installation"),title:F("Monter la caméra + brancher la nappe","Mount the camera + plug the cable"),
 lede:F("Assemblage final de la vision : relier mécaniquement le cube au cou, et électroniquement la caméra à l'ordinateur.","Final vision assembly: mechanically linking the cube to the neck, and electronically linking the camera to the computer."),
 parts:[{qty:"x1",name:F("Cylindre moleté pour la caméra","Knurled camera cylinder"),ref:""}],
 instr:[
  F("Prenez la coque cubique (la tête) contenant la caméra, et insérez-la entre les deux branches verticales du support en U (le cou). Alignez le gros trou circulaire qui traverse le U avec celui qui traverse les flancs de la tête cubique.","Take the cubic shell (the head) containing the camera, and insert it between the two vertical branches of the U-mount (the neck). Align the large circular bore crossing the U with the one crossing the flanks of the cubic head."),
  F("Enfoncez la grosse goupille cylindrique cannelée en plastique à travers ce trou pour lier les deux pièces comme une charnière. Inclinez manuellement la tête de la caméra de quelques degrés vers le bas (pour que le drone regarde un peu vers le sol en volant) et poussez fermement la goupille pour figer cet angle par friction.","Thrust the large splined plastic cylindrical pin through this bore to link both parts like a hinge. Manually tilt the camera head a few degrees downwards (so the drone looks slightly at the ground while flying) and firmly push the pin tight to freeze this angle by friction."),
  F("Il est l'heure de brancher la nappe au cerveau. Prenez l'extrémité flottante de la nappe dorée de 300 mm. Dirigez-vous vers la carte Raspberry Pi au centre. Cherchez le connecteur étroit flanqué de l'inscription <span class='tag'>CAM 0</span> (il y a un autre port appelé DISP, ignorez-le). Soulevez le loquet noir, glissez délicatement la nappe verticalement dedans, <strong>toujours avec la face brillante des contacts métalliques regardant vers les gros ports USB et HDMI de la carte mère</strong>. Refermez d'un clic net.","Time to plug the flex cable into the brain. Take the floating end of the 300 mm golden flex cable. Head over to the Raspberry Pi board in the centre. Look for the narrow connector flanked by the inscription <span class='tag'>CAM 0</span> (there is another port called DISP, ignore it). Lift the black latch, delicately slide the cable vertically in, <strong>always with the shiny side of the metal contacts looking towards the bulky USB and HDMI ports on the motherboard</strong>. Snap shut with a clean click.")]},
/* ===== STACK CENTRAL ===== */
{phase:F("Stack central","Central stack"),title:F("Monter l'ESC sur la plaque","Mount the ESC on the plate"),
 lede:F("Revenons au centre névralgique. Le grand carré ESC aux soudures argentées que vous avez préparé va venir siéger au cœur absolu de la plaque principale. Il sera monté sur 'pilotis' (des vis surélevées par des écrous) pour laisser l'air circuler en dessous. Chaque geste de surélévation exige de l'exactitude.","Let's return to the nerve centre. The large ESC square with silver solders you prepped will come to sit at the absolute heart of the main plate. It will be mounted on 'stilts' (screws elevated by nuts) to let air flow underneath. Every elevation gesture demands exactness."),
 parts:[
  {qty:"x4",name:F("Longues vis M3×20","Long M3×20 screws"),ref:F("à glisser par en dessous","to slip from underneath")},
  {qty:"x8",name:F("Écrous hexagonaux M3","Hex M3 nuts"),ref:F("prévoyez 2 écrous par vis","plan for 2 nuts per screw")},
  {qty:"x1",name:F("La carte ESC lourde avec ses fils soudés","The heavy ESC board with its soldered wires"),ref:""}],
 fastener:[F("Vis M3×20","Screw M3×20"),F("Écrou M3","Nut M3")],
 instr:[
  F("Placez-vous au-dessus du grand trou vide au centre de la plaque noire. Autour de ce vide carré, identifiez les <strong>4 petits trous ronds</strong> situés exactement aux quatre points cardinaux du carré central.","Position yourself above the large empty void in the centre of the black plate. Around this square void, identify the <strong>4 small round holes</strong> located exactly at the four compass points of the central square."),
  F("Soulevez le drone d'une main. Par le ventre du drone (le dessous de la plaque), introduisez une vis M3×20 très longue à travers l'un de ces trous et poussez vers le haut. La pointe filetée va sortir sur le dessus de la plaque, pointant vers votre plafond. Répétez pour les 3 autres trous. La plaque ressemble maintenant à une table munie de 4 piquets acérés pointant en l'air.","Lift the drone with one hand. Through the drone's belly (the underside of the plate), introduce a very long M3×20 screw through one of these holes and push upwards. The threaded tip will emerge on the top of the plate, pointing to your ceiling. Repeat for the 3 other holes. The plate now resembles a table fitted with 4 sharp stakes pointing up in the air."),
  F("Prenez un écrou M3, vissez-le sur un des piquets. Descendez-le en le vissant à fond jusqu'à ce qu'il vienne écraser le dessus de la plaque noire. Cela pince la vis et l'empêche de retomber. Faites-le pour les 4 piquets.","Take an M3 nut, thread it onto one of the stakes. Run it down by twisting it fully until it crushes against the top of the black plate. This pinches the screw and stops it from falling back down. Do it for all 4 stakes."),
  F("Maintenant, créez le 'pilotis' : vissez un deuxième écrou sur le même piquet. Mais cette fois, ne descendez pas jusqu'en bas ! Laissez environ 6 millimètres de filetage métallique nu dépasser au-dessus du deuxième écrou. C'est sur ce deuxième écrou que la carte va reposer. Mesurez à l'œil pour que les 4 deuxièmes écrous soient vissés très exactement à la même altitude.","Now, create the 'stilt': thread a second nut onto the same stake. But this time, don't run it all the way down! Leave about 6 millimetres of bare metal thread protruding above the second nut. The board will rest upon this second nut. Eyeball it so all 4 second nuts are threaded to the exact same altitude."),
  F("Saisissez solennellement votre bloc ESC câblé. Cherchez la flèche imprimée dessus et <strong>tournez l'ESC pour que cette flèche pointe rigoureusement vers l'arrière du drone (opposé à la caméra)</strong>. Abaissez l'ESC pour que les 4 bouts de vis piquants enfilent les 4 trous des coins de la carte. L'ESC s'arrête en tombant sur les 4 écrous-pilotis.","Solemnly grasp your wired ESC block. Seek out the arrow printed on it and <strong>spin the ESC so this arrow points rigorously to the rear of the drone (opposite the camera)</strong>. Lower the ESC so the 4 spiky screw tips thread the 4 corner holes of the board. The ESC stops by landing on the 4 stilt-nuts.")],
 tip:[F("Penchez la tête pour regarder sous l'ESC fraîchement surélevé. Vérifiez que la forêt de gros fils silicone venant des moteurs parvient à ramper doucement sous l'ESC sans être brutalement écrasée ou entaillée par le circuit imprimé. Si ça coince, tournez les 4 écrous pour remonter l'ESC plus haut.","Tilt your head to look under the newly elevated ESC. Check that the forest of thick silicone wires coming from the motors manages to crawl gently under the ESC without being brutally crushed or nicked by the circuit board. If it's binding, turn the 4 nuts to raise the ESC higher.")]},
{phase:F("Stack central","Central stack"),title:F("Monter le support + le Pixhawk","Mount the bracket + Pixhawk"),
 lede:F("Le roi de l'appareil (le contrôleur de vol Pixhawk, bloc rectangulaire en aluminium noir) vient trôner tout au sommet de cette tour centrale. Il va chevaucher l'ESC, reposant sur le petit pontet en plastique doté d'inserts M3 que vous aviez préparé.","The king of the aircraft (the Pixhawk flight controller, a black aluminium rectangular block) comes to reign at the very summit of this central tower. It will straddle the ESC, resting on the small plastic bridge fitted with M3 inserts you pre-prepped."),
 parts:[
  {qty:"x1",name:F("Pièce support Pixhawk imprimée (avec ses 4 inserts)","Printed Pixhawk mount part (with its 4 inserts)"),ref:""},
  {qty:"x1",name:F("Le bloc noir Pixhawk 6C Mini","The black Pixhawk 6C Mini block"),ref:""},
  {qty:"—",name:F("Mousse épaisse spongieuse double face","Thick spongy double-sided foam tape"),ref:"pour l'isolation antivibratoire / for anti-vibe isolation"}],
 instr:[
  F("Saisissez la petite plaque en plastique du support Pixhawk. Placez-la par-dessus l'ESC. Ses 4 pattes latérales percées viennent s'enfiler sur le bout des mêmes 4 longues vis qui dépassent encore de l'ESC. Verrouillez enfin l'architecture de toute cette tour en vissant 4 écrous M3 par-dessus les pattes en plastique. Serrez modérément.","Grab the small plastic plate of the Pixhawk mount. Place it over the ESC. Its 4 pierced lateral tabs slip over the tips of the very same 4 long screws still protruding above the ESC. Finally, lock the architecture of this entire tower by tightening 4 M3 nuts over the plastic tabs. Tighten moderately."),
  F("Découpez un beau carré de ruban mousse très moelleux à double face. Collez-le au centre exact du plateau en plastique. Retirez le film supérieur protecteur de la mousse.","Cut a handsome square of very squishy double-sided foam tape. Stick it in the exact centre of the plastic plateau. Peel the top protective film off the foam."),
  F("C'est l'instant qui décidera si votre drone s'envole droit ou part en toupie suicidaire. Prenez le bloc Pixhawk noir. Sur le dessus, une flèche blanche flanquée du mot FORWARD est gravée. <strong>Orientez cette flèche pour qu'elle pointe impérieusement vers le nez du drone (vers la caméra).</strong> Appuyez le dos plat du Pixhawk sur la mousse collante, en visant bien le centre, et pressez fermement.","This is the moment that decides if your drone flies straight or goes into a suicidal spin. Take the black Pixhawk block. On top, a white arrow flanked by the word FORWARD is engraved. <strong>Orient this arrow so it points imperiously toward the nose of the drone (towards the camera).</strong> Press the flat back of the Pixhawk onto the sticky foam, aiming dead centre, and squish firmly."),
  F("Reprenez votre petit niveau à bulle de chantier. Posez-le en long et en large sur le dos en aluminium du Pixhawk. Le bloc doit être horriblement horizontal. S'il penche comme la tour de Pise, vos capteurs d'assiette internes (les gyroscopes) seront trompés. Réglez la hauteur d'un coin en dévissant un écrou du 'pilotis' en dessous si besoin.","Take back your small construction spirit level. Place it lengthways and crossways on the aluminium back of the Pixhawk. The block must be hideously horizontal. If it leans like the Tower of Pisa, your internal attitude sensors (gyroscopes) will be fooled. Adjust a corner's height by unthreading a stilt-nut underneath if needed.")],
 warn:[F("L'erreur mortelle du débutant : Coller le contrôleur de vol avec la flèche pointée de travers ou vers l'arrière. La machine calculera à l'envers, compensera le roulis par du tangage de l'autre côté et explosera au sol en une fraction de seconde au décollage. Prenez 5 minutes pour scruter cette flèche.","The lethal rookie mistake: Sticking the flight controller with the arrow pointing sideways or backwards. The machine will calculate backwards, compensate roll with pitch on the wrong side, and explode into the ground in a fraction of a second upon take-off. Take 5 minutes to scrutinise this arrow.")]},
/* ===== ALIMENTATION ===== */
{phase:F("Alimentation","Power"),title:F("Brancher le Power Module PM02","Connect the PM02 Power Module"),
 lede:F("Une batterie de drone crache du 16 Volts bruts, pleins de parasites destructeurs générés par le freinage violent des moteurs. Le Pixhawk a besoin de 5 Volts d'une pureté cristalline pour ses capteurs. Le boîtier noir et rectangulaire enveloppé de plastique thermo-rétractable nommé 'PM02' joue le rôle de bouclier et d'analyseur de sang : il surveille la tension et abaisse le courant pour le Pixhawk.","A drone battery spits raw 16 Volts, full of destructive noise generated by the violent braking of the motors. The Pixhawk requires crystalline pure 5 Volts for its sensors. The black, rectangular block wrapped in heat-shrink plastic named 'PM02' acts as a shield and blood analyser: it monitors voltage and steps down the current for the Pixhawk."),
 parts:[{qty:"x1",name:F("Brique Power Module PM02","PM02 Power Module brick"),ref:F("livré enveloppé dans du plastique transparent","comes wrapped in clear plastic")}],
 instr:[
  F("Observez le PM02. Il possède de très gros câbles se finissant par un connecteur XT60 mâle d'un côté (généralement étiqueté IN), et un connecteur XT60 femelle de l'autre (OUT). Du centre du boîtier s'échappe un petit faisceau fragile de 6 fils très fins.","Observe the PM02. It has very thick cables terminating in a male XT60 connector on one side (usually labeled IN), and a female XT60 on the other (OUT). From the centre of the casing escapes a fragile little bundle of 6 hair-thin wires."),
  F("Saisissez l'extrémité de ces 6 fils fins (équipée d'un minuscule connecteur blanc). Dirigez-vous vers le Pixhawk central. Cherchez la prise encastrée marquée <strong>POWER</strong> sur l'avant du boîtier Pixhawk. Glissez délicatement la prise blanche, dans le bon sens, jusqu'au clic. C'est l'artère de vie du cerveau.","Grasp the end of these 6 thin wires (tipped with a minuscule white connector). Head over to the central Pixhawk. Search for the recessed socket marked <strong>POWER</strong> on the front of the Pixhawk casing. Delicately slide the white plug in, right side up, until the click. This is the brain's artery of life."),
  F("Prenez la grosse prise <strong>XT60 OUT</strong> du PM02 (celle qui doit alimenter le drone). Enclenchez-la violemment dans la prise XT60 correspondante que vous avez lourdement soudée tout à l'heure sur les pads à l'avant de l'ESC. La prise restante <strong>XT60 IN</strong> du PM02 restera dans le vide pour l'instant : c'est elle qui attendra qu'on lui branche la batterie le jour du vol.","Take the PM02's bulky <strong>XT60 OUT</strong> plug (the one that must power the drone). Jam it violently into the corresponding XT60 plug you heavily soldered earlier onto the ESC's front pads. The remaining <strong>XT60 IN</strong> plug of the PM02 will hang in the void for now: it's the one waiting for the battery to be plugged in on flight day.")]},
{phase:F("Alimentation","Power"),title:F("Alimenter la Pi (UBEC → broches 5V/GND)","Power the Pi (UBEC → 5V/GND pins)"),
 lede:F("L'ordinateur Raspberry Pi consomme beaucoup de courant, bien plus que ce que le Pixhawk pourrait lui fournir. Pour éviter l'évanouissement en plein vol, un deuxième régulateur abaisseur de tension blindé (l'UBEC ZTW) prend du jus depuis la source principale et le convertit en 5 Volts musclés, injectés directement dans les broches en fer de la carte Pi.","The Raspberry Pi computer consumes a lot of current, way more than the Pixhawk could ever supply it. To prevent mid-air blackouts, a second beefy step-down voltage regulator (the ZTW UBEC) siphons juice from the main source and converts it to muscular 5 Volts, injected straight into the iron pins of the Pi board."),
 parts:[{qty:"x1",name:F("Le boîtier métallique rouge/noir UBEC ZTW 10A","The red/black metal UBEC ZTW 10A casing"),ref:F("ses fils d'entrée ont déjà été soudés à l'ESC","its input wires were already soldered to the ESC")}],
 instr:[
  F("Avant toute chose, inspectez le bord du boîtier UBEC. Il possède un minuscule cavalier noir (un jumper) en plastique pontant deux petites broches métalliques. Retirez-le et replacez-le précisément sur les deux broches étiquetées <strong>5V</strong>. S'il est sur 12V, l'étape suivante incinérera littéralement l'ordinateur à 100 euros.","Before anything, inspect the edge of the UBEC casing. It features a minuscule black plastic jumper bridging two tiny metal pins. Pull it off and place it precisely over the two pins labeled <strong>5V</strong>. If it's on 12V, the next step will literally incinerate the 100-euro computer."),
  F("Tournez votre regard vers la forêt de longues broches métalliques nues situées sur un bord de la carte verte Raspberry Pi (ce sont les broches 'GPIO'). Il faut compter très prudemment les paires de broches en partant de l'extrémité la plus éloignée des ports USB.","Turn your gaze to the forest of long bare metal pins located on one edge of the green Raspberry Pi board (these are the 'GPIO' pins). You must count the pairs of pins very cautiously starting from the far end away from the USB ports."),
  F("Repérez les broches numéro 4 et numéro 6. Enfilez le connecteur noir attaché au fil <strong>Rouge sortant de l'UBEC sur la broche métallique n°4 (qui véhicule le 5V)</strong>. Enfilez ensuite le connecteur lié au fil <strong>Noir sortant de l'UBEC sur la broche n°6 adjacente (qui véhicule la masse, Ground)</strong>. Ils s'emboîtent par simple pression de haut en bas.","Spot pins number 4 and number 6. Slip the black connector attached to the <strong>Red wire exiting the UBEC onto metal pin n°4 (which carries the 5V)</strong>. Next, slip the connector tied to the <strong>Black wire exiting the UBEC onto the adjacent pin n°6 (which carries the ground)</strong>. They socket in by simple downward pressure.")],
 warn:[F("Vérification Paranoïaque : C'est le moment de sortir votre multimètre à nouveau. Mais il faut d'abord brancher une batterie ! (Branchez le Smoke Stopper au XT60 IN, puis la batterie LiPo). Réglez le multimètre sur Volts Continus (DCV). Glissez la pointe rouge dans le trou en haut du connecteur du fil rouge UBEC, pointe noire dans le noir. L'écran de l'appareil de mesure doit crier fièrement : <strong>5,0 Volts</strong> ou très proche. Si l'écran affiche 12,0 V ou un signe négatif, la mort électronique est proche. Débranchez la batterie, corrigez l'UBEC.","Paranoid Verification: It is time to whip out your multimeter again. But you must plug in a battery first! (Plug the Smoke Stopper to the XT60 IN, then the LiPo battery). Set the multimeter to Direct Current Volts (DCV). Slip the red probe tip into the top hole of the UBEC red wire connector, black probe in the black. The meter screen must shout proudly: <strong>5.0 Volts</strong> or very close. If the screen shows 12.0 V or a negative sign, electronic death is near. Unplug the battery, correct the UBEC.")]},
{phase:F("Alimentation","Power"),title:F("Fixer UBEC + PM à l'avant","Fix the UBEC + PM at the front"),
 lede:F("Ces deux petits boîtiers (le PM02 enveloppé de plastique et l'UBEC métallique) pendent lamentablement sur les côtés. Nous allons les emprisonner fermement sur la plaque centrale, dans le vide situé entre la tour ESC et le cou du support caméra.","These two small boxes (the plastic-wrapped PM02 and the metal UBEC) are dangling pathetically on the sides. We are going to imprison them tightly onto the central plate, in the void nestled between the ESC tower and the neck of the camera mount."),
 parts:[{qty:"—",name:F("Petits carrés de scotch mousse double face + Petits colliers de serrage en plastique (Rilsan)","Small squares of double-sided foam tape + Small plastic zip ties"),ref:""}],
 instr:[
  F("Appliquez un généreux carré de mousse adhésive sous le boîtier rectangulaire du PM02, et un autre sous le boîtier métallique de l'UBEC.","Apply a generous square of adhesive foam under the rectangular PM02 box, and another beneath the metallic UBEC casing."),
  F("Plaquez impitoyablement ces deux boîtiers côte à côte sur l'espace vide de la plaque noire à l'avant du drone. Si la mousse semble faible, faufilez un mince collier de serrage (zip tie) en plastique à travers les fentes de la plaque, entourez les boîtiers, tirez fort et coupez l'excédent au ras du fermoir. Rien ne doit ballotter en vol.","Smash these two casings mercilessly side-by-side onto the empty expanse of the black plate at the front of the drone. If the foam feels weak, weave a thin plastic zip tie through the plate's slots, encircle the casings, pull hard and snip the excess flush with the clasp. Nothing must flop around in flight."),
  F("Attrapez l'énorme connecteur jaune (le fameux XT60 IN du Power Module qui attend la batterie). Prenez tout ce bloc de fil lourd, dirigez-le vers le centre du drone, et forcez le connecteur jaune à descendre à travers le grand trou carré central béant de la plaque. Le connecteur va pendre bêtement sous le ventre du drone, entre les trains d'atterrissage. C'est parfait : c'est là, sous le plancher, que la grosse batterie viendra se loger à la fin. Laissez-le pendre bien librement, c'est votre prise de contact principal.","Grab the enormous yellow connector (the famous XT60 IN of the Power Module waiting for the battery). Take this whole heavy wire block, route it to the centre of the drone, and force the yellow connector to plunge down through the gaping large central square hole of the plate. The connector will dangle foolishly under the drone's belly, between the landing gear legs. It's perfect: that is where, under the floorboards, the massive battery will be nested at the end. Let it hang freely, it's your main contact plug.")]},
/* ===== BRANCHEMENTS ===== */
{phase:F("Branchements","Wiring"),title:F("Liaison UART Pi ↔ Pixhawk (TELEM 2)","UART link Pi ↔ Pixhawk (TELEM 2)"),
 lede:F("Le miracle de l'autonomie repose sur cette étape minuscule. L'ordinateur à l'arrière doit pouvoir murmurer ses ordres d'intelligence artificielle au pilote robotique au centre. Cette discussion passe par le port de télémétrie appelé TELEM 2, via une liaison série (UART) dont les fils doivent être judicieusement croisés pour que la bouche de l'un parle à l'oreille de l'autre.","The miracle of autonomy rests on this microscopic step. The rear computer must be able to whisper its artificial intelligence orders to the robotic pilot in the centre. This discussion flows through the telemetry port named TELEM 2, via a serial link (UART) whose wires must be shrewdly crossed so the mouth of one speaks to the ear of the other."),
 parts:[{qty:"x1",name:F("Un petit faisceau de fils fins : côté blanc (GH1.25) et de l'autre 3 fils unitaires noirs rectangulaires (Dupont femelles)","A small thin wire harness: white end (GH1.25) and the other end 3 single black rectangular sockets (female Duponts)"),ref:""}],
 instr:[
  F("Localisez sur la face supérieure du Pixhawk noir la prise encastrée gravée au laser <strong>TELEM 2</strong>. Branchez-y l'embout en plastique blanc regroupant les fils. Un clic signale son ancrage.","Locate on the top face of the black Pixhawk the recessed socket laser-engraved <strong>TELEM 2</strong>. Plug the white plastic end bundling the wires into it. A click signals its anchoring."),
  F("Ce faisceau compte normalement 6 fils sortants, mais nous n'en aurons besoin que de 3 précis. Repérez les fils selon la position de leur broche dans le connecteur blanc Pixhawk. Le fil le plus à droite (Pin 6) est la Terre (GND). Le fil de la Pin 2 (en partant de la gauche) est l'émetteur de données du Pixhawk (TX). Le fil de la Pin 3 est le récepteur (RX). Vous pouvez couper à ras et isoler avec de la gaine ou du scotch les 3 autres fils inutiles (Pins 1, 4 et 5).","This harness typically features 6 exiting wires, but we will only need 3 precise ones. Identify the wires according to their pin position in the white Pixhawk connector. The far-right wire (Pin 6) is the Ground (GND). The Pin 2 wire (counting from the left) is the Pixhawk's data transmitter (TX). The Pin 3 wire is the receiver (RX). You can snip flush and insulate with tape or shrink wrap the 3 other useless wires (Pins 1, 4, and 5)."),
  F("Dirigez les trois fils vitaux (GND, TX, RX) vers la grande forêt métallique de la Raspberry Pi. Et maintenant, suivez cette table de routage croisée pour enfiler fermement les petits cubes noirs femelles sur les broches en fer pointues de la Pi :<table class='map'><tr><th>Sortant du port TELEM 2 (Pixhawk)</th><th>→ Se glisse sur la broche GPIO de la Pi</th></tr><tr><td>Le fil de la Pin 6 (Masse électrique - GND)</td><td>S'enfonce sur la broche n°6 (celle qui a déjà le fil noir de l'UBEC ! Utilisez la voisine n°9 ou n°14 qui sont aussi des broches de masse GND, vérifiez un schéma pinout Raspberry)</td></tr><tr><td>Le fil de la Pin 2 (Bouche qui parle - TX)</td><td>S'enfonce sur la broche n°10 de la Pi (Oreille qui écoute - RX)</td></tr><tr><td>Le fil de la Pin 3 (Oreille qui écoute - RX)</td><td>S'enfonce sur la broche n°8 de la Pi (Bouche qui parle - TX)</td></tr></table>","Route the three vital wires (GND, TX, RX) toward the grand metallic forest of the Raspberry Pi. And now, follow this crossed routing table to firmly slide the small black female cubes onto the pointy iron pins of the Pi:<table class='map'><tr><th>Exiting TELEM 2 port (Pixhawk)</th><th>→ Slides onto Pi GPIO pin</th></tr><tr><td>Pin 6 wire (Electrical Ground - GND)</td><td>Pushes onto pin n°6 (which already has the black UBEC wire! Use neighbor n°9 or n°14 which are also GND pins, check a Raspberry pinout diagram)</td></tr><tr><td>Pin 2 wire (Talking Mouth - TX)</td><td>Pushes onto Pi pin n°10 (Listening Ear - RX)</td></tr><tr><td>Pin 3 wire (Listening Ear - RX)</td><td>Pushes onto Pi pin n°8 (Talking Mouth - TX)</td></tr></table>")],
 warn:[F("Ne connectez <strong>absolument jamais</strong> le fil provenant de la Pin 1 du TELEM 2 (qui crache 5 Volts puissants) sur la forêt de broches de la Pi ! L'ordinateur reçoit déjà un courant pur provenant de l'UBEC métallique de l'étape précédente. Imposer deux alimentations électriques concurrentes sur la même carte la transformera en charbon brûlant.","<strong>Absolutely never</strong> connect the wire stemming from TELEM 2's Pin 1 (which spews a potent 5 Volts) onto the Pi's pin forest! The computer already receives pure current streaming from the metallic UBEC of the previous step. Forcing two competing power feeds onto the same board will turn it into burning coal.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher l'ESC au Pixhawk","Connect the ESC to the Pixhawk"),
 lede:F("Le Pixhawk va dicter au contrôleur ESC à quelle vitesse doit tourner chaque moteur pour maintenir le drone à plat dans la tempête. Mais les câbles de sortie de la grande carte ESC carrée ne sont pas rangés dans le même ordre que ceux du Pixhawk. Une chirurgie de tri s'impose.","The Pixhawk will dictate to the ESC controller how fast each motor must spin to keep the drone flat in a gale. But the exit cables from the large square ESC board are not lined up in the same order as those of the Pixhawk. A triage surgery is required."),
 instr:[
  F("Récupérez le long câble plat qui était dans la boîte de l'ESC. Il possède un bloc connecteur rectangulaire blanc à chaque bout et 8 petits fils de couleurs vives pris en sandwich. Branchez l'un de ces blocs blancs dans la fente latérale de la grande carte ESC posée au centre.","Retrieve the long flat cable that was in the ESC's box. It has a white rectangular connector block at each end and 8 thin brightly coloured wires sandwiched within. Plug one of these white blocks into the side slot of the large ESC board sitting in the centre."),
  F("Prenez l'autre bout de ce câble flottant. Saisissez fermement une lame de cutter ou de petits ciseaux, et tranchez net le bout du connecteur en plastique blanc ! L'objectif est de libérer et séparer physiquement chaque petit fil coloré sur les deux derniers centimètres. Dénudez un ou deux millimètres au bout de chaque fil libre, étamez-les et glissez-les dans de petites prises noires rectangulaires (Dupont femelles) ou ressoudez-les à un faisceau de câbles standard d'un Pixhawk.","Take the other floating end of this cable. Firmly grasp a craft knife blade or small scissors, and slice the white plastic connector end clean off! The goal is to physically free and separate each small coloured wire for the last two centimetres. Strip a millimetre or two at the end of each free wire, tin them and slip them into small rectangular black sockets (female Duponts) or resolder them to a standard Pixhawk wire harness."),
  F("Prenez la documentation papier ou PDF livrée avec la carte SpeedyBee ESC pour identifier la fonction exacte de chaque fil coloré de la nappe. Étiquetez-les avec un bout de scotch. Identifiez les quatre fils portant le signal des moteurs (M1, M2, M3, M4), et un fil pour la Masse (GND).","Grab the paper or PDF manual shipped with the SpeedyBee ESC board to identify the exact function of each coloured wire in the ribbon. Tag them with a bit of tape. Identify the four wires carrying the motor signals (M1, M2, M3, M4), and one wire for Ground (GND)."),
  F("Sur l'arrière haut du bloc métallique Pixhawk, observez une grande rangée de broches dorées exposées. Ces colonnes sont appelées <span class='tag'>MAIN OUT</span>. Elles sont numérotées de 1 à 8 (verticalement). Sur la colonne verticale, les broches du bas sont le signal (noté 'S'), la ligne du milieu est le courant (VCC ou '+'), la ligne du haut est la masse (GND ou '-').","On the top rear of the metallic Pixhawk block, observe a grand array of exposed golden pins. These columns are called <span class='tag'>MAIN OUT</span>. They are numbered 1 through 8 (vertically). On the vertical column, the bottom pins are the signal (marked 'S'), the middle row is current (VCC or '+'), the top row is ground (GND or '-')."),
  F("Enfilez la cosse noire du fil moteur M1 sur la broche 'S' (en bas) de la colonne MAIN OUT n°1. Enfilez le fil M2 sur le 'S' de la colonne n°2. Le M3 sur le 'S' de la colonne 3. Le M4 sur le 'S' de la colonne 4. Enfin, prenez le petit fil Masse (GND) identifié tout à l'heure, et enfoncez-le sur n'importe quelle broche dorée libre de la ligne supérieure ('-').","Thread the black socket of motor wire M1 onto the 'S' pin (bottom) of MAIN OUT column n°1. Thread wire M2 onto the 'S' of column n°2. M3 onto the 'S' of column 3. M4 onto the 'S' of column 4. Finally, take the small Ground (GND) wire identified earlier, and shove it onto any free golden pin of the top row ('-')."),
  F("Ne raccordez rien d'autre sur le Pixhawk. Les fils de la nappe ESC censés transporter l'alimentation Batterie (+) ou le courant (C) ou la télémétrie ESC (T) doivent être isolés avec un ruban noir adhésif et repliés. Le Pixhawk pompe déjà sa vie par le gros câble du Power Module branché précédemment.","Do not hook up anything else to the Pixhawk. The ESC ribbon wires meant to transport Battery power (+) or current sensing (C) or ESC telemetry (T) must be insulated with black adhesive tape and folded back. The Pixhawk is already pumping its life through the thick Power Module cable plugged previously.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le GPS","Connect the GPS"),
 lede:F("Le GPS en forme de champignon plat, avec la boussole magnétique intégrée sous son capot, fournira à l'engin sa position absolue sur le globe.","The flat mushroom-shaped GPS, packing the integrated magnetic compass under its hood, will provide the craft its absolute position on the globe."),
 instr:[F("Sortez le bloc antenne GPS de son sachet. Il est pourvu d'un très long câble souple terminé par une broche blanche fine et large (GH1.25 à 6 trous). Sur les flancs de la tour Pixhawk, cherchez l'interstice gravé <strong>GPS 1</strong>. Enfoncez la prise blanche verticalement. Mettez le grand module antenne plat de côté pour le moment (il pendra misérablement) : nous le visserons tout à la fin, perché sur son mât en hauteur pour fuir les ondes néfastes émises par l'ordinateur en contrebas.","Pull the GPS antenna block from its bag. It's equipped with a very long supple cable ending in a thin, wide white plug (6-hole GH1.25). On the flanks of the Pixhawk tower, search for the recess engraved <strong>GPS 1</strong>. Jam the white plug in vertically. Set the large flat antenna module aside for the moment (it will dangle wretchedly): we will screw it down at the very end, perched high on its mast to flee the nefarious waves emitted by the computer below.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le récepteur ELRS","Connect the ELRS receiver"),
 lede:F("Cette minuscule puce de la taille d'un ongle dotée d'une tige noire courte (l'antenne) est le récepteur radio ELRS. C'est l'ultime fil de vie qui reliera vos pouces à l'engin si l'ordinateur de bord s'égare. Par une bizarrerie informatique majeure, il faudra modifier son langage natal, de 'CRSF' vers un sabir compréhensible par le Pixhawk appelé 'SBUS'.","This minuscule fingernail-sized chip sporting a short black stick (the antenna) is the ELRS radio receiver. It is the ultimate lifeline connecting your thumbs to the craft should the onboard computer stray. By a major computing quirk, you must modify its native tongue, from 'CRSF' to a gibberish the Pixhawk grasps called 'SBUS'."),
 instr:[
  F("Ce composant lilliputien a 4 tout petits trous de soudure alignés (GND, 5V, TX, RX). Soudez délicatement trois fins fils électriques sur GND, 5V, et TX. Laissez RX vide. À l'autre bout de ces fils, sertissez ou soudez de petits connecteurs noirs.","This lilliputian component features 4 tiny aligned solder holes (GND, 5V, TX, RX). Delicately solder three fine electrical wires onto GND, 5V, and TX. Leave RX empty. At the other end of these wires, crimp or solder small black sockets."),
  F("Dirigez ces trois fils vers le dos du Pixhawk. Branchez-les sur l'entrée réservée aux télécommandes, gravée <strong>RC IN</strong> (juste à côté des broches MAIN OUT utilisées précédemment pour les moteurs). Insérez les fiches en suivant la logique de couleur gravée près des broches : le fil de Masse sur la broche '-'. Le fil 5V sur le '+'. <strong>Le fil transportant le signal radio, branché sur le plot TX de l'ELRS, doit obligatoirement venir s'empaler sur la broche marquée 'S' (Signal) du groupe RC IN.</strong>","Route these three wires to the back of the Pixhawk. Plug them onto the input reserved for remote controls, engraved <strong>RC IN</strong> (right beside the MAIN OUT pins used previously for the motors). Insert the plugs following the colour logic engraved near the pins: the Ground wire on the '-' pin. The 5V wire on the '+'. <strong>The wire carrying the radio signal, tapped to the TX pad of the ELRS, must obligatorily impale itself on the pin marked 'S' (Signal) of the RC IN cluster.</strong>"),
  F("La manipulation logicielle vitale : Mettez la carte Pixhawk sous tension en branchant brièvement un câble USB du PC vers le drone. La petite LED sur la puce ELRS va s'allumer. Ne faites rien, attendez silencieusement environ 1 minute. La LED de l'ELRS va se mettre à clignoter frénétiquement à toute vitesse. Cela signifie qu'elle a créé un réseau Wi-Fi !","The vital software manipulation: Power up the Pixhawk board by briefly plugging a USB cable from the PC to the drone. The tiny LED on the ELRS chip will light up. Do nothing, wait silently for about 1 minute. The ELRS LED will start frantically blinking at breakneck speed. This means it has spun up a Wi-Fi network!"),
  F("Sautez sur votre ordinateur de bureau, cherchez les réseaux Wi-Fi disponibles, et connectez-vous au réseau nommé <span class='tag'>ExpressLRS RX</span> (mot de passe 'expresslrs' si demandé). Ouvrez votre navigateur internet et tapez <span class='tag'>10.0.0.1</span>. Une page web austère apparaît. Cliquez sur l'onglet <strong>Hardware</strong>. Scrollez dans le charabia jusqu'à trouver une ligne contenant la mention de la fameuse broche <strong>TX</strong>. Juste à côté, un menu déroulant. Cliquez dessus, jetez l'option 'Serial TX' par défaut, et forcez-le en sélectionnant <strong>SBUS</strong>. Appuyez sur le gros bouton Save. Le récepteur parlera désormais la bonne langue.","Jump on your desktop computer, search for available Wi-Fi networks, and connect to the network named <span class='tag'>ExpressLRS RX</span> (password 'expresslrs' if asked). Open your web browser and type <span class='tag'>10.0.0.1</span>. An austere webpage appears. Click the <strong>Hardware</strong> tab. Scroll through the gibberish until you spot a line mentioning the famed <strong>TX</strong> pin. Right next to it, a dropdown menu. Click it, toss the default 'Serial TX' option, and force it by selecting <strong>SBUS</strong>. Hit the giant Save button. The receiver will now speak the right language.")],
 tip:[F("Ne cherchez pas à cacher ou à coller définitivement cette petite puce noire tout de suite. Laissez-la pendouiller tristement hors de la plaque. Elle sera sanglée avec un collier sur la carrosserie arrière du vaisseau tout à la fin, de manière à ce que l'antenne capte sans subir les interférences du métal de la carte mère de la Pi.","Don't try to hide or definitively glue this small black chip just yet. Let it dangle sadly off the plate. It will be strapped with a zip tie to the rear bodywork of the vessel at the very end, in a way that lets the antenna catch signal without suffering interference from the metal of the Pi motherboard.")]},
/* ===== TEST CRITIQUE ===== */
{phase:F("Test · critique","Test · critical"),title:F("Smoke Stopper — première mise sous tension","Smoke Stopper — first power-up"),
 lede:F("L'étape de la sueur froide. Après toutes ces manipulations de câbles dénudés et de blocs d'aluminium conducteurs, la probabilité d'une erreur d'étourderie catastrophique est élevée. Il est temps de brancher la monstrueuse batterie LiPo pour la première fois. Agissez avec une extrême prudence et utilisez le fusible intelligent (Smoke Stopper) sans exception.","The cold sweat stage. After all this handling of stripped wires and conductive aluminium blocks, the probability of a catastrophic absent-minded error is high. It is time to plug in the monstrous LiPo battery for the first time. Act with extreme caution and use the smart fuse (Smoke Stopper) without exception."),
 parts:[
  {qty:"x1",name:F("Fusible réarmable 'Smoke Stopper' avec connecteurs XT60","Resettable 'Smoke Stopper' fuse with XT60 connectors"),ref:""},
  {qty:"x1",name:F("Voltmètre / Multimètre (en mode continuité acoustique)","Voltmeter / Multimeter (in acoustic continuity mode)"),ref:""},
  {qty:"x1",name:F("La colossale Batterie LiPo 4S","The colossal 4S LiPo battery"),ref:""}],
 instr:[
  F("Prenez les pointes noire et rouge du multimètre (réglé sur le symbole WiFi ou la note de musique de continuité). Plongez fermement une pointe dans le tunnel (+) du gros connecteur jaune XT60 pendant sous le drone. Plongez l'autre pointe dans le tunnel (-). Vous devez entendre le vide absolu, pas le moindre couinement de l'appareil.","Grab the black and red probes of the multimeter (set to the WiFi symbol or musical note for continuity). Plunge one probe firmly into the (+) tunnel of the large yellow XT60 connector dangling under the drone. Plunge the other probe into the (-) tunnel. You must hear absolute silence, not the slightest squeak from the meter."),
  F("Prenez le module magique : le Smoke Stopper. Il agit comme un gilet pare-balles électrique. Branchez son extrémité femelle dans la prise jaune pendante du drone.","Grab the magic module: the Smoke Stopper. It acts as an electrical bulletproof vest. Plug its female end into the drone's dangling yellow socket."),
  F("Le cœur battant, attrapez le câble de l'énorme batterie 4S posée au loin. Connectez-le brutalement dans la prise mâle d'entrée du Smoke Stopper. Le petit boîtier du Smoke Stopper doit immédiatement briller d'une lumière de <strong>LED verte solide, paisible et continue</strong>. La carte Pixhawk enclenchera un jingle joyeux de boot. Le ventilateur de la Raspberry Pi se mettra à hurler pendant 2 secondes. Tout va bien.","Heart pounding, snatch the cable of the massive 4S battery resting far away. Connect it brutally into the Smoke Stopper's male input plug. The small Smoke Stopper box must immediately glow with a <strong>solid, peaceful, continuous green LED</strong> light. The Pixhawk board will chime a joyous boot jingle. The Raspberry Pi fan will scream for 2 seconds. All is well."),
  F("Au bout d'une minute, déconnectez la batterie franchement en tirant sur le corps des prises en plastique, jamais par les fils.","After a minute, disconnect the battery boldly by pulling on the plastic bodies of the plugs, never by the wires.")],
 warn:[F("<strong>Si le boîtier claque, que la LED s'allume d'un rouge sang menaçant, ou s'éteint totalement, arrachez violemment le câble de la batterie en une fraction de seconde !</strong> Un pont d'étain invisible crée un court-circuit franc quelque part sur les plaques. Si vous aviez branché en direct, une boule de plasma à 1000 degrés aurait pulvérisé la soudure et ruiné les composants à l'instant T. Dégainez une loupe, et retournez examiner l'énorme carte ESC et les bornes de l'UBEC.","<strong>If the box clicks, the LED blazes a menacing blood red, or goes totally dark, violently yank the battery cable out in a fraction of a second!</strong> An invisible solder bridge is creating a dead short somewhere on the boards. Had you plugged it straight in, a 1000-degree plasma ball would have vaporized the joint and ruined the components at T-zero. Draw a magnifying glass, and go back to examine the huge ESC board and the UBEC terminals.")]},
/* ===== CONFIG QGC ===== */
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Flasher PX4 + Airframe","Flash PX4 + Airframe"),
 lede:F("Le drone possède un cœur et des nerfs mais son cerveau n'a pas appris à voler. L'ordinateur Windows sur votre bureau va injecter la cervelle algorithmique (PX4) dans les puces du Pixhawk via un câble USB. C'est l'intelligence artificielle des vents et de la gravité.","The drone possesses a heart and nerves but its brain hasn't learned to fly. The Windows computer on your desk will inject the algorithmic brains (PX4) into the Pixhawk's chips via a USB cable. It is the artificial intelligence of winds and gravity."),
 instr:[
  F("Procurez-vous un câble USB vers USB-C blindé pour transfert de données. Reliez le flanc du module noir Pixhawk à un port de votre grand ordinateur. Ouvrez le gigantesque logiciel <strong>QGroundControl (QGC)</strong> que vous aurez préalablement installé.","Procure a shielded USB to USB-C data transfer cable. Link the flank of the black Pixhawk module to a port on your large computer. Open the gargantuan <strong>QGroundControl (QGC)</strong> software you previously installed."),
  F("Dans l'interface sombre du logiciel, cliquez tout en haut à gauche sur l'icône de la lettre <strong>Q</strong>. Un menu s'effondre. Cliquez sur l'onglet <strong>Vehicle Setup (Configuration du Véhicule)</strong>, et sélectionnez le menu sous-jacent <strong>Firmware</strong>.","In the software's dark interface, click the <strong>Q</strong> letter icon at the very top-left. A menu collapses down. Click the <strong>Vehicle Setup</strong> tab, and select the underlying <strong>Firmware</strong> menu."),
  F("Suivez les ordres en rouge à l'écran : débranchez vivement le câble USB, attendez trois secondes, et rebranchez-le avec un bruit sec. Une colonne latérale apparaît et vous force à faire un choix technologique.","Follow the red orders on screen: briskly unplug the USB cable, wait three seconds, and plug it back in with a sharp thud. A side column appears and forces a technological choice upon you."),
  F("Dans les boutons radio, sélectionnez l'écosystème <strong>PX4 Pro Stable</strong>. Ne touchez plus à la souris, pressez OK, et regardez les barres de progression effacer l'ancien esprit de la carte pour y implanter le nouveau.","In the radio buttons, select the <strong>PX4 Pro Stable</strong> ecosystem. Do not touch the mouse anymore, hit OK, and watch the progress bars wipe the board's old mind to implant the new one."),
  F("L'installation achevée, le système reboot avec des bips. Restez dans Vehicle Setup et cherchez un autre onglet en bas à gauche appelé <strong>Airframe (Cellule)</strong>. Une liste visuelle d'appareils volants s'étale. Plongez dans la catégorie Quadrotor. Choisissez le modèle banal <strong>Generic Quadrotor X</strong>. Allez piocher le grand bouton d'action bleu en haut à droite de l'écran <strong>Apply and Restart (Appliquer et redémarrer)</strong>. Le Pixhawk sait désormais qu'il pilote un drone à 4 bras croisés.","The installation completed, the system reboots with beeps. Stay in Vehicle Setup and hunt for another tab bottom-left called <strong>Airframe</strong>. A visual list of flying machines sprawls out. Dive into the Quadrotor category. Choose the mundane <strong>Generic Quadrotor X</strong> model. Go grab the large blue action button at the top right of the screen <strong>Apply and Restart</strong>. The Pixhawk now knows it's flying a 4-crossed-arm drone.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Géométrie des moteurs (deadcat)","Motor geometry (deadcat)"),
 lede:F("Le Neutron IT n'est pas un X parfaitement symétrique. Ses bras avant sont un peu plus courts ou écartés différemment des bras arrière (façon 'Deadcat') pour dégager l'horizon visuel de la caméra qui trône au nez. Si vous ne confessez pas cette difformité au Pixhawk, il propulsera le drone avec des calculs erronés, entraînant une oscillation hideuse.","The Neutron IT is not a perfectly symmetrical X. Its front arms are slightly shorter or spread differently than the rear arms ('Deadcat' style) to clear the visual horizon of the camera reigning at the nose. If you do not confess this deformity to the Pixhawk, it will propel the drone with flawed math, leading to a hideous oscillation."),
 instr:[
  F("Toujours branché, fouillez dans les menus de <strong>Airframe</strong> ou de <strong>Vehicle Setup → Geometry</strong>. Cherchez la case obscure pour activer la géométrie asymétrique ou la saisie personnalisée des distances (Custom Geometry).","Still plugged in, rummage through the <strong>Airframe</strong> or <strong>Vehicle Setup → Geometry</strong> menus. Hunt for the obscure tick box to enable asymmetrical geometry or custom distance inputs (Custom Geometry)."),
  F("Armez-vous d'une règle physique. Mesurez avec précision l'éloignement en ligne droite depuis le centre parfait du boîtier Pixhawk jusqu'à l'axe de rotation central des cloches des moteurs <strong>avant</strong>. Remplissez les champs de l'ordinateur pour les bras correspondants (M1 et M3) avec la valeur estimée (par exemple, tapez précisément <span class='tag'>0.243 m</span> ou 24,3 cm selon l'unité réclamée).","Arm yourself with a physical ruler. Precisely measure the straight-line distance from the dead centre of the Pixhawk box to the central rotation axis of the <strong>front</strong> motor bells. Fill the computer fields for the corresponding arms (M1 and M3) with the estimated value (for example, type exactly <span class='tag'>0.243 m</span> or 24.3 cm depending on the demanded unit)."),
  F("Prenez la mesure pour les moteurs catapultés vers l'<strong>arrière</strong> du châssis. Reportez la mesure un peu plus longue dans les cases logicielles dévolues aux M2 et M4 (valeur de travail autour de <span class='tag'>0.263 m</span>). Validez religieusement.","Take the measurement for the motors catapulted toward the <strong>rear</strong> of the frame. Transcribe the slightly longer measurement into the software boxes dedicated to M2 and M4 (working value around <span class='tag'>0.263 m</span>). Relentlessly validate.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Binder le récepteur ELRS","Bind the ELRS receiver"),
 lede:F("Le récepteur noir abandonné sur la plaque est sourd. La télécommande à deux gros manches (RadioMaster) est muette. Ils doivent échanger un secret cryptographique (Binding Phrase) pour entamer la discussion.","The abandoned black receiver on the plate is deaf. The radio remote with two fat gimbals (RadioMaster) is mute. They must exchange a cryptographic secret (Binding Phrase) to open negotiations."),
 instr:[
  F("Redonnez vie au petit réseau Wi-Fi de la puce ELRS en branchant le Pixhawk. Attendez le clignotement hystérique. Connectez le PC au réseau <span class='tag'>ExpressLRS RX</span>, frappez <span class='tag'>10.0.0.1</span> dans le navigateur.","Bring the ELRS chip's small Wi-Fi network back to life by plugging in the Pixhawk. Wait for the hysterical blinking. Connect the PC to the <span class='tag'>ExpressLRS RX</span> network, strike <span class='tag'>10.0.0.1</span> into the browser."),
  F("Sur la page web du récepteur, repérez le grand champ texte clair appelé <strong>Binding Phrase</strong>. Tapez un mot de passe ou une phrase unique que vous n'oublierez jamais. Appuyez sur le bouton agressif <strong>Save &amp; Reboot</strong>.","On the receiver's webpage, spot the large clear text field called <strong>Binding Phrase</strong>. Type a password or a unique phrase you will never forget. Hit the aggressive <strong>Save &amp; Reboot</strong> button."),
  F("Lâchez la souris et attrapez la massive radiocommande noire à deux antennes. Allumez-la. Plongez dans ses petits menus internes sur l'écran monochrome LCD : tapotez sur <strong>Menu principal → Model Setup → naviguer tout en bas vers Internal RF → module ELRS</strong>. Fouillez pour dénicher le réglage 'Binding Phrase'. Frappez à l'aide des minuscules touches <strong>scrupuleusement la même suite de caractères exacts, majuscules incluses</strong>. Sortez du menu. Regardez la puce noire du drone : la LED est passée au vert solide indéfectible. Le sang circule.","Drop the mouse and grab the massive black dual-antenna radio controller. Turn it on. Plunge into its tiny internal menus on the monochrome LCD screen: tap through <strong>Main Menu → Model Setup → navigate all the way down to Internal RF → ELRS module</strong>. Rummage to unearth the 'Binding Phrase' setting. Strike using the tiny keys <strong>scrupulously the exact same string of characters, capitals included</strong>. Exit the menu. Look at the drone's black chip: the LED has turned to an unfailing solid green. The blood is pumping.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer la radio","Calibrate the radio"),
 lede:F("Le Pixhawk entend la radiocommande, mais il ignore à quoi ressemblent les mouvements des joysticks. Il faut lui borner les limites extrêmes de vos mouvements de poignets en agitant furieusement toutes les manettes.","The Pixhawk hears the radio remote, but it has no idea what joystick movements look like. You must peg the extreme boundaries of your wrist flicks by furiously thrashing all the sticks."),
 instr:[
  F("Retournez dans le logiciel QGC sur le PC, onglet <strong>Vehicle Setup</strong>, puis trouvez l'entrée en menu <strong>Radio</strong>. Une grande fenêtre bardée de barres de niveaux vertes horizontales s'affiche. Touchez les manches de votre radio pour vérifier la réponse nerveuse des barres à l'écran.","Return to the QGC software on the PC, <strong>Vehicle Setup</strong> tab, then find the <strong>Radio</strong> menu entry. A large window bristling with horizontal green level bars displays. Jiggle your radio gimbals to verify the twitchy response of the bars on screen."),
  F("Appuyez sur le gros bouton <strong>Calibrate</strong> à l'écran. Une cible et des cercles clignotent sur l'ordinateur. Le logiciel vous crie en rouge de pousser et tirer physiquement les deux manches croisés de votre radio dans absolument tous les coins de la course géométrique, puis de basculer tous les interrupteurs métalliques (switches) du haut, un par un, vers le haut, vers le milieu, puis vers le bas. Poussez fort jusqu'en butée lors de cet exercice mécanique.","Hit the large <strong>Calibrate</strong> button on screen. A target and circles flash on the computer. The software shouts at you in red to physically push and pull the two crossed gimbals of your radio into absolutely every corner of the geometric travel, then to flick all the metallic switches at the top, one by one, upwards, to the middle, then downwards. Push hard to the physical stops during this mechanical drill.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer les capteurs","Calibrate the sensors"),
 lede:F("Une séquence de gymnastique intense pour la machine. Elle a besoin de savoir où est le 'bas' (la gravité) et où est le nord magnétique. Vous devez danser avec elle dans l'espace vide.","An intense sequence of gymnastics for the machine. It needs to know where 'down' is (gravity) and where magnetic North lies. You must dance with it in empty space."),
 instr:[
  F("Naviguez vers <strong>Vehicle Setup → Sensors (Capteurs)</strong>. Lancez le capteur <strong>Gyroscope</strong> en premier : posez simplement la bête bien à plat et fuyez. Ne respirez même pas à proximité pendant la barre de progression.","Navigate to <strong>Vehicle Setup → Sensors</strong>. Launch the <strong>Gyroscope</strong> sensor first: simply set the beast dead flat and flee. Don't even breathe nearby during the progress bar."),
  F("Lancez <strong>Accéléromètre</strong>. QGC va montrer des animations de drone cubiques en train de se retourner. Saisissez fermement votre drone de carbone à deux mains et mimez l'écran. Posez-le parfaitement à plat, puis dressez-le à la verticale sur son nez pointant la table, puis sur sa queue, puis adossé sur son flanc droit, puis flanc gauche, puis enfin la tête en bas. Maintenez chaque pose inconfortable comme une statue jusqu'au bip du PC.","Launch <strong>Accelerometer</strong>. QGC will show cubic drone animations flipping over. Grasp your carbon drone firmly with both hands and mime the screen. Lay it perfectly flat, then stand it vertically on its nose pointing at the table, then on its tail, then leaning on its right flank, then left flank, then finally upside down. Hold each uncomfortable pose like a statue until the PC beeps."),
  F("Passez au <strong>Compas / Boussole</strong>. Allez au milieu d'une pièce vidée de tout appareil métallique, loin des radiateurs et écrans d'ordinateur. Cliquez sur Démarrer, et commencez à tournoyer frénétiquement en manipulant le drone pour balayer virtuellement tous les angles sphériques possibles autour de son centre jusqu'à ce que la barre soit verte.","Move to the <strong>Compass</strong>. Go to the middle of a room emptied of any metal device, far from radiators and computer screens. Click Start, and begin twirling frantically manipulating the drone to virtually paint every possible spherical angle around its centre until the bar turns green."),
  F("Enfin, reposez-le sur la table pour le rituel du <strong>Level Horizon</strong>. Le drone doit être sur la table la plus plate de la maison, au niveau à bulle. Cliquez sur l'écran et scellez cette position comme étant l'horizontal absolu du monde pour le drone.","Finally, set it back on the table for the <strong>Level Horizon</strong> ritual. The drone must be on the flattest table in the house, checked with a spirit level. Click on the screen and seal this position as the absolute horizontal of the world for the drone.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer la batterie","Configure the battery"),
 lede:F("Le drone peut voler brillamment, et la seconde d'après s'effondrer au sol comme une pierre si la tension des accumulateurs chute au-delà d'un point critique sans que l'alarme du Pixhawk n'ait sonné. La batterie est sa réserve d'oxygène.","The drone can fly brilliantly, and the very next second collapse to the ground like a stone if the cell voltage drops past a critical point without the Pixhawk alarm having sounded. The battery is its oxygen tank."),
 instr:[
  F("Dans QGC, naviguez jusqu'au bunker <strong>Vehicle Setup → Power</strong>. Un menu rempli de voltages s'affiche.","In QGC, navigate to the <strong>Vehicle Setup → Power</strong> bunker. A menu full of voltages displays."),
  F("Lisez l'étiquette de votre énorme batterie noire : elle indique 4S (ce qui signifie 4 cellules liées). Modifiez la case 'Number of Cells' et inscrivez brutalement le chiffre <strong>4</strong>. Sur la ligne en dessous, dictez la règle de la charge maximale 'Full voltage' en tapant <span class='tag'>4,2 V</span> par cellule. Juste à côté, tapez la loi mortelle 'Empty' en fixant le seuil à <span class='tag'>3,7 V</span>.","Read the label of your massive black battery: it states 4S (which means 4 linked cells). Modify the 'Number of Cells' box and brutally type the digit <strong>4</strong>. On the line below, dictate the rule of maximum charge 'Full voltage' by typing <span class='tag'>4.2 V</span> per cell. Right next to it, type the fatal 'Empty' law by setting the threshold to <span class='tag'>3.7 V</span>."),
  F("Plus bas dans ce menu obscur, trouvez le multiplicateur électrique ('Voltage Divider') appartenant au capteur PM02 installé plus tôt. La valeur constructeur à taper à l'aveugle est <span class='tag'>18.182</span> (utilisez un point). Plus tard, un clic sur 'Calculate' vous permettra de corriger cette marge en comparant avec un vrai multimètre branché sur la batterie sur le terrain.","Lower in this obscure menu, find the electrical multiplier ('Voltage Divider') belonging to the PM02 sensor installed earlier. The factory value to type blindly is <span class='tag'>18.182</span> (use a dot). Later, a click on 'Calculate' will let you correct this margin by comparing with a real multimeter plugged into the battery in the field.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer les modes de vol","Configure flight modes"),
 lede:F("En vol manuel, vos doigts sur les interrupteurs métalliques décident de l'aide fournie par le Pixhawk. 'Stabilized' (vous gérez l'altitude à la force du pouce), 'Position' (le GPS gèle la machine en plein ciel si vous lâchez les manettes), 'Offboard' (L'ordinateur IA de bord écrase vos ordres), et 'Return' (la machine remonte et rentre à la maison terrifiée).","In manual flight, your fingers on the metallic switches decide the help provided by the Pixhawk. 'Stabilized' (you manage altitude with thumb strength), 'Position' (the GPS freezes the machine mid-sky if you drop the sticks), 'Offboard' (The onboard AI computer overrides your commands), and 'Return' (the machine climbs and comes home terrified)."),
 instr:[
  F("Rendez-vous dans <strong>Vehicle Setup → Flight Modes</strong>. QGC écoute les canaux radio. Basculez d'un coup de doigt votre interrupteur de télécommande favori à 3 crans en haut à gauche. La barre d'un des 'Channels' va bouger à l'écran. C'est votre sélecteur de sécurité.","Go to <strong>Vehicle Setup → Flight Modes</strong>. QGC listens to the radio channels. Flick your favourite 3-position remote switch on the top-left with a finger stroke. A 'Channel' bar will jump on screen. This is your safety selector."),
  F("Affectez méthodiquement à cet interrupteur la trinité du pilote : Position n°1 tout en haut = Mode <strong>Stabilized</strong>. Position n°2 au milieu = Mode <strong>Altitude</strong>. Position n°3 en bas = Le fameux Mode <strong>Position</strong> (assisté par GPS). C'est votre couteau suisse de vol.","Methodically assign the pilot's trinity to this switch: Position n°1 at the very top = <strong>Stabilized</strong> Mode. Position n°2 in the middle = <strong>Altitude</strong> Mode. Position n°3 at the bottom = The famed <strong>Position</strong> Mode (GPS assisted). This is your flight Swiss Army knife."),
  F("Choisissez un autre petit bouton métallique séparé à droite de la radio. Assignez-le au canal Mode <strong>Offboard</strong>. Quand vous l'actionnerez, la lourde Raspberry Pi écrasera violemment vos entrées radio manuelles pour obéir à son code Python.","Pick another small separate metallic toggle switch on the right of the radio. Assign it to the <strong>Offboard</strong> Mode channel. When you actuate it, the heavy Raspberry Pi will violently override your manual radio inputs to obey its Python code."),
  F("Pour survivre, assignez un troisième bouton à part entière, idéalement rouge, au mode d'urgence <strong>Return to Land (RTL)</strong>. En cas de perte visuelle de l'appareil fuyant vers l'horizon, ce simple clic forcera l'algorithme à faire demi-tour.","To survive, assign a third full-fledged switch, ideally a red one, to the emergency <strong>Return to Land (RTL)</strong> mode. In case of visual loss of the craft fleeing toward the horizon, this simple click will force the algorithm to turn around.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer et calibrer les ESC","Configure and calibrate the ESCs"),
 lede:F("Le Pixhawk parle au bloc de puissance, mais les signaux sont décousus. Il faut que l'ESC mémorise quel cri électrique signifie l'arrêt complet des lames, et quel hurlement signifie la pleine puissance. Et vérifier au passage que vous n'avez pas soudé les fils de moteur à l'envers. LE TOUT SANS HÉLICES.","The Pixhawk speaks to the power block, but the signals are scrambled. The ESC must memorise which electrical shout means complete blade stop, and which scream means full power. And verify in passing that you didn't solder the motor wires backwards. ALL WITHOUT PROPELLERS."),
 instr:[
  F("Allez dans le menu en feu <strong>Vehicle Setup → Actuators</strong>. Regardez le tableau de routage matériel : vous devez forcer les menus déroulants pour que les sorties MAIN 1, 2, 3 et 4 correspondent sans équivoque aux fonctions logicielles Motor 1, Motor 2, Motor 3 et Motor 4. Modifiez la case 'PWM Rate' pour cracher la fréquence foudroyante de <span class='tag'>400 Hz</span> aux ESCs. Réglez Disarmed sur 1000, Min sur 1000, Max sur 2000.","Go into the hot menu <strong>Vehicle Setup → Actuators</strong>. Look at the hardware routing table: you must force the dropdowns so that MAIN outputs 1, 2, 3 and 4 unequivocally map to software functions Motor 1, Motor 2, Motor 3 and Motor 4. Modify the 'PWM Rate' box to spit the blistering frequency of <span class='tag'>400 Hz</span> to the ESCs. Set Disarmed to 1000, Min to 1000, Max to 2000."),
  F("La Calibration : Débranchez la grosse batterie noire. Dans QGC (toujours dans l'onglet Actuators), trouvez le bouton dangereux de Calibration ESC et acceptez les fenêtres d'avertissement clignotantes. Le logiciel va propulser virtuellement le manche des gaz du Pixhawk à 100 % (2000 PWM). C'est maintenant que vous prenez votre grosse batterie LiPo et que vous branchez violemment la grosse prise jaune XT60 d'un coup sous le drone. L'ESC va hurler une symphonie de bips stridents. Dès que les bips changent de rythme (1 seconde plus tard), cliquez immédiatement à l'écran pour ramener virtuellement la barre des gaz logiciels à 0 (1000 PWM). Une dernière mélodie de confirmation résonne. Débranchez la batterie. Vos ESCs sont synchronisés.","Calibration: Unplug the massive black battery. In QGC (still in the Actuators tab), find the dangerous ESC Calibration button and accept the flashing warning popups. The software will virtually blast the Pixhawk throttle stick to 100% (2000 PWM). Now is when you grab your fat LiPo battery and violently plug the large yellow XT60 connector in one strike under the drone. The ESC will scream a symphony of shrill beeps. The instant the beeps change rhythm (1 second later), immediately click the screen to virtually drag the software throttle bar down to 0 (1000 PWM). A final confirmation melody rings out. Unplug the battery. Your ESCs are synchronised."),
  F("Vérification physique : Rebranchez la batterie. Dans QGC sur ce même écran Actuators, actionnez les petites barres coulissantes de test de chaque moteur à 5 ou 10% pour les forcer à tourner au ralenti. Posez le doigt (SANS HÉLICES) sur le flanc texturé du moteur pour sentir de quel côté il tourne de force. Consultez de nouveau ce tableau absolu de survie : M1 (Avant-Droit) doit tourner en mode Horaire (CW). M3 (Avant-Gauche) doit tourner en mode Anti-Horaire (CCW). M2 (Arrière-Gauche) en Horaire. M4 (Arrière-Droit) en Anti-Horaire. Si un seul moteur désobéit et tourne à l'envers par rapport au plan, munissez-vous de votre fer à souder brûlant, dessoudez brutalement deux des trois fils de ce moteur fautif sur la carte ESC, inversez-les, et ressoudez. Problème réglé.","Physical Check: Re-plug the battery. In QGC on this same Actuators screen, actuate the tiny sliding test bars for each motor at 5 or 10% to force them to idle. Rest a finger (WITHOUT PROPELLERS) on the textured flank of the motor to feel which way it forcibly spins. Consult again this absolute table of survival: M1 (Front-Right) must spin Clockwise (CW). M3 (Front-Left) must spin Counter-Clockwise (CCW). M2 (Rear-Left) Clockwise. M4 (Rear-Right) Counter-Clockwise. If a single motor disobeys and spins backwards relative to the plan, arm yourself with your blazing soldering iron, brutally desolder two of the three wires of this offending motor on the ESC board, swap them, and resolder. Problem solved.")],
 warn:[F("L'avertissement ultime : Si une lame rotative (une hélice) effleure d'un millimètre l'axe des moteurs durant la totalité de ces procédures logicielles à l'intérieur de la maison, le drone s'élancera dans un tourbillon infernal et arrachera la moitié de la pièce. Conservez les hélices dans leur sachet scellé jusqu'au vol extérieur.","The ultimate warning: If a rotary blade (a propeller) so much as grazes a motor shaft by a millimetre during the entirety of these software procedures inside the house, the drone will launch into an infernal whirlwind and shred half the room. Keep the props in their sealed bag until the outdoor flight.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Régler les paramètres critiques","Set the critical parameters"),
 lede:F("Les entrailles profondes de PX4 se gèrent dans une immense liste alphabétique incompréhensible contenant 1000 paramètres chiffrés. Sans aller y taper certaines commandes vitales, l'appareil refusera obstinément d'armer ses moteurs au décollage pour des raisons de sécurité ou de flux de données.","The deep bowels of PX4 are managed in a massive, incomprehensible alphabetical list containing 1000 numbered parameters. Without venturing there to punch in certain vital commands, the craft will stubbornly refuse to arm its motors at take-off for safety or data-flow reasons."),
 instr:[
  F("Engouffrez-vous dans le menu <strong>Vehicle Setup → Parameters</strong>. C'est une jungle de dossiers. Utilisez la petite barre de recherche incrustée en haut à droite. Tapez simplement les premières lettres d'un paramètre, double-cliquez sur la ligne isolée qui s'affiche, remplacez la valeur numérique de la boîte de dialogue, puis cliquez sur le bouton implacable <strong>Save</strong> en haut à droite. Il faut faire cela une dizaine de fois.","Plunge into the <strong>Vehicle Setup → Parameters</strong> menu. It's a jungle of folders. Use the small search bar embedded top-right. Simply type the first letters of a parameter, double-click the isolated row that pops up, replace the numerical value in the dialog box, then click the relentless <strong>Save</strong> button top-right. You must do this a dozen times."),
  F("Commencez par la sécurité matérielle : Cherchez <span class='tag'>CBRK_IO_SAFETY</span> et entrez le code de déblocage 22027 (le modèle Pixhawk 6C Mini n'ayant pas de gros bouton physique rouge clignotant 'Safety', cela force le système à s'en passer). Ensuite, cherchez <span class='tag'>COM_RCL_EXCEPT</span> et tapez 4 (ce bouclier logiciel permet d'activer l'Offboard sans être obligé de maintenir les manches de la radio dans une position précise).","Start with hardware safety: Search for <span class='tag'>CBRK_IO_SAFETY</span> and enter the unlock code 22027 (the Pixhawk 6C Mini model lacking a large red flashing physical 'Safety' button, this forces the system to bypass it). Next, seek <span class='tag'>COM_RCL_EXCEPT</span> and type 4 (this software shield allows triggering Offboard without being forced to hold the radio sticks in a precise position)."),
  F("Allumez le flux d'IA sur le port TELEM 2 : Cherchez <span class='tag'>MAV_1_CONFIG</span> et affectez-le au port 'TELEM 2'. Réglez la vitesse de discussion de ce port avec <span class='tag'>SER_TEL2_BAUD</span> qu'il faut figer à 57600 bauds. Forcez le protocole de langage sur normal en cherchant <span class='tag'>MAV_1_MODE</span> (réglez sur Normal). Et pour que la Raspberry Pi avale un torrent d'informations continues, passez <span class='tag'>MAV_1_RATE</span> à 1200 octets par seconde.","Ignite the AI flow on the TELEM 2 port: Search <span class='tag'>MAV_1_CONFIG</span> and assign it to port 'TELEM 2'. Set the chatting speed of this port with <span class='tag'>SER_TEL2_BAUD</span> which must be frozen at 57600 bauds. Force the language protocol to normal by seeking <span class='tag'>MAV_1_MODE</span> (set to Normal). And so the Raspberry Pi swallows a torrent of continuous information, bump <span class='tag'>MAV_1_RATE</span> to 1200 bytes per second."),
  F("Affinez le pilotage gravitationnel : Modifiez <span class='tag'>MPC_THR_HOVER</span> (la puissance de gaz estimée pour que la bête de 2kg flotte sur place) à environ 0.65 ou 65%. Assurez-vous que l'estimateur de poussée automatique <span class='tag'>MPC_USE_HTE</span> est bien sur 'Enabled'. Furetez enfin dans le dossier Safety pour vous assurer que l'action en cas de perte de signal GPS est un 'Failsafe' sévère (Return To Land ou Hover) et non une chute libre, et paramétrez l'altitude de retour RTL à au moins 15 mètres pour éviter les arbres.","Hone gravitational piloting: Modify <span class='tag'>MPC_THR_HOVER</span> (the estimated throttle power for the 2kg beast to hover in place) to roughly 0.65 or 65%. Ensure the automatic thrust estimator <span class='tag'>MPC_USE_HTE</span> is indeed on 'Enabled'. Finally, snoop around the Safety folder to ensure the action on GPS signal loss is a severe 'Failsafe' (Return To Land or Hover) and not a freefall, and set the RTL return altitude to at least 15 metres to avoid trees.")],
