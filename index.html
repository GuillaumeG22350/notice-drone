<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neutron IT — Notice de montage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EBEE;--panel:#FFFFFF;--panel-2:#F4F5F7;
    --ink:#15181D;--ink-soft:#5B6470;--ink-faint:#8B929C;
    --line:#D7DBE0;--line-strong:#C2C8D0;
    --accent:#FF5A1F;--accent-soft:#FFE9DF;
    --warn:#C92A1C;--warn-soft:#FCE9E7;--tip:#1F6BB8;--tip-soft:#E6F0FA;
    --shadow:0 1px 2px rgba(20,24,29,.06),0 8px 24px rgba(20,24,29,.06);--radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0E1115;--panel:#161A20;--panel-2:#1C2128;
    --ink:#E9ECF0;--ink-soft:#9AA3AE;--ink-faint:#6B7480;
    --line:#262C34;--line-strong:#323A44;
    --accent:#FF6A33;--accent-soft:#3a1d10;
    --warn:#F2685A;--warn-soft:#2a1614;--tip:#6BB0F0;--tip-soft:#11202e;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100dvh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;background-position:center}
  html[data-theme="dark"] body{background-image:linear-gradient(#1a1f26 1px,transparent 1px),linear-gradient(90deg,#1a1f26 1px,transparent 1px)}
  header{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--line-strong)}
  .bar{max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:30px;height:30px;flex:none;border-radius:7px;background:var(--accent);position:relative;box-shadow:0 0 0 4px var(--accent-soft)}
  .logo::before,.logo::after{content:"";position:absolute;background:#fff}
  .logo::before{inset:13px 6px;height:4px;border-radius:2px}
  .logo::after{inset:6px 13px;width:4px;border-radius:2px}
  .brand b{font-family:"Space Grotesk";font-weight:700;font-size:15px;letter-spacing:.04em}
  .brand span{display:block;font-size:11px;color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase}
  .counter{margin-left:auto;display:flex;align-items:baseline;gap:6px;font-family:"IBM Plex Mono";color:var(--ink-soft);font-size:13px}
  .counter b{color:var(--ink);font-size:18px;font-weight:600}
  .langbtn{flex:none;height:34px;padding:0 14px;border-radius:9px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);font-family:"IBM Plex Mono";font-size:13px;font-weight:600;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .langbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--panel-2)}
  .iconbtn{flex:none;height:36px;min-width:36px;padding:0 10px;border-radius:9px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);cursor:pointer;font-size:15px;display:grid;place-items:center;transition:.15s}
  .iconbtn:hover{border-color:var(--accent);color:var(--accent)}
  .progress{height:3px;background:var(--line);width:100%}
  .progress i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s cubic-bezier(.4,0,.2,1)}
  main{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:26px 20px 120px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:"IBM Plex Mono";font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .eyebrow::before{content:"";width:22px;height:1.5px;background:var(--accent)}
  h1{font-family:"Space Grotesk";font-weight:600;font-size:clamp(23px,4vw,33px);line-height:1.1;letter-spacing:-.01em;margin-bottom:6px}
  .lede{color:var(--ink-soft);font-size:15.5px;max-width:62ch;margin-bottom:24px;line-height:1.5}
  .grid{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .rail{display:flex;flex-direction:column;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--line);font-family:"Space Grotesk";font-weight:600;font-size:13px;letter-spacing:.02em}
  .card-h .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .manifest{padding:6px}
  .part{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px}
  .part+.part{margin-top:1px}.part:hover{background:var(--panel-2)}
  .qty{flex:none;min-width:44px;height:30px;padding:0 8px;border-radius:7px;background:var(--ink);color:var(--bg);font-family:"IBM Plex Mono";font-weight:600;font-size:12.5px;display:grid;place-items:center}
  html[data-theme="dark"] .qty{background:var(--accent);color:#101317}
  .part .pn{font-size:13.5px;line-height:1.25}
  .part .pref{font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);margin-top:1px}
  .fastbody{padding:11px 12px;display:flex;flex-wrap:wrap;gap:8px}
  .fitem{display:flex;align-items:center;gap:7px;font-family:"IBM Plex Mono";font-size:11.5px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .fitem svg{width:17px;height:17px;color:var(--accent);flex:none}
  .check{display:flex;gap:11px;padding:9px 12px;cursor:pointer;border-radius:9px;align-items:flex-start}
  .check:hover{background:var(--panel-2)}
  .check input{appearance:none;flex:none;width:19px;height:19px;margin-top:1px;border:1.6px solid var(--line-strong);border-radius:5px;cursor:pointer;position:relative;transition:.15s}
  .check input:checked{background:var(--accent);border-color:var(--accent)}
  .check input:checked::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center}
  .check input:checked + .ctext{color:var(--ink-faint);text-decoration:line-through}
  .ctext{font-size:13.5px;line-height:1.35}
  .ctext small{display:block;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);text-decoration:none}
  .checkfoot{padding:11px 16px;border-top:1px solid var(--line);font-family:"IBM Plex Mono";font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center}
  .checkfoot b{color:var(--accent)}
  .viewport{display:flex;flex-direction:column;gap:18px}
  .figure{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .frame{position:relative;background:repeating-conic-gradient(var(--panel-2) 0% 25%,var(--panel) 0% 50%) 50%/22px 22px;min-height:230px;display:grid;place-items:center}
  .frame img{display:block;width:100%;height:auto;max-height:60vh;object-fit:contain}
  .ph{padding:40px 24px;text-align:center;color:var(--ink-faint);width:100%}
  .ph svg{width:38px;height:38px;opacity:.5;margin-bottom:12px}
  .ph code{display:inline-block;margin-top:10px;font-family:"IBM Plex Mono";font-size:12.5px;background:var(--panel-2);border:1px dashed var(--line-strong);padding:5px 10px;border-radius:7px;color:var(--ink-soft)}
  .frame .tick{position:absolute;width:13px;height:13px;border:1.5px solid var(--accent);opacity:.7}
  .frame .tick.tl{top:9px;left:9px;border-right:0;border-bottom:0}.frame .tick.tr{top:9px;right:9px;border-left:0;border-bottom:0}
  .frame .tick.bl{bottom:9px;left:9px;border-right:0;border-top:0}.frame .tick.br{bottom:9px;right:9px;border-left:0;border-top:0}
  .cap{padding:10px 15px;font-size:12.5px;color:var(--ink-soft);border-top:1px solid var(--line);display:flex;gap:8px;align-items:baseline;line-height:1.4}
  .cap b{font-family:"IBM Plex Mono";color:var(--accent);font-size:11px;letter-spacing:.05em}
  .steps-h{font-family:"Space Grotesk";font-weight:600;font-size:14px;letter-spacing:.02em;margin:2px 0 4px;display:flex;align-items:center;gap:9px}
  .steps-h .ln{flex:1;height:1px;background:var(--line)}
  ol.instr{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:2px}
  ol.instr li{counter-increment:s;display:flex;gap:14px;padding:11px 4px;border-bottom:1px solid var(--line)}
  ol.instr li:last-child{border-bottom:0}
  ol.instr li::before{content:counter(s,decimal-leading-zero);flex:none;font-family:"IBM Plex Mono";font-weight:600;font-size:12px;color:var(--accent);width:26px;text-align:right;padding-top:2px}
  ol.instr li p{font-size:14.5px;line-height:1.6}
  ol.instr strong{font-weight:600}
  ol.instr .tag{font-family:"IBM Plex Mono";font-size:12px;background:var(--panel-2);border:1px solid var(--line);padding:1px 6px;border-radius:5px;white-space:nowrap}
  ol.instr .cmd{display:block;font-family:"IBM Plex Mono";font-size:12px;line-height:1.55;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-top:7px;white-space:pre-wrap;word-break:break-word;color:var(--ink)}
  table.map{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  table.map th,table.map td{border:1px solid var(--line);padding:6px 8px;text-align:left}
  table.map th{background:var(--panel-2);font-family:"Space Grotesk";font-weight:600;font-size:12px}
  table.map td{font-family:"IBM Plex Mono";font-size:12px}
  .note{display:flex;gap:12px;padding:13px 15px;border-radius:11px;font-size:13.7px;line-height:1.5}
  .note .ic{flex:none;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;font-family:"Space Grotesk"}
  .note.warn{background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 35%,transparent)}
  .note.warn .ic{background:var(--warn)}.note.warn b{color:var(--warn)}
  .note.tip{background:var(--tip-soft);border:1px solid color-mix(in srgb,var(--tip) 30%,transparent)}
  .note.tip .ic{background:var(--tip)}.note.tip b{color:var(--tip)}
  .notes-wrap{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .outro{text-align:center;padding:46px 20px;max-width:640px;margin:6px auto}
  .outro .big{width:86px;height:86px;border-radius:50%;background:var(--accent);display:grid;place-items:center;margin:0 auto 24px;box-shadow:0 0 0 10px var(--accent-soft)}
  .outro .big svg{width:44px;height:44px;color:#fff}
  .outro h1{font-size:clamp(28px,6vw,44px)}
  .outro p{color:var(--ink-soft);font-size:16px;margin-top:12px}
  .outro .sig{margin-top:28px;font-family:"IBM Plex Mono";font-size:13px;color:var(--accent);letter-spacing:.05em}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:color-mix(in srgb,var(--panel) 90%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--line-strong)}
  .navin{max-width:1180px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px}
  .nbtn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:10px;font-family:"Space Grotesk";font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s}
  .nbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .nbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.nbtn.primary:hover{filter:brightness(1.06);color:#fff}
  .nbtn:disabled{opacity:.4;cursor:not-allowed}
  .dots{flex:1;display:flex;align-items:center;gap:7px;overflow-x:auto;padding:6px 2px;scroll-padding:0 40px;-ms-overflow-style:none;scrollbar-width:none}
  .dots::-webkit-scrollbar{display:none}
  .dt{flex:none;width:9px;height:9px;border-radius:50%;background:var(--line-strong);border:0;cursor:pointer;transition:.2s;padding:0}
  .dt:hover{transform:scale(1.3)}.dt.on{width:26px;border-radius:5px;background:var(--accent)}.dt.done{background:var(--ink-soft)}
  .navlabel{display:none;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);letter-spacing:.05em}
  @media(min-width:560px){.navlabel{display:block}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><div class="logo" aria-hidden="true"></div>
      <div><b>NEUTRON&nbsp;IT</b><span id="subtitle">Notice de montage</span></div></div>
    <div class="counter"><span id="cLbl">Étape</span> <b id="cNum">01</b>/<span id="cTot">00</span></div>
    
    <button class="langbtn" id="langToggle" title="Traduire / Translate">
      <span id="langTxt">FR / EN</span>
    </button>

    <button class="iconbtn" id="theme" title="Thème / Theme">◐</button>
  </div>
  <div class="progress"><i id="bar"></i></div>
</header>
<main id="stage" tabindex="-1"></main>
<nav class="nav"><div class="navin">
  <button class="nbtn" id="prev">‹ <span class="navlabel" id="prevL">Précédent</span></button>
  <div class="dots" id="dots"></div>
  <button class="nbtn primary" id="next"><span class="navlabel" id="nextL">Suivant</span> ›</button>
</div></nav>

<script>
const F=(fr,en)=>({fr,en});
const STEPS=[
/* ===== PRÉPARATION ===== */
{phase:F("Préparation · 1/2","Preparation · 1/2"),title:F("Composants — électronique","Components — electronics"),
 lede:F("Avant de commencer l'assemblage, rassemblez et pointez l'ensemble des composants électroniques. Disposez chaque élément clairement sur votre plan de travail afin de vérifier que rien ne manque.","Before starting the assembly, gather and check off all electronic components. Lay each item out clearly on your workspace to verify nothing is missing."),
 checklist:[
  {name:F("Moteurs SunnySky X2216 880KV","SunnySky X2216 880KV motors"),ref:"x4"},
  {name:F("ESC 4-en-1 SpeedyBee 60A","SpeedyBee 60A 4-in-1 ESC"),ref:"x1"},
  {name:F("Pixhawk 6C Mini + Power Module PM02","Pixhawk 6C Mini + PM02 Power Module"),ref:"x1"},
  {name:F("Raspberry Pi 5 8 Go + carte micro-SD","Raspberry Pi 5 8 GB + micro-SD"),ref:"x1"},
  {name:F("Ventilateur Active Cooler","Active Cooler fan"),ref:"x1"},
  {name:F("GPS u-blox M10 + mât","u-blox M10 GPS + mast"),ref:"x1"},
  {name:F("Récepteur ELRS Nano 2,4 GHz","ELRS Nano 2.4 GHz receiver"),ref:"x1"},
  {name:F("Caméra CSI Module 3 Wide + nappe 300 mm","CSI Camera Module 3 Wide + 300 mm cable"),ref:"x1"},
  {name:F("UBEC ZTW 10A (5V)","ZTW 10A UBEC (5V)"),ref:"x1"},
  {name:F("Batterie LiPo 4S 6000 mAh","LiPo 4S 6000 mAh battery"),ref:"x1"},
  {name:F("Radiocommande RadioMaster Pocket","RadioMaster Pocket radio"),ref:"x1"}]},
{phase:F("Préparation · 2/2","Preparation · 2/2"),title:F("Composants — structure & visserie","Components — structure & fasteners"),
 lede:F("Vérifiez ensuite les éléments mécaniques et l'outillage. La visserie est composée de diamètres M2 et M3. Il est recommandé de les trier par longueur dans de petits récipients pour faciliter le montage.","Next, check the mechanical parts and tools. The fasteners consist of M2 and M3 diameters. It is recommended to sort them by length into small containers to make assembly easier."),
 checklist:[
  {name:F("Tubes carbone 16×14×500 mm","Carbon tubes 16×14×500 mm"),ref:"x4"},
  {name:F("Connecteurs MR30 (jaunes)","MR30 connectors (yellow)"),ref:"x4"},
  {name:F("Fils silicone 20 AWG rouge / noir / bleu","20 AWG silicone wire red / black / blue"),ref:""},
  {name:F("Hélices Gemfan 9047 CW + CCW","Gemfan 9047 CW + CCW props"),ref:"x2"},
  {name:F("XT60 + condensateur 1000 µF","XT60 + 1000 µF capacitor"),ref:""},
  {name:F("Inserts thermiques M3 et M2","M3 and M2 heat-set inserts"),ref:""},
  {name:F("Vis M3 (6/8/16/18/20/25) + écrous M3","M3 screws (6/8/16/18/20/25) + M3 nuts"),ref:""},
  {name:F("Vis M2×6 et M2×10 + écrous M2 + boules silicone","M2×6 and M2×10 screws + M2 nuts + silicone balls"),ref:""},
  {name:F("Ruban mousse PE + colliers + Loctite 243","PE foam tape + zip ties + Loctite 243"),ref:""},
  {name:F("Fer à souder, étain, flux, gaines thermo, clés Allen","Soldering iron, solder, flux, heat-shrink, hex keys"),ref:""},
  {name:F("Scie à métaux, étau, niveau, masque FFP2 + lunettes","Hacksaw, vise, level, FFP2 mask + goggles"),ref:""}],
 warn:[F("Prenez le temps de bien valider cette liste. Le montage sera beaucoup plus fluide si toutes les pièces sont prêtes et à portée de main.","Take the time to validate this list thoroughly. Assembly will be much smoother if all parts are ready and within reach.")]},
/* ===== IMPRESSION ===== */
{phase:F("Impression 3D","3D printing"),title:F("Imprimer les pièces (PETG)","Print the parts (PETG)"),
 lede:F("L'ensemble de la structure est imprimé en PETG noir. Commencez par la grande plaque principale et les mâchoires des bras, qui sont les pièces structurelles les plus importantes.","The entire structure is printed in black PETG. Start with the large main plate and the arm jaws, which are the most important structural parts."),
 parts:[
  {qty:"x1",name:F("coque","shell"),ref:"coque.STL"},
  {qty:"x1",name:F("plaque_etage1","main plate"),ref:""},
  {qty:"x4",name:F("machoir_inférieur + supérieur","arm jaws lower + upper"),ref:""},
  {qty:"x4",name:F("machoir_inf. + sup. moteur","motor jaws lower + upper"),ref:""},
  {qty:"x4",name:F("plot","battery post"),ref:""},
  {qty:"x2",name:F("train_atterrissage","landing gear"),ref:""},
  {qty:"x1",name:F("support_caméra + support_pixhawk","camera + pixhawk mounts"),ref:""},
  {qty:"x1",name:F("coque + clap + cylindre caméra","camera shell + clamp + cylinder"),ref:""},
  {qty:"1 kg",name:F("Filament PETG noir, bien sec","Black PETG filament, well dried"),ref:""}],
 instr:[
  F("Dans votre logiciel de tranchage (slicer), appliquez ces paramètres : température de buse à <span class='tag'>240 °C</span>, plateau à <span class='tag'>80 °C</span>, remplissage interne de <strong>40 %</strong>, <strong>4 périmètres extérieurs</strong>, 5 couches pleines supérieures et inférieures, pour une hauteur de couche de 0,2 mm.","In your slicing software, apply these settings: nozzle temperature at <span class='tag'>240 °C</span>, bed at <span class='tag'>80 °C</span>, <strong>40%</strong> internal infill, <strong>4 outer perimeters</strong>, 5 solid top and bottom layers, for a 0.2 mm layer height."),
  F("L'orientation des pièces sur le plateau est essentielle : positionnez chaque mâchoire de sorte que les <strong>trous de vis soient orientés verticalement</strong>. Cela garantit une résistance optimale des couches lors du serrage.","Part orientation on the bed is essential: position each jaw so that the <strong>screw holes are oriented vertically</strong>. This ensures optimal layer strength during tightening.")],
 tip:[F("Le temps d'impression total étant d'environ 16 heures, vous pouvez préparer la découpe des tubes en carbone pendant ce temps.","As total print time is around 16 hours, you can prepare the carbon tube cuts in the meantime.")]},
{phase:F("Impression 3D","3D printing"),title:F("Contrôler les pièces","Inspect the parts"),
 lede:F("Inspectez soigneusement chaque pièce imprimée pour garantir la solidité du châssis.","Carefully inspect each printed part to ensure the frame's solidity."),
 instr:[
  F("Retirez délicatement les éventuels supports d'impression à l'aide d'une pince, en veillant à ne pas abîmer la surface de la pièce.","Gently remove any print supports using pliers, taking care not to damage the part's surface."),
  F("Vérifiez la propreté de chaque trou de vis. L'intérieur doit être lisse et régulier pour permettre une bonne insertion de la visserie ou des inserts thermiques.","Check the cleanliness of each screw hole. The inside must be smooth and even to allow proper insertion of hardware or heat-set inserts.")],
 warn:[
  F("Utilisez un filament de bonne qualité et bien sec. L'humidité dans le PETG peut causer une mauvaise adhésion entre les couches, fragilisant les pièces.","Use good quality, dry filament. Moisture in PETG can cause poor layer adhesion, weakening the parts."),
  F("N'hésitez pas à réimprimer une pièce si vous constatez un défaut de délaminage ou un trou de vis déformé.","Do not hesitate to reprint a part if you notice delamination defects or a deformed screw hole.")],
 tip:[F("Si un trou est très légèrement rétréci, vous pouvez utiliser un foret à métaux de Ø3 mm en le tournant <strong>à la main</strong> pour l'ajuster sans forcer. N'utilisez pas de perceuse.","If a hole is very slightly tight, you can use a Ø3 mm metal drill bit, turning it <strong>by hand</strong> to adjust it without forcing. Do not use a power drill.")]},
/* ===== TUBES ===== */
{phase:F("Tubes carbone","Carbon tubes"),title:F("Sécurité : découpe du carbone","Safety: cutting carbon"),
 lede:F("La poussière de fibre de carbone étant irritante pour les voies respiratoires et les yeux, il est nécessaire de bien préparer son plan de travail avant la découpe.","Because carbon fibre dust is irritating to the respiratory tract and eyes, it's necessary to properly prepare your workspace before cutting."),
 parts:[
  {qty:"x1",name:F("Masque FFP2 + lunettes de protection","FFP2 mask + safety goggles"),ref:""},
  {qty:"x1",name:F("Étau ou serre-joint","Vise or clamp"),ref:""},
  {qty:"x1",name:F("Aspirateur","Vacuum cleaner"),ref:""}],
 instr:[
  F("Travaillez de préférence à l'extérieur ou dans un endroit bien ventilé. Si vous coupez en intérieur, placez l'embout d'un aspirateur en marche juste à côté de la zone de coupe pour capter la poussière.","Work preferably outdoors or in a well-ventilated area. If cutting indoors, place a running vacuum nozzle right next to the cutting area to capture the dust."),
  F("Mettez un masque FFP2 et des lunettes de protection <strong>avant</strong> de commencer. Conservez-les jusqu'à ce que la zone et les tubes soient nettoyés (avec un chiffon humide par exemple).","Put on an FFP2 mask and safety goggles <strong>before</strong> starting. Keep them on until the area and the tubes are cleaned (with a damp cloth, for example).")],
 warn:[F("Ne soufflez pas sur les poussières de carbone. Aspirez-les immédiatement ou essuyez-les avec un chiffon humide.","Do not blow on the carbon dust. Vacuum it immediately or wipe it with a damp cloth.")]},
{phase:F("Tubes carbone","Carbon tubes"),title:F("Couper les tubes à 170 mm","Cut the tubes to 170 mm"),
 lede:F("Préparez les 4 bras du drone en découpant des tronçons de 170 mm dans les tubes en carbone, à l'aide d'une scie à métaux.","Prepare the 4 drone arms by cutting 170 mm sections from the carbon tubes, using a hacksaw."),
 parts:[
  {qty:"x4",name:F("Tubes carbone 16×14 mm","Carbon tubes 16×14 mm"),ref:"coupés à 170 mm"},
  {qty:"x1",name:F("Scie à métaux (lame fine)","Hacksaw (fine blade)"),ref:""},
  {qty:"x1",name:F("Papier de verre grain 400","400-grit sandpaper"),ref:""}],
 instr:[
  F("Mesurez précisément <span class='tag'>170 mm</span> et faites une marque. Pour une coupe nette, enroulez quelques tours de ruban de masquage centré sur votre repère : cela guide la lame et évite d'effilocher les fibres.","Measure precisely <span class='tag'>170 mm</span> and make a mark. For a clean cut, wrap a few turns of masking tape centered on your mark: this guides the blade and prevents fraying the fibres."),
  F("Placez le tube dans un <strong>étau</strong>, en laissant la zone de coupe dépasser légèrement. Coupez bien droit, avec un mouvement régulier, sans forcer vers le bas.","Place the tube in a <strong>vise</strong>, letting the cutting area protrude slightly. Cut straight, with a steady motion, without forcing downwards."),
  F("Une fois coupé, poncez légèrement les extrémités du tube en le frottant bien verticalement sur du papier de verre grain 400 posé à plat, jusqu'à obtenir une surface lisse et perpendiculaire.","Once cut, lightly sand the tube ends by rubbing it vertically on 400-grit sandpaper laid flat, until you get a smooth and perpendicular surface."),
  F("Vérifiez la longueur avec une règle : elle doit être de <strong>170 mm ± 1 mm</strong>. Répétez l'opération pour obtenir les 4 tubes.","Check the length with a ruler: it must be <strong>170 mm ± 1 mm</strong>. Repeat the operation to get the 4 tubes.")]},
/* ===== INSERTS ===== */
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Technique de pose des inserts","Insert fitting technique"),
 lede:F("Les inserts filetés en laiton s'intègrent dans le plastique à l'aide de la chaleur d'un fer à souder, créant un pas de vis très solide. Cette technique sera utilisée sur de nombreuses pièces.","Threaded brass inserts are embedded into the plastic using the heat of a soldering iron, creating a very strong thread. This technique will be used on many parts."),
 parts:[
  {qty:"~30",name:F("Inserts filetés M3","M3 threaded inserts"),ref:"diamètre ext. 4,2 mm"},
  {qty:"~6",name:F("Inserts filetés M2","M2 threaded inserts"),ref:""},
  {qty:"x1",name:F("Fer à souder + pinces brucelles","Soldering iron + tweezers"),ref:"réglé sur 200 °C"}],
 fastener:[F("Insert M3","Insert M3"),F("Insert M2","Insert M2")],
 instr:[
  F("Réglez la température de votre fer à souder sur <span class='tag'>200 °C</span> et laissez-le bien chauffer.","Set your soldering iron temperature to <span class='tag'>200 °C</span> and let it heat up thoroughly."),
  F("À l'aide des pinces, déposez un insert sur le trou correspondant. Il doit tenir droit et bien aligné verticalement.","Using tweezers, place an insert over the corresponding hole. It must stand straight and be vertically aligned."),
  F("Posez la pointe du fer bien au centre de l'insert. Appliquez une pression <strong>légère et bien droite</strong>. Sous l'effet de la chaleur, l'insert va descendre doucement dans le plastique (en 5 à 10 secondes environ).","Place the tip of the iron right in the centre of the insert. Apply <strong>light and straight</strong> pressure. Under the heat, the insert will slowly lower into the plastic (in about 5 to 10 seconds)."),
  F("Retirez le fer dès que le haut de l'insert est <strong>à fleur (au même niveau)</strong> de la surface plastique. Laissez refroidir quelques instants sans y toucher.","Remove the iron as soon as the top of the insert is <strong>flush (level)</strong> with the plastic surface. Let it cool for a few moments without touching it.")],
 warn:[F("L'insert ne doit pas dépasser ni être enfoncé trop profondément. Si la descente est trop rapide, la température est peut-être trop élevée ou la pression trop forte. Ajustez votre geste si nécessaire.","The insert must not protrude or be pushed too deep. If the descent is too fast, the temperature might be too high or the pressure too strong. Adjust your technique if necessary.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — plaque centrale","M3 inserts — main plate"),
 lede:F("Préparez la grande plaque principale en y insérant les pas de vis M3 nécessaires.","Prepare the large main plate by inserting the necessary M3 threads."),
 parts:[{qty:F("1 / trou périphérique","1 / perimeter hole"),name:F("Insert M3","Insert M3"),ref:"plaque_etage1"}],
 fastener:[F("Insert M3","Insert M3")],
 images:[{src:"plaque_inserts_M3.jpg",cap:F("Plaque — un insert M3 à chaque repère de fixation des bras.","Plate — one M3 insert at each arm mounting point.")}],
 instr:[F("En utilisant la méthode décrite, posez un insert M3 dans <strong>chacun</strong> des petits trous situés sur les parties extérieures de la plaque (qui serviront à fixer les bras) ainsi qu'autour de la découpe centrale. Laissez bien refroidir.","Using the described method, place an M3 insert into <strong>each</strong> of the small holes located on the outer parts of the plate (which will secure the arms) as well as around the central cutout. Let cool completely.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M2 — plaque centrale","M2 inserts — main plate"),
 lede:F("La plaque principale possède également 4 trous de fixation plus petits prévus pour la Raspberry Pi, situés à l'arrière.","The main plate also features 4 smaller mounting holes intended for the Raspberry Pi, located at the rear."),
 parts:[{qty:"x4",name:F("Insert M2 (petit format)","M2 insert (small size)"),ref:""}],
 fastener:[F("Insert M2","Insert M2")],
 images:[{src:"plaque_inserts_M2.jpg",cap:F("Plaque — inserts M2 pour la fixation de la Raspberry Pi.","Plate — M2 inserts for mounting the Raspberry Pi.")}],
 instr:[F("Placez très délicatement un insert M2 sur chacun de ces 4 trous. L'insertion avec le fer est plus rapide que pour les M3, veillez à bien vous arrêter à fleur.","Very delicately place an M2 insert on each of these 4 holes. Insertion with the iron is faster than for the M3s, be careful to stop flush.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — trains d'atterrissage","M3 inserts — landing gear"),
 lede:F("Les deux pièces du train d'atterrissage nécessitent des inserts sur leur platine supérieure pour pouvoir être vissées sous le drone.","The two landing gear parts require inserts on their top plate to be screwed under the drone."),
 parts:[{qty:"x4",name:F("Insert M3","Insert M3"),ref:"2 par train / 2 per gear"}],
 fastener:[F("Insert M3","Insert M3")],
 images:[{src:"train_insert_M3.jpg",cap:F("Train — insert M3 au niveau des trous de fixation supérieurs.","Landing gear — M3 insert at the upper mounting holes.")}],
 instr:[F("Posez un insert M3 bien droit dans chaque trou de la platine de fixation du premier train. <strong>Répétez ensuite l'opération pour le second train d'atterrissage</strong>.","Place an M3 insert perfectly straight into each hole of the first gear's mounting plate. <strong>Then repeat the operation for the second landing gear</strong>.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — mâchoires sup. moteur","M3 inserts — upper motor jaws"),
 lede:F("Prenez les 4 mâchoires supérieures prévues pour tenir les moteurs au bout des bras.","Take the 4 upper jaws intended to hold the motors at the end of the arms."),
 parts:[{qty:"x16",name:F("Insert M3","Insert M3"),ref:"4 par mâchoire / 4 per jaw"}],
 fastener:[F("Insert M3","Insert M3")],
 images:[{src:"machoire_sup_moteur_inserts.jpg",cap:F("Mâchoire sup. moteur — insert M3 à chaque coin. À répéter ×4.","Upper motor jaw — M3 insert at each corner. Repeat ×4.")}],
 instr:[F("Sur chaque mâchoire, installez un insert M3 dans les 4 trous situés aux coins. <strong>Effectuez cette opération pour les 4 pièces</strong>, ce qui représente 16 inserts au total pour cette étape.","On each jaw, install an M3 insert into the 4 corner holes. <strong>Perform this operation for all 4 parts</strong>, representing 16 inserts in total for this step.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — coque","M3 inserts — shell"),
 lede:F("La coque supérieure reçoit des inserts à sa base pour la fixation au châssis, et à son sommet pour accueillir le mât GPS.","The top shell receives inserts at its base for attachment to the frame, and at its summit to accommodate the GPS mast."),
 parts:[
  {qty:F("Pourtour","Perimeter"),name:F("Insert M3 — fixation coque","Insert M3 — shell fixing"),ref:""},
  {qty:"x4",name:F("Insert M3 — renfoncement central","Insert M3 — central recess"),ref:"pour mât GPS / for GPS mast"}],
 fastener:[F("Insert M3","Insert M3")],
 images:[{src:"coque_inserts_M3.jpg",cap:F("Coque — inserts sur le pourtour inférieur et dans la zone GPS.","Shell — inserts on the lower perimeter and in the GPS area.")}],
 instr:[
  F("Insérez un M3 dans chaque emplacement cylindrique situé sur la bordure inférieure de la coque.","Insert an M3 into each cylindrical slot located on the shell's lower edge."),
  F("Placez ensuite <strong>4 inserts M3</strong> dans les coins de la petite cavité carrée située sur le haut de la coque.","Then place <strong>4 M3 inserts</strong> in the corners of the small square cavity on top of the shell.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M3 — support Pixhawk","M3 inserts — Pixhawk mount"),
 lede:F("Préparez la petite plaque carrée qui servira de support au contrôleur de vol.","Prepare the small square plate that will serve as the mount for the flight controller."),
 parts:[{qty:"x4",name:F("Insert M3","Insert M3"),ref:"aux 4 coins du support / at 4 corners of mount"}],
 fastener:[F("Insert M3","Insert M3")],
 images:[{src:"support_pixhawk_inserts_M3.jpg",cap:F("Support Pixhawk — un insert M3 inséré à chaque coin.","Pixhawk mount — an M3 insert fitted at each corner.")}],
 instr:[F("Posez un insert M3 dans chaque trou aux extrémités de la pièce. Veillez à ce qu'ils soient bien à fleur pour que le Pixhawk repose ensuite sur une surface plane.","Place an M3 insert in each hole at the ends of the part. Ensure they are well flush so the Pixhawk later rests on a flat surface.")]},
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Inserts M2 — coque caméra","M2 inserts — camera shell"),
 lede:F("La pièce formant le boîtier de la caméra possède de petits perçages latéraux.","The part forming the camera housing has small lateral holes."),
 parts:[{qty:"x2",name:F("Insert M2","Insert M2"),ref:"flancs de la coque / sides of shell"}],
 fastener:[F("Insert M2","Insert M2")],
 images:[{src:"coque_camera_inserts_M2.jpg",cap:F("Coque caméra — petits inserts M2 intégrés sur les côtés.","Camera shell — small M2 inserts integrated on the sides.")}],
 instr:[F("Insérez très soigneusement un insert M2 sur chaque flanc (gauche et droit) de l'ouverture de la coque caméra. Ils permettront de visser la façade.","Very carefully insert an M2 insert on each flank (left and right) of the camera shell's opening. They will allow the front face to be screwed on.")]},
/* ===== BRAS ===== */
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Couper et étamer les fils moteur","Cut and tin the motor wires"),
 lede:F("Nous commençons la préparation du premier bras. Cette série d'actions devra être répétée 4 fois au total. Prenez un moteur et préparez ses fils.","We begin preparing the first arm. This series of actions must be repeated 4 times in total. Take a motor and prepare its wires."),
 parts:[
  {qty:"x1",name:F("Moteur SunnySky X2216","SunnySky X2216 motor"),ref:""},
  {qty:"x1",name:F("Fer à 380 °C, fil d'étain, flux","Iron at 380 °C, solder wire, flux"),ref:""}],
 instr:[
  F("Coupez les 3 fils du moteur à peu près à mi-longueur avec une pince coupante. Dénudez environ 5 mm de gaine à l'extrémité de chaque fil.","Cut the motor's 3 wires at about mid-length with side cutters. Strip about 5 mm of insulation at the end of each wire."),
  F("Appliquez un peu de flux sur le cuivre dénudé. Chauffez le fil avec le fer à <span class='tag'>380 °C</span> et appliquez l'étain jusqu'à ce que le fil soit uniformément recouvert d'une couche brillante (étamage).","Apply some flux to the bare copper. Heat the wire with the iron at <span class='tag'>380 °C</span> and apply solder until the wire is uniformly covered with a shiny layer (tinning).")],
 tip:[F("Pour faciliter le montage, décidez d'un code couleur pour la suite (par exemple : Bleu, Noir, Rouge de gauche à droite) et gardez le même pour les 4 moteurs.","To ease assembly, decide on a colour code for the next steps (e.g., Blue, Black, Red from left to right) and keep the same one for all 4 motors.")]},
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Souder le MR30 — côté moteur","Solder the MR30 — motor side"),
 lede:F("Les fils du moteur se raccordent sur un petit connecteur jaune (MR30) qui facilitera l'assemblage et la maintenance.","The motor wires connect to a small yellow connector (MR30) that will facilitate assembly and maintenance."),
 parts:[{qty:"x1",name:F("Connecteur MR30 (partie mâle)","MR30 connector (male part)"),ref:""}],
 images:[{src:"mr30_cote_moteur.jpg",cap:F("Connecteur MR30 soudé côté moteur (exemple de code couleur).","MR30 connector soldered motor side (example colour code).")}],
 instr:[
  F("Maintenez le connecteur MR30 et étamez l'intérieur de ses 3 petits godets de connexion en y déposant un peu d'étain.","Hold the MR30 connector and tin the inside of its 3 small connection cups by adding a little solder."),
  F("Placez un fil dans un godet, chauffez avec le fer pour fusionner l'étain du fil et du connecteur. Maintenez en place quelques secondes le temps que la soudure se fige.","Place a wire in a cup, heat with the iron to fuse the solder of the wire and the connector. Hold in place for a few seconds while the joint solidifies."),
  F("Soudez les trois fils en respectant bien un ordre défini de gauche à droite (selon votre code couleur). Vérifiez qu'aucune soudure ne déborde sur la voisine.","Solder the three wires keeping a defined left-to-right order (per your colour code). Verify that no solder bridges to the neighbour.")]},
{phase:F("Bras · câblage (×4)","Arm · wiring (×4)"),title:F("Faire les rallonges + MR30 côté ESC","Make the leads + MR30 ESC side"),
 lede:F("Préparez la rallonge qui traversera le tube en carbone pour relier le moteur à la carte centrale.","Prepare the lead that will pass through the carbon tube to connect the motor to the central board."),
 parts:[
  {qty:"x3",name:F("Fils silicone 20 AWG","20 AWG silicone wires"),ref:F("rouge, noir, bleu","red, black, blue")},
  {qty:"x1",name:F("Connecteur MR30 (partie femelle)","MR30 connector (female part)"),ref:""}],
 images:[{src:"mr30_cote_esc.jpg",cap:F("Moitié femelle du MR30 soudée à la rallonge de 3 fils.","Female half of the MR30 soldered to the 3-wire lead.")}],
 instr:[
  F("Coupez vos 3 fils silicone à une longueur correspondant à celle du <strong>tube (170 mm) plus environ 3 cm de marge</strong>. Dénudez et étamez chaque extrémité.","Cut your 3 silicone wires to a length corresponding to the <strong>tube (170 mm) plus about 3 cm margin</strong>. Strip and tin each end."),
  F("Prenez la partie femelle du MR30, étamez ses godets, et soudez-y les 3 fils en respectant <strong>strictement le même ordre de couleurs</strong> que sur la prise moteur.","Take the female part of the MR30, tin its cups, and solder the 3 wires to it respecting <strong>strictly the same colour order</strong> as on the motor plug."),
  F("<strong>Répétez maintenant l'ensemble des étapes de préparation moteur et câblage pour obtenir 4 groupes complets.</strong>","<strong>Now repeat all the motor prep and wiring steps to obtain 4 complete groups.</strong>")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Fixer le moteur sur la mâchoire","Fix the motor to the jaw"),
 lede:F("Le moteur se fixe sur sa base imprimée (la grande mâchoire).","The motor attaches to its printed base (the large jaw)."),
 parts:[{qty:"x4",name:F("Vis M3×16","M3×16 screws"),ref:""},{qty:"x1",name:F("Loctite 243 (frein-filet)","Loctite 243 (threadlocker)"),ref:""}],
 fastener:[F("Vis M3×16","Screw M3×16")],
 images:[{src:"moteur_fixation_machoire.jpg",cap:F("Moteur vissé sur la mâchoire inférieure avec 4 vis M3×16.","Motor screwed onto the lower jaw with 4 × M3×16 screws.")}],
 instr:[
  F("Positionnez le moteur sur la mâchoire inférieure, axe tourné vers le haut. Alignez les trous du moteur avec ceux de la pièce plastique.","Position the motor on the lower jaw, shaft pointing up. Align the motor holes with the plastic part's holes."),
  F("Appliquez une petite goutte de <strong>Loctite</strong> sur les 4 vis M3×16. Insérez-les par le dessus, à travers la base du moteur, et vissez-les de manière croisée et progressive.","Apply a small drop of <strong>Loctite</strong> to the 4 M3×16 screws. Insert them from the top, through the motor base, and tighten them progressively in a cross pattern."),
  F("Assurez-vous que les fils du moteur passent bien dans le dégagement prévu sans être écrasés.","Ensure the motor wires pass properly through the clearance without being crushed.")],
 warn:[F("L'utilisation du frein-filet Loctite est indispensable pour éviter que les vis ne se desserrent avec les vibrations.","Using Loctite threadlocker is essential to prevent screws from loosening due to vibrations.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Serrer le tube dans les mâchoires moteur","Clamp the tube in the motor jaws"),
 lede:F("Le tube carbone est fermement pincé entre les mâchoires supérieure et inférieure.","The carbon tube is firmly clamped between the upper and lower jaws."),
 parts:[
  {qty:"x1",name:F("Moteur + Mâchoire inférieure","Motor + Lower Jaw"),ref:""},
  {qty:"x1",name:F("Mâchoire supérieure","Upper jaw"),ref:""},
  {qty:"x1",name:F("Tube carbone de 170 mm","170 mm carbon tube"),ref:""},
  {qty:"x4",name:F("Vis M3×18 + Loctite","M3×18 screws + Loctite"),ref:""}],
 fastener:[F("Vis M3×18","Screw M3×18")],
 images:[{src:"tube_machoires_moteur.jpg",cap:F("Tube carbone inséré et serré entre les deux mâchoires moteur.","Carbon tube inserted and clamped between the two motor jaws.")}],
 instr:[
  F("Connectez la rallonge au moteur via la prise MR30, puis faites passer les fils dans le tube. Poussez le tube dans le canal de la mâchoire inférieure <strong>jusqu'à ce qu'il touche le fond</strong>.","Connect the lead to the motor via the MR30 plug, then route the wires through the tube. Push the tube into the lower jaw's channel <strong>until it bottoms out</strong>."),
  F("Placez la mâchoire supérieure par-dessus. Alignez les trous.","Place the upper jaw over it. Align the holes."),
  F("Insérez les 4 vis M3×18 par le dessous, ajoutez du Loctite et serrez en croix de façon homogène. Le tube ne doit absolument plus pouvoir tourner sur lui-même.","Insert the 4 M3×18 screws from below, add Loctite and tighten evenly in a cross pattern. The tube must absolutely not be able to twist anymore.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Fixer le bras sur la plaque","Fix the arm to the plate"),
 lede:F("Le bras complet s'attache maintenant à l'une des extrémités de la plaque principale.","The complete arm now attaches to one of the main plate's extremities."),
 parts:[
  {qty:"x1",name:F("Mâchoire inf. + sup. de fixation bras","Arm fixing lower + upper jaw"),ref:""},
  {qty:"x4",name:F("Vis longues M3×25 + Loctite","Long M3×25 screws + Loctite"),ref:""}],
 fastener:[F("Vis M3×25","Screw M3×25"),F("Insert M3","Insert M3")],
 images:[{src:"bras_fixation_plaque.jpg",cap:F("Bras fixé sur la plaque centrale à l'aide de vis M3×25 traversantes.","Arm fixed to the central plate using through M3×25 screws.")}],
 instr:[
  F("Placez les mâchoires inférieure et supérieure à l'extrémité libre du tube carbone.","Place the lower and upper jaws at the free end of the carbon tube."),
  F("Posez le tout sur l'une des 'oreilles' de fixation de la plaque principale, en alignant les trous verticaux avec les inserts de la plaque.","Rest the whole assembly on one of the main plate's mounting 'ears', aligning the vertical holes with the plate's inserts."),
  F("Insérez les vis M3×25 (avec Loctite) par le dessus. Serrez en croix pour fixer solidement l'ensemble à la plaque.","Insert the M3×25 screws (with Loctite) from the top. Tighten in a cross pattern to solidly fix the assembly to the plate.")]},
{phase:F("Bras · assemblage (×4)","Arm · assembly (×4)"),title:F("Répéter ×4 et mettre à niveau","Repeat ×4 and level"),
 lede:F("Répétez ces opérations pour les 4 bras, puis assurez-vous de l'alignement horizontal des moteurs.","Repeat these operations for all 4 arms, then ensure horizontal alignment of the motors."),
 parts:[{qty:"x1",name:F("Petit niveau à bulle","Small spirit level"),ref:""}],
 images:[{src:"bras_complet.png",cap:F("Aperçu d'un bras entièrement monté sur la structure.","Preview of a fully mounted arm on the structure.")}],
 instr:[
  F("Assemblez les trois autres bras en répétant la procédure exacte.","Assemble the other three arms by repeating the exact procedure."),
  F("Vérifiez la solidité globale : rien ne doit bouger.","Check overall solidity: nothing should move."),
  F("Posez le châssis bien à plat sur une table. Placez le niveau à bulle sur le sommet plat d'un moteur. Ajustez l'inclinaison du bras en desserrant légèrement la fixation côté plaque, corrigez, puis resserrez fermement. Répétez pour les 4 moteurs afin qu'ils soient tous parfaitement à l'horizontale.","Place the frame perfectly flat on a table. Place the spirit level on the flat top of a motor. Adjust the arm's tilt by slightly loosening the plate-side mount, correct, then firmly retighten. Repeat for all 4 motors so they are all perfectly horizontal.")]},
{phase:F("Structure","Structure"),title:F("Fixer les trains d'atterrissage","Fix the landing gear"),
 lede:F("Montez les pieds sous la plaque principale pour surélever le châssis et travailler plus confortablement.","Mount the feet under the main plate to elevate the frame and work more comfortably."),
 parts:[
  {qty:"x2",name:F("Pièces du train d'atterrissage","Landing gear parts"),ref:""},
  {qty:"x4",name:F("Vis M3","M3 screws"),ref:"+ Loctite"}],
 fastener:[F("Vis M3","Screw M3"),F("Insert M3","Insert M3")],
 images:[{src:"train_fixation_plaque.jpg",cap:F("Vis insérées par le dessus de la plaque pour ancrer les trains.","Screws inserted from the top of the plate to anchor the gear.")}],
 instr:[
  F("Alignez la platine d'un des trains d'atterrissage sous la plaque principale, face aux trous prévus.","Align the plate of one landing gear under the main plate, facing the designated holes."),
  F("Passez une vis M3 (avec Loctite) par le haut, à travers la plaque, pour visser dans l'insert du train. Serrez correctement.","Pass an M3 screw (with Loctite) from the top, through the plate, to screw into the gear's insert. Tighten properly."),
  F("Répétez cette étape pour le second train de l'autre côté du drone.","Repeat this step for the second gear on the other side of the drone.")]},
/* ===== ESC ===== */
{phase:F("ESC","ESC"),title:F("Étamer les pads de l'ESC","Tin the ESC pads"),
 lede:F("L'ESC central distribue la puissance. Préparez ses points de contact en y appliquant de l'étain.","The central ESC distributes power. Prepare its contact points by applying solder."),
 parts:[{qty:"x1",name:F("ESC SpeedyBee 60A","SpeedyBee 60A ESC"),ref:""}],
 images:[{src:"esc_pads_etamage.jpg",cap:F("Vue des pads M1-M4 et des gros pads d'alimentation étamés.","View of the tinned M1-M4 pads and large power pads.")}],
 instr:[
  F("Repérez les 4 groupes de petits rectangles (pads moteurs M1 à M4) et les deux grands rectangles (alimentation BAT+ et BAT-).","Locate the 4 groups of small rectangles (motor pads M1 to M4) and the two large rectangles (power BAT+ and BAT-)."),
  F("Chauffez un pad avec le fer et appliquez de l'étain pour former un dôme lisse. Procédez ainsi sur les 12 pads moteurs.","Heat a pad with the iron and apply solder to form a smooth dome. Do this on all 12 motor pads."),
  F("Augmentez la température du fer pour les gros pads BAT+ et BAT- (qui dissipent plus de chaleur) et formez-y un beau dôme d'étain.","Increase iron temperature for the large BAT+ and BAT- pads (which dissipate more heat) and form a nice solder dome on them.")]},
{phase:F("ESC","ESC"),title:F("Souder les phases + sens de rotation","Solder phases + rotation direction"),
 lede:F("Soudez les fils de chaque bras à l'ESC en fonction du sens de rotation requis.","Solder the wires from each arm to the ESC according to the required rotation direction."),
 parts:[{qty:"x4",name:F("Fils venant des bras","Wires coming from the arms"),ref:""}],
 images:[{src:"esc_phases_moteur.jpg",cap:F("Fils soudés selon l'ordre défini sur les pads correspondants.","Wires soldered in defined order on corresponding pads.")}],
 instr:[
  F("Placez l'ESC au centre, <strong>flèche orientée vers l'arrière du drone</strong>.","Place the ESC in the centre, <strong>arrow pointing towards the rear of the drone</strong>."),
  F("Associez les bras aux pads selon cette logique : M1 (Avant-Droit) sur pads M3 de l'ESC. M3 (Avant-Gauche) sur pads M1 de l'ESC. M2 (Arrière-Gauche) sur pads M2 de l'ESC. M4 (Arrière-Droit) sur pads M4 de l'ESC.","Match arms to pads per this logic: M1 (Front-Right) to ESC M3 pads. M3 (Front-Left) to ESC M1 pads. M2 (Rear-Left) to ESC M2 pads. M4 (Rear-Right) to ESC M4 pads."),
  F("<strong>Pour une rotation anti-horaire (CCW) :</strong> fil bleu au milieu, noir à droite, rouge à gauche.","<strong>For Counter-Clockwise (CCW) rotation:</strong> blue wire middle, black right, red left."),
  F("<strong>Pour une rotation horaire (CW) :</strong> fil noir à droite, rouge au milieu, bleu à gauche.","<strong>For Clockwise (CW) rotation:</strong> black wire right, red middle, blue left."),
  F("Soudez soigneusement chaque fil. Répétez pour les 4 bras.","Carefully solder each wire. Repeat for all 4 arms.")],
 tip:[F("S'il y a une erreur de sens observée plus tard, il suffira d'inverser deux des trois fils du moteur concerné sur l'ESC.","If a direction error is observed later, you just need to swap two of the three wires of the concerned motor on the ESC.")]},
{phase:F("ESC","ESC"),title:F("Souder l'alimentation","Solder the power"),
 lede:F("Raccordez l'alimentation principale de l'ESC.","Connect the main power supply to the ESC."),
 parts:[
  {qty:"x1",name:F("Connecteur XT60 mâle (gros fils)","Male XT60 connector (thick wires)"),ref:""},
  {qty:"x1",name:F("Condensateur 1000 µF","1000 µF capacitor"),ref:""},
  {qty:"x2",name:F("Fils de l'UBEC","UBEC wires"),ref:""}],
 images:[{src:"esc_alimentation.jpg",cap:F("Détail des branchements sur BAT+ et BAT- (XT60, condensateur, UBEC).","Detail of connections on BAT+ and BAT- (XT60, capacitor, UBEC).")}],
 instr:[
  F("Soudez le fil rouge du XT60 sur le pad <strong>BAT+</strong>, et le fil noir sur <strong>BAT-</strong>.","Solder the XT60's red wire to the <strong>BAT+</strong> pad, and the black wire to <strong>BAT-</strong>."),
  F("Soudez la patte longue du condensateur sur <strong>BAT+</strong> et la patte courte (bande grise) sur <strong>BAT-</strong>. Veillez à respecter cette polarité.","Solder the capacitor's long leg to <strong>BAT+</strong> and the short leg (grey stripe) to <strong>BAT-</strong>. Ensure this polarity is respected."),
  F("Soudez enfin le fil rouge de l'UBEC sur <strong>BAT+</strong> et le noir sur <strong>BAT-</strong>.","Finally solder the UBEC's red wire to <strong>BAT+</strong> and the black to <strong>BAT-</strong>.")],
 warn:[F("Avant d'aller plus loin, utilisez un multimètre en mode continuité pour vérifier l'absence de contact entre BAT+ et BAT-. Le multimètre ne doit émettre aucun son.","Before proceeding, use a multimeter in continuity mode to verify there is no contact between BAT+ and BAT-. The multimeter must not emit any sound.")]},
/* ===== CALCULATEUR ===== */
{phase:F("Calculateur","Companion computer"),title:F("Préparer la carte SD — Raspberry Pi Imager","Prepare the SD card — Raspberry Pi Imager"),
 lede:F("L'ordinateur de bord (Raspberry Pi) a besoin de son système d'exploitation. Préparez la carte micro-SD maintenant.","The onboard computer (Raspberry Pi) needs its operating system. Prepare the micro-SD card now."),
 parts:[{qty:"x1",name:F("Carte micro-SD + lecteur pour PC","micro-SD card + reader for PC"),ref:""}],
 instr:[
  F("Sur votre ordinateur, téléchargez <strong>Raspberry Pi Imager</strong> et insérez la carte SD.","On your computer, download <strong>Raspberry Pi Imager</strong> and insert the SD card."),
  F("Choisissez l'appareil 'Raspberry Pi 5', puis l'OS <strong>Raspberry Pi OS Lite (64-bit)</strong> (sans bureau graphique) et sélectionnez votre carte SD.","Choose 'Raspberry Pi 5' device, then the <strong>Raspberry Pi OS Lite (64-bit)</strong> OS (without graphical desktop) and select your SD card."),
  F("Dans les réglages avancés (Edit Settings) : définissez le nom d'hôte sur <span class='tag'>neutronit</span>, l'utilisateur sur <span class='tag'>neutronit</span> et le mot de passe sur <span class='tag'>neutronit2026</span>. Renseignez le nom et mot de passe de votre réseau Wi-Fi (idéalement le partage de connexion de votre téléphone).","In the advanced settings (Edit Settings): set hostname to <span class='tag'>neutronit</span>, user to <span class='tag'>neutronit</span> and password to <span class='tag'>neutronit2026</span>. Enter the name and password for your Wi-Fi network (ideally your phone's hotspot)."),
  F("Dans l'onglet Services, cochez <strong>Enable SSH</strong> (avec mot de passe). Sauvegardez et cliquez sur Write. Insérez la carte dans la Pi une fois terminé.","In the Services tab, tick <strong>Enable SSH</strong> (with password). Save and click Write. Insert the card into the Pi when finished.")],
 tip:[F("Il est important de respecter scrupuleusement la casse et les noms d'utilisateurs pour faciliter les prochaines étapes logicielles.","It's important to strictly respect case and usernames to facilitate the upcoming software steps.")]},
{phase:F("Calculateur","Companion computer"),title:F("Monter le ventilateur sur la Pi","Fit the cooler on the Pi"),
 lede:F("Fixez le module de refroidissement (Active Cooler) sur la Raspberry Pi pour éviter la surchauffe du processeur.","Mount the cooling module (Active Cooler) onto the Raspberry Pi to prevent processor overheating."),
 parts:[{qty:"x1",name:F("Active Cooler officiel","Official Active Cooler"),ref:""}],
 images:[{src:"raspberry_ventilateur.jpg",cap:F("Ventilateur clipsé et petit câble connecté sur le port FAN.","Fan clipped on and small cable connected to the FAN port.")}],
 instr:[
  F("Enlevez les protections des pads thermiques. Placez le bloc sur le processeur et alignez les clips de fixation avec les trous de la carte.","Remove the thermal pad protectors. Place the block on the processor and align the mounting clips with the board's holes."),
  F("Appuyez doucement jusqu'à entendre le clic de verrouillage des ergots.","Press gently until you hear the locking click of the pins."),
  F("Branchez le connecteur du ventilateur dans le petit port nommé <span class='tag'>FAN</span> sur la carte mère.","Plug the fan connector into the small port named <span class='tag'>FAN</span> on the motherboard.")]},
{phase:F("Calculateur","Companion computer"),title:F("Fixer la Raspberry Pi (anti-vibration)","Mount the Raspberry Pi (anti-vibration)"),
 lede:F("Montez la carte sur le châssis à l'aide de supports souples pour l'isoler des vibrations.","Mount the board to the frame using soft mounts to isolate it from vibrations."),
 parts:[
  {qty:"x4",name:F("Vis M2×10","M2×10 screws"),ref:""},
  {qty:"x4",name:F("Écrous M2","M2 nuts"),ref:""},
  {qty:"x4",name:F("Boules amortissement silicone","Silicone damping balls"),ref:""}],
 fastener:[F("Vis M2×10","Screw M2×10"),F("Écrou M2","Nut M2"),F("Insert M2","Insert M2")],
 images:[{src:"raspberry_fixation.jpg",cap:F("Montage anti-vibration avec écrou intermédiaire et boule silicone.","Anti-vibration mount with intermediate nut and silicone ball.")}],
 instr:[
  F("Passez une vis M2×10 dans chaque trou de fixation de la Raspberry Pi par le dessus.","Pass an M2×10 screw through each mounting hole of the Raspberry Pi from the top."),
  F("Sous la carte, vissez un écrou M2 sur chaque vis pour la bloquer contre le circuit, puis vissez une boule de silicone sur la partie restante du filetage.","Under the board, thread an M2 nut onto each screw to lock it against the circuit, then screw a silicone ball onto the remaining thread."),
  F("Placez l'ensemble au-dessus des inserts M2 de la grande plaque arrière, et vissez doucement les têtes supérieures.","Place the assembly above the M2 inserts on the large rear plate, and gently tighten the top screw heads.")]},
/* ===== INSTALLATION CAMERA (AVANCÉE) ===== */
{phase:F("Installation Caméra","Camera Installation"),title:F("Assembler la caméra dans sa coque","Assemble the camera in its shell"),
 lede:F("Installez le module caméra dans son support imprimé avant de le fixer à l'avant du drone.","Install the camera module into its printed mount before attaching it to the front of the drone."),
 parts:[
  {qty:"x1",name:F("Caméra Module 3 Wide","Camera Module 3 Wide"),ref:""},
  {qty:"x1",name:F("Nappe de 300 mm","300 mm flex cable"),ref:""},
  {qty:"x2",name:F("Vis M2×6","M2×6 screws"),ref:""},
  {qty:"x1",name:F("Coque caméra","Camera shell"),ref:""}],
 fastener:[F("Vis M2×6","Screw M2×6")],
 images:[{src:"camera_dans_coque.jpg",cap:F("Capteur glissé dans la coque et nappe branchée au dos.","Sensor slid into the shell and cable plugged into the back.")}],
 instr:[
  F("Soulevez le loquet de la caméra, insérez la nappe dorée (contacts vers le circuit imprimé) et refermez le loquet.","Lift the camera latch, insert the golden flex cable (contacts facing the circuit board) and close the latch."),
  F("Placez la caméra dans la coque imprimée, l'objectif ressortant par l'avant. Guidez la nappe vers l'arrière.","Place the camera inside the printed shell, lens protruding from the front. Guide the cable towards the back."),
  F("Fixez la caméra avec deux petites vis M2×6 placées à l'avant, de part et d'autre de l'objectif.","Secure the camera with two small M2×6 screws placed at the front, on either side of the lens.")]},
{phase:F("Installation Caméra","Camera Installation"),title:F("Fermer avec le clap caméra","Close with the camera clamp"),
 lede:F("Une façade imprimée vient sécuriser l'objectif de la caméra.","A printed front face secures the camera lens."),
 parts:[
  {qty:"x1",name:F("Façade (clap caméra)","Faceplate (camera clamp)"),ref:""},
  {qty:"x2",name:F("Vis M2×6","M2×6 screws"),ref:""}],
 fastener:[F("Vis M2×6","Screw M2×6"),F("Insert M2","Insert M2")],
 images:[{src:"clap_camera.jpg",cap:F("Clap frontal fixé avec les vis latérales.","Front clamp secured with lateral screws.")}],
 instr:[
  F("Positionnez la façade par-dessus l'objectif de la caméra.","Position the faceplate over the camera lens."),
  F("Vissez la façade sur les inserts latéraux de la coque à l'aide de deux vis M2×6.","Screw the faceplate onto the shell's lateral inserts using two M2×6 screws."),
  F("Vérifiez que la nappe sort librement sans être écrasée.","Verify that the flex cable exits freely without being crushed.")]},
{phase:F("Installation Caméra","Camera Installation"),title:F("Fixer le support caméra sur la plaque","Fix the camera mount to the plate"),
 lede:F("Le support en U fait le lien entre la caméra et le châssis du drone.","The U-shaped mount links the camera to the drone frame."),
 parts:[
  {qty:"x1",name:F("Support de caméra en U","U-shaped camera mount"),ref:""},
  {qty:"x2",name:F("Vis M3×6","M3×6 screws"),ref:""}],
 fastener:[F("Vis M3×6","Screw M3×6")],
 images:[{src:"support_camera_fixation.jpg",cap:F("Support vissé au bout du nez de la plaque principale.","Mount screwed to the very nose of the main plate.")}],
 instr:[
  F("Placez le support en U sur le bord avant de la plaque principale, les branches orientées vers le haut.","Place the U-mount on the front edge of the main plate, branches pointing up."),
  F("Fixez-le à la plaque à l'aide de deux vis M3×6 par le dessus.","Secure it to the plate using two M3×6 screws from the top.")]},
{phase:F("Installation Caméra","Camera Installation"),title:F("Monter la caméra + brancher la nappe","Mount the camera + plug the cable"),
 lede:F("Montez la tête caméra sur le support et connectez la nappe à la Raspberry Pi.","Mount the camera head onto the support and connect the cable to the Raspberry Pi."),
 parts:[{qty:"x1",name:F("Cylindre de fixation","Mounting cylinder"),ref:""}],
 images:[{src:"camera_montage_support.jpg",cap:F("Tête fixée et nappe branchée sur le port CAM 0.","Head secured and cable plugged into the CAM 0 port.")}],
 instr:[
  F("Placez la coque caméra entre les branches du support. Insérez le cylindre pour lier les deux pièces. Réglez légèrement l'inclinaison vers le bas et poussez fermement pour fixer la position.","Place the camera shell between the mount branches. Insert the cylinder to link both parts. Set a slight downward tilt and push firmly to hold the position."),
  F("Connectez l'autre extrémité de la nappe au port <span class='tag'>CAM 0</span> de la Raspberry Pi, avec les contacts métalliques orientés vers les ports USB/HDMI de la carte.","Connect the other end of the cable to the <span class='tag'>CAM 0</span> port on the Raspberry Pi, with the metal contacts facing the USB/HDMI ports of the board.")]},
/* ===== STACK CENTRAL ===== */
{phase:F("Stack central","Central stack"),title:F("Monter l'ESC sur la plaque","Mount the ESC on the plate"),
 lede:F("L'ESC central se monte surélevé grâce à des entretoises formées par des écrous.","The central ESC is mounted elevated using standoffs formed by nuts."),
 parts:[
  {qty:"x4",name:F("Vis M3×20","M3×20 screws"),ref:""},
  {qty:"x8",name:F("Écrous M3","M3 nuts"),ref:""},
  {qty:"x1",name:F("ESC câblé","Wired ESC"),ref:""}],
 fastener:[F("Vis M3×20","Screw M3×20"),F("Écrou M3","Nut M3")],
 images:[{src:"esc_montage_central.jpg",cap:F("ESC monté sur ses vis centrales, surélevé par des écrous.","ESC mounted on its central screws, elevated by nuts.")}],
 instr:[
  F("Passez les 4 vis M3×20 par le dessous des 4 trous situés autour de la découpe centrale de la plaque.","Pass the 4 M3×20 screws from under the 4 holes located around the central cutout of the plate."),
  F("Vissez un écrou sur chaque vis et serrez-le contre la plaque pour bloquer la vis.","Thread a nut onto each screw and tighten it against the plate to lock the screw."),
  F("Vissez un second écrou sur chaque vis en laissant environ 6 mm de jeu au-dessus pour servir de support à l'ESC. Ajustez la hauteur pour qu'ils soient au même niveau.","Thread a second nut onto each screw leaving about 6 mm clearance above to support the ESC. Adjust the height so they are level."),
  F("Placez l'ESC sur ces écrous, en vérifiant que la <strong>flèche de l'ESC pointe bien vers l'arrière du drone</strong>.","Place the ESC on these nuts, verifying that the <strong>ESC arrow points to the rear of the drone</strong>.")],
 tip:[F("Assurez-vous que les câbles des moteurs passent sous l'ESC sans être pincés.","Ensure the motor cables pass under the ESC without being pinched.")]},
{phase:F("Stack central","Central stack"),title:F("Monter le support + le Pixhawk","Mount the bracket + Pixhawk"),
 lede:F("Le contrôleur de vol (Pixhawk) vient se positionner au sommet de la tour centrale, amorti par de la mousse.","The flight controller (Pixhawk) is positioned atop the central tower, dampened by foam."),
 parts:[
  {qty:"x1",name:F("Support Pixhawk","Pixhawk mount"),ref:""},
  {qty:"x1",name:F("Pixhawk 6C Mini","Pixhawk 6C Mini"),ref:""},
  {qty:"—",name:F("Ruban mousse adhésive double face","Double-sided adhesive foam tape"),ref:""}],
 images:[{src:"pixhawk_fixation.jpg",cap:F("Pixhawk positionné avec sa flèche orientée vers l'avant.","Pixhawk positioned with its arrow pointing forward.")}],
 instr:[
  F("Positionnez le support plastique du Pixhawk sur les vis dépassant de l'ESC, puis bloquez-le avec 4 écrous M3.","Position the plastic Pixhawk mount over the screws protruding from the ESC, then lock it with 4 M3 nuts."),
  F("Collez un morceau de mousse adhésive au centre du support.","Stick a piece of adhesive foam in the centre of the mount."),
  F("Fixez le Pixhawk sur la mousse en veillant <strong>impérativement à ce que sa flèche 'FORWARD' pointe vers l'avant du drone</strong> (vers la caméra).","Fix the Pixhawk onto the foam, <strong>imperatively ensuring its 'FORWARD' arrow points to the front of the drone</strong> (towards the camera)."),
  F("Vérifiez l'horizontalité du boîtier à l'aide d'un petit niveau. Ajustez les écrous du support si nécessaire.","Check the housing's horizontal level with a small spirit level. Adjust the mount nuts if necessary.")],
 warn:[F("Une erreur d'orientation de la flèche du Pixhawk entraînera un dysfonctionnement immédiat des commandes de vol.","An orientation error of the Pixhawk arrow will result in an immediate flight control malfunction.")]},
/* ===== ALIMENTATION ===== */
{phase:F("Alimentation","Power"),title:F("Brancher le Power Module PM02","Connect the PM02 Power Module"),
 lede:F("Le PM02 régule le courant de la batterie pour fournir une tension propre au Pixhawk.","The PM02 regulates battery current to provide clean voltage to the Pixhawk."),
 parts:[{qty:"x1",name:F("Power Module PM02","PM02 Power Module"),ref:""}],
 images:[{src:"power_module_branchement.jpg",cap:F("Câble 6 broches du PM02 branché sur le port POWER du Pixhawk.","PM02 6-pin cable plugged into the Pixhawk's POWER port.")}],
 instr:[
  F("Branchez la petite prise blanche du câble 6 fils du PM02 sur le port <strong>POWER</strong> situé à l'avant du Pixhawk.","Plug the small white connector of the PM02's 6-wire cable into the <strong>POWER</strong> port at the front of the Pixhawk."),
  F("Branchez le gros connecteur <strong>XT60 OUT</strong> du PM02 sur le connecteur XT60 soudé précédemment à l'ESC. La prise restante (XT60 IN) servira pour la batterie.","Plug the PM02's large <strong>XT60 OUT</strong> connector into the XT60 connector previously soldered to the ESC. The remaining plug (XT60 IN) will be used for the battery.")]},
{phase:F("Alimentation","Power"),title:F("Alimenter la Pi (UBEC → broches 5V/GND)","Power the Pi (UBEC → 5V/GND pins)"),
 lede:F("L'UBEC abaisse la tension de la batterie pour alimenter la Raspberry Pi en 5V.","The UBEC steps down the battery voltage to power the Raspberry Pi with 5V."),
 parts:[{qty:"x1",name:F("UBEC ZTW 10A","ZTW 10A UBEC"),ref:""}],
 images:[{src:"alim_pi_ubec.jpg",cap:F("Fils UBEC (rouge et noir) connectés aux broches dédiées de la Pi.","UBEC wires (red and black) connected to the dedicated Pi pins.")}],
 instr:[
  F("Vérifiez que le petit cavalier (jumper) sur le boîtier UBEC est bien placé sur les broches <strong>5V</strong> (et non 12V).","Check that the small jumper on the UBEC casing is properly set on the <strong>5V</strong> pins (not 12V)."),
  F("Sur la rangée de broches de la Raspberry Pi, identifiez la broche 4 (pour le 5V) et la broche 6 (pour la masse / GND), en vous repérant par rapport aux ports extérieurs.","On the Raspberry Pi pin header, identify pin 4 (for 5V) and pin 6 (for ground / GND), using the external ports for orientation."),
  F("Insérez le connecteur du fil <strong>rouge de l'UBEC sur la broche 4</strong> et le fil <strong>noir sur la broche 6</strong>.","Insert the connector of the UBEC's <strong>red wire onto pin 4</strong> and the <strong>black wire onto pin 6</strong>.")],
 warn:[F("Il est vivement conseillé de tester la tension de sortie de l'UBEC au multimètre (doit être proche de 5.0V) avant de le brancher à la Pi. Une erreur de branchement endommagerait la carte.","It is strongly advised to test the UBEC output voltage with a multimeter (should be near 5.0V) before plugging it into the Pi. A connection error would damage the board.")]},
{phase:F("Alimentation","Power"),title:F("Fixer UBEC + PM à l'avant","Fix the UBEC + PM at the front"),
 lede:F("Ces deux boîtiers trouvent leur place à l'avant de la plaque centrale.","These two casings find their place at the front of the central plate."),
 parts:[{qty:"—",name:F("Mousse adhésive ou colliers de serrage","Adhesive foam or zip ties"),ref:""}],
 images:[{src:"ubec_pm_avant.jpg",cap:F("UBEC et PM02 fixés à l'avant du châssis.","UBEC and PM02 secured at the front of the frame.")}],
 instr:[
  F("Fixez le boîtier du PM02 et celui de l'UBEC sur l'espace libre à l'avant de la plaque principale, en utilisant de la mousse adhésive double face (ou des colliers en plastique si nécessaire).","Secure the PM02 casing and the UBEC casing on the free space at the front of the main plate, using double-sided adhesive foam (or plastic zip ties if necessary)."),
  F("Faites passer le grand connecteur XT60 IN du Power Module à travers le trou central de la plaque pour qu'il pende sous le drone, prêt à recevoir la batterie.","Pass the large XT60 IN connector of the Power Module through the plate's central hole so it hangs beneath the drone, ready to receive the battery.")]},
/* ===== BRANCHEMENTS ===== */
{phase:F("Branchements","Wiring"),title:F("Liaison UART Pi ↔ Pixhawk (TELEM 2)","UART link Pi ↔ Pixhawk (TELEM 2)"),
 lede:F("Cette liaison série permet à la Raspberry Pi et au Pixhawk de communiquer.","This serial link allows the Raspberry Pi and the Pixhawk to communicate."),
 parts:[{qty:"x1",name:F("Faisceau de câbles (GH1.25 vers Dupont)","Wire harness (GH1.25 to Dupont)"),ref:""}],
 images:[{src:"uart_pi_pixhawk.jpg",cap:F("Liaison série branchée entre TELEM 2 et les broches GPIO.","Serial link plugged between TELEM 2 and the GPIO pins.")}],
 instr:[
  F("Branchez le connecteur blanc sur le port <strong>TELEM 2</strong> du Pixhawk.","Plug the white connector into the Pixhawk's <strong>TELEM 2</strong> port."),
  F("Raccordez 3 fils à la Raspberry Pi en suivant ce schéma croisé :<table class='map'><tr><th>Sortie TELEM 2 (Pixhawk)</th><th>Entrée broche Pi</th></tr><tr><td>Pin 6 (GND / Masse)</td><td>Broche 9 ou 14 (GND)</td></tr><tr><td>Pin 2 (TX / Transmission)</td><td>Broche 10 (RX / Réception)</td></tr><tr><td>Pin 3 (RX / Réception)</td><td>Broche 8 (TX / Transmission)</td></tr></table>","Connect 3 wires to the Raspberry Pi following this crossed diagram:<table class='map'><tr><th>TELEM 2 Output (Pixhawk)</th><th>Pi Pin Input</th></tr><tr><td>Pin 6 (GND / Ground)</td><td>Pin 9 or 14 (GND)</td></tr><tr><td>Pin 2 (TX / Transmission)</td><td>Pin 10 (RX / Reception)</td></tr><tr><td>Pin 3 (RX / Reception)</td><td>Pin 8 (TX / Transmission)</td></tr></table>")],
 warn:[F("Ne connectez pas le fil 5V provenant du Pixhawk à la Pi, celle-ci étant déjà alimentée par l'UBEC.","Do not connect the 5V wire coming from the Pixhawk to the Pi, as it is already powered by the UBEC.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher l'ESC au Pixhawk","Connect the ESC to the Pixhawk"),
 lede:F("Associez les signaux moteurs de l'ESC aux sorties du Pixhawk.","Assign the ESC motor signals to the Pixhawk outputs."),
 parts:[{qty:"x1",name:F("Câble de signal ESC","ESC signal cable"),ref:""}],
 images:[{src:"esc_pixhawk_mainout.jpg",cap:F("Fils de signal M1-M4 et Masse connectés aux sorties MAIN OUT.","M1-M4 signal wires and Ground connected to MAIN OUT outputs.")}],
 instr:[
  F("Séparez les fils du câble plat de l'ESC pour pouvoir les brancher individuellement.","Separate the wires of the ESC flat cable to be able to plug them individually."),
  F("Insérez les connecteurs des fils M1, M2, M3 et M4 respectivement sur les broches du bas (marquées 'S') des colonnes <strong>MAIN OUT 1, 2, 3 et 4</strong> du Pixhawk.","Insert the connectors of wires M1, M2, M3 and M4 respectively onto the bottom pins (marked 'S') of columns <strong>MAIN OUT 1, 2, 3 and 4</strong> of the Pixhawk."),
  F("Placez le fil de masse (GND) sur l'une des broches du haut de ces mêmes colonnes (ligne marquée '-').","Place the ground wire (GND) on one of the top pins of these same columns (row marked '-')."),
  F("Isolez les fils restants (alimentation VCC, télémétrie ESC) avec du ruban adhésif, ils ne sont pas utilisés.","Insulate the remaining wires (VCC power, ESC telemetry) with tape, they are not used.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le GPS","Connect the GPS"),
 lede:F("Le module GPS permet d'obtenir la position exacte du drone.","The GPS module provides the drone's exact position."),
 parts:[{qty:"x1",name:F("Antenne GPS","GPS antenna"),ref:""}],
 images:[{src:"gps_branchement.jpg",cap:F("Câble du GPS branché sur le port correspondant du Pixhawk.","GPS cable plugged into the corresponding Pixhawk port.")}],
 instr:[F("Branchez le connecteur du câble GPS sur le port <strong>GPS 1</strong> situé sur le Pixhawk.","Plug the GPS cable connector into the <strong>GPS 1</strong> port located on the Pixhawk.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le récepteur ELRS","Connect the ELRS receiver"),
 lede:F("Ce petit module assure la liaison radio avec votre télécommande. Il nécessite une configuration logicielle pour communiquer correctement.","This small module ensures the radio link with your remote. It requires software configuration to communicate correctly."),
 parts:[{qty:"x1",name:F("Récepteur ELRS","ELRS receiver"),ref:""}],
 images:[{src:"elrs_branchement.jpg",cap:F("Récepteur ELRS câblé sur le port RC IN.","ELRS receiver wired to the RC IN port.")}],
 instr:[
  F("Soudez 3 fils sur le récepteur (GND, 5V, TX).","Solder 3 wires to the receiver (GND, 5V, TX)."),
  F("Branchez ces fils sur le port <strong>RC IN</strong> du Pixhawk : Masse sur le '-', 5V sur le '+', et le fil de signal (TX) sur le 'S'.","Connect these wires to the Pixhawk's <strong>RC IN</strong> port: Ground on '-', 5V on '+', and the signal wire (TX) on 'S'."),
  F("Mettez le Pixhawk sous tension via USB. La LED de l'ELRS clignotera rapidement au bout d'une minute, créant un réseau Wi-Fi.","Power the Pixhawk via USB. The ELRS LED will blink rapidly after a minute, creating a Wi-Fi network."),
  F("Connectez votre ordinateur au réseau Wi-Fi <span class='tag'>ExpressLRS RX</span>. Allez sur <span class='tag'>10.0.0.1</span> dans votre navigateur. Dans l'onglet Hardware, changez le mode de la broche TX pour <strong>SBUS</strong> et sauvegardez.","Connect your computer to the <span class='tag'>ExpressLRS RX</span> Wi-Fi network. Go to <span class='tag'>10.0.0.1</span> in your browser. In the Hardware tab, change the TX pin mode to <strong>SBUS</strong> and save.")]},
/* ===== TEST CRITIQUE ===== */
{phase:F("Test · critique","Test · critical"),title:F("Smoke Stopper — première mise sous tension","Smoke Stopper — first power-up"),
 lede:F("Procédez au test de continuité pour vérifier l'absence de court-circuit avant d'alimenter le système avec la batterie.","Perform a continuity test to ensure there are no short circuits before powering the system with the battery."),
 parts:[
  {qty:"x1",name:F("Multimètre","Multimeter"),ref:""},
  {qty:"x1",name:F("Smoke Stopper","Smoke Stopper"),ref:""}],
 images:[{src:"smoke_stopper.jpg",cap:F("Utilisation du Smoke Stopper lors de la première mise sous tension.","Using the Smoke Stopper during the first power-up.")}],
 instr:[
  F("Avec le multimètre en mode continuité, vérifiez les bornes de la prise XT60. Aucun bip ne doit retentir.","With the multimeter in continuity mode, check the terminals of the XT60 plug. No beep should sound."),
  F("Branchez le Smoke Stopper au connecteur XT60 du drone, puis branchez-y la batterie.","Plug the Smoke Stopper into the drone's XT60 connector, then plug the battery into it."),
  F("Si une LED verte s'allume en continu, l'alimentation est saine. Laissez tourner quelques instants puis débranchez correctement la batterie.","If a steady green LED lights up, the power supply is safe. Let it run for a few moments then properly unplug the battery.")],
 warn:[F("Si la LED est rouge ou si le composant s'éteint, débranchez immédiatement la batterie pour examiner vos soudures (risque de court-circuit).","If the LED is red or the component turns off, unplug the battery immediately to examine your soldering (short-circuit risk).")]},
/* ===== CONFIG QGC ===== */
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Flasher PX4 + Airframe","Flash PX4 + Airframe"),
 lede:F("Le logiciel QGroundControl permet d'installer le système de vol (PX4) sur le Pixhawk.","The QGroundControl software installs the flight system (PX4) onto the Pixhawk."),
 instr:[
  F("Reliez le Pixhawk à votre ordinateur via un câble USB et lancez QGroundControl (QGC).","Connect the Pixhawk to your computer via a USB cable and launch QGroundControl (QGC)."),
  F("Cliquez sur l'icône 'Q', allez dans <strong>Vehicle Setup</strong>, puis <strong>Firmware</strong>.","Click the 'Q' icon, go to <strong>Vehicle Setup</strong>, then <strong>Firmware</strong>."),
  F("Débranchez puis rebranchez le câble USB comme demandé, et sélectionnez <strong>PX4 Pro Stable</strong>. Laissez l'installation se terminer.","Unplug then replug the USB cable as requested, and select <strong>PX4 Pro Stable</strong>. Let the installation finish."),
  F("Allez ensuite dans l'onglet <strong>Airframe</strong>, choisissez <strong>Generic Quadrotor X</strong> et cliquez sur <strong>Apply and Restart</strong>.","Then go to the <strong>Airframe</strong> tab, choose <strong>Generic Quadrotor X</strong> and click <strong>Apply and Restart</strong>.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Géométrie des moteurs (deadcat)","Motor geometry (deadcat)"),
 lede:F("Le châssis a une géométrie asymétrique qu'il faut préciser au logiciel pour stabiliser le vol.","The frame has an asymmetrical geometry that must be specified to the software to stabilize flight."),
 instr:[
  F("Dans les paramètres géométriques (<strong>Airframe</strong> ou <strong>Vehicle Setup → Geometry</strong>), activez la configuration personnalisée.","In the geometric settings (<strong>Airframe</strong> or <strong>Vehicle Setup → Geometry</strong>), enable custom configuration."),
  F("Mesurez la distance entre le centre du Pixhawk et l'axe des moteurs. Entrez la valeur pour les moteurs avant (M1, M3), environ <span class='tag'>0.243 m</span>.","Measure the distance from the Pixhawk centre to the motor axis. Enter the value for the front motors (M1, M3), approximately <span class='tag'>0.243 m</span>."),
  F("Entrez la distance pour les moteurs arrière (M2, M4), environ <span class='tag'>0.263 m</span>. Sauvegardez.","Enter the distance for the rear motors (M2, M4), approximately <span class='tag'>0.263 m</span>. Save.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Binder le récepteur ELRS","Bind the ELRS receiver"),
 lede:F("Associez la radiocommande au récepteur du drone à l'aide d'une phrase clé.","Pair the remote control to the drone receiver using a binding phrase."),
 instr:[
  F("Rebranchez le Pixhawk en USB pour activer le réseau Wi-Fi de l'ELRS. Connectez-vous à <span class='tag'>ExpressLRS RX</span> sur l'ordinateur.","Plug the Pixhawk back into USB to activate the ELRS Wi-Fi network. Connect to <span class='tag'>ExpressLRS RX</span> on the computer."),
  F("Ouvrez l'adresse <span class='tag'>10.0.0.1</span> et saisissez une phrase secrète dans le champ <strong>Binding Phrase</strong>. Cliquez sur Save & Reboot.","Open the address <span class='tag'>10.0.0.1</span> and enter a secret phrase in the <strong>Binding Phrase</strong> field. Click Save & Reboot."),
  F("Allumez votre radiocommande, allez dans les réglages du module ELRS (Internal RF) et saisissez exactement la même 'Binding Phrase'. La LED du récepteur doit devenir verte et fixe.","Turn on your remote, go to the ELRS module settings (Internal RF) and enter exactly the same 'Binding Phrase'. The receiver LED should turn solid green.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer la radio","Calibrate the radio"),
 lede:F("Définissez l'amplitude des commandes de votre radio dans le logiciel.","Define the amplitude of your radio controls in the software."),
 instr:[
  F("Dans QGC, allez dans <strong>Vehicle Setup → Radio</strong>.","In QGC, go to <strong>Vehicle Setup → Radio</strong>."),
  F("Cliquez sur <strong>Calibrate</strong> et suivez les instructions à l'écran : déplacez les manches dans toutes les directions jusqu'en butée, et actionnez chaque interrupteur.","Click on <strong>Calibrate</strong> and follow the on-screen instructions: move the sticks in all directions to their limits, and toggle each switch.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer les capteurs","Calibrate the sensors"),
