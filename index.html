<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neutron IT — Notice de montage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EBEE;--panel:#FFFFFF;--panel-2:#F4F5F7;
    --ink:#15181D;--ink-soft:#5B6470;--ink-faint:#8B929C;
    --line:#D7DBE0;--line-strong:#C2C8D0;
    --accent:#FF5A1F;--accent-soft:#FFE9DF;
    --warn:#C92A1C;--warn-soft:#FCE9E7;--tip:#1F6BB8;--tip-soft:#E6F0FA;
    --shadow:0 1px 2px rgba(20,24,29,.06),0 8px 24px rgba(20,24,29,.06);--radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0E1115;--panel:#161A20;--panel-2:#1C2128;
    --ink:#E9ECF0;--ink-soft:#9AA3AE;--ink-faint:#6B7480;
    --line:#262C34;--line-strong:#323A44;
    --accent:#FF6A33;--accent-soft:#3a1d10;
    --warn:#F2685A;--warn-soft:#2a1614;--tip:#6BB0F0;--tip-soft:#11202e;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100dvh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;background-position:center}
  html[data-theme="dark"] body{background-image:linear-gradient(#1a1f26 1px,transparent 1px),linear-gradient(90deg,#1a1f26 1px,transparent 1px)}
  header{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--line-strong)}
  .bar{max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:30px;height:30px;flex:none;border-radius:7px;background:var(--accent);position:relative;box-shadow:0 0 0 4px var(--accent-soft)}
  .logo::before,.logo::after{content:"";position:absolute;background:#fff}
  .logo::before{inset:13px 6px;height:4px;border-radius:2px}
  .logo::after{inset:6px 13px;width:4px;border-radius:2px}
  .brand b{font-family:"Space Grotesk";font-weight:700;font-size:15px;letter-spacing:.04em}
  .brand span{display:block;font-size:11px;color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase}
  .counter{margin-left:auto;display:flex;align-items:baseline;gap:6px;font-family:"IBM Plex Mono";color:var(--ink-soft);font-size:13px}
  .counter b{color:var(--ink);font-size:18px;font-weight:600}
  .iconbtn{flex:none;height:36px;min-width:36px;padding:0 10px;border-radius:9px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);cursor:pointer;font-size:13px;font-weight:600;font-family:"IBM Plex Mono";display:grid;place-items:center;transition:.15s}
  .iconbtn:hover{border-color:var(--accent);color:var(--accent)}
  .progress{height:3px;background:var(--line);width:100%}
  .progress i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s cubic-bezier(.4,0,.2,1)}
  main{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:26px 20px 120px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:"IBM Plex Mono";font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .eyebrow::before{content:"";width:22px;height:1.5px;background:var(--accent)}
  h1{font-family:"Space Grotesk";font-weight:600;font-size:clamp(23px,4vw,33px);line-height:1.1;letter-spacing:-.01em;margin-bottom:6px}
  .lede{color:var(--ink-soft);font-size:15.5px;max-width:62ch;margin-bottom:24px}
  .grid{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .rail{display:flex;flex-direction:column;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--line);font-family:"Space Grotesk";font-weight:600;font-size:13px;letter-spacing:.02em}
  .card-h .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .manifest{padding:6px}
  .part{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px}
  .part+.part{margin-top:1px}.part:hover{background:var(--panel-2)}
  .qty{flex:none;min-width:44px;height:30px;padding:0 8px;border-radius:7px;background:var(--ink);color:var(--bg);font-family:"IBM Plex Mono";font-weight:600;font-size:12.5px;display:grid;place-items:center}
  html[data-theme="dark"] .qty{background:var(--accent);color:#101317}
  .part .pn{font-size:13.5px;line-height:1.25}
  .part .pref{font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);margin-top:1px}
  .fastbody{padding:11px 12px;display:flex;flex-wrap:wrap;gap:8px}
  .fitem{display:flex;align-items:center;gap:7px;font-family:"IBM Plex Mono";font-size:11.5px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .fitem svg{width:17px;height:17px;color:var(--accent);flex:none}
  .check{display:flex;gap:11px;padding:9px 12px;cursor:pointer;border-radius:9px;align-items:flex-start}
  .check:hover{background:var(--panel-2)}
  .check input{appearance:none;flex:none;width:19px;height:19px;margin-top:1px;border:1.6px solid var(--line-strong);border-radius:5px;cursor:pointer;position:relative;transition:.15s}
  .check input:checked{background:var(--accent);border-color:var(--accent)}
  .check input:checked::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center}
  .check input:checked + .ctext{color:var(--ink-faint);text-decoration:line-through}
  .ctext{font-size:13.5px;line-height:1.35}
  .ctext small{display:block;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);text-decoration:none}
  .checkfoot{padding:11px 16px;border-top:1px solid var(--line);font-family:"IBM Plex Mono";font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center}
  .checkfoot b{color:var(--accent)}
  .viewport{display:flex;flex-direction:column;gap:18px}
  .figure{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .frame{position:relative;background:repeating-conic-gradient(var(--panel-2) 0% 25%,var(--panel) 0% 50%) 50%/22px 22px;min-height:230px;display:grid;place-items:center}
  .frame img{display:block;width:100%;height:auto;max-height:60vh;object-fit:contain}
  .ph{padding:40px 24px;text-align:center;color:var(--ink-faint);width:100%}
  .ph svg{width:38px;height:38px;opacity:.5;margin-bottom:12px}
  .ph code{display:inline-block;margin-top:10px;font-family:"IBM Plex Mono";font-size:12.5px;background:var(--panel-2);border:1px dashed var(--line-strong);padding:5px 10px;border-radius:7px;color:var(--ink-soft)}
  .frame .tick{position:absolute;width:13px;height:13px;border:1.5px solid var(--accent);opacity:.7}
  .frame .tick.tl{top:9px;left:9px;border-right:0;border-bottom:0}.frame .tick.tr{top:9px;right:9px;border-left:0;border-bottom:0}
  .frame .tick.bl{bottom:9px;left:9px;border-right:0;border-top:0}.frame .tick.br{bottom:9px;right:9px;border-left:0;border-top:0}
  .cap{padding:10px 15px;font-size:12.5px;color:var(--ink-soft);border-top:1px solid var(--line);display:flex;gap:8px;align-items:baseline}
  .cap b{font-family:"IBM Plex Mono";color:var(--accent);font-size:11px;letter-spacing:.05em}
  .steps-h{font-family:"Space Grotesk";font-weight:600;font-size:14px;letter-spacing:.02em;margin:2px 0 4px;display:flex;align-items:center;gap:9px}
  .steps-h .ln{flex:1;height:1px;background:var(--line)}
  ol.instr{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:2px}
  ol.instr li{counter-increment:s;display:flex;gap:14px;padding:11px 4px;border-bottom:1px solid var(--line)}
  ol.instr li:last-child{border-bottom:0}
  ol.instr li::before{content:counter(s,decimal-leading-zero);flex:none;font-family:"IBM Plex Mono";font-weight:600;font-size:12px;color:var(--accent);width:26px;text-align:right;padding-top:2px}
  ol.instr li p{font-size:14.5px;line-height:1.5}
  ol.instr strong{font-weight:600}
  ol.instr .tag{font-family:"IBM Plex Mono";font-size:12px;background:var(--panel-2);border:1px solid var(--line);padding:1px 6px;border-radius:5px;white-space:nowrap}
  ol.instr .cmd{display:block;font-family:"IBM Plex Mono";font-size:12px;line-height:1.55;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-top:7px;white-space:pre-wrap;word-break:break-word;color:var(--ink)}
  table.map{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  table.map th,table.map td{border:1px solid var(--line);padding:6px 8px;text-align:left}
  table.map th{background:var(--panel-2);font-family:"Space Grotesk";font-weight:600;font-size:12px}
  table.map td{font-family:"IBM Plex Mono";font-size:12px}
  .note{display:flex;gap:12px;padding:13px 15px;border-radius:11px;font-size:13.7px;line-height:1.5}
  .note .ic{flex:none;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;font-family:"Space Grotesk"}
  .note.warn{background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 35%,transparent)}
  .note.warn .ic{background:var(--warn)}.note.warn b{color:var(--warn)}
  .note.tip{background:var(--tip-soft);border:1px solid color-mix(in srgb,var(--tip) 30%,transparent)}
  .note.tip .ic{background:var(--tip)}.note.tip b{color:var(--tip)}
  .notes-wrap{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .outro{text-align:center;padding:46px 20px;max-width:640px;margin:6px auto}
  .outro .big{width:86px;height:86px;border-radius:50%;background:var(--accent);display:grid;place-items:center;margin:0 auto 24px;box-shadow:0 0 0 10px var(--accent-soft)}
  .outro .big svg{width:44px;height:44px;color:#fff}
  .outro h1{font-size:clamp(28px,6vw,44px)}
  .outro p{color:var(--ink-soft);font-size:16px;margin-top:12px}
  .outro .sig{margin-top:28px;font-family:"IBM Plex Mono";font-size:13px;color:var(--accent);letter-spacing:.05em}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:color-mix(in srgb,var(--panel) 90%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--line-strong)}
  .navin{max-width:1180px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px}
  .nbtn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:10px;font-family:"Space Grotesk";font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s}
  .nbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .nbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.nbtn.primary:hover{filter:brightness(1.06);color:#fff}
  .nbtn:disabled{opacity:.4;cursor:not-allowed}
  .dots{flex:1;display:flex;align-items:center;gap:7px;overflow-x:auto;padding:6px 2px;scroll-padding:0 40px;-ms-overflow-style:none;scrollbar-width:none}
  .dots::-webkit-scrollbar{display:none}
  .dt{flex:none;width:9px;height:9px;border-radius:50%;background:var(--line-strong);border:0;cursor:pointer;transition:.2s;padding:0}
  .dt:hover{transform:scale(1.3)}.dt.on{width:26px;border-radius:5px;background:var(--accent)}.dt.done{background:var(--ink-soft)}
  .navlabel{display:none;font-family:"IBM Plex Mono";font-size:11px;color:var(--ink-faint);letter-spacing:.05em}
  @media(min-width:560px){.navlabel{display:block}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><div class="logo" aria-hidden="true"></div>
      <div><b>NEUTRON&nbsp;IT</b><span id="subtitle">Notice de montage</span></div></div>
    <div class="counter"><span id="cLbl">Étape</span> <b id="cNum">01</b>/<span id="cTot">00</span></div>
    <button class="iconbtn" id="lang" title="Language">EN</button>
    <button class="iconbtn" id="theme" title="Thème / Theme">◐</button>
  </div>
  <div class="progress"><i id="bar"></i></div>
</header>
<main id="stage" tabindex="-1"></main>
<nav class="nav"><div class="navin">
  <button class="nbtn" id="prev">‹ <span class="navlabel" id="prevL">Précédent</span></button>
  <div class="dots" id="dots"></div>
  <button class="nbtn primary" id="next"><span class="navlabel" id="nextL">Suivant</span> ›</button>
</div></nav>

<script>
/* Champs bilingues : {fr:"...", en:"..."}. Arrays instr/warn/tip = [{fr,en},...]. */
const F=(fr,en)=>({fr,en});
const STEPS=[
/* ===== PRÉPARATION ===== */
{phase:F("Préparation · 1/2","Preparation · 1/2"),title:F("Composants — électronique","Components — electronics"),
 lede:F("Rassemblez et cochez toute l'électronique avant de commencer.","Gather and tick off all the electronics before starting."),
 checklist:[
  {name:F("Moteurs SunnySky X2216 880KV","SunnySky X2216 880KV motors"),ref:"x4"},
  {name:F("ESC 4-en-1 SpeedyBee 60A","SpeedyBee 60A 4-in-1 ESC"),ref:"x1"},
  {name:F("Pixhawk 6C Mini + Power Module PM02","Pixhawk 6C Mini + PM02 Power Module"),ref:"x1"},
  {name:F("Raspberry Pi 5 8 Go + carte micro-SD","Raspberry Pi 5 8 GB + micro-SD"),ref:"x1"},
  {name:F("Ventilateur Active Cooler","Active Cooler fan"),ref:"x1"},
  {name:F("GPS u-blox M10 + mât","u-blox M10 GPS + mast"),ref:"x1"},
  {name:F("Récepteur ELRS Nano 2,4 GHz","ELRS Nano 2.4 GHz receiver"),ref:"x1"},
  {name:F("Caméra CSI Module 3 Wide + nappe 300 mm","CSI Camera Module 3 Wide + 300 mm cable"),ref:"x1"},
  {name:F("UBEC ZTW 10A (5V)","ZTW 10A UBEC (5V)"),ref:"x1"},
  {name:F("Batterie LiPo 4S 6000 mAh","LiPo 4S 6000 mAh battery"),ref:"x1"},
  {name:F("Radiocommande RadioMaster Pocket","RadioMaster Pocket radio"),ref:"x1"}]},
{phase:F("Préparation · 2/2","Preparation · 2/2"),title:F("Composants — structure & visserie","Components — structure & fasteners"),
 lede:F("Le mécanique et l'atelier. Toute la visserie est en M2 et M3.","Mechanical parts and workshop. All fasteners are M2 and M3."),
 checklist:[
  {name:F("Tubes carbone 16×14×500 mm","Carbon tubes 16×14×500 mm"),ref:"x4"},
  {name:F("Connecteurs MR30 (jaunes)","MR30 connectors (yellow)"),ref:"x4"},
  {name:F("Fils silicone 20 AWG rouge / noir / bleu","20 AWG silicone wire red / black / blue"),ref:""},
  {name:F("Hélices Gemfan 9047 CW + CCW","Gemfan 9047 CW + CCW props"),ref:"x2"},
  {name:F("XT60 + condensateur 1000 µF","XT60 + 1000 µF capacitor"),ref:""},
  {name:F("Inserts thermiques M3 et M2","M3 and M2 heat-set inserts"),ref:""},
  {name:F("Vis M3 (8/16/18/20/25) + écrous M3","M3 screws (8/16/18/20/25) + M3 nuts"),ref:""},
  {name:F("Vis M2×10 + écrous M2 + boules silicone","M2×10 screws + M2 nuts + silicone balls"),ref:""},
  {name:F("Ruban mousse PE + colliers + Loctite 243","PE foam tape + zip ties + Loctite 243"),ref:""},
  {name:F("Fer à souder, étain, flux, clés Allen","Soldering iron, solder, flux, hex keys"),ref:""},
  {name:F("Scie à métaux, étau, masque FFP2 + lunettes","Hacksaw, vise, FFP2 mask + goggles"),ref:""}],
 warn:[F("Ne lancez pas le montage tant que les deux pages ne sont pas cochées.","Do not start assembly until both pages are fully ticked off.")]},
/* ===== IMPRESSION ===== */
{phase:F("Impression 3D","3D printing"),title:F("Imprimer les pièces (PETG)","Print the parts (PETG)"),
 lede:F("Pièces structurelles en PETG noir. Priorité plaque + mâchoires.","Structural parts in black PETG. Plate + jaws first."),
 parts:[
  {qty:"x1",name:F("coque","shell"),ref:"coque.STL"},
  {qty:"x1",name:F("plaque_etage1","main plate"),ref:""},
  {qty:"x4",name:F("machoir_inférieur + supérieur","arm jaws lower + upper"),ref:""},
  {qty:"x4",name:F("machoir_inf. + sup. moteur","motor jaws lower + upper"),ref:""},
  {qty:"x4",name:F("plot","battery post"),ref:""},
  {qty:"x2",name:F("train_atterrissage","landing gear"),ref:""},
  {qty:"x1",name:F("support_caméra + support_pixhawk","camera + pixhawk mounts"),ref:""},
  {qty:"x1",name:F("coque + clap + cylindre caméra","camera shell + clamp + cylinder"),ref:""},
  {qty:"1 kg",name:F("Filament PETG noir, bien sec","Black PETG filament, well dried"),ref:""}],
 instr:[
  F("Réglages : buse <span class='tag'>240 °C</span>, plateau <span class='tag'>80 °C</span>, remplissage <strong>40 %</strong>, <strong>4 périmètres</strong>, couche 0,2 mm.","Settings: nozzle <span class='tag'>240 °C</span>, bed <span class='tag'>80 °C</span>, infill <strong>40%</strong>, <strong>4 perimeters</strong>, 0.2 mm layer."),
  F("Orientez les <strong>mâchoires trous de vis verticaux</strong>.","Orient the <strong>jaws with screw holes vertical</strong>.")],
 tip:[F("Priorité plaque + 8 mâchoires. Pendant l'impression, coupez les tubes.","Plate + 8 jaws first. Cut the tubes while it prints.")]},
{phase:F("Impression 3D","3D printing"),title:F("Contrôler les pièces","Inspect the parts"),
 lede:F("La qualité du fil et l'absence de défaut sont déterminantes.","Filament quality and defect-free parts are critical."),
 instr:[
  F("Retirez les supports à la pince.","Remove supports with pliers."),
  F("Vérifiez chaque trou : propre, rond, uniforme.","Check each hole: clean, round, uniform.")],
 warn:[
  F("<strong>PETG humide</strong> = stringing et couches mal soudées = zones de vis fragiles. Fil de qualité, bien sec.","<strong>Wet PETG</strong> = stringing and weak layers = fragile screw zones. Use quality, dry filament."),
  F("Rebutez toute pièce avec délaminage ou trou ovalisé sur une zone de vis.","Scrap any part with delamination or an oval hole on a screw area.")],
 tip:[F("Trou ovalisé : repassez un foret Ø3 à la main.","Oval hole: re-pass a Ø3 drill bit by hand.")]},
/* ===== TUBES ===== */
{phase:F("Tubes carbone","Carbon tubes"),title:F("Sécurité : découpe du carbone","Safety: cutting carbon"),
 lede:F("La poussière de fibre de carbone est dangereuse. On prépare le poste.","Carbon fibre dust is hazardous. Set up the workspace first."),
 parts:[
  {qty:"x1",name:F("Masque FFP2 + lunettes","FFP2 mask + goggles"),ref:""},
  {qty:"x1",name:F("Étau / serre-joint","Vise / clamp"),ref:""},
  {qty:"x1",name:F("Aspirateur à proximité","Vacuum nearby"),ref:""}],
 instr:[
  F("Travaillez en extérieur ou avec un aspirateur à côté.","Work outdoors or with a vacuum right next to you."),
  F("Masque FFP2 + lunettes — à garder jusqu'au nettoyage complet.","FFP2 mask + goggles — keep on until fully cleaned up.")],
 warn:[F("<strong>Poussière cancérigène.</strong> Ne soufflez jamais : aspirez.","<strong>Carcinogenic dust.</strong> Never blow it off: vacuum it.")]},
{phase:F("Tubes carbone","Carbon tubes"),title:F("Couper les tubes à 170 mm","Cut the tubes to 170 mm"),
 lede:F("Les 4 bras sont taillés à 170 mm, à la scie à métaux.","The 4 arms are cut to 170 mm with a hacksaw."),
 parts:[
  {qty:"x4",name:F("Tubes carbone 16×14 mm","Carbon tubes 16×14 mm"),ref:"170 mm"},
  {qty:"x1",name:F("Scie à métaux","Hacksaw"),ref:""},
  {qty:"x1",name:F("Papier de verre 400","400-grit sandpaper"),ref:""}],
 instr:[
  F("Marquez <span class='tag'>170 mm</span>, entourez de ruban de masquage.","Mark <span class='tag'>170 mm</span>, wrap masking tape around it."),
  F("Serrez le tube dans l'<strong>étau</strong> et sciez bien droit, sans forcer.","Clamp the tube in the <strong>vise</strong> and saw straight, without forcing."),
  F("Poncez les extrémités au papier 400.","Sand the ends with 400-grit."),
  F("Contrôlez : <strong>170 mm ± 1 mm</strong>. Répétez ×4.","Check: <strong>170 mm ± 1 mm</strong>. Repeat ×4.")]},
/* ===== INSERTS ===== */
{phase:F("Inserts thermiques","Heat-set inserts"),title:F("Technique de pose des inserts","Insert fitting technique"),
 lede:F("Les inserts laiton créent un filetage métal dans le PETG. Méthode pour toutes les poses.","Brass inserts create a metal thread in the PETG. Method for all fittings."),
 parts:[
  {qty:"~30",name:F("Inserts M3","M3 inserts"),ref:"OD 4,2"},
  {qty:"~6",name:F("Inserts M2","M2 inserts"),ref:""},
  {qty:"x1",name:F("Fer à souder à 200 °C","Soldering iron at 200 °C"),ref:""}],
 fastener:[F("Insert M3","Insert M3"),F("Insert M2","Insert M2")],
 instr:[

/* ===== BRANCHEMENTS ===== */
{phase:F("Branchements","Wiring"),title:F("Liaison UART Pi ↔ Pixhawk (TELEM 2)","UART link Pi ↔ Pixhawk (TELEM 2)"),
 lede:F("La télémétrie MAVLink passe par une liaison série croisée.","MAVLink telemetry runs over a crossed serial link."),
 parts:[{qty:"x1",name:F("Câble GH1.25 → Dupont","GH1.25 → Dupont cable"),ref:""}],
 images:[{src:"uart_pi_pixhawk.jpg",cap:F("TELEM 2 ↔ broches GPIO de la Pi (GND/TX/RX croisés).","TELEM 2 ↔ Pi GPIO pins (GND/TX/RX crossed).")}],
 instr:[
  F("Câblage :<table class='map'><tr><th>TELEM 2</th><th>→ Pi (broche)</th></tr><tr><td>pin 6 GND</td><td>broche 6</td></tr><tr><td>pin 2 TX</td><td>broche 10 (RX)</td></tr><tr><td>pin 3 RX</td><td>broche 8 (TX)</td></tr></table>","Wiring:<table class='map'><tr><th>TELEM 2</th><th>→ Pi (pin)</th></tr><tr><td>pin 6 GND</td><td>pin 6</td></tr><tr><td>pin 2 TX</td><td>pin 10 (RX)</td></tr><tr><td>pin 3 RX</td><td>pin 8 (TX)</td></tr></table>"),
  F("Rallonges : dénuder, étamer, connecter.","Extensions: strip, tin, connect.")],
 warn:[F("Croisé : TX d'un côté vers RX de l'autre. Ne branchez pas le 5V de TELEM 2.","Crossed: TX one side to RX the other. Do not connect TELEM 2 5V.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher l'ESC au Pixhawk","Connect the ESC to the Pixhawk"),
 lede:F("Ton ESC SpeedyBee est fourni avec un câble plat à 8 fils. D'un côté, il y a la prise blanche qui se clipse dans l'ESC. De l'autre côté, des fils nus ou fiches noires (Dupont).","Your SpeedyBee ESC comes with an 8-wire flat cable. One side clips into the ESC. The other side has bare wires or black Dupont plugs."),
 instr:[
  F("<strong>GND (-)</strong> : La masse (souvent noir) à brancher sur MAIN OUT.","<strong>GND (-)</strong>: Ground (often black) to connect to MAIN OUT."),
  F("<strong>BAT / VCC (+)</strong> : Le courant (souvent rouge) 👉 <strong>C'est lui qu'il faut neutraliser !</strong> Ne pas le brancher.","<strong>BAT / VCC (+)</strong>: Power (often red) 👉 <strong>Must be neutralized!</strong> Do not connect it."),
  F("<strong>M1, M2, M3, M4</strong> : Les signaux des 4 moteurs (souvent jaune/blanc/bleu) sur MAIN OUT.","<strong>M1, M2, M3, M4</strong>: The 4 motor signals (often yellow/white/blue) on MAIN OUT."),
  F("<strong>CUR / TLM</strong> : Courant et Télémétrie (on ne les branche pas sur MAIN OUT).","<strong>CUR / TLM</strong>: Current and Telemetry (do not connect them to MAIN OUT).")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le GPS","Connect the GPS"),
 lede:F("Le GPS M10 (compas intégré) sur son port dédié.","The M10 GPS (built-in compass) on its dedicated port."),
 images:[{src:"gps_branchement.jpg",cap:F("GPS M10 en GH1.25 sur le port GPS 1.","M10 GPS via GH1.25 on the GPS 1 port.")}],
 instr:[F("Branchez le GPS en <strong>GH1.25</strong> sur le port <span class='tag'>GPS 1</span>.","Plug the GPS via <strong>GH1.25</strong> into <span class='tag'>GPS 1</span>.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le récepteur ELRS","Connect the ELRS receiver"),
 lede:F("Le piège logiciel (Très important !) : Comme l'ELRS parle CRSF par défaut, si tu branches juste les câbles, le Pixhawk ne comprendra rien. Tu dois dire à ton récepteur de traduire son langage en SBUS.","Software trap (Very important!): Since ELRS speaks CRSF by default, if you just plug the cables, the Pixhawk won't understand. You must tell your receiver to translate its language to SBUS."),
 images:[{src:"elrs_branchement.jpg",cap:F("Récepteur ELRS branché en RC IN (SBUS).","ELRS receiver wired to RC IN (SBUS).")}],
 instr:[
  F("Branchez le récepteur : <span class='tag'>RC IN</span> en SBUS (signal sur TX + GND + 5V).","Wire the receiver: <span class='tag'>RC IN</span> SBUS (signal on TX + GND + 5V)."),
  F("Mets ton récepteur ELRS en mode Wi-Fi (laisse-le clignoter rapidement).","Put your ELRS receiver in Wi-Fi mode (let it blink rapidly)."),
  F("Connecte-toi dessus avec ton PC (adresse <span class='tag'>10.0.0.1</span>).","Connect to it with your PC (address <span class='tag'>10.0.0.1</span>)."),
  F("Va dans l'onglet <strong>Hardware</strong>.","Go to the <strong>Hardware</strong> tab."),
  F("Cherche la ligne qui correspond au pin <strong>TX</strong> (ou Serial TX) et change son mode en <strong>SBUS</strong>.","Look for the line corresponding to the <strong>TX</strong> pin (or Serial TX) and change its mode to <strong>SBUS</strong>.")]},
/* ===== TEST CRITIQUE ===== */
{phase:F("Test · critique","Test · critical"),title:F("Smoke Stopper — première mise sous tension","Smoke Stopper — first power-up"),
 lede:F("Avant toute première connexion batterie, on chasse les courts-circuits. Non optionnel.","Before any first battery connection, hunt for shorts. Not optional."),
 parts:[
  {qty:"x1",name:F("Smoke Stopper (XT60)","Smoke Stopper (XT60)"),ref:""},
  {qty:"x1",name:F("Multimètre","Multimeter"),ref:F("continuité","continuity")},
  {qty:"x1",name:F("Batterie LiPo 4S","LiPo 4S battery"),ref:""}],
 images:[{src:"smoke_stopper.jpg",cap:F("Smoke Stopper entre la batterie et le drone — LED de contrôle.","Smoke Stopper between battery and drone — indicator LED.")}],
 instr:[
  F("Multimètre (continuité) : <strong>aucun bip entre BAT+ et BAT−</strong>.","Multimeter (continuity): <strong>no beep between BAT+ and BAT−</strong>."),
  F("Intercalez le <strong>Smoke Stopper</strong>, branchez la batterie.","Insert the <strong>Smoke Stopper</strong>, connect the battery."),
  F("<strong>LED verte</strong> = OK. Vérifiez le démarrage Pixhawk + Pi, mesurez 5,0 V UBEC.","<strong>Green LED</strong> = OK. Check Pixhawk + Pi boot, measure 5.0 V UBEC."),
  F("Si nominal après 30 s, débranchez et retirez le Smoke Stopper.","If nominal after 30 s, disconnect and remove the Smoke Stopper.")],
 warn:[F("<strong>LED rouge ou échauffement = court-circuit → débranchez immédiatement.</strong> Jamais de 1re mise sous tension sans Smoke Stopper.","<strong>Red LED or heat = short → disconnect at once.</strong> Never a first power-up without a Smoke Stopper.")]},

/* ===== LOGICIEL PI ===== */
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Le calculateur de bord","The companion computer"),
 lede:F("Le drone vole maintenant en manuel. Place au cerveau autonome : la Raspberry Pi exécute le script de vol et envoie la vidéo au PC sol. Les prochaines pages la mettent en route.","The drone now flies manually. Now the autonomous brain: the Raspberry Pi runs the flight script and streams video to the ground PC. The next pages bring it online."),
 instr:[
  F("On va : la trouver sur le réseau → s'y connecter en SSH → installer le logiciel → lancer.","We will: find it on the network → connect via SSH → install software → launch."),
  F("Tout se fait depuis le PC sol, partage de connexion du téléphone activé.","All from the ground PC, with the phone hotspot on.")],
 tip:[F("La carte SD a déjà été préparée à l'étape « Configurer la carte SD ».","The SD card was already prepared in the \"Flash the SD card\" step.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Trouver les adresses IP","Find the IP addresses"),
 lede:F("Le .local ne marche pas ici. PC et Pi sur le même Wi-Fi (partage de connexion).","The .local doesn't work here. PC and Pi on the same Wi-Fi (hotspot)."),
 instr:[
  F("IP de la Pi : dans les réglages du <strong>partage de connexion</strong> (ex. <span class='tag'>172.20.10.2</span>).","Pi IP: in the <strong>hotspot</strong> settings (e.g. <span class='tag'>172.20.10.2</span>)."),
  F("IP du PC : <span class='tag'>ipconfig</span> dans PowerShell, ligne IPv4 (ex. <span class='tag'>172.20.10.3</span>).","PC IP: <span class='tag'>ipconfig</span> in PowerShell, IPv4 line (e.g. <span class='tag'>172.20.10.3</span>).")],
 tip:[F("PC et Pi partagent les 3 premiers blocs d'IP.","PC and Pi share the first 3 IP blocks.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Connexion SSH","SSH connection"),
 lede:F("On se connecte à la Pi depuis le PC.","Connect to the Pi from the PC."),
 instr:[
  F("Connexion :<code class='cmd'>ssh neutronit@172.20.10.2</code>","Connect:<code class='cmd'>ssh neutronit@172.20.10.2</code>"),
  F("Erreur après reflash :<code class='cmd'>ssh-keygen -R 172.20.10.2</code>puis relancez.","Error after a reflash:<code class='cmd'>ssh-keygen -R 172.20.10.2</code>then retry.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Installer le logiciel","Install the software"),
 lede:F("Deux commandes installent tout.","Two commands install everything."),
 instr:[
  F("Système, OpenCV, caméra, GStreamer :<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>","System, OpenCV, camera, GStreamer:<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>"),
  F("Python + PATH + groupe série :<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>","Python + PATH + serial group:<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Activer l'UART","Enable UART"),
 lede:F("On libère le port série matériel.","Free up the hardware serial port."),
 instr:[
  F("<span class='tag'>sudo raspi-config</span> → Interface Options → Serial Port → login shell <strong>NON</strong>, hardware <strong>OUI</strong> → Reboot.","<span class='tag'>sudo raspi-config</span> → Interface Options → Serial Port → login shell <strong>NO</strong>, hardware <strong>YES</strong> → Reboot."),
  F("Vérifier :<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>","Check:<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Éditer le code via VS Code (Remote SSH)","Edit the code via VS Code (Remote SSH)"),
 lede:F("VS Code se connecte à la Pi : vous éditez les fichiers directement dessus, terminal compris.","VS Code connects to the Pi: you edit files on it directly, terminal included."),
 instr:[
  F("Installez l'extension <strong>Remote - SSH</strong> dans VS Code.","Install the <strong>Remote - SSH</strong> extension in VS Code."),
  F("Cliquez l'icône verte <span class='tag'>&gt;&lt;</span> en bas à gauche → <strong>Connect to Host</strong> → <strong>Add New SSH Host</strong>.","Click the green <span class='tag'>&gt;&lt;</span> icon (bottom-left) → <strong>Connect to Host</strong> → <strong>Add New SSH Host</strong>."),
  F("Saisissez <span class='tag'>ssh neutronit@172.20.10.2</span>, mot de passe <span class='tag'>neutronit2026</span>.","Enter <span class='tag'>ssh neutronit@172.20.10.2</span>, password <span class='tag'>neutronit2026</span>."),
  F("<strong>Open Folder</strong> → <span class='tag'>/home/neutronit</span>. Le terminal intégré (Terminal → New Terminal) tourne déjà sur la Pi.","<strong>Open Folder</strong> → <span class='tag'>/home/neutronit</span>. The built-in terminal (Terminal → New Terminal) already runs on the Pi.")],
 tip:[F("Plus besoin d'écran ni de clavier sur la Pi : tout passe par VS Code.","No screen or keyboard on the Pi: everything goes through VS Code.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Lancer le vol","Launch the flight"),
 lede:F("Trois commandes (remplacez l'IP par celle du PC).","Three commands (replace the IP with the PC's)."),
 instr:[
  F("Télémétrie :<code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:172.20.10.3:14550 --out udp:127.0.0.1:14551</code>","Telemetry:<code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:172.20.10.3:14550 --out udp:127.0.0.1:14551</code>"),
  F("Caméra :<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://172.20.10.3:5600</code>","Camera:<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://172.20.10.3:5600</code>"),
  F("Vol autonome :<code class='cmd'>python3 neutronit_vol.py</code>","Autonomous flight:<code class='cmd'>python3 neutronit_vol.py</code>")]},

/* ============================ UI ============================ */
const UI={
  fr:{sub:"Notice de montage",step:"Étape",prev:"Précédent",next:"Suivant",done:"Terminé",
    parts:"Matériel nécessaire",screws:"Visserie",check:"Liste de vérification",howto:"Marche à suivre",
    caution:"Précaution",tip:"Astuce",checked:"Coché",photo:"Photo à placer dans le dossier"},
  en:{sub:"Assembly guide",step:"Step",prev:"Previous",next:"Next",done:"Done",
    parts:"Required parts",screws:"Fasteners",check:"Checklist",howto:"How to",
    caution:"Caution",tip:"Tip",checked:"Checked",photo:"Photo to add to the folder"}
};
let lang='fr';
const L=x=> (x&&typeof x==='object'&&'fr'in x)? x[lang] : x;

const stage=document.getElementById('stage'),dotsWrap=document.getElementById('dots'),bar=document.getElementById('bar');
const cNum=document.getElementById('cNum'),cTot=document.getElementById('cTot');
const prevB=document.getElementById('prev'),nextB=document.getElementById('next');
let i=0;
const pad=n=>String(n).padStart(2,'0');
const PH=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
const SCREW=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M8.5 4h7l-1.5 3.2h-4z"/><path d="M10 7.2h4V18l-2 3-2-3z"/></svg>`;
const INSERT=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="7" y="5" width="10" height="14" rx="1.2"/><path d="M9.4 5v14M12 5v14M14.6 5v14"/></svg>`;
const CHECKMARK=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;

function partsCard(s){
  const rows=s.parts.map(p=>`<div class="part"><div class="qty">${L(p.qty)}</div><div><div class="pn">${L(p.name)}</div>${p.ref?`<div class="pref">${L(p.ref)}</div>`:''}</div></div>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].parts}</div><div class="manifest">${rows}</div></div>`;
}
function fastCard(s){
  const it=s.fastener.map(f=>{const t=L(f);const ic=/nsert/i.test(t)?INSERT:SCREW;return `<div class="fitem">${ic}<span>${t}</span></div>`;}).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].screws}</div><div class="fastbody">${it}</div></div>`;
}
function checkCard(s){
  const rows=s.checklist.map((c,k)=>`<label class="check"><input type="checkbox" data-k="${k}"><span class="ctext">${L(c.name)}${c.ref?`<small>${L(c.ref)}</small>`:''}</span></label>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].check}</div><div class="manifest">${rows}</div><div class="checkfoot"><span>${UI[lang].checked}</span><span><b id="ckN">0</b> / ${s.checklist.length}</span></div></div>`;
}
function figure(im){
  return `<figure class="figure"><div class="frame"><span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
    <img src="${im.src}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="ph" style="display:none">${PH}<div>${UI[lang].photo}</div><code>${im.src}</code></div></div>
    ${im.cap?`<figcaption class="cap"><b>FIG</b><span>${L(im.cap)}</span></figcaption>`:''}</figure>`;
}
function notes(arr,type){
  if(!arr||!arr.length) return '';
  const ic=type==='warn'?'!':'i', lbl=type==='warn'?UI[lang].caution:UI[lang].tip;
  return arr.map(t=>`<div class="note ${type}"><div class="ic">${ic}</div><div><b>${lbl}.</b> ${L(t)}</div></div>`).join('');
}
function render(){
  const s=STEPS[i];
  if(s.outro){
    stage.innerHTML=`<div class="outro"><div class="big">${CHECKMARK}</div><h1>${L(s.title)}</h1><p>${L(s.lede)}</p><div class="sig">${s.sig}</div></div>`;
  }else{
    let rail = s.checklist?checkCard(s):(s.parts?partsCard(s):'');
    if(s.fastener) rail+=fastCard(s);
    const left = rail?`<div class="rail">${rail}</div>`:'';
    const imgs=(s.images||[]).map(figure).join('');
    const instr=s.instr?`<div class="steps-h">${UI[lang].howto}<span class="ln"></span></div><ol class="instr">${s.instr.map(t=>`<li><p>${L(t)}</p></li>`).join('')}</ol>`:'';
    const co=(s.warn||s.tip)?`<div class="notes-wrap">${notes(s.warn,'warn')}${notes(s.tip,'tip')}</div>`:'';
    const main=(imgs||instr||co)?`<div class="viewport">${imgs}${instr}${co}</div>`:'';
    const cols=left?`<div class="grid"><div>${left}</div>${main||'<div></div>'}</div>`:main;
    stage.innerHTML=`<div class="eyebrow">${L(s.phase)}</div><h1>${L(s.title)}</h1>${s.lede?`<p class="lede">${L(s.lede)}</p>`:''}${cols}`;
    if(s.checklist){const bx=stage.querySelectorAll('.check input'),ck=document.getElementById('ckN');
      bx.forEach(b=>b.addEventListener('change',()=>{ck.textContent=[...bx].filter(x=>x.checked).length;}));}
  }
  cNum.textContent=pad(i+1);
  bar.style.width=((i+1)/STEPS.length*100)+'%';
  prevB.disabled=i===0;
  nextB.innerHTML=i===STEPS.length-1?`<span class="navlabel">${UI[lang].done}</span> ✓`:`<span class="navlabel">${UI[lang].next}</span> ›`;
  [...dotsWrap.children].forEach((d,k)=>{d.className='dt'+(k===i?' on':(k<i?' done':''));});
  const a=dotsWrap.children[i]; if(a) a.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  stage.focus({preventScroll:true});
  window.scrollTo({top:0,behavior:'smooth'});
}
function buildDots(){
  dotsWrap.innerHTML='';
  STEPS.forEach((s,k)=>{const b=document.createElement('button');b.className='dt';b.title=`${pad(k+1)} — ${L(s.title)}`;b.addEventListener('click',()=>{i=k;render();});dotsWrap.appendChild(b);});
}
function applyLang(){
  document.documentElement.lang=lang;
  document.getElementById('subtitle').textContent=UI[lang].sub;
  document.getElementById('cLbl').textContent=UI[lang].step;
  document.getElementById('prevL').textContent=UI[lang].prev;
  document.getElementById('nextL').textContent=UI[lang].next;
  document.getElementById('lang').textContent=lang==='fr'?'EN':'FR';
  cTot.textContent=pad(STEPS.length);
  buildDots(); render();
}
prevB.addEventListener('click',()=>{if(i>0){i--;render();}});
nextB.addEventListener('click',()=>{if(i<STEPS.length-1){i++;render();}});
document.addEventListener('keydown',e=>{if(e.target.matches('input'))return;
  if(e.key==='ArrowRight'&&i<STEPS.length-1){i++;render();}
  if(e.key==='ArrowLeft'&&i>0){i--;render();}});
document.getElementById('lang').addEventListener('click',()=>{lang=lang==='fr'?'en':'fr';applyLang();});
document.getElementById('theme').addEventListener('click',()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',d?'light':'dark');});
applyLang();
</script>
