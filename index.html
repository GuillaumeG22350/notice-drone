/* ===== ALIMENTATION ===== */
{phase:F("Alimentation","Power"),title:F("Brancher le Power Module PM02","Connect the PM02 Power Module"),
 lede:F("Le PM02 régule le courant de la batterie pour fournir une tension propre au Pixhawk.","The PM02 regulates battery current to provide clean voltage to the Pixhawk."),
 parts:[{qty:"x1",name:F("Power Module PM02","PM02 Power Module"),ref:""}],
 images:[
  {src:"cable_power_module.jpg",cap:F("Câble et connecteur du Power Module.","Power Module cable and connector.")},
  {src:"power_module_branchement.jpg",cap:F("Câble 6 broches du PM02 branché sur le port POWER du Pixhawk.","PM02 6-pin cable plugged into the Pixhawk's POWER port.")}
 ],
 instr:[
  F("Branchez la petite prise blanche du câble 6 fils du PM02 sur le port <strong>POWER</strong> situé à l'avant du Pixhawk.","Plug the small white connector of the PM02's 6-wire cable into the <strong>POWER</strong> port at the front of the Pixhawk."),
  F("Branchez le gros connecteur <strong>XT60 OUT</strong> du PM02 sur le connecteur XT60 soudé précédemment à l'ESC. La prise restante (XT60 IN) servira pour la batterie.","Plug the PM02's large <strong>XT60 OUT</strong> connector into the XT60 connector previously soldered to the ESC. The remaining plug (XT60 IN) will be used for the battery.")]},
{phase:F("Alimentation","Power"),title:F("Alimenter la Pi (UBEC → broches 5V/GND)","Power the Pi (UBEC → 5V/GND pins)"),
 lede:F("L'UBEC abaisse la tension de la batterie pour alimenter la Raspberry Pi en 5V.","The UBEC steps down the battery voltage to power the Raspberry Pi with 5V."),
 parts:[{qty:"x1",name:F("UBEC ZTW 10A","ZTW 10A UBEC"),ref:""}],
 images:[
  {src:"ubec_seul.jpg",cap:F("Régulateur de tension UBEC.","UBEC voltage regulator.")},
  {src:"alim_pi_ubec.jpg",cap:F("Fils UBEC (rouge et noir) connectés aux broches dédiées de la Pi.","UBEC wires (red and black) connected to the dedicated Pi pins.")}
 ],
 instr:[
  F("Vérifiez que le petit cavalier (jumper) sur le boîtier UBEC est bien placé sur les broches <strong>5V</strong> (et non 12V).","Check that the small jumper on the UBEC casing is properly set on the <strong>5V</strong> pins (not 12V)."),
  F("Sur la rangée de broches de la Raspberry Pi, identifiez la broche 4 (pour le 5V) et la broche 6 (pour la masse / GND), en vous repérant par rapport aux ports extérieurs.","On the Raspberry Pi pin header, identify pin 4 (for 5V) and pin 6 (for ground / GND), using the external ports for orientation."),
  F("Insérez le connecteur du fil <strong>rouge de l'UBEC sur la broche 4</strong> et le fil <strong>noir sur la broche 6</strong>.","Insert the connector of the UBEC's <strong>red wire onto pin 4</strong> and the <strong>black wire onto pin 6</strong>.")],
 warn:[F("Il est vivement conseillé de tester la tension de sortie de l'UBEC au multimètre (doit être proche de 5.0V) avant de le brancher à la Pi. Une erreur de branchement endommagerait la carte.","It is strongly advised to test the UBEC output voltage with a multimeter (should be near 5.0V) before plugging it into the Pi. A connection error would damage the board.")]},
{phase:F("Alimentation","Power"),title:F("Fixer UBEC + PM à l'avant","Fix the UBEC + PM at the front"),
 lede:F("Ces deux boîtiers trouvent leur place à l'avant de la plaque centrale.","These two casings find their place at the front of the central plate."),
 parts:[{qty:"—",name:F("Mousse adhésive ou colliers de serrage","Adhesive foam or zip ties"),ref:""}],
 images:[{src:"ubec_pm_avant.jpg",cap:F("UBEC et PM02 fixés à l'avant du châssis.","UBEC and PM02 secured at the front of the frame.")}],
 instr:[
  F("Fixez le boîtier du PM02 et celui de l'UBEC sur l'espace libre à l'avant de la plaque principale, en utilisant de la mousse adhésive double face (ou des colliers en plastique si nécessaire).","Secure the PM02 casing and the UBEC casing on the free space at the front of the main plate, using double-sided adhesive foam (or plastic zip ties if necessary)."),
  F("Faites passer le grand connecteur XT60 IN du Power Module à travers le trou central de la plaque pour qu'il pende sous le drone, prêt à recevoir la batterie.","Pass the large XT60 IN connector of the Power Module through the plate's central hole so it hangs beneath the drone, ready to receive the battery.")]},
/* ===== BRANCHEMENTS ===== */
{phase:F("Branchements","Wiring"),title:F("Liaison UART Pi ↔ Pixhawk (TELEM 2)","UART link Pi ↔ Pixhawk (TELEM 2)"),
 lede:F("Cette liaison série permet à la Raspberry Pi et au Pixhawk de communiquer.","This serial link allows the Raspberry Pi and the Pixhawk to communicate."),
 parts:[{qty:"x1",name:F("Faisceau de câbles (GH1.25 vers Dupont)","Wire harness (GH1.25 to Dupont)"),ref:""}],
 images:[{src:"uart_pi_pixhawk.jpg",cap:F("Liaison série branchée entre TELEM 2 et les broches GPIO.","Serial link plugged between TELEM 2 and the GPIO pins.")}],
 instr:[
  F("Branchez le connecteur blanc sur le port <strong>TELEM 2</strong> du Pixhawk.","Plug the white connector into the Pixhawk's <strong>TELEM 2</strong> port."),
  F("Raccordez 3 fils à la Raspberry Pi en suivant ce schéma croisé :<table class='map'><tr><th>Sortie TELEM 2 (Pixhawk)</th><th>Entrée broche Pi</th></tr><tr><td>Pin 6 (GND / Masse)</td><td>Broche 9 ou 14 (GND)</td></tr><tr><td>Pin 2 (TX / Transmission)</td><td>Broche 10 (RX / Réception)</td></tr><tr><td>Pin 3 (RX / Réception)</td><td>Broche 8 (TX / Transmission)</td></tr></table>","Connect 3 wires to the Raspberry Pi following this crossed diagram:<table class='map'><tr><th>TELEM 2 Output (Pixhawk)</th><th>Pi Pin Input</th></tr><tr><td>Pin 6 (GND / Ground)</td><td>Pin 9 or 14 (GND)</td></tr><tr><td>Pin 2 (TX / Transmission)</td><td>Pin 10 (RX / Reception)</td></tr><tr><td>Pin 3 (RX / Reception)</td><td>Pin 8 (TX / Transmission)</td></tr></table>")],
 warn:[F("Ne connectez pas le fil 5V provenant du Pixhawk à la Pi, celle-ci étant déjà alimentée par l'UBEC.","Do not connect the 5V wire coming from the Pixhawk to the Pi, as it is already powered by the UBEC.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher l'ESC au Pixhawk","Connect the ESC to the Pixhawk"),
 lede:F("Associez les signaux moteurs de l'ESC aux sorties du Pixhawk. Vous devrez réaliser une rallonge soudée pour ce branchement.","Assign the ESC motor signals to the Pixhawk outputs. You will need to make a soldered extension for this connection."),
 parts:[
  {qty:"x1",name:F("Câble plat 8 broches (fourni avec ESC)","8-pin flat cable (provided with ESC)"),ref:""},
  {qty:"x4",name:F("Rallonges avec connecteurs Dupont femelles","Extensions with female Dupont connectors"),ref:""},
  {qty:"—",name:F("Gaines thermorétractables","Heat shrink tubing"),ref:""}],
 images:[
  {src:"connecteurs_esc_pixhawk.jpg",cap:F("Câblage rallongé avec connecteurs Dupont prêts pour le Pixhawk.","Extended wiring with Dupont connectors ready for the Pixhawk.")},
  {src:"esc_pixhawk_mainout.jpg",cap:F("Fils de signal et Masse connectés aux sorties MAIN OUT.","Signal wires and Ground connected to MAIN OUT outputs.")}
 ],
 instr:[
  F("L'ESC est fourni avec un câble 8 broches qui ne se branche pas directement sur le Pixhawk. Branchez le connecteur blanc sur l'ESC, puis coupez le connecteur à l'autre extrémité pour libérer les fils.","The ESC comes with an 8-pin cable that does not plug directly into the Pixhawk. Plug the white connector into the ESC, then cut off the connector at the other end to free the wires."),
  F("Dénudez et étamez les fils correspondants aux Moteurs 1 à 4 et à la Masse (GND). Prenez vos rallonges (terminées par des connecteurs noirs Dupont), dénudez, étamez, et soudez-les aux fils de l'ESC. Isolez chaque soudure avec une gaine thermorétractable.","Strip and tin the wires corresponding to Motors 1 to 4 and Ground (GND). Take your extensions (terminated with black Dupont connectors), strip, tin, and solder them to the ESC wires. Insulate each joint with heat shrink tubing."),
  F("La correspondance du câblage vers les broches du bas (marquées 'S') du Pixhawk est vitale, car l'ESC est retourné :<table class='map'><tr><th>Moteur Physique (QGC)</th><th>Fil sortant de l'ESC</th><th>→ Branché sur Pixhawk</th></tr><tr><td>Avant-Gauche (Moteur 3)</td><td>Pad ESC M1</td><td>MAIN OUT 3</td></tr><tr><td>Avant-Droit (Moteur 1)</td><td>Pad ESC M3</td><td>MAIN OUT 1</td></tr><tr><td>Arrière-Gauche (Moteur 2)</td><td>Pad ESC M2</td><td>MAIN OUT 2</td></tr><tr><td>Arrière-Droit (Moteur 4)</td><td>Pad ESC M4</td><td>MAIN OUT 4</td></tr></table>","The wiring mapping to the bottom pins (marked 'S') of the Pixhawk is vital, as the ESC is backward:<table class='map'><tr><th>Physical Motor (QGC)</th><th>Wire exiting ESC</th><th>→ Plugged to Pixhawk</th></tr><tr><td>Front-Left (Motor 3)</td><td>ESC Pad M1</td><td>MAIN OUT 3</td></tr><tr><td>Front-Right (Motor 1)</td><td>ESC Pad M3</td><td>MAIN OUT 1</td></tr><tr><td>Rear-Left (Motor 2)</td><td>ESC Pad M2</td><td>MAIN OUT 2</td></tr><tr><td>Rear-Right (Motor 4)</td><td>ESC Pad M4</td><td>MAIN OUT 4</td></tr></table>"),
  F("Placez le fil de masse (GND) rallongé sur l'une des broches du haut (ligne marquée '-') d'une des colonnes MAIN OUT. Isolez les fils non utilisés.","Place the extended ground wire (GND) on one of the top pins (row marked '-') of a MAIN OUT column. Insulate the unused wires.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le GPS","Connect the GPS"),
 lede:F("Le module GPS permet d'obtenir la position exacte du drone.","The GPS module provides the drone's exact position."),
 parts:[{qty:"x1",name:F("Antenne GPS","GPS antenna"),ref:""}],
 images:[
  {src:"gps.jpg",cap:F("Vue du module GPS.","View of the GPS module.")},
  {src:"gps_branchement.jpg",cap:F("Câble du GPS branché sur le port correspondant du Pixhawk.","GPS cable plugged into the corresponding Pixhawk port.")}
 ],
 instr:[F("Branchez le connecteur du câble GPS sur le port <strong>GPS 1</strong> situé sur le Pixhawk.","Plug the GPS cable connector into the <strong>GPS 1</strong> port located on the Pixhawk.")]},
{phase:F("Branchements","Wiring"),title:F("Brancher le récepteur ELRS","Connect the ELRS receiver"),
 lede:F("Ce petit module assure la liaison radio avec votre télécommande. Il nécessite une configuration logicielle pour communiquer correctement.","This small module ensures the radio link with your remote. It requires software configuration to communicate correctly."),
 parts:[{qty:"x1",name:F("Récepteur ELRS","ELRS receiver"),ref:""}],
 images:[
  {src:"recepteur_elrs.jpg",cap:F("Module de réception ELRS.","ELRS receiver module.")},
  {src:"elrs_branchement.jpg",cap:F("Récepteur ELRS câblé sur le port RC IN.","ELRS receiver wired to the RC IN port.")}
 ],
 instr:[
  F("Soudez 3 fils sur le récepteur (GND, 5V, TX).","Solder 3 wires to the receiver (GND, 5V, TX)."),
  F("Branchez ces fils sur le port <strong>RC IN</strong> du Pixhawk : Masse sur le '-', 5V sur le '+', et le fil de signal (TX) sur le 'S'.","Connect these wires to the Pixhawk's <strong>RC IN</strong> port: Ground on '-', 5V on '+', and the signal wire (TX) on 'S'."),
  F("Mettez le Pixhawk sous tension via USB. La LED de l'ELRS clignotera rapidement au bout d'une minute, créant un réseau Wi-Fi.","Power the Pixhawk via USB. The ELRS LED will blink rapidly after a minute, creating a Wi-Fi network."),
  F("Connectez votre ordinateur au réseau Wi-Fi <span class='tag'>ExpressLRS RX</span>. Allez sur <span class='tag'>10.0.0.1</span> dans votre navigateur. Dans l'onglet Hardware, changez le mode de la broche TX pour <strong>SBUS</strong> et sauvegardez.","Connect your computer to the <span class='tag'>ExpressLRS RX</span> Wi-Fi network. Go to <span class='tag'>10.0.0.1</span> in your browser. In the Hardware tab, change the TX pin mode to <strong>SBUS</strong> and save.")]},
/* ===== TEST CRITIQUE ===== */
{phase:F("Test · critique","Test · critical"),title:F("Smoke Stopper — première mise sous tension","Smoke Stopper — first power-up"),
 lede:F("Procédez au test de continuité pour vérifier l'absence de court-circuit avant d'alimenter le système avec la batterie.","Perform a continuity test to ensure there are no short circuits before powering the system with the battery."),
 parts:[
  {qty:"x1",name:F("Multimètre","Multimeter"),ref:""},
  {qty:"x1",name:F("Smoke Stopper","Smoke Stopper"),ref:""}],
 images:[{src:"smoke_stopper.jpg",cap:F("Utilisation du Smoke Stopper lors de la première mise sous tension.","Using the Smoke Stopper during the first power-up.")}],
 instr:[
  F("Avec le multimètre en mode continuité, vérifiez les bornes de la prise XT60. Aucun bip ne doit retentir.","With the multimeter in continuity mode, check the terminals of the XT60 plug. No beep should sound."),
  F("Branchez le Smoke Stopper au connecteur XT60 du drone, puis branchez-y la batterie.","Plug the Smoke Stopper into the drone's XT60 connector, then plug the battery into it."),
  F("Si une LED verte s'allume en continu, l'alimentation est saine. Laissez tourner quelques instants puis débranchez correctement la batterie.","If a steady green LED lights up, the power supply is safe. Let it run for a few moments then properly unplug the battery.")],
 warn:[F("Si la LED est rouge ou si le composant s'éteint, débranchez immédiatement la batterie pour examiner vos soudures (risque de court-circuit).","If the LED is red or the component turns off, unplug the battery immediately to examine your soldering (short-circuit risk).")]},
/* ===== CONFIG QGC ===== */
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Prérequis logiciels","Software pre-requisites"),
 lede:F("Avant de brancher le contrôleur de vol, préparez votre ordinateur.","Before plugging in the flight controller, prepare your computer."),
 instr:[F("Lancez <strong>toujours</strong> le logiciel QGroundControl (QGC) sur votre ordinateur en premier, avant de brancher le câble USB au Pixhawk.","<strong>Always</strong> launch the QGroundControl (QGC) software on your computer first, before plugging the USB cable into the Pixhawk.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Flasher PX4 + Airframe","Flash PX4 + Airframe"),
 lede:F("Le logiciel QGroundControl permet d'installer le système de vol (PX4) sur le Pixhawk.","The QGroundControl software installs the flight system (PX4) onto the Pixhawk."),
 images:[
  {src:"firmware.jpg",cap:F("Sélection du Firmware PX4 Pro Stable.","Selecting the PX4 Pro Stable Firmware.")},
  {src:"airframe.jpg",cap:F("Sélection de la cellule Generic Quadrotor X.","Selecting the Generic Quadrotor X airframe.")}
 ],
 instr:[
  F("Reliez le Pixhawk à votre ordinateur via un câble USB. QGC détecte la carte.","Connect the Pixhawk to your computer via a USB cable. QGC detects the board."),
  F("Cliquez sur l'icône 'Q' (haut gauche), allez dans <strong>Vehicle Setup</strong>, puis <strong>Firmware</strong>.","Click the 'Q' icon (top left), go to <strong>Vehicle Setup</strong>, then <strong>Firmware</strong>."),
  F("Débranchez puis rebranchez le câble USB comme demandé, et sélectionnez <strong>PX4 Pro Stable</strong>. Laissez l'installation se terminer.","Unplug then replug the USB cable as requested, and select <strong>PX4 Pro Stable</strong>. Let the installation finish."),
  F("Allez ensuite dans l'onglet <strong>Airframe</strong>, choisissez <strong>Generic Quadrotor X</strong> et cliquez sur <strong>Apply and Restart</strong>.","Then go to the <strong>Airframe</strong> tab, choose <strong>Generic Quadrotor X</strong> and click <strong>Apply and Restart</strong>.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Géométrie des moteurs (deadcat)","Motor geometry (deadcat)"),
 lede:F("C'est dans l'onglet Actuators qu'il faut préciser la géométrie asymétrique du châssis pour stabiliser le vol et mapper les moteurs.","It is in the Actuators tab that you must specify the asymmetric frame geometry to stabilise flight and map the motors."),
 images:[{src:"actuators.jpg",cap:F("Menu Actuators : configuration PWM et géométrie.","Actuators menu: PWM setup and geometry.")}],
 instr:[
  F("Allez dans le menu <strong>Vehicle Setup → Actuators</strong>. Assurez-vous que les sorties MAIN 1 à 4 correspondent bien aux Moteurs 1 à 4 dans la section 'Motor 1-4'. Réglez le 'PWM Main' Rate à <span class='tag'>400 Hz</span>.","Go to the <strong>Vehicle Setup → Actuators</strong> menu. Ensure MAIN outputs 1 to 4 correspond to Motors 1 to 4 in the 'Motor 1-4' section. Set the 'PWM Main' Rate to <span class='tag'>400 Hz</span>."),
  F("Descendez dans la page jusqu'à la section <strong>Geometry</strong> et activez la géométrie personnalisée (Custom).","Scroll down the page to the <strong>Geometry</strong> section and enable custom geometry."),
  F("Mesurez la distance entre le centre du Pixhawk et l'axe des moteurs. Entrez la valeur pour les moteurs avant (M1, M3), environ <span class='tag'>0.243 m</span>.","Measure the distance from the Pixhawk centre to the motor axis. Enter the value for the front motors (M1, M3), approximately <span class='tag'>0.243 m</span>."),
  F("Entrez la distance pour les moteurs arrière (M2, M4), environ <span class='tag'>0.263 m</span>. Sauvegardez.","Enter the distance for the rear motors (M2, M4), approximately <span class='tag'>0.263 m</span>. Save.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Binder le récepteur ELRS","Bind the ELRS receiver"),
 lede:F("Associez la radiocommande au récepteur du drone à l'aide d'une phrase clé (Binding Phrase).","Pair the remote control to the drone receiver using a binding phrase."),
 images:[{src:"bind_elrs.mp4",cap:F("Procédure de Bind Wi-Fi sur l'ELRS.","Wi-Fi Bind procedure on the ELRS.")}],
 instr:[
  F("Rebranchez le Pixhawk en USB pour activer le réseau Wi-Fi du récepteur ELRS. Connectez-vous à <span class='tag'>ExpressLRS RX</span> sur votre ordinateur.","Plug the Pixhawk back into USB to activate the ELRS receiver's Wi-Fi network. Connect to <span class='tag'>ExpressLRS RX</span> on your computer."),
  F("Ouvrez l'adresse <span class='tag'>10.0.0.1</span> et saisissez une phrase secrète dans le champ <strong>Binding Phrase</strong>. Cliquez sur Save & Reboot.","Open the address <span class='tag'>10.0.0.1</span> and enter a secret phrase in the <strong>Binding Phrase</strong> field. Click Save & Reboot."),
  F("Allumez votre radiocommande RadioMaster Pocket, <strong>activez son Wi-Fi</strong> pour accéder à l'interface de réglage du module ELRS (Internal RF). Saisissez exactement la même 'Binding Phrase' dans l'émetteur. La LED du récepteur sur le drone doit devenir verte et fixe.","Turn on your RadioMaster Pocket remote, <strong>activate its Wi-Fi</strong> to access the ELRS module (Internal RF) setup interface. Enter exactly the same 'Binding Phrase' in the transmitter. The receiver LED on the drone should turn solid green.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer la radio","Calibrate the radio"),
 lede:F("Définissez l'amplitude des commandes de votre radio dans le logiciel.","Define the amplitude of your radio controls in the software."),
 images:[{src:"radio.jpg",cap:F("Menu de calibration de la radiocommande.","Radio calibration menu.")}],
 instr:[
  F("Dans QGC, allez dans <strong>Vehicle Setup → Radio</strong>.","In QGC, go to <strong>Vehicle Setup → Radio</strong>."),
  F("Cliquez sur <strong>Calibrate</strong> et suivez les instructions à l'écran : déplacez les manches dans toutes les directions jusqu'en butée, et actionnez chaque interrupteur.","Click on <strong>Calibrate</strong> and follow the on-screen instructions: move the sticks in all directions to their limits, and toggle each switch.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Calibrer les capteurs","Calibrate the sensors"),
 lede:F("Les capteurs de position et d'orientation doivent être calibrés.","Position and orientation sensors must be calibrated."),
 images:[{src:"sensors.jpg",cap:F("Menu de calibration des capteurs inertiels et magnétiques.","Inertial and magnetic sensors calibration menu.")}],
 instr:[
  F("Allez dans <strong>Vehicle Setup → Sensors</strong>. Commencez par le <strong>Gyroscope</strong> : le drone doit rester immobile sur la table.","Go to <strong>Vehicle Setup → Sensors</strong>. Start with the <strong>Gyroscope</strong>: the drone must remain still on the table."),
  F("Lancez la calibration de l'<strong>Accéléromètre</strong> : placez le drone dans les 6 positions indiquées par les animations à l'écran et attendez la validation pour chaque posture.","Start the <strong>Accelerometer</strong> calibration: place the drone in the 6 positions indicated by the on-screen animations and wait for validation for each posture."),
  F("Pour le <strong>Compas</strong>, manipulez le drone dans toutes les directions (loin de sources métalliques) jusqu'à ce que la calibration se termine.","For the <strong>Compass</strong>, manipulate the drone in all directions (away from metal sources) until calibration completes."),
  F("Effectuez enfin le <strong>Level Horizon</strong> en posant le drone bien à plat.","Finally perform the <strong>Level Horizon</strong> by placing the drone perfectly flat.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer la batterie et calibrer l'ESC","Configure the battery and calibrate the ESC"),
 lede:F("Renseignez les caractéristiques de la batterie et synchronisez l'ESC. <strong>À faire SANS HÉLICES.</strong>","Enter the battery characteristics and synchronise the ESC. <strong>To be done WITHOUT PROPELLERS.</strong>"),
 images:[{src:"power.jpg",cap:F("Onglet Power : configuration de la batterie et bouton de calibration ESC.","Power tab: battery configuration and ESC calibration button.")}],
 instr:[
  F("Allez dans <strong>Vehicle Setup → Power</strong>. Réglez 'Number of Cells' sur <strong>4</strong>. Indiquez la tension pleine ('Full voltage') à <span class='tag'>4.2 V</span> par cellule et la tension vide ('Empty') à <span class='tag'>3.7 V</span>.","Go to <strong>Vehicle Setup → Power</strong>. Set 'Number of Cells' to <strong>4</strong>. Set full voltage to <span class='tag'>4.2 V</span> per cell and empty voltage to <span class='tag'>3.7 V</span>."),
  F("Saisissez la valeur <span class='tag'>18.182</span> dans le champ 'Voltage Divider' du PM02.","Enter the value <span class='tag'>18.182</span> in the PM02 'Voltage Divider' field."),
  F("Descendez en bas de cette même page 'Power' pour trouver le bouton <strong>ESC PWM Calibrate</strong>. Débranchez la batterie. Cliquez sur le bouton, branchez la batterie quand le logiciel le demande pour synchroniser la plage des gaz, et attendez la confirmation de l'ESC.","Scroll down this same 'Power' page to find the <strong>ESC PWM Calibrate</strong> button. Unplug the battery. Click the button, plug the battery when the software prompts to synchronise the throttle range, and wait for ESC confirmation.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Tester le sens des moteurs","Test the motor direction"),
 lede:F("Vérifiez le sens de rotation de chaque moteur (Toujours sans hélices).","Verify the rotation direction of each motor (Always without propellers)."),
 instr:[
  F("Retournez dans <strong>Vehicle Setup → Actuators</strong>.","Return to <strong>Vehicle Setup → Actuators</strong>."),
  F("Testez chaque moteur à bas régime (5-10%) depuis les curseurs de l'interface et observez leur sens de rotation réel.","Test each motor at low speed (5-10%) using the interface sliders and observe their actual rotation direction."),
  F("Vérifiez : Moteur 1 (Avant-Droit) et Moteur 2 (Arrière-Gauche) doivent tourner dans le sens <strong>horaire (CW)</strong>. Moteur 3 (Avant-Gauche) et Moteur 4 (Arrière-Droit) doivent tourner dans le sens <strong>anti-horaire (CCW)</strong>.","Verify: Motor 1 (Front-Right) and Motor 2 (Rear-Left) must spin <strong>clockwise (CW)</strong>. Motor 3 (Front-Left) and Motor 4 (Rear-Right) must spin <strong>counter-clockwise (CCW)</strong>."),
  F("Si un moteur tourne dans le mauvais sens, dessoudez et inversez deux de ses trois fils sur la carte de l'ESC.","If a motor spins the wrong way, desolder and swap two of its three wires on the ESC board.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer les modes de vol","Configure flight modes"),
 lede:F("Assignez les interrupteurs de votre radio pour basculer entre les modes de vol.","Assign your radio switches to toggle between flight modes."),
 images:[{src:"flight_modes.jpg",cap:F("Configuration des canaux pour les modes de vol.","Flight modes channel configuration.")}],
 instr:[
  F("Allez dans <strong>Vehicle Setup → Flight Modes</strong>.","Go to <strong>Vehicle Setup → Flight Modes</strong>."),
  F("Sur un interrupteur à 3 positions, assignez respectivement les modes <strong>Stabilized</strong>, <strong>Altitude</strong>, et <strong>Position</strong>.","On a 3-position switch, assign respectively the <strong>Stabilized</strong>, <strong>Altitude</strong>, and <strong>Position</strong> modes."),
  F("Sur un autre interrupteur, assignez le mode <strong>Offboard</strong> (pilotage autonome).","On another switch, assign the <strong>Offboard</strong> mode (autonomous piloting)."),
  F("Assignez un interrupteur dédié à la fonction d'urgence <strong>Return to Land (RTL)</strong>.","Assign a dedicated switch for the <strong>Return to Land (RTL)</strong> emergency function.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Activer la vidéo dans QGC","Enable video in QGC"),

/* ============================ UI ============================ */
let lang = 'fr'; // Langue par défaut
const UI = {
  fr: {
    sub: "Notice de montage détaillée", step: "Étape", prev: "Précédent", next: "Suivant", done: "Terminer",
    parts: "Matériel requis", screws: "Visserie", check: "Checklist", howto: "Procédure",
    caution: "Attention", tip: "Astuce", checked: "Validé"
  },
  en: {
    sub: "Detailed assembly guide", step: "Step", prev: "Previous", next: "Next", done: "Finish",
    parts: "Required hardware", screws: "Fasteners", check: "Checklist", howto: "Procedure",
    caution: "Caution", tip: "Tip", checked: "Validated"
  }
};
const L = x => (x && typeof x === 'object' && 'fr' in x) ? x[lang] : x;

const stage = document.getElementById('stage'), dotsWrap = document.getElementById('dots'), bar = document.getElementById('bar');
const cNum = document.getElementById('cNum'), cTot = document.getElementById('cTot');
const prevB = document.getElementById('prev'), nextB = document.getElementById('next');
const langToggle = document.getElementById('langToggle'), langTxt = document.getElementById('langTxt');
let i = 0;
const pad = n => String(n).padStart(2, '0');
const SCREW = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M8.5 4h7l-1.5 3.2h-4z"/><path d="M10 7.2h4V18l-2 3-2-3z"/></svg>`;
const INSERT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="7" y="5" width="10" height="14" rx="1.2"/><path d="M9.4 5v14M12 5v14M14.6 5v14"/></svg>`;
const CHECKMARK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;

// Fonction pour sauvegarder l'état des cases à cocher avant de redessiner l'interface
function getCheckState() {
  const checkboxes = stage.querySelectorAll('.check input');
  return Array.from(checkboxes).map(cb => cb.checked);
}
// Fonction pour restaurer l'état
function setCheckState(stateArray) {
  const checkboxes = stage.querySelectorAll('.check input');
  checkboxes.forEach((cb, idx) => {
    if (stateArray[idx]) cb.checked = true;
  });
  updateCheckCount();
}
function updateCheckCount() {
  const bx = stage.querySelectorAll('.check input');
  const ck = document.getElementById('ckN');
  if (ck) ck.textContent = [...bx].filter(x => x.checked).length;
}

function partsCard(s) {
  const rows = s.parts.map(p => `<div class="part"><div class="qty">${L(p.qty)}</div><div><div class="pn">${L(p.name)}</div>${p.ref ? `<div class="pref">${L(p.ref)}</div>` : ''}</div></div>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].parts}</div><div class="manifest">${rows}</div></div>`;
}
function fastCard(s) {
  const it = s.fastener.map(f => { const t = L(f); const ic = /nsert/i.test(t) ? INSERT : SCREW; return `<div class="fitem">${ic}<span>${t}</span></div>`; }).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].screws}</div><div class="fastbody">${it}</div></div>`;
}
function checkCard(s) {
  const rows = s.checklist.map((c, k) => `<label class="check"><input type="checkbox" data-k="${k}"><span class="ctext">${L(c.name)}${c.ref ? `<small>${L(c.ref)}</small>` : ''}</span></label>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].check}</div><div class="manifest">${rows}</div><div class="checkfoot"><span>${UI[lang].checked}</span><span><b id="ckN">0</b> / ${s.checklist.length}</span></div></div>`;
}
function figure(im) {
  const isVideo = im.src.endsWith('.mp4') || im.src.endsWith('.webm');
  const mediaHtml = isVideo 
    ? `<video src="${im.src}" autoplay loop muted playsinline></video>`
    : `<img src="${im.src}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
       <div class="ph" style="display:none"><div>[Image / Vidéo manquante]</div><code>${im.src}</code></div>`;
       
  return `<figure class="figure"><div class="frame"><span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
    ${mediaHtml}</div>
    ${im.cap ? `<figcaption class="cap"><b>FIG</b><span>${L(im.cap)}</span></figcaption>` : ''}</figure>`;
}
function notes(arr, type) {
  if (!arr || !arr.length) return '';
  const ic = type === 'warn' ? '!' : 'i', lbl = type === 'warn' ? UI[lang].caution : UI[lang].tip;
  return arr.map(t => `<div class="note ${type}"><div class="ic">${ic}</div><div><b>${lbl}.</b> ${L(t)}</div></div>`).join('');
}
function render(preserveState = false) {
  const state = preserveState ? getCheckState() : [];
  const s = STEPS[i];
  
  if (s.outro) {
    stage.innerHTML = `<div class="outro"><div class="big">${CHECKMARK}</div><h1>${L(s.title)}</h1><p>${L(s.lede)}</p><div class="sig">${s.sig}</div></div>`;
  } else {
    let rail = s.checklist ? checkCard(s) : (s.parts ? partsCard(s) : '');
    if (s.fastener) rail += fastCard(s);
    const left = rail ? `<div class="rail">${rail}</div>` : '';
    const imgs = (s.images || []).map(figure).join('');
    const instr = s.instr ? `<div class="steps-h">${UI[lang].howto}<span class="ln"></span></div><ol class="instr">${s.instr.map(t => `<li><p>${L(t)}</p></li>`).join('')}</ol>` : '';
    const co = (s.warn || s.tip) ? `<div class="notes-wrap">${notes(s.warn, 'warn')}${notes(s.tip, 'tip')}</div>` : '';
    const main = (imgs || instr || co) ? `<div class="viewport">${imgs}${instr}${co}</div>` : '';
    const cols = left ? `<div class="grid"><div>${left}</div>${main || '<div></div>'}</div>` : main;
    
    stage.innerHTML = `<div class="eyebrow">${L(s.phase)}</div><h1>${L(s.title)}</h1>${s.lede ? `<p class="lede">${L(s.lede)}</p>` : ''}${cols}`;
    
    if (s.checklist) {
      const bx = stage.querySelectorAll('.check input');
      bx.forEach(b => b.addEventListener('change', updateCheckCount));
      if (preserveState) setCheckState(state);
    }
  }
  
  cNum.textContent = pad(i + 1);
  bar.style.width = ((i + 1) / STEPS.length * 100) + '%';
  prevB.disabled = i === 0;
  nextB.innerHTML = i === STEPS.length - 1 ? `<span class="navlabel">${UI[lang].done}</span> ✓` : `<span class="navlabel">${UI[lang].next}</span> ›`;
  
  [...dotsWrap.children].forEach((d, k) => { d.className = 'dt' + (k === i ? ' on' : (k < i ? ' done' : '')); });
  const a = dotsWrap.children[i]; if (a) a.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  
  if (!preserveState) {
    stage.focus({ preventScroll: true });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function buildDots() {
  dotsWrap.innerHTML = '';
  STEPS.forEach((s, k) => { 
    const b = document.createElement('button'); 
    b.className = 'dt'; 
    b.title = `${pad(k + 1)} — ${L(s.title)}`; 
    b.addEventListener('click', () => { i = k; render(); }); 
    dotsWrap.appendChild(b); 
  });
}
function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('subtitle').textContent = UI[lang].sub;
  document.getElementById('cLbl').textContent = UI[lang].step;
  document.getElementById('prevL').textContent = UI[lang].prev;
  document.getElementById('nextL').textContent = UI[lang].next;
  langTxt.innerHTML = lang === 'fr' ? '<span style="color:var(--accent)">FR</span> / EN' : 'FR / <span style="color:var(--accent)">EN</span>';
  cTot.textContent = pad(STEPS.length);
  buildDots();
  render(true);
}

// Clic sur le bouton de traduction : mise à jour instantanée de l'interface
langToggle.addEventListener('click', () => {
  lang = (lang === 'fr') ? 'en' : 'fr';
  applyLang();
});

prevB.addEventListener('click', () => { if (i > 0) { i--; render(); } });
nextB.addEventListener('click', () => { if (i < STEPS.length - 1) { i++; render(); } });
document.addEventListener('keydown', e => {
  if (e.target.matches('input')) return;
  if (e.key === 'ArrowRight' && i < STEPS.length - 1) { i++; render(); }
  if (e.key === 'ArrowLeft' && i > 0) { i--; render(); }
});
document.getElementById('theme').addEventListener('click', () => { const d = document.documentElement.getAttribute('data-theme') === 'dark'; document.documentElement.setAttribute('data-theme', d ? 'light' : 'dark'); });

// Initialisation au chargement
applyLang();
</script>
</body>
</html>
