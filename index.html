 lede:F("Les capteurs de position et d'orientation doivent être calibrés.","Position and orientation sensors must be calibrated."),
 instr:[
  F("Allez dans <strong>Vehicle Setup → Sensors</strong>. Commencez par le <strong>Gyroscope</strong> : le drone doit rester immobile sur la table.","Go to <strong>Vehicle Setup → Sensors</strong>. Start with the <strong>Gyroscope</strong>: the drone must remain still on the table."),
  F("Lancez la calibration de l'<strong>Accéléromètre</strong> : placez le drone dans les 6 positions indiquées par les animations à l'écran et attendez la validation pour chaque posture.","Start the <strong>Accelerometer</strong> calibration: place the drone in the 6 positions indicated by the on-screen animations and wait for validation for each posture."),
  F("Pour le <strong>Compas</strong>, manipulez le drone dans toutes les directions (loin de sources métalliques) jusqu'à ce que la calibration se termine.","For the <strong>Compass</strong>, manipulate the drone in all directions (away from metal sources) until calibration completes."),
  F("Effectuez enfin le <strong>Level Horizon</strong> en posant le drone bien à plat.","Finally perform the <strong>Level Horizon</strong> by placing the drone perfectly flat.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer la batterie","Configure the battery"),
 lede:F("Renseignez les caractéristiques de la batterie pour que le système surveille correctement son niveau.","Enter the battery characteristics so the system correctly monitors its level."),
 instr:[
  F("Allez dans <strong>Vehicle Setup → Power</strong>.","Go to <strong>Vehicle Setup → Power</strong>."),
  F("Réglez 'Number of Cells' sur <strong>4</strong>. Indiquez la tension pleine ('Full voltage') à <span class='tag'>4.2 V</span> par cellule et la tension vide ('Empty') à <span class='tag'>3.7 V</span>.","Set 'Number of Cells' to <strong>4</strong>. Set full voltage to <span class='tag'>4.2 V</span> per cell and empty voltage to <span class='tag'>3.7 V</span>."),
  F("Saisissez la valeur <span class='tag'>18.182</span> dans le champ 'Voltage Divider' du PM02 (ajustable plus tard).","Enter the value <span class='tag'>18.182</span> in the PM02 'Voltage Divider' field (adjustable later).")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer les modes de vol","Configure flight modes"),
 lede:F("Assignez les interrupteurs de votre radio pour basculer entre les modes de vol.","Assign your radio switches to toggle between flight modes."),
 instr:[
  F("Allez dans <strong>Vehicle Setup → Flight Modes</strong>.","Go to <strong>Vehicle Setup → Flight Modes</strong>."),
  F("Sur un interrupteur à 3 positions, assignez respectivement les modes <strong>Stabilized</strong>, <strong>Altitude</strong>, et <strong>Position</strong>.","On a 3-position switch, assign respectively the <strong>Stabilized</strong>, <strong>Altitude</strong>, and <strong>Position</strong> modes."),
  F("Sur un autre interrupteur, assignez le mode <strong>Offboard</strong> (pilotage autonome).","On another switch, assign the <strong>Offboard</strong> mode (autonomous piloting)."),
  F("Il est recommandé d'assigner un interrupteur dédié à la fonction de sécurité <strong>Return to Land (RTL)</strong>.","It is recommended to assign a dedicated switch for the <strong>Return to Land (RTL)</strong> safety function.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Configurer et calibrer les ESC","Configure and calibrate the ESCs"),
 lede:F("Synchronisez la communication entre le Pixhawk et les ESC. <strong>Cette étape doit se faire SANS HÉLICES.</strong>","Synchronise communication between the Pixhawk and ESCs. <strong>This step must be done WITHOUT PROPELLERS.</strong>"),
 instr:[
  F("Allez dans <strong>Vehicle Setup → Actuators</strong>. Assurez-vous que les sorties MAIN 1 à 4 correspondent bien aux Moteurs 1 à 4. Réglez le 'PWM Rate' à <span class='tag'>400 Hz</span>.","Go to <strong>Vehicle Setup → Actuators</strong>. Ensure MAIN outputs 1 to 4 correspond to Motors 1 to 4. Set the 'PWM Rate' to <span class='tag'>400 Hz</span>."),
  F("Pour calibrer, utilisez le bouton logiciel prévu. Suivez les instructions (brancher la batterie quand demandé) pour synchroniser la plage des gaz.","To calibrate, use the provided software button. Follow the instructions (plugging in the battery when asked) to synchronise the throttle range."),
  F("Testez chaque moteur à bas régime (5-10%) depuis l'interface et observez leur sens de rotation. Si un moteur ne tourne pas dans le sens prévu (horaire ou anti-horaire), inversez deux de ses fils soudés à l'ESC.","Test each motor at low speed (5-10%) from the interface and observe their rotation direction. If a motor does not spin in the intended direction (clockwise or counter-clockwise), swap two of its wires soldered to the ESC.")]},
{phase:F("Configuration · QGC","Setup · QGC"),title:F("Régler les paramètres critiques","Set the critical parameters"),
 lede:F("Ajustez certains paramètres spécifiques dans la base de données PX4.","Adjust specific parameters in the PX4 database."),
 instr:[
  F("Allez dans <strong>Vehicle Setup → Parameters</strong>. Utilisez la barre de recherche pour trouver et modifier les valeurs suivantes, puis sauvegardez.","Go to <strong>Vehicle Setup → Parameters</strong>. Use the search bar to find and modify the following values, then save."),
  F("Cherchez <span class='tag'>CBRK_IO_SAFETY</span> et entrez 22027. Cherchez <span class='tag'>COM_RCL_EXCEPT</span> et entrez 4.","Search <span class='tag'>CBRK_IO_SAFETY</span> and enter 22027. Search <span class='tag'>COM_RCL_EXCEPT</span> and enter 4."),
  F("Pour l'UART : <span class='tag'>MAV_1_CONFIG</span> (sur TELEM 2), <span class='tag'>SER_TEL2_BAUD</span> (sur 57600), <span class='tag'>MAV_1_MODE</span> (sur Normal), et <span class='tag'>MAV_1_RATE</span> (sur 1200).","For UART: <span class='tag'>MAV_1_CONFIG</span> (on TELEM 2), <span class='tag'>SER_TEL2_BAUD</span> (on 57600), <span class='tag'>MAV_1_MODE</span> (on Normal), and <span class='tag'>MAV_1_RATE</span> (on 1200)."),
  F("Réglez <span class='tag'>MPC_THR_HOVER</span> à environ 0.65, et assurez-vous que le RTL en cas de failsafe est bien actif, avec une altitude de retour appropriée.","Set <span class='tag'>MPC_THR_HOVER</span> to around 0.65, and ensure RTL on failsafe is active, with an appropriate return altitude.")]},
/* ===== LOGICIEL PI ===== */
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Le calculateur de bord","The companion computer"),
 lede:F("La Raspberry Pi doit être configurée pour faire fonctionner l'algorithme de vol. Connectez-la à votre ordinateur via le partage de connexion de votre téléphone.","The Raspberry Pi must be configured to run the flight algorithm. Connect it to your computer via your phone's hotspot."),
 instr:[
  F("Assurez-vous que le drone est alimenté et que la Raspberry Pi a démarré.","Ensure the drone is powered and the Raspberry Pi has booted."),
  F("Connectez votre ordinateur portable au partage de connexion Wi-Fi de votre téléphone.","Connect your laptop to your phone's Wi-Fi hotspot.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Trouver les adresses IP","Find the IP addresses"),
 lede:F("Récupérez les adresses IP nécessaires pour communiquer.","Retrieve the necessary IP addresses to communicate."),
 instr:[
  F("Regardez dans les réglages du partage de connexion de votre téléphone pour identifier l'IP attribuée à la Raspberry Pi (client 'neutronit').","Look in your phone's hotspot settings to identify the IP assigned to the Raspberry Pi ('neutronit' client)."),
  F("Sur votre ordinateur, ouvrez PowerShell et tapez <span class='tag'>ipconfig</span> pour trouver l'adresse IPv4 de votre PC sur le même réseau.","On your computer, open PowerShell and type <span class='tag'>ipconfig</span> to find your PC's IPv4 address on the same network.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Connexion SSH","SSH connection"),
 lede:F("Prenez le contrôle de la Raspberry Pi à distance.","Take remote control of the Raspberry Pi."),
 instr:[
  F("Dans PowerShell, connectez-vous en tapant : <code class='cmd'>ssh neutronit@[IP_DE_LA_PI]</code>","In PowerShell, log in by typing: <code class='cmd'>ssh neutronit@[PI_IP]</code>"),
  F("Saisissez le mot de passe <span class='tag'>neutronit2026</span> lorsqu'il vous est demandé.","Enter the password <span class='tag'>neutronit2026</span> when prompted.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Installer le logiciel","Install the software"),
 lede:F("Installez les bibliothèques logicielles requises sur la Raspberry Pi.","Install the required software libraries on the Raspberry Pi."),
 instr:[
  F("Copiez et exécutez cette commande pour installer les outils système (OpenCV, GStreamer) :<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>","Copy and execute this command to install system tools (OpenCV, GStreamer):<code class='cmd'>sudo apt update && sudo apt upgrade -y && sudo apt install python3-pip python3-opencv rpicam-apps gstreamer1.0-tools gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly -y --fix-missing</code>"),
  F("Exécutez cette commande pour installer les outils de communication (MAVLink, MAVProxy) :<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>","Execute this command to install communication tools (MAVLink, MAVProxy):<code class='cmd'>pip3 install pymavlink MAVProxy numpy scipy PyYAML future --break-system-packages && echo 'export PATH=$PATH:/home/neutronit/.local/bin' >> ~/.bashrc && source ~/.bashrc && sudo usermod -a -G dialout neutronit</code>")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Activer l'UART","Enable UART"),
 lede:F("Activez le port série de la Raspberry Pi pour qu'elle puisse échanger des données avec le Pixhawk.","Enable the Raspberry Pi's serial port so it can exchange data with the Pixhawk."),
 instr:[
  F("Tapez <span class='tag'>sudo raspi-config</span>. Allez dans <strong>Interface Options → Serial Port</strong>. Répondez <strong>NO</strong> à 'login shell' et <strong>YES</strong> à 'hardware enabled'. Redémarrez la Pi.","Type <span class='tag'>sudo raspi-config</span>. Go to <strong>Interface Options → Serial Port</strong>. Answer <strong>NO</strong> to 'login shell' and <strong>YES</strong> to 'hardware enabled'. Reboot the Pi."),
  F("Reconnectez-vous en SSH et vérifiez l'installation avec :<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>","Reconnect via SSH and verify the installation with:<code class='cmd'>mavproxy.py --version && python3 -c \"import cv2; print('OpenCV OK')\" && ls /dev/ttyAMA0</code>")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Éditer le code via VS Code (Remote SSH)","Edit the code via VS Code (Remote SSH)"),
 lede:F("Utilisez Visual Studio Code pour écrire et exécuter des scripts Python directement sur la Raspberry Pi.","Use Visual Studio Code to write and run Python scripts directly on the Raspberry Pi."),
 instr:[
  F("Dans VS Code sur votre ordinateur, installez l'extension <strong>Remote - SSH</strong>.","In VS Code on your computer, install the <strong>Remote - SSH</strong> extension."),
  F("Cliquez sur l'icône de connexion (en bas à gauche), choisissez <strong>Connect to Host…</strong> et ajoutez votre connexion : <span class='tag'>ssh neutronit@[IP_DE_LA_PI]</span>.","Click the connection icon (bottom left), choose <strong>Connect to Host…</strong> and add your connection: <span class='tag'>ssh neutronit@[PI_IP]</span>."),
  F("Ouvrez le dossier <span class='tag'>/home/neutronit</span>. Vous pouvez maintenant éditer vos fichiers et ouvrir des terminaux (Terminal → New Terminal) qui s'exécuteront sur la Pi.","Open the <span class='tag'>/home/neutronit</span> folder. You can now edit your files and open terminals (Terminal → New Terminal) that will run on the Pi.")]},
{phase:F("Logiciel · Pi","Software · Pi"),title:F("Lancer le vol","Launch the flight"),
 lede:F("Lancez les processus de télémétrie, de vidéo et l'algorithme IA dans des terminaux séparés.","Launch the telemetry, video, and AI algorithm processes in separate terminals."),
 instr:[
  F("Terminal 1 (Télémétrie) - Remplacez l'IP par celle de votre <strong>PC</strong> :<code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:[IP_DU_PC]:14550 --out udp:127.0.0.1:14551</code>","Terminal 1 (Telemetry) - Replace the IP with your <strong>PC's</strong>:<code class='cmd'>mavproxy.py --master=/dev/ttyAMA0 --baudrate 57600 --out udp:[PC_IP]:14550 --out udp:127.0.0.1:14551</code>"),
  F("Terminal 2 (Vidéo) - Remplacez également l'IP par celle de votre <strong>PC</strong> :<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://[IP_DU_PC]:5600</code>","Terminal 2 (Video) - Also replace the IP with your <strong>PC's</strong>:<code class='cmd'>rpicam-vid -t 0 --codec h264 --width 640 --height 480 --framerate 30 --inline -o udp://[PC_IP]:5600</code>"),
  F("Terminal 3 (Algorithme de vol) :<code class='cmd'>python3 neutronit_vol.py</code>","Terminal 3 (Flight Algorithm):<code class='cmd'>python3 neutronit_vol.py</code>")]},
/* ===== FERMETURE ===== */
{phase:F("Fermeture finale","Final closing"),title:F("Monter le mât GPS","Fit the GPS mast"),
 lede:F("Le GPS doit être placé en hauteur pour limiter les interférences.","The GPS must be placed high up to limit interference."),
 parts:[{qty:"x4",name:F("Vis M3×8","M3×8 screws"),ref:""}],
 fastener:[F("Vis M3×8","Screw M3×8"),F("Insert M3","Insert M3")],
 images:[{src:"mat_gps.jpg",cap:F("Mât cylindrique fixé sur le dessus de la coque avec le GPS.","Cylindrical mast secured on top of the shell with the GPS.")}],
 instr:[F("Vissez la base du mât noir sur la cavité au sommet de la coque en utilisant 4 vis M3×8. Placez le module GPS au sommet du mât, en veillant à l'orienter vers l'avant.","Screw the base of the black mast onto the cavity at the top of the shell using 4 M3×8 screws. Place the GPS module on top of the mast, ensuring it is oriented forward.")]},
{phase:F("Fermeture finale","Final closing"),title:F("Fermer la coque + fixer l'ELRS","Close the shell + secure the ELRS"),
 lede:F("Il est temps de refermer le châssis de manière sécurisée.","It's time to securely close the frame."),
 parts:[
  {qty:"x4",name:F("Vis M3","M3 screws"),ref:""},
  {qty:"x1",name:F("Collier de serrage en plastique","Plastic zip tie"),ref:""}],
 fastener:[F("Vis M3","Screw M3"),F("Insert M3","Insert M3")],
 images:[
  {src:"coque_fixation.jpg",cap:F("Coque reposant sur la plaque, vissée par le dessous.","Shell resting on the plate, screwed from underneath.")},
  {src:"elrs_coque_fixation.jpg",cap:F("Récepteur ELRS attaché à l'arrière à travers les ventilations.","ELRS receiver attached at the rear through the vents.")}],
 instr:[
  F("Placez doucement la coque sur la structure. Vérifiez que les câbles (GPS, alimentation) passent correctement et ne sont pas coincés.","Gently place the shell onto the structure. Check that cables (GPS, power) route properly and are not pinched."),
  F("Fixez la coque en insérant les vis M3 depuis le dessous de la plaque principale. Serrez modérément.","Secure the shell by inserting M3 screws from underneath the main plate. Tighten moderately."),
  F("Maintenez le récepteur ELRS contre les aérations à l'arrière de la coque, l'antenne bien dégagée, et attachez-le avec un collier en plastique.","Hold the ELRS receiver against the vents at the rear of the shell, keeping the antenna clear, and secure it with a plastic zip tie.")]},
/* ===== PREMIER VOL ===== */
{phase:F("Premier vol","First flight"),title:F("Installer la batterie","Install the battery"),
 lede:F("La batterie se place sous le drone et se maintient avec des sangles.","The battery is placed under the drone and secured with straps."),
 parts:[
  {qty:"x1",name:F("Batterie LiPo 4S 6000 mAh","LiPo 4S 6000 mAh battery"),ref:""},
  {qty:"x2",name:F("Sangles velcro","Velcro straps"),ref:""}],
 images:[{src:"batterie_sangles.jpg",cap:F("Batterie maintenue fermement sous le châssis par les sangles.","Battery held firmly under the frame by the straps.")}],
 instr:[
  F("Positionnez la batterie sous la plaque inférieure, entre les 4 petits plots de centrage. Connectez la prise XT60.","Position the battery under the lower plate, between the 4 small centering posts. Connect the XT60 plug."),
  F("Enroulez les deux sangles velcro autour du corps du drone pour plaquer fermement la batterie. Serrez correctement pour éviter tout mouvement en vol.","Wrap the two velcro straps around the drone's body to firmly press the battery against it. Tighten properly to prevent any movement in flight."),
  F("Soulevez le drone par le centre de gravité. Si l'équilibre n'est pas parfait, déplacez légèrement la batterie d'avant en arrière.","Lift the drone by its centre of gravity. If the balance isn't perfect, slightly shift the battery forwards or backwards.")]},
{phase:F("Premier vol","First flight"),title:F("Monter les hélices","Fit the propellers"),

/* ============================ UI ============================ */
let lang = 'fr'; // Langue par défaut
const UI = {
  fr: {
    sub: "Notice de montage détaillée", step: "Étape", prev: "Précédent", next: "Suivant", done: "Terminer",
    parts: "Matériel requis", screws: "Visserie", check: "Checklist", howto: "Procédure",
    caution: "Attention", tip: "Astuce", checked: "Validé"
  },
  en: {
    sub: "Detailed assembly guide", step: "Step", prev: "Previous", next: "Next", done: "Finish",
    parts: "Required hardware", screws: "Fasteners", check: "Checklist", howto: "Procedure",
    caution: "Caution", tip: "Tip", checked: "Validated"
  }
};
const L = x => (x && typeof x === 'object' && 'fr' in x) ? x[lang] : x;

const stage = document.getElementById('stage'), dotsWrap = document.getElementById('dots'), bar = document.getElementById('bar');
const cNum = document.getElementById('cNum'), cTot = document.getElementById('cTot');
const prevB = document.getElementById('prev'), nextB = document.getElementById('next');
const langToggle = document.getElementById('langToggle'), langTxt = document.getElementById('langTxt');
let i = 0;
const pad = n => String(n).padStart(2, '0');
const SCREW = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M8.5 4h7l-1.5 3.2h-4z"/><path d="M10 7.2h4V18l-2 3-2-3z"/></svg>`;
const INSERT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="7" y="5" width="10" height="14" rx="1.2"/><path d="M9.4 5v14M12 5v14M14.6 5v14"/></svg>`;
const CHECKMARK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;

// Fonction pour sauvegarder l'état des cases à cocher avant de redessiner l'interface
function getCheckState() {
  const checkboxes = stage.querySelectorAll('.check input');
  return Array.from(checkboxes).map(cb => cb.checked);
}
// Fonction pour restaurer l'état
function setCheckState(stateArray) {
  const checkboxes = stage.querySelectorAll('.check input');
  checkboxes.forEach((cb, idx) => {
    if (stateArray[idx]) cb.checked = true;
  });
  updateCheckCount();
}
function updateCheckCount() {
  const bx = stage.querySelectorAll('.check input');
  const ck = document.getElementById('ckN');
  if (ck) ck.textContent = [...bx].filter(x => x.checked).length;
}

function partsCard(s) {
  const rows = s.parts.map(p => `<div class="part"><div class="qty">${L(p.qty)}</div><div><div class="pn">${L(p.name)}</div>${p.ref ? `<div class="pref">${L(p.ref)}</div>` : ''}</div></div>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].parts}</div><div class="manifest">${rows}</div></div>`;
}
function fastCard(s) {
  const it = s.fastener.map(f => { const t = L(f); const ic = /nsert/i.test(t) ? INSERT : SCREW; return `<div class="fitem">${ic}<span>${t}</span></div>`; }).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].screws}</div><div class="fastbody">${it}</div></div>`;
}
function checkCard(s) {
  const rows = s.checklist.map((c, k) => `<label class="check"><input type="checkbox" data-k="${k}"><span class="ctext">${L(c.name)}${c.ref ? `<small>${L(c.ref)}</small>` : ''}</span></label>`).join('');
  return `<div class="card"><div class="card-h"><span class="dot"></span>${UI[lang].check}</div><div class="manifest">${rows}</div><div class="checkfoot"><span>${UI[lang].checked}</span><span><b id="ckN">0</b> / ${s.checklist.length}</span></div></div>`;
}
function figure(im) {
  return `<figure class="figure"><div class="frame"><span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
    <img src="${im.src}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="ph" style="display:none"><div>[Image manquante / missing]</div><code>${im.src}</code></div></div>
    ${im.cap ? `<figcaption class="cap"><b>FIG</b><span>${L(im.cap)}</span></figcaption>` : ''}</figure>`;
}
function notes(arr, type) {
  if (!arr || !arr.length) return '';
  const ic = type === 'warn' ? '!' : 'i', lbl = type === 'warn' ? UI[lang].caution : UI[lang].tip;
  return arr.map(t => `<div class="note ${type}"><div class="ic">${ic}</div><div><b>${lbl}.</b> ${L(t)}</div></div>`).join('');
}
function render(preserveState = false) {
  const state = preserveState ? getCheckState() : [];
  const s = STEPS[i];
  
  if (s.outro) {
    stage.innerHTML = `<div class="outro"><div class="big">${CHECKMARK}</div><h1>${L(s.title)}</h1><p>${L(s.lede)}</p><div class="sig">${s.sig}</div></div>`;
  } else {
    let rail = s.checklist ? checkCard(s) : (s.parts ? partsCard(s) : '');
    if (s.fastener) rail += fastCard(s);
    const left = rail ? `<div class="rail">${rail}</div>` : '';
    const imgs = (s.images || []).map(figure).join('');
    const instr = s.instr ? `<div class="steps-h">${UI[lang].howto}<span class="ln"></span></div><ol class="instr">${s.instr.map(t => `<li><p>${L(t)}</p></li>`).join('')}</ol>` : '';
    const co = (s.warn || s.tip) ? `<div class="notes-wrap">${notes(s.warn, 'warn')}${notes(s.tip, 'tip')}</div>` : '';
    const main = (imgs || instr || co) ? `<div class="viewport">${imgs}${instr}${co}</div>` : '';
    const cols = left ? `<div class="grid"><div>${left}</div>${main || '<div></div>'}</div>` : main;
    
    stage.innerHTML = `<div class="eyebrow">${L(s.phase)}</div><h1>${L(s.title)}</h1>${s.lede ? `<p class="lede">${L(s.lede)}</p>` : ''}${cols}`;
    
    if (s.checklist) {
      const bx = stage.querySelectorAll('.check input');
      bx.forEach(b => b.addEventListener('change', updateCheckCount));
      if (preserveState) setCheckState(state);
    }
  }
  
  cNum.textContent = pad(i + 1);
  bar.style.width = ((i + 1) / STEPS.length * 100) + '%';
  prevB.disabled = i === 0;
  nextB.innerHTML = i === STEPS.length - 1 ? `<span class="navlabel">${UI[lang].done}</span> ✓` : `<span class="navlabel">${UI[lang].next}</span> ›`;
  
  [...dotsWrap.children].forEach((d, k) => { d.className = 'dt' + (k === i ? ' on' : (k < i ? ' done' : '')); });
  const a = dotsWrap.children[i]; if (a) a.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  
  if (!preserveState) {
    stage.focus({ preventScroll: true });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function buildDots() {
  dotsWrap.innerHTML = '';
  STEPS.forEach((s, k) => { 
    const b = document.createElement('button'); 
    b.className = 'dt'; 
    b.title = `${pad(k + 1)} — ${L(s.title)}`; 
    b.addEventListener('click', () => { i = k; render(); }); 
    dotsWrap.appendChild(b); 
  });
}
function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('subtitle').textContent = UI[lang].sub;
  document.getElementById('cLbl').textContent = UI[lang].step;
  document.getElementById('prevL').textContent = UI[lang].prev;
  document.getElementById('nextL').textContent = UI[lang].next;
  langTxt.innerHTML = lang === 'fr' ? '<span style="color:var(--accent)">FR</span> / EN' : 'FR / <span style="color:var(--accent)">EN</span>';
  cTot.textContent = pad(STEPS.length);
  buildDots();
  // On passe "true" pour préserver l'état (les cases cochées) lors d'un simple changement de langue
  render(true);
}

// Clic sur le bouton de traduction : mise à jour instantanée de l'interface
langToggle.addEventListener('click', () => {
  lang = (lang === 'fr') ? 'en' : 'fr';
  applyLang();
});

prevB.addEventListener('click', () => { if (i > 0) { i--; render(); } });
nextB.addEventListener('click', () => { if (i < STEPS.length - 1) { i++; render(); } });
document.addEventListener('keydown', e => {
  if (e.target.matches('input')) return;
  if (e.key === 'ArrowRight' && i < STEPS.length - 1) { i++; render(); }
  if (e.key === 'ArrowLeft' && i > 0) { i--; render(); }
});
document.getElementById('theme').addEventListener('click', () => { const d = document.documentElement.getAttribute('data-theme') === 'dark'; document.documentElement.setAttribute('data-theme', d ? 'light' : 'dark'); });

// Initialisation au chargement
applyLang();
</script>
</body>
</html>
